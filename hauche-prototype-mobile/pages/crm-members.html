    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style id="theme-vars">
:root {
  --color-primary: #C8A45C;
  --color-primary-light: #D4B76E;
  --color-primary-lighter: #E2CC8E;
  --color-primary-lightest: rgba(200, 164, 92, 0.1);
  --color-primary-dark: #A6893F;

  --color-background: #0C0C14;
  --color-background-secondary: #111119;
  --color-surface: #16161F;
  --color-surface-elevated: #1C1C28;
  --color-surface-hover: #222232;

  --color-text-primary: #F0ECE4;
  --color-text-secondary: #8A867E;
  --color-text-tertiary: #5A5750;

  --color-border: rgba(255, 255, 255, 0.06);
  --color-divider: rgba(255, 255, 255, 0.08);

  --state-success: #34D399;
  --state-success-bg: rgba(52, 211, 153, 0.1);
  --state-warning: #FBBF24;
  --state-warning-bg: rgba(251, 191, 36, 0.1);
  --state-error: #F87171;
  --state-error-bg: rgba(248, 113, 113, 0.1);
  --state-info: #60A5FA;
  --state-info-bg: rgba(96, 165, 250, 0.1);

  --font-display: 'Inter', 'Noto Sans SC', sans-serif;
  --font-body: 'Inter', 'Noto Sans SC', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;

  --text-xs: 0.6875rem;
  --text-sm: 0.75rem;
  --text-base: 0.8125rem;
  --text-lg: 0.875rem;
  --text-xl: 1rem;
  --text-2xl: 1.125rem;

  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;

  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-full: 9999px;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--color-background);
    --color-primary: var(--color-primary);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        width: 375px;
        min-height: 100vh;
        background: var(--color-background);
        color: var(--color-text-primary);
        font-family: 'Inter', 'Noto Sans SC', -apple-system, sans-serif;
        font-size: var(--text-base);
        line-height: 1.5;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
      }
      body {
        padding-bottom: calc(56px + env(safe-area-inset-bottom, 0px));
      }

      /* ── App Header ── */
      .app-header {
        position: sticky;
        top: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 48px;
        padding: 0 var(--space-4);
        background: var(--color-background);
        border-bottom: 1.5px solid var(--color-primary);
      }
      .app-header .back-btn,
      .app-header .add-btn {
        width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: none;
        background: none;
        color: var(--color-text-primary);
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }
      .app-header .add-btn { color: var(--color-primary); }
      .app-header .title {
        font-size: var(--text-lg);
        font-weight: 600;
        color: var(--color-text-primary);
        letter-spacing: 0.02em;
      }

      /* ── Search Bar ── */
      .search-bar {
        padding: var(--space-3) var(--space-4);
      }
      .search-bar .search-input {
        width: 100%;
        height: 36px;
        display: flex;
        align-items: center;
        gap: var(--space-2);
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-full);
        padding: 0 var(--space-4);
        color: var(--color-text-tertiary);
        font-size: var(--text-sm);
      }
      .search-bar .search-input svg {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
        opacity: 0.5;
      }

      /* ── Filter Tabs ── */
      .filter-tabs {
        display: flex;
        gap: 0;
        padding: 0 var(--space-4) var(--space-3);
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }
      .filter-tabs::-webkit-scrollbar { display: none; }
      .filter-tabs { -ms-overflow-style: none; scrollbar-width: none; }
      .filter-tab {
        flex-shrink: 0;
        padding: 6px var(--space-3);
        border-radius: var(--radius-full);
        font-size: var(--text-sm);
        font-weight: 500;
        border: 1px solid var(--color-border);
        background: transparent;
        color: var(--color-text-secondary);
        cursor: pointer;
        white-space: nowrap;
        transition: all 0.2s;
        -webkit-tap-highlight-color: transparent;
      }
      .filter-tab.active {
        background: rgba(200, 164, 92, 0.15);
        border-color: var(--color-primary);
        color: var(--color-primary);
      }
      .filter-tab + .filter-tab {
        margin-left: var(--space-2);
      }

      /* ── Member List ── */
      .member-list {
        padding: 0 var(--space-4);
        display: flex;
        flex-direction: column;
        gap: var(--space-3);
      }

      /* ── Member Card ── */
      .member-card {
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-lg);
        padding: var(--space-4);
        position: relative;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        transition: background 0.15s;
      }
      .member-card:active {
        background: var(--color-surface-hover);
      }

      .member-card .card-header {
        display: flex;
        align-items: flex-start;
        gap: var(--space-3);
      }
      .member-card .avatar {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: var(--text-lg);
        font-weight: 600;
        flex-shrink: 0;
      }
      .avatar-gold { background: rgba(200, 164, 92, 0.15); color: var(--color-primary); }
      .avatar-blue { background: rgba(96, 165, 250, 0.12); color: var(--state-info); }
      .avatar-gray { background: rgba(138, 134, 126, 0.12); color: var(--color-text-secondary); }

      .member-card .card-info { flex: 1; min-width: 0; }
      .member-card .name-row {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        margin-bottom: 2px;
      }
      .member-card .name {
        font-size: var(--text-base);
        font-weight: 600;
        color: var(--color-text-primary);
      }
      .tier-badge {
        display: inline-flex;
        align-items: center;
        padding: 1px 8px;
        border-radius: var(--radius-full);
        font-size: var(--text-xs);
        font-weight: 600;
        letter-spacing: 0.02em;
      }
      .tier-gold { background: rgba(200, 164, 92, 0.18); color: var(--color-primary-lighter); }
      .tier-blue { background: rgba(96, 165, 250, 0.15); color: var(--state-info); }
      .tier-gray { background: rgba(138, 134, 126, 0.15); color: var(--color-text-secondary); }

      .member-card .phone {
        font-size: var(--text-sm);
        color: var(--color-text-secondary);
        margin-bottom: var(--space-2);
      }

      /* Tags */
      .tags-row {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-1);
        margin-bottom: var(--space-2);
      }
      .tag-pill {
        padding: 2px 8px;
        border-radius: var(--radius-full);
        font-size: var(--text-xs);
        font-weight: 500;
      }
      .tag-purple { background: rgba(167, 139, 250, 0.12); color: #A78BFA; }
      .tag-teal { background: rgba(52, 211, 153, 0.1); color: var(--state-success); }
      .tag-amber { background: rgba(251, 191, 36, 0.1); color: var(--state-warning); }
      .tag-blue { background: rgba(96, 165, 250, 0.1); color: var(--state-info); }
      .tag-rose { background: rgba(251, 113, 133, 0.1); color: #FB7185; }

      /* Meta info */
      .card-meta {
        font-size: var(--text-xs);
        color: var(--color-text-tertiary);
        display: flex;
        align-items: center;
        gap: var(--space-2);
        margin-bottom: 4px;
      }
      .card-meta .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--color-text-tertiary); flex-shrink: 0; }

      /* Purchase */
      .card-purchase {
        font-size: var(--text-xs);
        color: var(--color-text-secondary);
        margin-top: var(--space-1);
        margin-bottom: 4px;
        display: flex;
        align-items: flex-start;
        gap: var(--space-2);
      }
      .card-purchase .purchase-icon {
        flex-shrink: 0;
        width: 14px;
        height: 14px;
        margin-top: 1px;
        opacity: 0.5;
      }

      /* Commission */
      .card-commission {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 3px 10px;
        border-radius: var(--radius-sm);
        font-size: var(--text-xs);
        font-weight: 600;
        margin-top: var(--space-1);
      }
      .commission-pending {
        background: rgba(200, 164, 92, 0.12);
        color: var(--color-primary-lighter);
      }
      .commission-settled {
        background: var(--state-success-bg);
        color: var(--state-success);
      }

      /* Chevron */
      .member-card .chevron {
        position: absolute;
        right: var(--space-4);
        top: 50%;
        transform: translateY(-50%);
        width: 16px;
        height: 16px;
        color: var(--color-text-tertiary);
      }

      /* Push content right of chevron */
      .member-card .card-body {
        padding-right: 24px;
      }

      /* ── Floating Action Button ── */
      .fab {
        position: fixed;
        bottom: calc(56px + var(--space-4) + env(safe-area-inset-bottom, 0px));
        right: var(--space-4);
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: var(--color-primary);
        color: var(--color-background);
        display: flex;
        align-items: center;
        justify-content: center;
        border: none;
        cursor: pointer;
        box-shadow: 0 4px 20px rgba(200, 164, 92, 0.35);
        z-index: 90;
        -webkit-tap-highlight-color: transparent;
        transition: transform 0.15s, box-shadow 0.15s;
      }
      .fab:active {
        transform: scale(0.92);
        box-shadow: 0 2px 10px rgba(200, 164, 92, 0.25);
      }
      .fab svg { width: 24px; height: 24px; }

      /* ── Bottom Tab Bar ── */
      .tab-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 56px;
        background: var(--color-surface);
        border-top: 1px solid var(--color-border);
        display: flex;
        align-items: center;
        justify-content: space-around;
        z-index: 100;
        padding-bottom: env(safe-area-inset-bottom, 0px);
        max-width: 375px;
        margin: 0 auto;
      }
      .tab-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
        font-size: var(--text-xs);
        color: var(--color-text-tertiary);
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        border: none;
        background: none;
        padding: 4px 0;
      }
      .tab-item svg { width: 22px; height: 22px; }
      .tab-item.active { color: var(--color-primary); }

      /* Utility */
      .section-divider {
        height: 8px;
        background: var(--color-background);
      }
    </style>
</body>
