<head>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style id="theme-vars">
:root {
  /* ── Brand Colors ── */
  --color-primary: #C8A45C;
  --color-primary-light: #D4B76E;
  --color-primary-lighter: #E2CC8E;
  --color-primary-lightest: #F0E4C0;
  --color-primary-dark: #A6893F;
  --color-primary-darker: #8B7133;

  --color-background: #0A0A0F;
  --color-background-secondary: #12121A;
  --color-background-tertiary: #1A1A26;
  --color-surface: #16161F;
  --color-surface-elevated: #1E1E2A;

  --color-text-primary: #F5F0E8;
  --color-text-secondary: #A09B90;
  --color-text-tertiary: #6B665C;
  --color-text-inverse: #0A0A0F;

  --color-border: rgba(200, 164, 92, 0.15);
  --color-border-subtle: rgba(255, 255, 255, 0.06);
  --color-divider: rgba(255, 255, 255, 0.08);

  /* ── State Colors ── */
  --state-success: #34D399;
  --state-warning: #FBBF24;
  --state-error: #F87171;
  --state-info: #60A5FA;

  /* ── Typography ── */
  --font-display: 'Playfair Display', 'Noto Serif SC', Georgia, serif;
  --font-body: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', monospace;

  --text-xs: 0.75rem;
  --text-sm: 0.875rem;
  --text-base: 1rem;
  --text-lg: 1.125rem;
  --text-xl: 1.25rem;
  --text-2xl: 1.5rem;
  --text-3xl: 1.875rem;
  --text-4xl: 2.25rem;
  --text-5xl: 3rem;
  --text-6xl: 3.75rem;
  --text-display: 4.5rem;

  --leading-tight: 1.15;
  --leading-snug: 1.3;
  --leading-normal: 1.6;
  --leading-relaxed: 1.75;

  --tracking-tight: -0.02em;
  --tracking-normal: 0;
  --tracking-wide: 0.05em;
  --tracking-wider: 0.1em;

  /* ── Spacing ── */
  --space-1: 0.25rem;
  --space-2: 0.5rem;
  --space-3: 0.75rem;
  --space-4: 1rem;
  --space-5: 1.25rem;
  --space-6: 1.5rem;
  --space-8: 2rem;
  --space-10: 2.5rem;
  --space-12: 3rem;
  --space-16: 4rem;
  --space-20: 5rem;
  --space-24: 6rem;
  --space-32: 8rem;

  /* ── Radius ── */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;

  /* ── Shadows ── */
  --shadow-card: 0 1px 3px rgba(0, 0, 0, 0.04);
  --shadow-elevated: 0 4px 16px rgba(0, 0, 0, 0.05);
  --shadow-floating: 0 8px 32px rgba(0, 0, 0, 0.08);
}

/* ── Typography Classes ── */
.font-display { font-family: var(--font-display); }
.font-body { font-family: var(--font-body); }
.font-mono { font-family: var(--font-mono); }

.text-display {
  font-family: var(--font-display);
  font-size: var(--text-display);
  line-height: var(--leading-tight);
  letter-spacing: var(--tracking-tight);
}

.text-heading {
  font-family: var(--font-display);
  font-size: var(--text-4xl);
  line-height: var(--leading-tight);
  letter-spacing: var(--tracking-tight);
}

.text-subheading {
  font-family: var(--font-body);
  font-size: var(--text-xl);
  line-height: var(--leading-snug);
  letter-spacing: var(--tracking-wide);
  font-weight: 300;
}

.text-body {
  font-family: var(--font-body);
  font-size: var(--text-base);
  line-height: var(--leading-normal);
}

.text-caption {
  font-family: var(--font-body);
  font-size: var(--text-sm);
  line-height: var(--leading-normal);
  color: var(--color-text-secondary);
}

.text-overline {
  font-family: var(--font-body);
  font-size: var(--text-xs);
  line-height: var(--leading-normal);
  letter-spacing: var(--tracking-wider);
  text-transform: uppercase;
  color: var(--color-primary);
  font-weight: 600;
}

/* ── Surface Classes ── */
.surface-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border-subtle);
  border-radius: var(--radius-lg);
}

.surface-elevated {
  background: var(--color-surface-elevated);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
}

/* ── Gold accent line ── */
.gold-line {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--color-primary), transparent);
}

.gold-line-left {
  height: 2px;
  width: 48px;
  background: var(--color-primary);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>

    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--color-background);
    --color-primary: var(--color-primary);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }

      /* ── Project Shell: Global Layout ── */
      html, body {
        background: var(--color-background);
        min-height: 100vh;
      }

      /* ── Project Shell: Navbar ── */
      .shell-navbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        background: rgba(10, 10, 15, 0.9);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(200, 164, 92, 0.2);
        transition: background 0.3s ease;
      }

      .shell-navbar__inner {
        max-width: 1280px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 1.5rem;
        height: 64px;
      }

      .shell-navbar__logo {
        font-family: var(--font-display);
        font-size: 1.375rem;
        font-weight: 600;
        color: var(--color-primary);
        text-decoration: none;
        letter-spacing: var(--tracking-wide);
        white-space: nowrap;
      }

      .shell-navbar__logo:hover {
        color: var(--color-primary-light);
      }

      .shell-navbar__nav {
        display: flex;
        align-items: center;
        gap: 2rem;
        overflow-x: auto;
      }

      .shell-navbar__link {
        font-family: var(--font-body);
        font-size: var(--text-xs);
        font-weight: 500;
        letter-spacing: var(--tracking-wider);
        text-transform: uppercase;
        color: var(--color-text-secondary);
        text-decoration: none;
        padding: 0.25rem 0;
        position: relative;
        white-space: nowrap;
        transition: color 0.25s ease;
      }

      .shell-navbar__link::after {
        content: '';
        position: absolute;
        bottom: -2px;
        left: 0;
        width: 0;
        height: 1px;
        background: var(--color-primary);
        transition: width 0.3s ease;
      }

      .shell-navbar__link:hover {
        color: var(--color-text-primary);
      }

      .shell-navbar__link:hover::after {
        width: 100%;
      }

      /* Active nav item */
      .shell-navbar__link[data-active="true"] {
        color: var(--color-primary);
      }

      .shell-navbar__link[data-active="true"]::after {
        width: 100%;
        background: var(--color-primary);
      }

      /* ── Project Shell: Mobile Nav ── */
      @media (max-width: 768px) {
        .shell-navbar__inner {
          padding: 0 1rem;
          gap: 1rem;
        }

        .shell-navbar__nav {
          gap: 1.25rem;
          -webkit-overflow-scrolling: touch;
          scrollbar-width: none;
          -ms-overflow-style: none;
        }

        .shell-navbar__nav::-webkit-scrollbar {
          display: none;
        }

        .shell-navbar__link {
          font-size: 0.6875rem;
        }

        .shell-navbar__logo {
          font-size: 1.125rem;
        }
      }

      /* ── Project Shell: Main Content Area ── */
      .shell-main {
        padding-top: 64px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .shell-content {
        flex: 1;
      }

      /* ── Project Shell: Footer ── */
      .shell-footer {
        border-top: 1px solid var(--color-border);
        padding: 2rem 1.5rem;
        text-align: center;
      }

      .shell-footer__text {
        font-family: var(--font-body);
        font-size: var(--text-sm);
        color: var(--color-text-tertiary);
        letter-spacing: var(--tracking-wide);
      }

      .shell-footer__gold-divider {
        width: 48px;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--color-primary), transparent);
        margin: 0 auto 1rem;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">

    <!-- ═══════════════════════════════════════════════════
         HEADER / NAVBAR (fixed top)
         ═══════════════════════════════════════════════════ -->
    <header class="shell-navbar">
        <div class="shell-navbar__inner">

    <!-- ═══════════════════════════════════════════════════
         MAIN CONTENT WRAPPER

    <div class="shell-main">
        <div class="shell-content">

            <!-- ─────────────────────────────────────────────

            <section class="hero-section">
                <div class="hero-section__overlay"></div>

                    <h1 class="font-display" style="font-size: var(--text-display); color: var(--color-primary); line-height: var(--leading-tight); margin-bottom: var(--space-6);">

                    </h1>
                    <p class="font-body" style="font-size: var(--text-xl); color: var(--color-text-secondary); font-weight: 300; letter-spacing: var(--tracking-wide); max-width: 600px; margin: 0 auto var(--space-8);">

    <!-- Page-specific styles (before </body>) -->
    <style>
        /* ── Hero Section ── */
        .hero-section {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: url('../assets/hero-main.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            overflow: hidden;
        }

        .hero-section__overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to bottom,
                rgba(10, 10, 15, 0.4) 0%,
                rgba(10, 10, 15, 0.85) 100%
            );
            z-index: 1;
        }

        .hero-section__content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: var(--space-8) var(--space-6);
            max-width: 800px;
        }

        /* ── Gold Badge Pills ── */
        .badge-pill {
            display: inline-block;
            padding: var(--space-2) var(--space-5);
            border: 1px solid var(--color-primary);
            border-radius: var(--radius-full);
            font-family: var(--font-body);
            font-size: var(--text-sm);
            color: var(--color-primary);
            letter-spacing: var(--tracking-wide);
            white-space: nowrap;
            transition: background 0.25s ease, color 0.25s ease;
        }

        .badge-pill:hover {
            background: rgba(200, 164, 92, 0.12);
        }

        /* ── Hero CTA Button ── */
        .hero-cta {
            display: inline-block;
            padding: var(--space-3) var(--space-8);
            background: var(--color-primary);
            color: var(--color-text-inverse);
            font-family: var(--font-body);
            font-size: var(--text-base);
            font-weight: 600;
            letter-spacing: var(--tracking-wide);
            border-radius: var(--radius-md);
            text-decoration: none;
            transition: background 0.25s ease, transform 0.2s ease;
        }

        .hero-cta:hover {
            background: var(--color-primary-light);
            transform: translateY(-1px);
        }

        /* ── Metrics Grid ── */
        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: var(--space-8);
        }

        @media (min-width: 768px) {
            .metrics-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* ── Metric Card ── */
        .metric-card {
            padding: var(--space-8);
            border-top: 2px solid var(--color-primary) !important;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .metric-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        .metric-card__number {
            font-size: var(--text-4xl);
            font-weight: 700;
            margin-bottom: var(--space-2);
        }

        .metric-card__label {
            font-size: var(--text-lg);
            font-weight: 500;
        }

            color: var(--color-primary);
        }

        .shell-navbar__link[data-active="true"]::after {
            width: 100%;
            background: var(--color-primary);
        }
