<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>豪车之家 - 大湾区高端豪车平台</title>
    <style id="theme-vars">
:root {
  /* ── Brand Colors ── */
  --color-primary: #C8A45C;
  --color-primary-light: #D4B76E;
  --color-primary-lighter: #E2CC8E;
  --color-primary-lightest: #F0E4C0;
  --color-primary-dark: #A6893F;
  --color-primary-darker: #8B7133;

  --color-background: #0A0A0F;
  --color-background-secondary: #12121A;
  --color-background-tertiary: #1A1A26;
  --color-surface: #16161F;
  --color-surface-elevated: #1E1E2A;

  --color-text-primary: #F5F0E8;
  --color-text-secondary: #A09B90;
  --color-text-tertiary: #6B665C;
  --color-text-inverse: #0A0A0F;

  --color-border: rgba(200, 164, 92, 0.15);
  --color-border-subtle: rgba(255, 255, 255, 0.06);
  --color-divider: rgba(255, 255, 255, 0.08);

  /* ── State Colors ── */
  --state-success: #34D399;
  --state-warning: #FBBF24;
  --state-error: #F87171;
  --state-info: #60A5FA;

  /* ── Typography ── */
  --font-display: 'Playfair Display', 'Noto Serif SC', Georgia, serif;
  --font-body: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', monospace;

  --text-xs: 0.75rem;
  --text-sm: 0.875rem;
  --text-base: 1rem;
  --text-lg: 1.125rem;
  --text-xl: 1.25rem;
  --text-2xl: 1.5rem;
  --text-3xl: 1.875rem;
  --text-4xl: 2.25rem;
  --text-5xl: 3rem;
  --text-6xl: 3.75rem;
  --text-display: 4.5rem;

  --leading-tight: 1.15;
  --leading-snug: 1.3;
  --leading-normal: 1.6;
  --leading-relaxed: 1.75;

  --tracking-tight: -0.02em;
  --tracking-normal: 0;
  --tracking-wide: 0.05em;
  --tracking-wider: 0.1em;

  /* ── Spacing ── */
  --space-1: 0.25rem;
  --space-2: 0.5rem;
  --space-3: 0.75rem;
  --space-4: 1rem;
  --space-5: 1.25rem;
  --space-6: 1.5rem;
  --space-8: 2rem;
  --space-10: 2.5rem;
  --space-12: 3rem;
  --space-16: 4rem;
  --space-20: 5rem;
  --space-24: 6rem;
  --space-32: 8rem;

  /* ── Radius ── */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;

  /* ── Shadows (static surfaces: border-first; floating layers: subtle shadow) ── */
  --shadow-card: 0 1px 3px rgba(0, 0, 0, 0.04);
  --shadow-elevated: 0 4px 16px rgba(0, 0, 0, 0.05);
  --shadow-floating: 0 8px 32px rgba(0, 0, 0, 0.08);
}

/* ── Typography Classes ── */
.font-display { font-family: var(--font-display); }
.font-body { font-family: var(--font-body); }
.font-mono { font-family: var(--font-mono); }

.text-display {
  font-family: var(--font-display);
  font-size: var(--text-display);
  line-height: var(--leading-tight);
  letter-spacing: var(--tracking-tight);
}

.text-heading {
  font-family: var(--font-display);
  font-size: var(--text-4xl);
  line-height: var(--leading-tight);
  letter-spacing: var(--tracking-tight);
}

.text-subheading {
  font-family: var(--font-body);
  font-size: var(--text-xl);
  line-height: var(--leading-snug);
  letter-spacing: var(--tracking-wide);
  font-weight: 300;
}

.text-body {
  font-family: var(--font-body);
  font-size: var(--text-base);
  line-height: var(--leading-normal);
}

.text-caption {
  font-family: var(--font-body);
  font-size: var(--text-sm);
  line-height: var(--leading-normal);
  color: var(--color-text-secondary);
}

.text-overline {
  font-family: var(--font-body);
  font-size: var(--text-xs);
  line-height: var(--leading-normal);
  letter-spacing: var(--tracking-wider);
  text-transform: uppercase;
  color: var(--color-primary);
  font-weight: 600;
}

/* ── Surface Classes ── */
.surface-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border-subtle);
  border-radius: var(--radius-lg);
}

.surface-elevated {
  background: var(--color-surface-elevated);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
}

/* ── Gold accent line ── */
.gold-line {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--color-primary), transparent);
}

.gold-line-left {
  height: 2px;
  width: 48px;
  background: var(--color-primary);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--color-background);
    --color-primary: var(--color-primary);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="pb-20">

        <!-- Hero Section -->
        <section class="relative flex items-center justify-center" style="min-height: 70vh;">
            <div class="absolute inset-0 bg-cover bg-center" style="background-image: url('../assets/hero-main.jpg');"></div>
            <div class="absolute inset-0" style="background: linear-gradient(to bottom, rgba(10,10,15,0.4), rgba(10,10,15,0.85));"></div>
            <div class="relative z-10 flex flex-col items-center px-6 text-center">
                <h1 class="font-display text-5xl tracking-tight" style="color: var(--color-primary); text-wrap: balance; word-break: keep-all; overflow-wrap: break-word; line-height: var(--leading-tight);">豪车之家</h1>
                <p class="font-body text-base mt-3" style="color: var(--color-text-secondary); font-weight: 300; letter-spacing: var(--tracking-wide);">大湾区高端豪车平台</p>
                <div class="flex flex-col items-center gap-3 mt-8">
                    <span class="inline-block text-xs whitespace-nowrap py-2 px-4 rounded-full text-center font-body" style="border: 1px solid var(--color-primary); color: var(--color-primary); letter-spacing: var(--tracking-wide);">字节TRAE AI大赛</span>
                    <span class="inline-block text-xs whitespace-nowrap py-2 px-4 rounded-full text-center font-body" style="border: 1px solid var(--color-primary); color: var(--color-primary); letter-spacing: var(--tracking-wide);">估值 6600万</span>
                    <span class="inline-block text-xs whitespace-nowrap py-2 px-4 rounded-full text-center font-body" style="border: 1px solid var(--color-primary); color: var(--color-primary); letter-spacing: var(--tracking-wide);">对标汽车之家</span>
                </div>
                <a href="#" data-dom-id="cta-market-pain" class="mt-8 w-full max-w-xs flex items-center justify-center py-3 rounded-lg font-body text-sm font-semibold" style="background: var(--color-primary); color: var(--color-text-inverse); min-height: 44px; letter-spacing: var(--tracking-wide);">探索AI解决方案</a>
            </div>
        </section>

        <!-- Gold Divider -->
        <div class="gold-line mx-6"></div>

        <!-- Metrics Section -->
        <section class="px-6 py-10">
            <h2 class="font-display text-2xl tracking-tight text-center mb-8" style="color: var(--color-text-primary); text-wrap: balance; word-break: keep-all; overflow-wrap: break-word; line-height: var(--leading-snug);">为什么选择豪车之家</h2>
            <div class="flex flex-col gap-4">
                <div class="surface-card px-5 py-4" style="border-left: 2px solid var(--color-primary);">
                    <div class="font-display text-4xl whitespace-nowrap" style="color: var(--color-primary); line-height: var(--leading-tight); letter-spacing: var(--tracking-tight);">6套</div>
                    <div class="font-body text-sm mt-1" style="color: var(--color-text-primary); font-weight: 500;">自研AI工具</div>
                    <p class="font-body text-sm mt-1 line-clamp-2" style="color: var(--color-text-secondary);">覆盖内容生成、智能推荐、图像识别等核心业务场景</p>
                </div>
                <div class="surface-card px-5 py-4" style="border-left: 2px solid var(--color-primary);">
                    <div class="font-display text-4xl whitespace-nowrap" style="color: var(--color-primary); line-height: var(--leading-tight); letter-spacing: var(--tracking-tight);">80%</div>
                    <div class="font-body text-sm mt-1" style="color: var(--color-text-primary); font-weight: 500;">人力成本削减</div>
                    <p class="font-body text-sm mt-1 line-clamp-2" style="color: var(--color-text-secondary);">AI自动化流程大幅降低运营与内容制作成本</p>
                </div>
                <div class="surface-card px-5 py-4" style="border-left: 2px solid var(--color-primary);">
                    <div class="font-display text-4xl whitespace-nowrap" style="color: var(--color-primary); line-height: var(--leading-tight); letter-spacing: var(--tracking-tight);">6600万</div>
                    <div class="font-body text-sm mt-1" style="color: var(--color-text-primary); font-weight: 500;">当前估值</div>
                    <p class="font-body text-sm mt-1 line-clamp-2" style="color: var(--color-text-secondary);">大湾区领先的高端汽车数字平台，增长势头强劲</p>
                </div>
            </div>
        </section>

    </main>

    <!-- Bottom Tab Bar -->
    <nav class="fixed bottom-0 inset-x-0 z-50 flex items-center justify-around" style="background: var(--color-background-secondary); border-top: 1px solid var(--color-border); padding-bottom: env(safe-area-inset-bottom, 0px);">
        <a href="#" class="tab-item flex flex-col items-center justify-center py-2 px-3" data-tab-key="index" data-dom-id="tab-index" data-active="true" style="min-height: 44px; min-width: 44px;">
            <i data-lucide="home" style="width: 20px; height: 20px;"></i>
            <span class="text-xs mt-1 font-body">首页</span>
        </a>
        <a href="#" class="tab-item flex flex-col items-center justify-center py-2 px-3" data-tab-key="market-pain" data-dom-id="tab-market-pain" style="min-height: 44px; min-width: 44px;">
            <i data-lucide="alert-circle" style="width: 20px; height: 20px;"></i>
            <span class="text-xs mt-1 font-body">痛点</span>
        </a>
        <a href="#" class="tab-item flex flex-col items-center justify-center py-2 px-3" data-tab-key="ai-solutions" data-dom-id="tab-ai-solutions" style="min-height: 44px; min-width: 44px;">
            <i data-lucide="cpu" style="width: 20px; height: 20px;"></i>
            <span class="text-xs mt-1 font-body">AI方案</span>
        </a>
        <a href="#" class="tab-item flex flex-col items-center justify-center py-2 px-3" data-tab-key="business-model" data-dom-id="tab-business-model" style="min-height: 44px; min-width: 44px;">
            <i data-lucide="trending-up" style="width: 20px; height: 20px;"></i>
            <span class="text-xs mt-1 font-body">模式</span>
        </a>
        <a href="#" class="tab-item flex flex-col items-center justify-center py-2 px-3" data-tab-key="tech-team" data-dom-id="tab-tech-team" style="min-height: 44px; min-width: 44px;">
            <i data-lucide="award" style="width: 20px; height: 20px;"></i>
            <span class="text-xs mt-1 font-body">团队</span>
        </a>
    </nav>

    <style>
        /* Tab bar styling */
        .tab-item {
            color: var(--color-text-tertiary);
            transition: color 0.2s ease;
        }
        .tab-item[data-active="true"] {
            color: var(--color-primary);
        }

        /* Smooth scroll */
        html { scroll-behavior: smooth; }

        /* No horizontal scroll */
        body { overflow-x: hidden; }

        /* Card touch feedback */
        .surface-card {
            transition: transform 0.15s ease;
        }
        .surface-card:active {
            transform: translateY(-1px);
        }

        /* CTA hover feedback */
        a[data-dom-id="cta-market-pain"] {
            transition: opacity 0.2s ease;
        }
        a[data-dom-id="cta-market-pain"]:hover {
            opacity: 0.9;
        }
        a[data-dom-id="cta-market-pain"]:active {
            transform: scale(0.98);
        }
    </style>
    <script>lucide.createIcons();</script>
</body>
</html>
