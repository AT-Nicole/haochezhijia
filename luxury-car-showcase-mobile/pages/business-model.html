    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style id="theme-vars">
:root {
  /* ── Brand Colors ── */
  --color-primary: #C8A45C;
  --color-primary-light: #D4B76E;
  --color-primary-lighter: #E2CC8E;
  --color-primary-lightest: #F0E4C0;
  --color-primary-dark: #A6893F;
  --color-primary-darker: #8B7133;

  --color-background: #0A0A0F;
  --color-background-secondary: #12121A;
  --color-background-tertiary: #1A1A26;
  --color-surface: #16161F;
  --color-surface-elevated: #1E1E2A;

  --color-text-primary: #F5F0E8;
  --color-text-secondary: #A09B90;
  --color-text-tertiary: #6B665C;
  --color-text-inverse: #0A0A0F;

  --color-border: rgba(200, 164, 92, 0.15);
  --color-border-subtle: rgba(255, 255, 255, 0.06);
  --color-divider: rgba(255, 255, 255, 0.08);

  /* ── State Colors ── */
  --state-success: #34D399;
  --state-warning: #FBBF24;
  --state-error: #F87171;
  --state-info: #60A5FA;

  /* ── Typography ── */
  --font-display: 'Playfair Display', 'Noto Serif SC', Georgia, serif;
  --font-body: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', monospace;

  --text-xs: 0.75rem;
  --text-sm: 0.875rem;
  --text-base: 1rem;
  --text-lg: 1.125rem;
  --text-xl: 1.25rem;
  --text-2xl: 1.5rem;
  --text-3xl: 1.875rem;
  --text-4xl: 2.25rem;
  --text-5xl: 3rem;
  --text-6xl: 3.75rem;
  --text-display: 4.5rem;

  --leading-tight: 1.15;
  --leading-snug: 1.3;
  --leading-normal: 1.6;
  --leading-relaxed: 1.75;

  --tracking-tight: -0.02em;
  --tracking-normal: 0;
  --tracking-wide: 0.05em;
  --tracking-wider: 0.1em;

  /* ── Spacing ── */
  --space-1: 0.25rem;
  --space-2: 0.5rem;
  --space-3: 0.75rem;
  --space-4: 1rem;
  --space-5: 1.25rem;
  --space-6: 1.5rem;
  --space-8: 2rem;
  --space-10: 2.5rem;
  --space-12: 3rem;
  --space-16: 4rem;
  --space-20: 5rem;
  --space-24: 6rem;
  --space-32: 8rem;

  /* ── Radius ── */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;

  /* ── Shadows (static surfaces: border-first; floating layers: subtle shadow) ── */
  --shadow-card: 0 1px 3px rgba(0, 0, 0, 0.04);
  --shadow-elevated: 0 4px 16px rgba(0, 0, 0, 0.05);
  --shadow-floating: 0 8px 32px rgba(0, 0, 0, 0.08);
}

/* ── Typography Classes ── */
.font-display { font-family: var(--font-display); }
.font-body { font-family: var(--font-body); }
.font-mono { font-family: var(--font-mono); }

.text-display {
  font-family: var(--font-display);
  font-size: var(--text-display);
  line-height: var(--leading-tight);
  letter-spacing: var(--tracking-tight);
}

.text-heading {
  font-family: var(--font-display);
  font-size: var(--text-4xl);
  line-height: var(--leading-tight);
  letter-spacing: var(--tracking-tight);
}

.text-subheading {
  font-family: var(--font-body);
  font-size: var(--text-xl);
  line-height: var(--leading-snug);
  letter-spacing: var(--tracking-wide);
  font-weight: 300;
}

.text-body {
  font-family: var(--font-body);
  font-size: var(--text-base);
  line-height: var(--leading-normal);
}

.text-caption {
  font-family: var(--font-body);
  font-size: var(--text-sm);
  line-height: var(--leading-normal);
  color: var(--color-text-secondary);
}

.text-overline {
  font-family: var(--font-body);
  font-size: var(--text-xs);
  line-height: var(--leading-normal);
  letter-spacing: var(--tracking-wider);
  text-transform: uppercase;
  color: var(--color-primary);
  font-weight: 600;
}

/* ── Surface Classes ── */
.surface-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border-subtle);
  border-radius: var(--radius-lg);
}

.surface-elevated {
  background: var(--color-surface-elevated);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
}

/* ── Gold accent line ── */
.gold-line {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--color-primary), transparent);
}

.gold-line-left {
  height: 2px;
  width: 48px;
  background: var(--color-primary);
}

    </style>

    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--color-background);
    --color-primary: var(--color-primary);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">

    <style>
      .tab-bar { position:fixed; bottom:0; left:0; right:0; z-index:1000; background:rgba(10,10,15,0.95); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-top:1px solid var(--color-border); display:flex; align-items:center; justify-content:space-around; height:56px; padding-bottom:env(safe-area-inset-bottom,0px); }
      .tab-bar__item { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; flex:1; height:100%; text-decoration:none; transition:color 0.2s ease; color:var(--color-text-tertiary); }
      .tab-bar__item:active { opacity:0.7; }
      .tab-bar__item[data-active="true"] { color:var(--color-primary); }
      .tab-bar__label { font-family:var(--font-body); font-size:10px; letter-spacing:0.02em; font-weight:500; }
      .tab-bar__icon { width:20px; height:20px; }
      .gold-dot { width:8px; height:8px; border-radius:50%; background:var(--color-primary); flex-shrink:0; }
      .diff-card { transition:border-color 0.3s ease; }
      .diff-card:active { border-color:var(--color-primary); }
      .cta-gold { display:flex; align-items:center; justify-content:center; width:100%; padding:0.75rem 1.5rem; background:var(--color-primary); color:var(--color-text-inverse); font-family:var(--font-body); font-size:var(--text-sm); font-weight:600; letter-spacing:var(--tracking-wide); text-decoration:none; border-radius:var(--radius-lg); transition:background 0.25s ease, transform 0.15s ease; }
      .cta-gold:active { background:var(--color-primary-dark); transform:scale(0.98); }
      @media (prefers-reduced-motion:reduce) { .tab-bar__item, .diff-card, .cta-gold { transition:none; } }
    </style>
