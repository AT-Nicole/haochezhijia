<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字人视频 - 豪车之家</title>
    <style id="theme-vars">
:root {
  /* ── Brand Colors ── */
  --color-primary: #C8A45C;
  --color-primary-light: #D4B76E;
  --color-primary-lighter: #E2CC8E;
  --color-primary-lightest: rgba(200, 164, 92, 0.1);
  --color-primary-dark: #A6893F;

  --color-background: #0C0C14;
  --color-background-secondary: #111119;
  --color-surface: #16161F;
  --color-surface-elevated: #1C1C28;
  --color-surface-hover: #222232;

  --color-sidebar-bg: #0E0E16;
  --color-sidebar-active: rgba(200, 164, 92, 0.08);

  --color-text-primary: #F0ECE4;
  --color-text-secondary: #8A867E;
  --color-text-tertiary: #5A5750;
  --color-text-inverse: #0C0C14;

  --color-border: rgba(255, 255, 255, 0.06);
  --color-border-subtle: rgba(255, 255, 255, 0.04);
  --color-divider: rgba(255, 255, 255, 0.08);

  /* ── State Colors ── */
  --state-success: #34D399;
  --state-success-bg: rgba(52, 211, 153, 0.1);
  --state-warning: #FBBF24;
  --state-warning-bg: rgba(251, 191, 36, 0.1);
  --state-error: #F87171;
  --state-error-bg: rgba(248, 113, 113, 0.1);
  --state-info: #60A5FA;
  --state-info-bg: rgba(96, 165, 250, 0.1);

  /* ── Typography ── */
  --font-display: 'Inter', 'Noto Sans SC', -apple-system, sans-serif;
  --font-body: 'Inter', 'Noto Sans SC', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;

  --text-xs: 0.75rem;
  --text-sm: 0.8125rem;
  --text-base: 0.875rem;
  --text-lg: 1rem;
  --text-xl: 1.125rem;
  --text-2xl: 1.25rem;
  --text-3xl: 1.5rem;

  /* ── Spacing ── */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;

  /* ── Layout ── */
  --sidebar-width: 240px;
  --sidebar-collapsed-width: 64px;
  --header-height: 56px;
  --content-max-width: 1400px;

  /* ── Radius ── */
  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-full: 9999px;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--color-background);
    --color-primary: var(--color-primary);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased" style="font-family: var(--font-body);">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <!-- Logo -->
        <div class="sidebar-logo">
            <span class="logo-text">豪车之家</span>
        </div>

        <!-- Navigation -->
        <nav class="sidebar-nav">
            <a href="#" class="nav-item">
                <i data-icon="layout-dashboard" style="width:20px;height:20px;"></i>
                <span>工作台</span>
            </a>
            <a href="#" class="nav-item">
                <i data-icon="file-text" style="width:20px;height:20px;"></i>
                <span>内容管理</span>
            </a>
            <a href="#" class="nav-item">
                <i data-icon="calendar" style="width:20px;height:20px;"></i>
                <span>发布计划</span>
            </a>
            <a href="#" class="nav-item active">
                <i data-icon="video" style="width:20px;height:20px;"></i>
                <span>数字人</span>
            </a>
            <a href="#" class="nav-item">
                <i data-icon="image" style="width:20px;height:20px;"></i>
                <span>素材库</span>
            </a>
            <a href="#" class="nav-item">
                <i data-icon="bar-chart-3" style="width:20px;height:20px;"></i>
                <span>数据分析</span>
            </a>
            <a href="#" class="nav-item">
                <i data-icon="settings" style="width:20px;height:20px;"></i>
                <span>系统设置</span>
            </a>
        </nav>

        <!-- User Avatar -->
        <div class="sidebar-user">
            <div class="user-avatar-sm">豪</div>
            <div class="user-info">
                <span class="user-name">豪哥</span>
                <span class="user-role">COO</span>
            </div>
        </div>
    </aside>

    <!-- MAIN AREA -->
    <div class="main-area">
        <!-- Top Header -->
        <header class="top-header">
            <div class="breadcrumb">
                <span>工具</span>
                <i data-icon="chevron-right" style="width:14px;height:14px;color:var(--color-text-tertiary);"></i>
                <span class="breadcrumb-current">数字人视频</span>
            </div>
            <div class="header-actions">
                <div class="search-box">
                    <i data-icon="search" style="width:16px;height:16px;color:var(--color-text-tertiary);"></i>
                    <input type="text" placeholder="搜索..." class="search-input" />
                </div>
                <button class="icon-btn">
                    <i data-icon="bell" style="width:18px;height:18px;"></i>
                    <span class="notif-dot"></span>
                </button>
                <div class="header-avatar">豪</div>
            </div>
        </header>

        <!-- Content -->
        <main class="content-area">
            <!-- Row 1: Video Preview + Config -->
            <div class="row-split">

                <!-- LEFT: Video Preview -->
                <div class="preview-panel">
                    <div class="video-preview-container">
                        <div class="video-preview">
                            <div class="video-preview-overlay">
                                <div class="play-btn-large">
                                    <i data-icon="play" style="width:32px;height:32px;"></i>
                                </div>
                                <span class="preview-label">数字人预览</span>
                            </div>
                        </div>
                    </div>

                    <!-- Timeline -->
                    <div class="timeline">
                        <div class="timeline-track">
                            <div class="timeline-progress" style="width: 35%;"></div>
                            <div class="timeline-handle" style="left: 35%;"></div>
                        </div>
                        <div class="timeline-markers">
                            <span>0:00</span>
                            <span>0:05</span>
                            <span>0:10</span>
                            <span>0:15</span>
                            <span>0:20</span>
                            <span>0:25</span>
                            <span>0:30</span>
                        </div>
                    </div>

                    <!-- Controls -->
                    <div class="video-controls">
                        <button class="ctrl-btn active-ctrl">
                            <i data-icon="play" style="width:18px;height:18px;"></i>
                        </button>
                        <button class="ctrl-btn">
                            <i data-icon="pause" style="width:18px;height:18px;"></i>
                        </button>
                        <div class="speed-selector">
                            <span>1x</span>
                            <i data-icon="chevron-down" style="width:14px;height:14px;"></i>
                        </div>
                        <div class="ctrl-spacer"></div>
                        <span class="time-display">0:10 / 0:30</span>
                        <div class="ctrl-spacer"></div>
                        <button class="ctrl-btn">
                            <i data-icon="maximize" style="width:18px;height:18px;"></i>
                        </button>
                    </div>
                </div>

                <!-- RIGHT: Configuration Panel -->
                <div class="config-panel">
                    <!-- Avatar Settings -->
                    <div class="config-section">
                        <h3 class="config-title">数字人设置</h3>

                        <label class="field-label">形象选择</label>
                        <div class="avatar-selector">
                            <div class="avatar-card selected">
                                <div class="avatar-thumb">
                                    <div class="avatar-placeholder">
                                        <i data-icon="user" style="width:32px;height:32px;"></i>
                                    </div>
                                </div>
                                <span class="avatar-name">商务西装</span>
                            </div>
                            <div class="avatar-card">
                                <div class="avatar-thumb">
                                    <div class="avatar-placeholder">
                                        <i data-icon="user" style="width:32px;height:32px;"></i>
                                    </div>
                                </div>
                                <span class="avatar-name">休闲POLO</span>
                            </div>
                        </div>

                        <label class="field-label" style="margin-top: var(--space-5);">声音选择</label>
                        <div class="dropdown-field">
                            <span>男声-沉稳</span>
                            <i data-icon="chevron-down" style="width:16px;height:16px;color:var(--color-text-tertiary);"></i>
                        </div>
                    </div>

                    <!-- Video Content -->
                    <div class="config-section">
                        <h3 class="config-title">视频内容</h3>
                        <div class="textarea-wrapper">
                            <textarea class="script-input" rows="6" placeholder="输入视频脚本内容...">欢迎来到豪车之家大湾区展厅，今天为大家带来最新到店的保时捷Cayenne，这款车拥有卓越的操控性能和豪华的内饰设计，是都市精英的不二之选...</textarea>
                        </div>
                        <div class="char-count">128<span style="color:var(--color-text-tertiary);">/500字</span></div>
                    </div>

                    <!-- Background Templates -->
                    <div class="config-section">
                        <h3 class="config-title">背景模板</h3>
                        <div class="template-grid">
                            <div class="template-card selected">
                                <div class="template-thumb">
                                    <i data-icon="building-2" style="width:20px;height:20px;color:var(--color-primary);"></i>
                                </div>
                                <span>豪华展厅</span>
                            </div>
                            <div class="template-card">
                                <div class="template-thumb">
                                    <i data-icon="wine" style="width:20px;height:20px;color:var(--color-text-secondary);"></i>
                                </div>
                                <span>高尔夫晚宴</span>
                            </div>
                            <div class="template-card">
                                <div class="template-thumb">
                                    <i data-icon="car" style="width:20px;height:20px;color:var(--color-text-secondary);"></i>
                                </div>
                                <span>车友自驾</span>
                            </div>
                            <div class="template-card upload-card">
                                <div class="template-thumb">
                                    <i data-icon="upload" style="width:20px;height:20px;color:var(--color-text-tertiary);"></i>
                                </div>
                                <span>自定义上传</span>
                            </div>
                        </div>
                    </div>

                    <!-- Output Settings -->
                    <div class="config-section">
                        <h3 class="config-title">输出设置</h3>
                        <label class="field-label">分辨率</label>
                        <div class="resolution-toggle">
                            <div class="res-option active">1080x1920 竖屏</div>
                            <div class="res-option">1920x1080 横屏</div>
                        </div>
                        <label class="field-label" style="margin-top: var(--space-5);">时长</label>
                        <div class="duration-pills">
                            <div class="duration-pill active">30秒</div>
                            <div class="duration-pill">60秒</div>
                            <div class="duration-pill">90秒</div>
                        </div>
                    </div>

                    <!-- Action Buttons -->
                    <div class="config-section config-actions">
                        <button class="btn-primary-gold">
                            <i data-icon="sparkles" style="width:18px;height:18px;"></i>
                            <span>生成视频</span>
                        </button>
                        <button class="btn-ghost">
                            <i data-icon="layers" style="width:16px;height:16px;"></i>
                            <span>批量生成 (3条)</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Row 2: Recent Videos -->
            <div class="recent-section">
                <div class="recent-header">
                    <h3 class="recent-title">最近生成</h3>
                    <a href="#" class="view-all-link">查看全部</a>
                </div>
                <div class="recent-grid">
                    <!-- Card 1 -->
                    <div class="video-card">
                        <div class="video-thumb">
                            <div class="video-thumb-placeholder">
                                <i data-icon="play-circle" style="width:28px;height:28px;color:var(--color-text-tertiary);"></i>
                            </div>
                            <span class="duration-badge">0:30</span>
                        </div>
                        <div class="video-card-info">
                            <span class="video-card-title">保时捷到货通知</span>
                            <span class="status-badge status-success">已完成</span>
                        </div>
                    </div>
                    <!-- Card 2 -->
                    <div class="video-card">
                        <div class="video-thumb">
                            <div class="video-thumb-placeholder">
                                <i data-icon="play-circle" style="width:28px;height:28px;color:var(--color-text-tertiary);"></i>
                            </div>
                            <span class="duration-badge">0:30</span>
                        </div>
                        <div class="video-card-info">
                            <span class="video-card-title">会员招募视频</span>
                            <span class="status-badge status-warning">
                                <span class="spinner"></span>
                                生成中...
                            </span>
                        </div>
                    </div>
                    <!-- Card 3 -->
                    <div class="video-card">
                        <div class="video-thumb">
                            <div class="video-thumb-placeholder">
                                <i data-icon="play-circle" style="width:28px;height:28px;color:var(--color-text-tertiary);"></i>
                            </div>
                            <span class="duration-badge">0:30</span>
                        </div>
                        <div class="video-card-info">
                            <span class="video-card-title">周末自驾活动</span>
                            <span class="status-badge status-success">已完成</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>lucide.createIcons();</script>

<style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { overflow-x: hidden; }

    /* ── Sidebar ── */
    .sidebar {
        position: fixed;
        top: 0; left: 0;
        width: var(--sidebar-width);
        height: 100vh;
        background: var(--color-sidebar-bg);
        border-right: 1px solid var(--color-border);
        display: flex;
        flex-direction: column;
        z-index: 100;
    }
    .sidebar-logo {
        height: var(--header-height);
        display: flex;
        align-items: center;
        justify-content: center;
        border-bottom: 1px solid var(--color-border);
    }
    .logo-text {
        font-size: var(--text-xl);
        font-weight: 700;
        background: linear-gradient(135deg, var(--color-primary), var(--color-primary-lighter));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: 0.02em;
    }
    .sidebar-nav {
        flex: 1;
        padding: var(--space-3) var(--space-3);
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 2px;
    }
    .nav-item {
        display: flex;
        align-items: center;
        gap: var(--space-3);
        padding: var(--space-3) var(--space-4);
        border-radius: var(--radius-md);
        color: var(--color-text-secondary);
        text-decoration: none;
        font-size: var(--text-sm);
        transition: all 0.15s ease;
        cursor: pointer;
    }
    .nav-item:hover {
        background: var(--color-surface-hover);
        color: var(--color-text-primary);
    }
    .nav-item.active {
        background: var(--color-sidebar-active);
        color: var(--color-primary);
    }
    .sidebar-user {
        padding: var(--space-4);
        border-top: 1px solid var(--color-border);
        display: flex;
        align-items: center;
        gap: var(--space-3);
    }
    .user-avatar-sm {
        width: 36px; height: 36px;
        border-radius: var(--radius-full);
        background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
        display: flex; align-items: center; justify-content: center;
        font-size: var(--text-sm);
        font-weight: 600;
        color: var(--color-text-inverse);
        flex-shrink: 0;
    }
    .user-info {
        display: flex;
        flex-direction: column;
    }
    .user-name { font-size: var(--text-sm); font-weight: 500; color: var(--color-text-primary); }
    .user-role { font-size: var(--text-xs); color: var(--color-text-tertiary); }

    /* ── Main Area ── */
    .main-area {
        margin-left: var(--sidebar-width);
        min-height: 100vh;
    }

    /* ── Top Header ── */
    .top-header {
        height: var(--header-height);
        background: var(--color-background);
        border-bottom: 1px solid var(--color-border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 var(--space-6);
        position: sticky;
        top: 0;
        z-index: 50;
    }
    .breadcrumb {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        font-size: var(--text-sm);
        color: var(--color-text-tertiary);
    }
    .breadcrumb-current { color: var(--color-text-primary); font-weight: 500; }
    .header-actions {
        display: flex;
        align-items: center;
        gap: var(--space-4);
    }
    .search-box {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-md);
        padding: var(--space-2) var(--space-3);
        width: 220px;
    }
    .search-input {
        background: transparent;
        border: none;
        outline: none;
        color: var(--color-text-primary);
        font-size: var(--text-sm);
        font-family: var(--font-body);
        width: 100%;
    }
    .search-input::placeholder { color: var(--color-text-tertiary); }
    .icon-btn {
        position: relative;
        background: none;
        border: none;
        color: var(--color-text-secondary);
        cursor: pointer;
        padding: var(--space-2);
        border-radius: var(--radius-md);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s;
    }
    .icon-btn:hover { background: var(--color-surface-hover); }
    .notif-dot {
        position: absolute;
        top: 6px; right: 6px;
        width: 7px; height: 7px;
        background: var(--color-error);
        border-radius: var(--radius-full);
    }
    .header-avatar {
        width: 32px; height: 32px;
        border-radius: var(--radius-full);
        background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
        display: flex; align-items: center; justify-content: center;
        font-size: var(--text-xs);
        font-weight: 600;
        color: var(--color-text-inverse);
        cursor: pointer;
    }

    /* ── Content Area ── */
    .content-area {
        padding: var(--space-6);
        max-width: var(--content-max-width);
        margin: 0 auto;
    }

    /* ── Row Split ── */
    .row-split {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--space-6);
        margin-bottom: var(--space-6);
    }

    /* ── Video Preview Panel ── */
    .preview-panel {
        display: flex;
        flex-direction: column;
    }
    .video-preview-container {
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-lg);
        overflow: hidden;
    }
    .video-preview {
        position: relative;
        width: 100%;
        padding-top: 56.25%; /* 16:9 */
        background: linear-gradient(135deg, #12121a 0%, #1a1a28 40%, #161622 100%);
        overflow: hidden;
    }
    .video-preview-overlay {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: var(--space-4);
    }
    /* Subtle showroom ambiance */
    .video-preview::before {
        content: '';
        position: absolute;
        inset: 0;
        background:
            radial-gradient(ellipse 60% 50% at 70% 40%, rgba(200,164,92,0.06) 0%, transparent 70%),
            radial-gradient(ellipse 40% 60% at 30% 70%, rgba(100,100,140,0.04) 0%, transparent 70%);
        pointer-events: none;
    }
    .play-btn-large {
        width: 64px; height: 64px;
        border-radius: 50%;
        background: rgba(200,164,92,0.15);
        border: 2px solid rgba(200,164,92,0.4);
        display: flex; align-items: center; justify-content: center;
        color: var(--color-primary);
        cursor: pointer;
        transition: all 0.2s;
        z-index: 1;
    }
    .play-btn-large:hover {
        background: rgba(200,164,92,0.25);
        border-color: var(--color-primary);
    }
    .preview-label {
        font-size: var(--text-base);
        color: var(--color-text-secondary);
        z-index: 1;
    }

    /* ── Timeline ── */
    .timeline {
        background: var(--color-surface);
        padding: var(--space-4) var(--space-5) var(--space-2);
    }
    .timeline-track {
        position: relative;
        height: 4px;
        background: var(--color-surface-elevated);
        border-radius: 2px;
        cursor: pointer;
    }
    .timeline-progress {
        position: absolute;
        top: 0; left: 0;
        height: 100%;
        background: var(--color-primary);
        border-radius: 2px;
    }
    .timeline-handle {
        position: absolute;
        top: 50%;
        width: 12px; height: 12px;
        background: var(--color-primary);
        border: 2px solid var(--color-background);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        cursor: pointer;
        transition: transform 0.1s;
    }
    .timeline-handle:hover { transform: translate(-50%, -50%) scale(1.3); }
    .timeline-markers {
        display: flex;
        justify-content: space-between;
        margin-top: var(--space-2);
        font-size: 10px;
        color: var(--color-text-tertiary);
        font-variant-numeric: tabular-nums;
    }

    /* ── Video Controls ── */
    .video-controls {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        padding: var(--space-3) var(--space-5);
        background: var(--color-surface);
        border-top: 1px solid var(--color-border);
    }
    .ctrl-btn {
        background: none;
        border: none;
        color: var(--color-text-secondary);
        cursor: pointer;
        padding: var(--space-1);
        border-radius: var(--radius-sm);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.15s;
    }
    .ctrl-btn:hover { color: var(--color-text-primary); background: var(--color-surface-hover); }
    .active-ctrl { color: var(--color-primary); }
    .speed-selector {
        display: flex;
        align-items: center;
        gap: var(--space-1);
        padding: var(--space-1) var(--space-2);
        border-radius: var(--radius-sm);
        font-size: var(--text-xs);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: background 0.15s;
    }
    .speed-selector:hover { background: var(--color-surface-hover); }
    .ctrl-spacer { flex: 1; }
    .time-display {
        font-size: var(--text-xs);
        color: var(--color-text-tertiary);
        font-variant-numeric: tabular-nums;
    }

    /* ── Config Panel ── */
    .config-panel {
        display: flex;
        flex-direction: column;
        gap: var(--space-5);
        max-height: calc(100vh - var(--header-height) - var(--space-6) * 2);
        overflow-y: auto;
        padding-right: var(--space-2);
    }
    .config-panel::-webkit-scrollbar { width: 4px; }
    .config-panel::-webkit-scrollbar-track { background: transparent; }
    .config-panel::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 2px; }

    .config-section {
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-lg);
        padding: var(--space-5);
    }
    .config-title {
        font-size: var(--text-lg);
        font-weight: 600;
        color: var(--color-text-primary);
        margin-bottom: var(--space-4);
    }
    .field-label {
        display: block;
        font-size: var(--text-xs);
        font-weight: 500;
        color: var(--color-text-secondary);
        margin-bottom: var(--space-2);
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }

    /* ── Avatar Selector ── */
    .avatar-selector {
        display: flex;
        gap: var(--space-3);
    }
    .avatar-card {
        flex: 1;
        border: 2px solid var(--color-border);
        border-radius: var(--radius-lg);
        overflow: hidden;
        cursor: pointer;
        transition: all 0.15s;
        text-align: center;
    }
    .avatar-card:hover { border-color: var(--color-text-tertiary); }
    .avatar-card.selected { border-color: var(--color-primary); }
    .avatar-thumb {
        padding: var(--space-5) var(--space-4);
        display: flex;
        justify-content: center;
    }
    .avatar-placeholder {
        width: 64px; height: 64px;
        border-radius: var(--radius-full);
        background: var(--color-surface-elevated);
        display: flex; align-items: center; justify-content: center;
        color: var(--color-text-tertiary);
    }
    .avatar-card.selected .avatar-placeholder {
        background: var(--color-primary-lightest);
        color: var(--color-primary);
    }
    .avatar-name {
        display: block;
        padding: var(--space-2) var(--space-3) var(--space-3);
        font-size: var(--text-sm);
        color: var(--color-text-secondary);
    }
    .avatar-card.selected .avatar-name { color: var(--color-primary); }

    /* ── Dropdown Field ── */
    .dropdown-field {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: var(--space-3) var(--space-4);
        background: var(--color-surface-elevated);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-md);
        font-size: var(--text-sm);
        color: var(--color-text-primary);
        cursor: pointer;
        transition: border-color 0.15s;
    }
    .dropdown-field:hover { border-color: var(--color-text-tertiary); }

    /* ── Textarea ── */
    .textarea-wrapper { position: relative; }
    .script-input {
        width: 100%;
        background: var(--color-surface-elevated);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-md);
        padding: var(--space-3) var(--space-4);
        color: var(--color-text-primary);
        font-size: var(--text-sm);
        font-family: var(--font-body);
        resize: none;
        outline: none;
        line-height: 1.6;
        transition: border-color 0.15s;
    }
    .script-input:focus { border-color: var(--color-primary); }
    .script-input::placeholder { color: var(--color-text-tertiary); }
    .char-count {
        text-align: right;
        font-size: var(--text-xs);
        color: var(--color-text-secondary);
        margin-top: var(--space-2);
    }

    /* ── Template Grid ── */
    .template-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--space-3);
    }
    .template-card {
        border: 1px solid var(--color-border);
        border-radius: var(--radius-md);
        overflow: hidden;
        cursor: pointer;
        transition: all 0.15s;
        text-align: center;
    }
    .template-card:hover { border-color: var(--color-text-tertiary); }
    .template-card.selected { border-color: var(--color-primary); }
    .upload-card { border-style: dashed; }
    .template-thumb {
        height: 72px;
        background: var(--color-surface-elevated);
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .template-card.selected .template-thumb { background: var(--color-primary-lightest); }
    .template-card span {
        display: block;
        padding: var(--space-2) var(--space-2) var(--space-3);
        font-size: var(--text-xs);
        color: var(--color-text-secondary);
    }
    .template-card.selected span { color: var(--color-primary); }

    /* ── Resolution Toggle ── */
    .resolution-toggle {
        display: flex;
        gap: var(--space-2);
    }
    .res-option {
        flex: 1;
        text-align: center;
        padding: var(--space-3) var(--space-4);
        background: var(--color-surface-elevated);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-md);
        font-size: var(--text-sm);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all 0.15s;
    }
    .res-option:hover { border-color: var(--color-text-tertiary); }
    .res-option.active {
        background: var(--color-primary-lightest);
        border-color: var(--color-primary);
        color: var(--color-primary);
    }

    /* ── Duration Pills ── */
    .duration-pills {
        display: flex;
        gap: var(--space-2);
    }
    .duration-pill {
        padding: var(--space-2) var(--space-5);
        background: var(--color-surface-elevated);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-full);
        font-size: var(--text-sm);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all 0.15s;
    }
    .duration-pill:hover { border-color: var(--color-text-tertiary); }
    .duration-pill.active {
        background: var(--color-primary);
        border-color: var(--color-primary);
        color: var(--color-text-inverse);
        font-weight: 500;
    }

    /* ── Action Buttons ── */
    .config-actions {
        display: flex;
        flex-direction: column;
        gap: var(--space-3);
    }
    .btn-primary-gold {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-2);
        width: 100%;
        padding: var(--space-4);
        background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
        border: none;
        border-radius: var(--radius-md);
        color: var(--color-text-inverse);
        font-size: var(--text-base);
        font-weight: 600;
        font-family: var(--font-body);
        cursor: pointer;
        transition: all 0.2s;
        box-shadow: 0 4px 16px rgba(200,164,92,0.25);
    }
    .btn-primary-gold:hover {
        box-shadow: 0 6px 24px rgba(200,164,92,0.35);
        transform: translateY(-1px);
    }
    .btn-ghost {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-2);
        width: 100%;
        padding: var(--space-3);
        background: transparent;
        border: 1px solid var(--color-border);
        border-radius: var(--radius-md);
        color: var(--color-text-secondary);
        font-size: var(--text-sm);
        font-family: var(--font-body);
        cursor: pointer;
        transition: all 0.15s;
    }
    .btn-ghost:hover {
        background: var(--color-surface-hover);
        color: var(--color-text-primary);
        border-color: var(--color-text-tertiary);
    }

    /* ── Recent Videos Section ── */
    .recent-section {
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-lg);
        padding: var(--space-5);
    }
    .recent-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: var(--space-5);
    }
    .recent-title {
        font-size: var(--text-lg);
        font-weight: 600;
    }
    .view-all-link {
        font-size: var(--text-sm);
        color: var(--color-primary);
        text-decoration: none;
        transition: color 0.15s;
    }
    .view-all-link:hover { color: var(--color-primary-light); }
    .recent-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: var(--space-4);
    }
    .video-card {
        border-radius: var(--radius-md);
        overflow: hidden;
        cursor: pointer;
        transition: all 0.15s;
    }
    .video-card:hover { transform: translateY(-2px); }
    .video-thumb {
        position: relative;
        aspect-ratio: 16/9;
        background: var(--color-surface-elevated);
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: var(--radius-md);
        overflow: hidden;
    }
    .video-thumb-placeholder {
        color: var(--color-text-tertiary);
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .duration-badge {
        position: absolute;
        bottom: var(--space-2);
        right: var(--space-2);
        background: rgba(0,0,0,0.7);
        color: var(--color-text-primary);
        font-size: 11px;
        padding: 2px 6px;
        border-radius: var(--radius-sm);
        font-variant-numeric: tabular-nums;
    }
    .video-card-info {
        padding: var(--space-3) var(--space-2) 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }
    .video-card-title {
        font-size: var(--text-sm);
        font-weight: 500;
        color: var(--color-text-primary);
    }

    /* ── Status Badges ── */
    .status-badge {
        font-size: 11px;
        padding: 2px 8px;
        border-radius: var(--radius-full);
        display: flex;
        align-items: center;
        gap: 4px;
        white-space: nowrap;
    }
    .status-success {
        background: var(--state-success-bg);
        color: var(--state-success);
    }
    .status-warning {
        background: var(--state-warning-bg);
        color: var(--state-warning);
    }

    /* ── Spinner ── */
    .spinner {
        width: 12px; height: 12px;
        border: 2px solid var(--state-warning-bg);
        border-top-color: var(--state-warning);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
</style>

</body>
</html>
