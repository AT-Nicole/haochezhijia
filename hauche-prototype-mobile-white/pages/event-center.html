<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活动中心</title>
    <style id="theme-vars">
:root {
  /* ── Brand Colors: Ferrari Rosso Corsa — 赛道传承红 ── */
  /* 法拉利数字设计: 克制的红色使用，仅用于CTA和品牌关键时刻 */
  --color-primary: #DA291C;
  --color-primary-light: #E8403A;
  --color-primary-lighter: rgba(218, 41, 28, 0.06);
  --color-primary-lightest: rgba(218, 41, 28, 0.03);
  --color-primary-dark: #B01E0A;
  --color-primary-active: #9D2211;
  --color-primary-text: #FFFFFF;

  /* ── Accent: 赛道黄 Giallo Modena — 法拉利盾牌传承色 ── */
  --color-accent: #E8B800;
  --color-accent-light: #F0CC44;
  --color-accent-lighter: rgba(232, 184, 0, 0.10);
  --color-accent-lightest: rgba(232, 184, 0, 0.05);

  /* ── Backgrounds: Ferrari Chiaroscuro — 明暗交替展厅感 ── */
  /* 法拉利核心理念：纯白编辑面板 + 深黑沉浸区域，硬切割过渡 */
  --color-background: #FAFAFA;
  --color-background-secondary: #F3F3F3;
  --color-background-tertiary: #E8E8E8;
  --color-surface: #FFFFFF;
  --color-surface-elevated: #FFFFFF;
  --color-surface-hover: #F5F5F5;

  /* ── Text: Ferrari双字体编辑层级 — FerrariSans灵感 ── */
  --color-text-primary: #181818;
  --color-text-secondary: #666666;
  --color-text-tertiary: #8F8F8F;
  --color-text-inverse: #FFFFFF;
  --color-text-quaternary: #B0B0B0;

  /* ── Borders & Dividers: 法拉利精准线条 ── */
  --color-border: #CCCCCC;
  --color-border-subtle: rgba(0, 0, 0, 0.06);
  --color-divider: rgba(0, 0, 0, 0.08);

  /* ── State Colors ── */
  --state-success: #03904A;
  --state-success-bg: rgba(3, 144, 74, 0.06);
  --state-warning: #E8A838;
  --state-warning-bg: rgba(232, 168, 56, 0.06);
  --state-error: #F13A2C;
  --state-error-bg: rgba(241, 58, 44, 0.06);
  --state-info: #4C98B9;
  --state-info-bg: rgba(76, 152, 185, 0.06);

  /* ── Typography: FerrariSans灵感 — 紧凑有力 ── */
  --font-display: 'SF Pro Display', 'PingFang SC', 'Noto Sans SC', 'Helvetica Neue', Arial, sans-serif;
  --font-body: 'SF Pro Text', 'PingFang SC', 'Noto Sans SC', 'Helvetica Neue', Arial, sans-serif;
  --font-mono: 'SF Mono', 'JetBrains Mono', ui-monospace, monospace;

  /* 法拉利字号层级 — 标题紧凑、正文舒适 */
  --text-xs: 0.6875rem;     /* 11px - 大写标签（text-transform:uppercase + letter-spacing:1px）*/
  --text-sm: 0.8125rem;     /* 13px - 说明文字 */
  --text-base: 0.875rem;    /* 14px - 正文 */
  --text-lg: 1rem;          /* 16px - 卡片标题/UI标题 */
  --text-xl: 1.125rem;      /* 18px - 副标题 */
  --text-2xl: 1.25rem;      /* 20px - 章节标题 */
  --text-3xl: 1.5rem;       /* 24px - 大标题 */
  --text-display: 1.75rem;   /* 28px - 核心数据/英雄标题 */

  /* ── Spacing: 法拉利8px基础网格 ── */
  --space-0-5: 2px;
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;

  /* ── Radius: 法拉利剃刀级精度 — 2px标志性圆角 ── */
  --radius-xs: 1px;
  --radius-sm: 2px;
  --radius-md: 4px;
  --radius-lg: 8px;
  --radius-xl: 12px;
  --radius-2xl: 16px;
  --radius-full: 9999px;

  /* ── Shadows: 法拉利扁平层次 — 近乎零阴影 ── */
  --shadow-none: none;
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 2px 6px rgba(0, 0, 0, 0.06);
  --shadow-card: none;
  --shadow-elevated: 0 4px 12px rgba(0, 0, 0, 0.08);
  --shadow-float: 0 8px 24px rgba(0, 0, 0, 0.10);
  --shadow-modal: 0 12px 40px rgba(0, 0, 0, 0.12);

  /* ── Gradients: 极少使用 — 法拉利用纯色对比，不用渐变 ── */
  --gradient-primary: linear-gradient(135deg, #DA291C 0%, #B01E0A 100%);
  --gradient-accent: linear-gradient(135deg, #E8B800 0%, #C49E00 100%);
  --gradient-dark: linear-gradient(180deg, #000000 0%, #181818 100%);
  --gradient-hero: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 100%);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--color-background);
    --color-primary: var(--color-primary);
    --color-accent: var(--color-accent);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main>
        <!-- Back Nav -->
        <header class="sticky top-0 z-30 border-b border-[var(--color-border)]" style="background:var(--color-surface)">
            <div class="flex h-12 items-center px-4">
                <button class="flex h-8 w-8 items-center justify-center" aria-label="返回" data-dom-id="nav-back">
                    <i data-lucide="chevron-left" class="h-5 w-5" style="color:var(--color-text-primary)"></i>
                </button>
                <div class="min-w-0 flex-1 text-center font-semibold text-[var(--color-text-primary)]" style="font-size:var(--text-lg)">活动中心</div>
                <div class="w-8"></div>
            </div>
        </header>

        <div class="px-4 pb-8 pt-4">
            <!-- Featured Event Banner -->
            <div class="relative overflow-hidden" style="border-radius:var(--radius-lg)" data-dom-id="featured-event">
                <img src="../assets/showroom-hero.jpg" alt="法拉利赛道日" class="aspect-[16/9] w-full object-cover">
                <div class="absolute inset-0" style="background:linear-gradient(to top,rgba(0,0,0,0.8) 0%,rgba(0,0,0,0.1) 60%,transparent)"></div>
                <div class="absolute inset-x-0 bottom-0 p-4">
                    <span class="inline-block px-2 py-0.5 font-medium" style="font-size:var(--text-xs);color:var(--color-primary-text);background:var(--color-primary);border-radius:var(--radius-sm);text-transform:uppercase;letter-spacing:1px">限时活动</span>
                    <h3 class="mt-2 font-semibold" style="font-size:var(--text-xl);color:white">法拉利赛道体验日</h3>
                    <p class="mt-1 text-[rgba(255,255,255,0.8)]" style="font-size:var(--text-sm)">上海国际赛车场 &middot; 7月28日</p>
                    <div class="mt-3 flex items-center gap-4">
                        <span class="text-[rgba(255,255,255,0.6)]" style="font-size:var(--text-xs)">剩余 12 个名额</span>
                        <button class="px-4 py-1.5 font-semibold" style="font-size:var(--text-sm);color:var(--color-primary-text);background:var(--color-primary);border-radius:var(--radius-sm)" data-dom-id="cta-event-1">立即报名</button>
                    </div>
                </div>
            </div>

            <!-- Section Title -->
            <h3 class="mt-6 mb-3 font-semibold text-[var(--color-text-primary)]" style="font-size:var(--text-base)">近期活动</h3>

            <!-- Event 1 -->
            <article class="flex gap-3 border border-[var(--color-border)] p-4" style="border-radius:var(--radius-lg);background:var(--color-surface)" data-dom-id="event-1">
                <div class="shrink-0 text-center" style="width:56px">
                    <div class="font-semibold" style="font-size:var(--text-2xl);color:var(--color-primary);line-height:1">26</div>
                    <div class="text-[var(--color-text-tertiary)]" style="font-size:var(--text-xs)">7月</div>
                </div>
                <div class="min-w-0 flex-1">
                    <h4 class="font-medium text-[var(--color-text-primary)]" style="font-size:var(--text-base)">迈巴赫尊享品鉴晚宴</h4>
                    <div class="mt-1 flex items-center gap-2 text-[var(--color-text-secondary)]" style="font-size:var(--text-sm)">
                        <i data-lucide="map-pin" class="h-3.5 w-3.5"></i>
                        <span>北京王府半岛酒店</span>
                    </div>
                    <div class="mt-1 flex items-center gap-2 text-[var(--color-text-secondary)]" style="font-size:var(--text-sm)">
                        <i data-lucide="clock" class="h-3.5 w-3.5"></i>
                        <span>18:30 - 21:30</span>
                    </div>
                    <div class="mt-2 flex items-center justify-between">
                        <span class="text-[var(--color-text-tertiary)]" style="font-size:var(--text-xs)">仅限VIP客户</span>
                        <button class="px-3 py-1 font-medium" style="font-size:var(--text-xs);color:var(--color-primary);border:1px solid var(--color-primary);border-radius:var(--radius-sm)">预约</button>
                    </div>
                </div>
            </article>

            <!-- Event 2 -->
            <article class="mt-3 flex gap-3 border border-[var(--color-border)] p-4" style="border-radius:var(--radius-lg);background:var(--color-surface)" data-dom-id="event-2">
                <div class="shrink-0 text-center" style="width:56px">
                    <div class="font-semibold" style="font-size:var(--text-2xl);color:var(--color-primary);line-height:1">02</div>
                    <div class="text-[var(--color-text-tertiary)]" style="font-size:var(--text-xs)">8月</div>
                </div>
                <div class="min-w-0 flex-1">
                    <h4 class="font-medium text-[var(--color-text-primary)]" style="font-size:var(--text-base)">保时捷凌驾风雪试驾</h4>
                    <div class="mt-1 flex items-center gap-2 text-[var(--color-text-secondary)]" style="font-size:var(--text-sm)">
                        <i data-lucide="map-pin" class="h-3.5 w-3.5"></i>
                        <span>崇礼太舞滑雪场</span>
                    </div>
                    <div class="mt-1 flex items-center gap-2 text-[var(--color-text-secondary)]" style="font-size:var(--text-sm)">
                        <i data-lucide="clock" class="h-3.5 w-3.5"></i>
                        <span>全天活动</span>
                    </div>
                    <div class="mt-2 flex items-center justify-between">
                        <span class="text-[var(--color-text-tertiary)]" style="font-size:var(--text-xs)">剩余 8 个名额</span>
                        <button class="px-3 py-1 font-medium" style="font-size:var(--text-xs);color:var(--color-primary);border:1px solid var(--color-primary);border-radius:var(--radius-sm)">预约</button>
                    </div>
                </div>
            </article>

            <!-- Event 3 -->
            <article class="mt-3 flex gap-3 border border-[var(--color-border)] p-4" style="border-radius:var(--radius-lg);background:var(--color-surface)" data-dom-id="event-3">
                <div class="shrink-0 text-center" style="width:56px">
                    <div class="font-semibold" style="font-size:var(--text-2xl);color:var(--color-primary);line-height:1">15</div>
                    <div class="text-[var(--color-text-tertiary)]" style="font-size:var(--text-xs)">8月</div>
                </div>
                <div class="min-w-0 flex-1">
                    <h4 class="font-medium text-[var(--color-text-primary)]" style="font-size:var(--text-base)">AMG性能驾驶学院</h4>
                    <div class="mt-1 flex items-center gap-2 text-[var(--color-text-secondary)]" style="font-size:var(--text-sm)">
                        <i data-lucide="map-pin" class="h-3.5 w-3.5"></i>
                        <span>珠海国际赛车场</span>
                    </div>
                    <div class="mt-1 flex items-center gap-2 text-[var(--color-text-secondary)]" style="font-size:var(--text-sm)">
                        <i data-lucide="clock" class="h-3.5 w-3.5"></i>
                        <span>09:00 - 17:00</span>
                    </div>
                    <div class="mt-2 flex items-center justify-between">
                        <span class="text-[var(--color-text-tertiary)]" style="font-size:var(--text-xs)">报名截止 8月10日</span>
                        <button class="px-3 py-1 font-medium" style="font-size:var(--text-xs);color:var(--color-primary);border:1px solid var(--color-primary);border-radius:var(--radius-sm)">预约</button>
                    </div>
                </div>
            </article>
        </div>
    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
