<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>车辆详情</title>
    <style id="theme-vars">
:root {
  /* ── Brand Colors: Ferrari Rosso Corsa — 赛道传承红 ── */
  /* 法拉利数字设计: 克制的红色使用，仅用于CTA和品牌关键时刻 */
  --color-primary: #DA291C;
  --color-primary-light: #E8403A;
  --color-primary-lighter: rgba(218, 41, 28, 0.06);
  --color-primary-lightest: rgba(218, 41, 28, 0.03);
  --color-primary-dark: #B01E0A;
  --color-primary-active: #9D2211;
  --color-primary-text: #FFFFFF;

  /* ── Accent: 赛道黄 Giallo Modena — 法拉利盾牌传承色 ── */
  --color-accent: #E8B800;
  --color-accent-light: #F0CC44;
  --color-accent-lighter: rgba(232, 184, 0, 0.10);
  --color-accent-lightest: rgba(232, 184, 0, 0.05);

  /* ── Backgrounds: Ferrari Chiaroscuro — 明暗交替展厅感 ── */
  /* 法拉利核心理念：纯白编辑面板 + 深黑沉浸区域，硬切割过渡 */
  --color-background: #FAFAFA;
  --color-background-secondary: #F3F3F3;
  --color-background-tertiary: #E8E8E8;
  --color-surface: #FFFFFF;
  --color-surface-elevated: #FFFFFF;
  --color-surface-hover: #F5F5F5;

  /* ── Text: Ferrari双字体编辑层级 — FerrariSans灵感 ── */
  --color-text-primary: #181818;
  --color-text-secondary: #666666;
  --color-text-tertiary: #8F8F8F;
  --color-text-inverse: #FFFFFF;
  --color-text-quaternary: #B0B0B0;

  /* ── Borders & Dividers: 法拉利精准线条 ── */
  --color-border: #CCCCCC;
  --color-border-subtle: rgba(0, 0, 0, 0.06);
  --color-divider: rgba(0, 0, 0, 0.08);

  /* ── State Colors ── */
  --state-success: #03904A;
  --state-success-bg: rgba(3, 144, 74, 0.06);
  --state-warning: #E8A838;
  --state-warning-bg: rgba(232, 168, 56, 0.06);
  --state-error: #F13A2C;
  --state-error-bg: rgba(241, 58, 44, 0.06);
  --state-info: #4C98B9;
  --state-info-bg: rgba(76, 152, 185, 0.06);

  /* ── Typography: FerrariSans灵感 — 紧凑有力 ── */
  --font-display: 'SF Pro Display', 'PingFang SC', 'Noto Sans SC', 'Helvetica Neue', Arial, sans-serif;
  --font-body: 'SF Pro Text', 'PingFang SC', 'Noto Sans SC', 'Helvetica Neue', Arial, sans-serif;
  --font-mono: 'SF Mono', 'JetBrains Mono', ui-monospace, monospace;

  /* 法拉利字号层级 — 标题紧凑、正文舒适 */
  --text-xs: 0.6875rem;     /* 11px - 大写标签（text-transform:uppercase + letter-spacing:1px）*/
  --text-sm: 0.8125rem;     /* 13px - 说明文字 */
  --text-base: 0.875rem;    /* 14px - 正文 */
  --text-lg: 1rem;          /* 16px - 卡片标题/UI标题 */
  --text-xl: 1.125rem;      /* 18px - 副标题 */
  --text-2xl: 1.25rem;      /* 20px - 章节标题 */
  --text-3xl: 1.5rem;       /* 24px - 大标题 */
  --text-display: 1.75rem;   /* 28px - 核心数据/英雄标题 */

  /* ── Spacing: 法拉利8px基础网格 ── */
  --space-0-5: 2px;
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;

  /* ── Radius: 法拉利剃刀级精度 — 2px标志性圆角 ── */
  --radius-xs: 1px;
  --radius-sm: 2px;
  --radius-md: 4px;
  --radius-lg: 8px;
  --radius-xl: 12px;
  --radius-2xl: 16px;
  --radius-full: 9999px;

  /* ── Shadows: 法拉利扁平层次 — 近乎零阴影 ── */
  --shadow-none: none;
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 2px 6px rgba(0, 0, 0, 0.06);
  --shadow-card: none;
  --shadow-elevated: 0 4px 12px rgba(0, 0, 0, 0.08);
  --shadow-float: 0 8px 24px rgba(0, 0, 0, 0.10);
  --shadow-modal: 0 12px 40px rgba(0, 0, 0, 0.12);

  /* ── Gradients: 极少使用 — 法拉利用纯色对比，不用渐变 ── */
  --gradient-primary: linear-gradient(135deg, #DA291C 0%, #B01E0A 100%);
  --gradient-accent: linear-gradient(135deg, #E8B800 0%, #C49E00 100%);
  --gradient-dark: linear-gradient(180deg, #000000 0%, #181818 100%);
  --gradient-hero: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 100%);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--color-background);
    --color-primary: var(--color-primary);
    --color-accent: var(--color-accent);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="pb-8" data-dom-id="page-car-detail" style="font-family: var(--font-body);">

      <!-- Top Nav Bar -->
      <header class="sticky top-0 z-30 flex items-center justify-between h-11 px-4" style="background: transparent;">
        <button class="w-8 h-8 rounded-[var(--radius-sm)] flex items-center justify-center border" style="background: rgba(255,255,255,0.9); border-color: var(--color-border); backdrop-filter: blur(8px);" aria-label="返回" data-dom-id="btn-back-detail">
          <i data-lucide="chevron-left" class="w-4 h-4" style="color: var(--color-text-primary);"></i>
        </button>
        <button class="w-8 h-8 rounded-[var(--radius-sm)] flex items-center justify-center border" style="background: rgba(255,255,255,0.9); border-color: var(--color-border); backdrop-filter: blur(8px);" aria-label="分享" data-dom-id="btn-share">
          <i data-lucide="share-2" class="w-4 h-4" style="color: var(--color-text-primary);"></i>
        </button>
      </header>

      <!-- Hero Image -->
      <div class="px-4">
        <div class="rounded-[var(--radius-lg)] overflow-hidden border" style="aspect-ratio: 16/10; border-color: var(--color-border);">
          <img src="../assets/car-maybach.jpg" alt="迈巴赫S480" class="w-full h-full object-cover">
        </div>
      </div>

      <!-- Info Card (overlapping) -->
      <div class="px-4 -mt-5 relative z-10">
        <div class="rounded-[var(--radius-lg)] p-4 border" style="background: var(--color-surface); border-color: var(--color-border);">
          <div class="flex items-start justify-between mb-1">
            <h1 class="text-[var(--text-2xl)] font-semibold" style="color: var(--color-text-primary); text-wrap: balance; word-break: keep-all;">迈巴赫S480</h1>
            <button class="w-8 h-8 rounded-[var(--radius-sm)] flex items-center justify-center shrink-0 border" style="background: var(--color-background-secondary); border-color: var(--color-border);" aria-label="收藏">
              <i data-lucide="heart" class="w-3.5 h-3.5" style="color: var(--color-text-tertiary);"></i>
            </button>
          </div>
          <p class="text-[var(--text-sm)] mb-3" style="color: var(--color-text-secondary);">2024款 · 4.0T · 旗舰型</p>
          <p class="text-[var(--text-3xl)] font-bold" style="color: var(--color-primary); font-variant-numeric: tabular-nums;">¥288<span class="text-[var(--text-lg)] font-medium">万</span></p>
        </div>
      </div>

      <!-- Specs Grid -->
      <div class="px-4 mt-4">
        <div class="grid grid-cols-4 gap-2">
          <div class="rounded-[var(--radius-sm)] py-2.5 text-center border" style="background: var(--color-surface); border-color: var(--color-border);">
            <i data-lucide="gauge" class="w-3.5 h-3.5 mx-auto mb-1" style="color: var(--color-primary);"></i>
            <p class="text-[var(--text-sm)] font-medium whitespace-nowrap" style="color: var(--color-text-primary);">4.0T</p>
            <p class="text-[var(--text-xs)] whitespace-nowrap" style="color: var(--color-text-tertiary);">排量</p>
          </div>
          <div class="rounded-[var(--radius-sm)] py-2.5 text-center border" style="background: var(--color-surface); border-color: var(--color-border);">
            <i data-lucide="settings-2" class="w-3.5 h-3.5 mx-auto mb-1" style="color: var(--color-primary);"></i>
            <p class="text-[var(--text-sm)] font-medium whitespace-nowrap" style="color: var(--color-text-primary);">9AT</p>
            <p class="text-[var(--text-xs)] whitespace-nowrap" style="color: var(--color-text-tertiary);">变速箱</p>
          </div>
          <div class="rounded-[var(--radius-sm)] py-2.5 text-center border" style="background: var(--color-surface); border-color: var(--color-border);">
            <i data-lucide="calendar" class="w-3.5 h-3.5 mx-auto mb-1" style="color: var(--color-primary);"></i>
            <p class="text-[var(--text-sm)] font-medium whitespace-nowrap" style="color: var(--color-text-primary);">2024</p>
            <p class="text-[var(--text-xs)] whitespace-nowrap" style="color: var(--color-text-tertiary);">年份</p>
          </div>
          <div class="rounded-[var(--radius-sm)] py-2.5 text-center border" style="background: var(--color-surface); border-color: var(--color-border);">
            <i data-lucide="users" class="w-3.5 h-3.5 mx-auto mb-1" style="color: var(--color-primary);"></i>
            <p class="text-[var(--text-sm)] font-medium whitespace-nowrap" style="color: var(--color-text-primary);">5座</p>
            <p class="text-[var(--text-xs)] whitespace-nowrap" style="color: var(--color-text-tertiary);">座位</p>
          </div>
        </div>
      </div>

      <!-- Tab Switcher -->
      <div class="px-4 mt-5">
        <div class="flex gap-0 rounded-[var(--radius-sm)] p-1 border" style="background: var(--color-background-secondary); border-color: var(--color-border);">
          <button class="flex-1 py-2 rounded-[var(--radius-xs)] text-[var(--text-xs)] font-semibold text-center whitespace-nowrap uppercase tracking-[0.05em] transition-all duration-200" style="background: var(--color-surface); color: var(--color-text-primary);" data-active="true">参数</button>
          <button class="flex-1 py-2 rounded-[var(--radius-xs)] text-[var(--text-xs)] font-medium text-center whitespace-nowrap uppercase tracking-[0.05em] transition-all duration-200" style="color: var(--color-text-tertiary);">配置</button>
          <button class="flex-1 py-2 rounded-[var(--radius-xs)] text-[var(--text-xs)] font-medium text-center whitespace-nowrap uppercase tracking-[0.05em] transition-all duration-200" style="color: var(--color-text-tertiary);">推荐</button>
        </div>
      </div>

      <!-- AI Score Card -->
      <div class="px-4 mt-4">
        <div class="rounded-[var(--radius-lg)] p-4 border" style="background: var(--color-surface); border-color: var(--color-border);">
          <div class="flex items-center gap-1.5 mb-2.5">
            <i data-lucide="sparkles" class="h-3.5 w-3.5" style="color: var(--color-accent);"></i>
            <span class="text-[var(--text-xs)] font-semibold uppercase tracking-[0.05em]" style="color: var(--color-text-tertiary);">AI综合评分</span>
          </div>
          <div class="flex items-end gap-2 mb-2.5">
            <span class="text-[var(--text-display)] font-bold leading-none" style="color: var(--color-primary); font-variant-numeric: tabular-nums;">96</span>
            <span class="text-[var(--text-sm)] pb-0.5" style="color: var(--color-text-tertiary);">综合评分</span>
          </div>
          <div class="w-full h-1.5 rounded-[var(--radius-full)] overflow-hidden" style="background: var(--color-background-secondary);">
            <div class="h-full rounded-[var(--radius-full)] transition-all duration-700" style="width: 96%; background: var(--color-primary);"></div>
          </div>
          <div class="flex justify-between mt-2">
            <span class="text-[var(--text-xs)]" style="color: var(--color-text-tertiary);">性价比</span>
            <span class="text-[var(--text-xs)]" style="color: var(--color-text-tertiary);">市场热度</span>
            <span class="text-[var(--text-xs)]" style="color: var(--color-text-tertiary);">保值率</span>
          </div>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="px-4 mt-5">
        <div class="flex gap-2.5">
          <button class="flex-1 h-11 rounded-[var(--radius-sm)] flex items-center justify-center gap-1.5 text-[var(--text-sm)] font-semibold whitespace-nowrap transition-all duration-200 hover:opacity-90 active:scale-[0.98]" style="background: var(--color-primary); color: var(--color-primary-text);" data-dom-id="btn-consult">
            <i data-lucide="message-circle" class="w-4 h-4"></i>
            立即咨询
          </button>
          <button class="flex-1 h-11 rounded-[var(--radius-sm)] flex items-center justify-center gap-1.5 text-[var(--text-sm)] font-medium whitespace-nowrap transition-all duration-200 hover:opacity-90 active:scale-[0.98] border" style="background: var(--color-surface); border-color: var(--color-border); color: var(--color-text-primary);" data-dom-id="btn-compare">
            <i data-lucide="git-compare" class="w-4 h-4"></i>
            加入对比
          </button>
        </div>
      </div>

    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
