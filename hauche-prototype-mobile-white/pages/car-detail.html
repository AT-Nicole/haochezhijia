<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>车辆详情</title>
    <style id="theme-vars">
:root {
  /* ── Brand Colors: White Premium — NIO-Inspired Refined Red + Gold VIP ── */
  /* 蔚来风格要点：克制用色、精确对比、75%浅色+25%深色比例 */
  --color-primary: #C41E3A;
  --color-primary-light: #D6344F;
  --color-primary-lighter: rgba(196, 30, 58, 0.06);
  --color-primary-lightest: rgba(196, 30, 58, 0.03);
  --color-primary-dark: #9A1830;
  --color-primary-text: #FFFFFF;

  --color-accent: #D4A843;
  --color-accent-light: #E8C06A;
  --color-accent-lighter: rgba(212, 168, 67, 0.10);
  --color-accent-lightest: rgba(212, 168, 67, 0.05);

  /* ── Backgrounds: NIO-inspired "有温度的白" — 层次分明的暖灰梯度 ── */
  --color-background: #FAFBFC;
  --color-background-secondary: #F5F6F8;
  --color-background-tertiary: #EEEEF0;
  --color-surface: #FFFFFF;
  --color-surface-elevated: #FFFFFF;
  --color-surface-hover: #F7F8FA;

  /* ── Text: NIO风格 — 5级字重、精确对比度（9.9:1） ── */
  --color-text-primary: #1F2022;
  --color-text-secondary: #6E747A;
  --color-text-tertiary: #A0A6AE;
  --color-text-inverse: #FFFFFF;
  --color-text-quaternary: #C8CDD3;

  /* ── Borders & Dividers: NIO克制分割线 ── */
  --color-border: rgba(0, 0, 0, 0.05);
  --color-border-subtle: rgba(0, 0, 0, 0.03);
  --color-divider: rgba(0, 0, 0, 0.06);

  /* ── State Colors: 柔和功能性色彩 ── */
  --state-success: #2BBC8E;
  --state-success-bg: rgba(43, 188, 142, 0.06);
  --state-warning: #E8A838;
  --state-warning-bg: rgba(232, 168, 56, 0.06);
  --state-error: #E94A47;
  --state-error-bg: rgba(233, 74, 71, 0.06);
  --state-info: #3B8BEB;
  --state-info-bg: rgba(59, 139, 235, 0.06);

  /* ── Typography: NIO Blue Sky Sans 灵感 — 更大字号、更舒适行高 ── */
  --font-display: 'SF Pro Display', 'PingFang SC', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-body: 'SF Pro Text', 'PingFang SC', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'SF Mono', 'JetBrains Mono', ui-monospace, monospace;

  /* 蔚来APP字号层级（移动端适配） */
  --text-xs: 0.6875rem;     /* 11px - 注释/标签 */
  --text-sm: 0.8125rem;     /* 13px - 辅助文字 */
  --text-base: 0.875rem;    /* 14px - 正文（蔚来标准正文） */
  --text-lg: 0.9375rem;     /* 15px - 次要标题 */
  --text-xl: 1.0625rem;     /* 17px - 卡片标题（蔚来标准） */
  --text-2xl: 1.25rem;      /* 20px - 页面标题 */
  --text-3xl: 1.5rem;       /* 24px - 大标题 */
  --text-display: 1.75rem;  /* 28px - 核心数据展示 */

  /* ── Spacing: NIO"松弛有度"留白策略 ── */
  --space-0-5: 2px;
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;

  /* ── Radius: NIO大圆角 — 柔和亲切 ── */
  --radius-xs: 4px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-2xl: 24px;
  --radius-full: 9999px;

  /* ── Shadows: NIO精致阴影 — "高级精致的品质" ── */
  --shadow-none: none;
  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.02);
  --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.06);
  --shadow-card: 0 1px 4px rgba(0, 0, 0, 0.04), 0 0 0 1px rgba(0, 0, 0, 0.02);
  --shadow-elevated: 0 4px 16px rgba(0, 0, 0, 0.08);
  --shadow-float: 0 8px 30px rgba(0, 0, 0, 0.10);
  --shadow-modal: 0 16px 48px rgba(0, 0, 0, 0.12);

  /* ── NIO-inspired gradients ── */
  --gradient-primary: linear-gradient(135deg, #C41E3A 0%, #9A1830 100%);
  --gradient-accent: linear-gradient(135deg, #D4A843 0%, #B8922E 100%);
  --gradient-sky: linear-gradient(180deg, #EDF2FF 0%, #FAFBFC 100%);
  --gradient-warm: linear-gradient(180deg, #FFF8F0 0%, #FAFBFC 100%);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--color-background);
    --color-primary: var(--color-primary);
    --color-accent: var(--color-accent);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="pb-8" data-dom-id="page-car-detail" style="font-family: var(--font-body);">

      <!-- Top Nav Bar -->
      <header class="sticky top-0 z-30 flex items-center h-11 px-4" style="background: transparent;">
        <button class="w-9 h-9 rounded-[var(--radius-md)] flex items-center justify-center" style="background: rgba(255,255,255,0.85); backdrop-filter: blur(8px);" aria-label="返回" data-dom-id="btn-back-detail">
          <i data-lucide="chevron-left" class="w-5 h-5" style="color: var(--color-text-primary);"></i>
        </button>
        <div class="flex-1"></div>
        <button class="w-9 h-9 rounded-[var(--radius-md)] flex items-center justify-center" style="background: rgba(255,255,255,0.85); backdrop-filter: blur(8px);" aria-label="分享" data-dom-id="btn-share">
          <i data-lucide="share-2" class="w-5 h-5" style="color: var(--color-text-primary);"></i>
        </button>
      </header>

      <!-- Hero Image -->
      <div class="px-5">
        <div class="rounded-b-[var(--radius-lg)] overflow-hidden" style="aspect-ratio: 16/10;">
          <img src="../assets/car-maybach.jpg" alt="迈巴赫S480" class="w-full h-full object-cover">
        </div>
      </div>

      <!-- Info Card (overlapping) -->
      <div class="px-5 -mt-6 relative z-10">
        <div class="rounded-[var(--radius-lg)] p-5" style="background: var(--color-surface); box-shadow: var(--shadow-card);">
          <div class="flex items-start justify-between mb-1">
            <h1 class="text-[var(--color-text-primary)] text-[var(--text-2xl)] font-semibold" style="text-wrap: balance; word-break: keep-all;">迈巴赫S480</h1>
            <button class="w-9 h-9 rounded-[var(--radius-md)] flex items-center justify-center shrink-0" style="background: var(--color-background-secondary);" aria-label="收藏">
              <i data-lucide="heart" class="w-4 h-4" style="color: var(--color-text-tertiary);"></i>
            </button>
          </div>
          <p class="text-[var(--color-text-secondary)] text-[var(--text-sm)] mb-3">2024款 · 4.0T · 旗舰型</p>
          <p class="text-[var(--color-primary)] text-[var(--text-3xl)] font-bold" style="font-variant-numeric: tabular-nums;">¥288<span class="text-[var(--text-lg)] font-medium">万</span></p>
        </div>
      </div>

      <!-- Specs Grid -->
      <div class="px-5 mt-5">
        <div class="grid grid-cols-4 gap-2">
          <div class="rounded-[var(--radius-md)] py-3 text-center" style="background: var(--color-surface); box-shadow: var(--shadow-card);">
            <i data-lucide="gauge" class="w-4 h-4 mx-auto mb-1.5" style="color: var(--color-primary);"></i>
            <p class="text-[var(--color-text-primary)] text-[var(--text-sm)] font-medium whitespace-nowrap">4.0T</p>
            <p class="text-[var(--color-text-tertiary)] text-[var(--text-xs)] whitespace-nowrap">排量</p>
          </div>
          <div class="rounded-[var(--radius-md)] py-3 text-center" style="background: var(--color-surface); box-shadow: var(--shadow-card);">
            <i data-lucide="settings-2" class="w-4 h-4 mx-auto mb-1.5" style="color: var(--color-primary);"></i>
            <p class="text-[var(--color-text-primary)] text-[var(--text-sm)] font-medium whitespace-nowrap">9AT</p>
            <p class="text-[var(--color-text-tertiary)] text-[var(--text-xs)] whitespace-nowrap">变速箱</p>
          </div>
          <div class="rounded-[var(--radius-md)] py-3 text-center" style="background: var(--color-surface); box-shadow: var(--shadow-card);">
            <i data-lucide="calendar" class="w-4 h-4 mx-auto mb-1.5" style="color: var(--color-primary);"></i>
            <p class="text-[var(--color-text-primary)] text-[var(--text-sm)] font-medium whitespace-nowrap">2024款</p>
            <p class="text-[var(--color-text-tertiary)] text-[var(--text-xs)] whitespace-nowrap">年份</p>
          </div>
          <div class="rounded-[var(--radius-md)] py-3 text-center" style="background: var(--color-surface); box-shadow: var(--shadow-card);">
            <i data-lucide="users" class="w-4 h-4 mx-auto mb-1.5" style="color: var(--color-primary);"></i>
            <p class="text-[var(--color-text-primary)] text-[var(--text-sm)] font-medium whitespace-nowrap">5座</p>
            <p class="text-[var(--color-text-tertiary)] text-[var(--text-xs)] whitespace-nowrap">座位</p>
          </div>
        </div>
      </div>

      <!-- Tab Switcher -->
      <div class="px-5 mt-6">
        <div class="flex gap-0 rounded-[var(--radius-md)] p-1" style="background: var(--color-background-secondary);">
          <button class="flex-1 py-2.5 rounded-[var(--radius-sm)] text-[var(--text-sm)] font-medium text-center whitespace-nowrap transition-all duration-200" style="background: var(--color-surface); color: var(--color-text-primary); box-shadow: var(--shadow-sm);" data-active="true">参数</button>
          <button class="flex-1 py-2.5 rounded-[var(--radius-sm)] text-[var(--text-sm)] font-medium text-center whitespace-nowrap transition-all duration-200" style="color: var(--color-text-tertiary);">配置</button>
          <button class="flex-1 py-2.5 rounded-[var(--radius-sm)] text-[var(--text-sm)] font-medium text-center whitespace-nowrap transition-all duration-200" style="color: var(--color-text-tertiary);">相似推荐</button>
        </div>
      </div>

      <!-- AI Score Card -->
      <div class="px-5 mt-5">
        <div class="rounded-[var(--radius-lg)] p-4" style="background: var(--color-surface); box-shadow: var(--shadow-card);">
          <div class="flex items-center gap-2 mb-3">
            <i data-lucide="sparkles" class="w-4 h-4" style="color: var(--color-accent);"></i>
            <h3 class="text-[var(--color-text-primary)] text-[var(--text-base)] font-semibold">AI综合评分</h3>
          </div>
          <div class="flex items-end gap-3 mb-3">
            <span class="text-[var(--color-primary)] text-[var(--text-display)] font-bold leading-none" style="font-variant-numeric: tabular-nums;">96</span>
            <span class="text-[var(--color-text-tertiary)] text-[var(--text-sm)] pb-0.5">综合评分</span>
          </div>
          <div class="w-full h-2 rounded-[var(--radius-full)] overflow-hidden" style="background: var(--color-background-secondary);">
            <div class="h-full rounded-[var(--radius-full)] transition-all duration-700" style="width: 96%; background: var(--gradient-primary);"></div>
          </div>
          <div class="flex justify-between mt-2">
            <span class="text-[var(--color-text-tertiary)] text-[var(--text-xs)]">性价比</span>
            <span class="text-[var(--color-text-tertiary)] text-[var(--text-xs)]">市场热度</span>
            <span class="text-[var(--color-text-tertiary)] text-[var(--text-xs)]">保值率</span>
          </div>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="px-5 mt-6">
        <div class="flex gap-3">
          <button class="flex-1 h-12 rounded-[var(--radius-md)] flex items-center justify-center gap-2 text-[var(--text-base)] font-semibold whitespace-nowrap transition-all duration-200 hover:opacity-90 active:scale-[0.98]" style="background: var(--color-primary); color: var(--color-primary-text);" data-dom-id="btn-consult">
            <i data-lucide="message-circle" class="w-4 h-4"></i>
            立即咨询
          </button>
          <button class="flex-1 h-12 rounded-[var(--radius-md)] flex items-center justify-center gap-2 text-[var(--text-base)] font-medium whitespace-nowrap transition-all duration-200 hover:opacity-90 active:scale-[0.98]" style="border: 1px solid var(--color-border); background: var(--color-surface); color: var(--color-text-primary);" data-dom-id="btn-compare">
            <i data-lucide="git-compare" class="w-4 h-4"></i>
            加入对比
          </button>
        </div>
      </div>

    </main>
    <style>
      @media (prefers-reduced-motion: reduce) {
        * { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; }
      }
      .tabular { font-variant-numeric: tabular-nums; }
    </style>
    <script>lucide.createIcons();</script>
</body>
</html>
