<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM首页</title>
    <style id="theme-vars">
:root {
  /* ── Brand Colors: Ferrari Rosso Corsa — 赛道传承红 ── */
  /* 法拉利数字设计: 克制的红色使用，仅用于CTA和品牌关键时刻 */
  --color-primary: #DA291C;
  --color-primary-light: #E8403A;
  --color-primary-lighter: rgba(218, 41, 28, 0.06);
  --color-primary-lightest: rgba(218, 41, 28, 0.03);
  --color-primary-dark: #B01E0A;
  --color-primary-active: #9D2211;
  --color-primary-text: #FFFFFF;

  /* ── Accent: 赛道黄 Giallo Modena — 法拉利盾牌传承色 ── */
  --color-accent: #E8B800;
  --color-accent-light: #F0CC44;
  --color-accent-lighter: rgba(232, 184, 0, 0.10);
  --color-accent-lightest: rgba(232, 184, 0, 0.05);

  /* ── Backgrounds: Ferrari Chiaroscuro — 明暗交替展厅感 ── */
  /* 法拉利核心理念：纯白编辑面板 + 深黑沉浸区域，硬切割过渡 */
  --color-background: #FAFAFA;
  --color-background-secondary: #F3F3F3;
  --color-background-tertiary: #E8E8E8;
  --color-surface: #FFFFFF;
  --color-surface-elevated: #FFFFFF;
  --color-surface-hover: #F5F5F5;

  /* ── Text: Ferrari双字体编辑层级 — FerrariSans灵感 ── */
  --color-text-primary: #181818;
  --color-text-secondary: #666666;
  --color-text-tertiary: #8F8F8F;
  --color-text-inverse: #FFFFFF;
  --color-text-quaternary: #B0B0B0;

  /* ── Borders & Dividers: 法拉利精准线条 ── */
  --color-border: #CCCCCC;
  --color-border-subtle: rgba(0, 0, 0, 0.06);
  --color-divider: rgba(0, 0, 0, 0.08);

  /* ── State Colors ── */
  --state-success: #03904A;
  --state-success-bg: rgba(3, 144, 74, 0.06);
  --state-warning: #E8A838;
  --state-warning-bg: rgba(232, 168, 56, 0.06);
  --state-error: #F13A2C;
  --state-error-bg: rgba(241, 58, 44, 0.06);
  --state-info: #4C98B9;
  --state-info-bg: rgba(76, 152, 185, 0.06);

  /* ── Typography: FerrariSans灵感 — 紧凑有力 ── */
  --font-display: 'SF Pro Display', 'PingFang SC', 'Noto Sans SC', 'Helvetica Neue', Arial, sans-serif;
  --font-body: 'SF Pro Text', 'PingFang SC', 'Noto Sans SC', 'Helvetica Neue', Arial, sans-serif;
  --font-mono: 'SF Mono', 'JetBrains Mono', ui-monospace, monospace;

  /* 法拉利字号层级 — 标题紧凑、正文舒适 */
  --text-xs: 0.6875rem;     /* 11px - 大写标签（text-transform:uppercase + letter-spacing:1px）*/
  --text-sm: 0.8125rem;     /* 13px - 说明文字 */
  --text-base: 0.875rem;    /* 14px - 正文 */
  --text-lg: 1rem;          /* 16px - 卡片标题/UI标题 */
  --text-xl: 1.125rem;      /* 18px - 副标题 */
  --text-2xl: 1.25rem;      /* 20px - 章节标题 */
  --text-3xl: 1.5rem;       /* 24px - 大标题 */
  --text-display: 1.75rem;   /* 28px - 核心数据/英雄标题 */

  /* ── Spacing: 法拉利8px基础网格 ── */
  --space-0-5: 2px;
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;

  /* ── Radius: 法拉利剃刀级精度 — 2px标志性圆角 ── */
  --radius-xs: 1px;
  --radius-sm: 2px;
  --radius-md: 4px;
  --radius-lg: 8px;
  --radius-xl: 12px;
  --radius-2xl: 16px;
  --radius-full: 9999px;

  /* ── Shadows: 法拉利扁平层次 — 近乎零阴影 ── */
  --shadow-none: none;
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 2px 6px rgba(0, 0, 0, 0.06);
  --shadow-card: none;
  --shadow-elevated: 0 4px 12px rgba(0, 0, 0, 0.08);
  --shadow-float: 0 8px 24px rgba(0, 0, 0, 0.10);
  --shadow-modal: 0 12px 40px rgba(0, 0, 0, 0.12);

  /* ── Gradients: 极少使用 — 法拉利用纯色对比，不用渐变 ── */
  --gradient-primary: linear-gradient(135deg, #DA291C 0%, #B01E0A 100%);
  --gradient-accent: linear-gradient(135deg, #E8B800 0%, #C49E00 100%);
  --gradient-dark: linear-gradient(180deg, #000000 0%, #181818 100%);
  --gradient-hero: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 100%);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--color-background);
    --color-primary: var(--color-primary);
    --color-accent: var(--color-accent);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="pb-20" data-dom-id="page-crm-home" style="font-family: var(--font-body);">

      <!-- Status Bar Spacer -->
      <div class="h-11"></div>

      <!-- Welcome Header -->
      <div class="px-4 pt-3 pb-5">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-[var(--text-sm)] mb-0.5" style="color: var(--color-text-secondary);">上午好，陈经理</p>
            <h1 class="text-[var(--text-2xl)] font-semibold" style="color: var(--color-text-primary); text-wrap: balance; word-break: keep-all;">工作台</h1>
          </div>
          <div class="w-9 h-9 rounded-[var(--radius-sm)] flex items-center justify-center border" style="background: var(--color-primary-lighter); border-color: var(--color-primary);">
            <span class="text-[var(--text-sm)] font-semibold" style="color: var(--color-primary);">陈</span>
          </div>
        </div>
      </div>

      <!-- Stat Cards -->
      <div class="px-4 mb-5">
        <div class="grid grid-cols-3 gap-2">
          <div class="rounded-[var(--radius-sm)] p-3 border" style="background: var(--color-surface); border-color: var(--color-border);">
            <p class="text-[var(--text-xs)] mb-1.5 whitespace-nowrap uppercase tracking-[0.05em]" style="color: var(--color-text-tertiary);">本月新增</p>
            <p class="text-[var(--text-3xl)] font-bold whitespace-nowrap" style="color: var(--color-text-primary); font-variant-numeric: tabular-nums;">28</p>
            <p class="text-[var(--text-xs)] mt-1 whitespace-nowrap flex items-center gap-0.5" style="color: var(--state-success);">
              <i data-lucide="trending-up" class="w-3 h-3"></i>+12%
            </p>
          </div>
          <div class="rounded-[var(--radius-sm)] p-3 border" style="background: var(--color-surface); border-color: var(--color-border);">
            <p class="text-[var(--text-xs)] mb-1.5 whitespace-nowrap uppercase tracking-[0.05em]" style="color: var(--color-text-tertiary);">活跃客户</p>
            <p class="text-[var(--text-3xl)] font-bold whitespace-nowrap" style="color: var(--color-text-primary); font-variant-numeric: tabular-nums;">156</p>
            <p class="text-[var(--text-xs)] mt-1 whitespace-nowrap flex items-center gap-0.5" style="color: var(--state-success);">
              <i data-lucide="trending-up" class="w-3 h-3"></i>+8%
            </p>
          </div>
          <div class="rounded-[var(--radius-sm)] p-3 border" style="background: var(--color-surface); border-color: var(--color-border);">
            <p class="text-[var(--text-xs)] mb-1.5 whitespace-nowrap uppercase tracking-[0.05em]" style="color: var(--color-text-tertiary);">转化率</p>
            <p class="text-[var(--text-3xl)] font-bold whitespace-nowrap" style="color: var(--color-text-primary); font-variant-numeric: tabular-nums;">34%</p>
            <p class="text-[var(--text-xs)] mt-1 whitespace-nowrap flex items-center gap-0.5" style="color: var(--state-error);">
              <i data-lucide="trending-down" class="w-3 h-3"></i>-2%
            </p>
          </div>
        </div>
      </div>

      <!-- Recent Leads -->
      <div class="px-4 mb-5">
        <div class="flex items-center justify-between mb-3">
          <span class="text-[var(--text-xs)] font-semibold uppercase tracking-[0.05em]" style="color: var(--color-text-tertiary);">近期线索</span>
          <button class="text-[var(--text-xs)] font-medium flex items-center gap-0.5 whitespace-nowrap" style="color: var(--color-primary);">
            查看全部
            <i data-lucide="chevron-right" class="w-3.5 h-3.5"></i>
          </button>
        </div>
        <div class="rounded-[var(--radius-lg)] overflow-hidden border" style="background: var(--color-surface); border-color: var(--color-border);">
          <!-- Lead 1 -->
          <div class="flex items-center gap-3 px-3.5 py-3" style="border-bottom: 1px solid var(--color-border);">
            <div class="w-8 h-8 rounded-[var(--radius-sm)] flex items-center justify-center shrink-0" style="background: var(--color-accent-lightest);">
              <span class="text-[var(--text-xs)] font-medium" style="color: var(--color-accent);">王</span>
            </div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center justify-between mb-0.5">
                <p class="text-[var(--text-sm)] font-medium truncate" style="color: var(--color-text-primary);">王思远</p>
                <span class="text-[var(--text-xs)] px-2 py-0.5 rounded-[var(--radius-sm)] whitespace-nowrap font-medium" style="background: var(--state-warning-bg); color: var(--state-warning);">跟进中</span>
              </div>
              <p class="text-[var(--text-xs)] truncate" style="color: var(--color-text-tertiary);">迈巴赫S480 · 预算300万内</p>
            </div>
          </div>
          <!-- Lead 2 -->
          <div class="flex items-center gap-3 px-3.5 py-3" style="border-bottom: 1px solid var(--color-border);">
            <div class="w-8 h-8 rounded-[var(--radius-sm)] flex items-center justify-center shrink-0" style="background: var(--color-primary-lightest);">
              <span class="text-[var(--text-xs)] font-medium" style="color: var(--color-primary);">李</span>
            </div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center justify-between mb-0.5">
                <p class="text-[var(--text-sm)] font-medium truncate" style="color: var(--color-text-primary);">李明哲</p>
                <span class="text-[var(--text-xs)] px-2 py-0.5 rounded-[var(--radius-sm)] whitespace-nowrap font-medium" style="background: var(--state-success-bg); color: var(--state-success);">已到店</span>
              </div>
              <p class="text-[var(--text-xs)] truncate" style="color: var(--color-text-tertiary);">保时捷卡宴 · 二手置换</p>
            </div>
          </div>
          <!-- Lead 3 -->
          <div class="flex items-center gap-3 px-3.5 py-3">
            <div class="w-8 h-8 rounded-[var(--radius-sm)] flex items-center justify-center shrink-0" style="background: var(--state-info-bg);">
              <span class="text-[var(--text-xs)] font-medium" style="color: var(--state-info);">张</span>
            </div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center justify-between mb-0.5">
                <p class="text-[var(--text-sm)] font-medium truncate" style="color: var(--color-text-primary);">张婉清</p>
                <span class="text-[var(--text-xs)] px-2 py-0.5 rounded-[var(--radius-sm)] whitespace-nowrap font-medium" style="background: var(--color-background-secondary); color: var(--color-text-secondary);">新线索</span>
              </div>
              <p class="text-[var(--text-xs)] truncate" style="color: var(--color-text-tertiary);">AMG G63 · 全款购车</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Quick Actions -->
      <div class="px-4 mb-5">
        <span class="text-[var(--text-xs)] font-semibold uppercase tracking-[0.05em] block mb-3" style="color: var(--color-text-tertiary);">快捷操作</span>
        <div class="grid grid-cols-4 gap-2">
          <button class="flex flex-col items-center gap-1.5 py-3 rounded-[var(--radius-sm)] border transition-all duration-200" style="background: var(--color-surface); border-color: var(--color-border);" data-dom-id="btn-add-lead">
            <div class="w-9 h-9 rounded-[var(--radius-sm)] flex items-center justify-center" style="background: var(--color-primary-lightest);">
              <i data-lucide="user-plus" class="w-4 h-4" style="color: var(--color-primary);"></i>
            </div>
            <span class="text-[var(--text-xs)] whitespace-nowrap" style="color: var(--color-text-secondary);">新增线索</span>
          </button>
          <button class="flex flex-col items-center gap-1.5 py-3 rounded-[var(--radius-sm)] border transition-all duration-200" style="background: var(--color-surface); border-color: var(--color-border);" data-dom-id="btn-add-car">
            <div class="w-9 h-9 rounded-[var(--radius-sm)] flex items-center justify-center" style="background: var(--color-accent-lightest);">
              <i data-lucide="car" class="w-4 h-4" style="color: var(--color-accent);"></i>
            </div>
            <span class="text-[var(--text-xs)] whitespace-nowrap" style="color: var(--color-text-secondary);">录入车辆</span>
          </button>
          <button class="flex flex-col items-center gap-1.5 py-3 rounded-[var(--radius-sm)] border transition-all duration-200" style="background: var(--color-surface); border-color: var(--color-border);" data-dom-id="btn-follow-up">
            <div class="w-9 h-9 rounded-[var(--radius-sm)] flex items-center justify-center" style="background: var(--state-success-bg);">
              <i data-lucide="phone" class="w-4 h-4" style="color: var(--state-success);"></i>
            </div>
            <span class="text-[var(--text-xs)] whitespace-nowrap" style="color: var(--color-text-secondary);">回访客户</span>
          </button>
          <button class="flex flex-col items-center gap-1.5 py-3 rounded-[var(--radius-sm)] border transition-all duration-200" style="background: var(--color-surface); border-color: var(--color-border);" data-dom-id="btn-ai-assist">
            <div class="w-9 h-9 rounded-[var(--radius-sm)] flex items-center justify-center" style="background: var(--state-info-bg);">
              <i data-lucide="bot" class="w-4 h-4" style="color: var(--state-info);"></i>
            </div>
            <span class="text-[var(--text-xs)] whitespace-nowrap" style="color: var(--color-text-secondary);">AI助手</span>
          </button>
        </div>
      </div>

    </main>

    <!-- Tab Bar -->
    <nav class="fixed bottom-0 inset-x-0 z-30" style="background: var(--color-surface); border-top: 1px solid var(--color-border);" data-dom-id="tab-bar-home">
      <div class="flex items-center justify-around h-14 px-2 pb-1">
        <button class="flex flex-col items-center gap-[2px] py-1 min-w-0" data-dom-id="tab-home" data-active="true">
          <i data-lucide="home" class="w-5 h-5" style="color: var(--color-primary);"></i>
          <span class="text-[var(--text-xs)] whitespace-nowrap font-semibold" style="color: var(--color-primary);">首页</span>
        </button>
        <button class="flex flex-col items-center gap-[2px] py-1 min-w-0" data-dom-id="tab-showroom">
          <i data-lucide="layout-grid" class="w-5 h-5" style="color: var(--color-text-quaternary);"></i>
          <span class="text-[var(--text-xs)] whitespace-nowrap" style="color: var(--color-text-quaternary);">展厅</span>
        </button>
        <button class="flex flex-col items-center gap-[2px] py-1 min-w-0" data-dom-id="tab-members">
          <i data-lucide="crown" class="w-5 h-5" style="color: var(--color-text-quaternary);"></i>
          <span class="text-[var(--text-xs)] whitespace-nowrap" style="color: var(--color-text-quaternary);">会员</span>
        </button>
        <button class="flex flex-col items-center gap-[2px] py-1 min-w-0" data-dom-id="tab-inventory">
          <i data-lucide="package" class="w-5 h-5" style="color: var(--color-text-quaternary);"></i>
          <span class="text-[var(--text-xs)] whitespace-nowrap" style="color: var(--color-text-quaternary);">库存</span>
        </button>
        <button class="flex flex-col items-center gap-[2px] py-1 min-w-0" data-dom-id="tab-profile">
          <i data-lucide="user" class="w-5 h-5" style="color: var(--color-text-quaternary);"></i>
          <span class="text-[var(--text-xs)] whitespace-nowrap" style="color: var(--color-text-quaternary);">我的</span>
        </button>
      </div>
      <div class="h-[env(safe-area-inset-bottom,34px)]" style="background: var(--color-surface);"></div>
    </nav>
    <script>lucide.createIcons();</script>
</body>
</html>
