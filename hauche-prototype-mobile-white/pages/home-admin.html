<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员首页</title>
    <style id="theme-vars">
:root {
  /* ── Brand Colors: White Premium — NIO-Inspired Refined Red + Gold VIP ── */
  /* 蔚来风格要点：克制用色、精确对比、75%浅色+25%深色比例 */
  --color-primary: #C41E3A;
  --color-primary-light: #D6344F;
  --color-primary-lighter: rgba(196, 30, 58, 0.06);
  --color-primary-lightest: rgba(196, 30, 58, 0.03);
  --color-primary-dark: #9A1830;
  --color-primary-text: #FFFFFF;

  --color-accent: #D4A843;
  --color-accent-light: #E8C06A;
  --color-accent-lighter: rgba(212, 168, 67, 0.10);
  --color-accent-lightest: rgba(212, 168, 67, 0.05);

  /* ── Backgrounds: NIO-inspired "有温度的白" — 层次分明的暖灰梯度 ── */
  --color-background: #FAFBFC;
  --color-background-secondary: #F5F6F8;
  --color-background-tertiary: #EEEEF0;
  --color-surface: #FFFFFF;
  --color-surface-elevated: #FFFFFF;
  --color-surface-hover: #F7F8FA;

  /* ── Text: NIO风格 — 5级字重、精确对比度（9.9:1） ── */
  --color-text-primary: #1F2022;
  --color-text-secondary: #6E747A;
  --color-text-tertiary: #A0A6AE;
  --color-text-inverse: #FFFFFF;
  --color-text-quaternary: #C8CDD3;

  /* ── Borders & Dividers: NIO克制分割线 ── */
  --color-border: rgba(0, 0, 0, 0.05);
  --color-border-subtle: rgba(0, 0, 0, 0.03);
  --color-divider: rgba(0, 0, 0, 0.06);

  /* ── State Colors: 柔和功能性色彩 ── */
  --state-success: #2BBC8E;
  --state-success-bg: rgba(43, 188, 142, 0.06);
  --state-warning: #E8A838;
  --state-warning-bg: rgba(232, 168, 56, 0.06);
  --state-error: #E94A47;
  --state-error-bg: rgba(233, 74, 71, 0.06);
  --state-info: #3B8BEB;
  --state-info-bg: rgba(59, 139, 235, 0.06);

  /* ── Typography: NIO Blue Sky Sans 灵感 — 更大字号、更舒适行高 ── */
  --font-display: 'SF Pro Display', 'PingFang SC', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-body: 'SF Pro Text', 'PingFang SC', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'SF Mono', 'JetBrains Mono', ui-monospace, monospace;

  /* 蔚来APP字号层级（移动端适配） */
  --text-xs: 0.6875rem;     /* 11px - 注释/标签 */
  --text-sm: 0.8125rem;     /* 13px - 辅助文字 */
  --text-base: 0.875rem;    /* 14px - 正文（蔚来标准正文） */
  --text-lg: 0.9375rem;     /* 15px - 次要标题 */
  --text-xl: 1.0625rem;     /* 17px - 卡片标题（蔚来标准） */
  --text-2xl: 1.25rem;      /* 20px - 页面标题 */
  --text-3xl: 1.5rem;       /* 24px - 大标题 */
  --text-display: 1.75rem;  /* 28px - 核心数据展示 */

  /* ── Spacing: NIO"松弛有度"留白策略 ── */
  --space-0-5: 2px;
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;

  /* ── Radius: NIO大圆角 — 柔和亲切 ── */
  --radius-xs: 4px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-2xl: 24px;
  --radius-full: 9999px;

  /* ── Shadows: NIO精致阴影 — "高级精致的品质" ── */
  --shadow-none: none;
  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.02);
  --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.06);
  --shadow-card: 0 1px 4px rgba(0, 0, 0, 0.04), 0 0 0 1px rgba(0, 0, 0, 0.02);
  --shadow-elevated: 0 4px 16px rgba(0, 0, 0, 0.08);
  --shadow-float: 0 8px 30px rgba(0, 0, 0, 0.10);
  --shadow-modal: 0 16px 48px rgba(0, 0, 0, 0.12);

  /* ── NIO-inspired gradients ── */
  --gradient-primary: linear-gradient(135deg, #C41E3A 0%, #9A1830 100%);
  --gradient-accent: linear-gradient(135deg, #D4A843 0%, #B8922E 100%);
  --gradient-sky: linear-gradient(180deg, #EDF2FF 0%, #FAFBFC 100%);
  --gradient-warm: linear-gradient(180deg, #FFF8F0 0%, #FAFBFC 100%);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--color-background);
    --color-primary: var(--color-primary);
    --color-accent: var(--color-accent);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased" style="font-family: var(--font-body);">
    <main class="pb-24">
      <!-- Status Bar Spacer -->
      <div class="h-11"></div>

      <!-- Header -->
      <header class="flex items-center justify-between px-5 pt-1 pb-4" style="margin-top: 20px;">
        <div class="flex flex-col">
          <div class="flex items-center gap-2">
            <span class="text-lg font-semibold tracking-[-0.02em]" style="color: var(--color-text-primary);">豪车之家</span>
            <span class="inline-flex items-center h-5 px-2 rounded-full text-[11px] font-medium whitespace-nowrap" style="background: var(--color-primary-lighter); color: var(--color-primary);">管理后台</span>
          </div>
          <span class="mt-0.5 text-[13px]" style="color: var(--color-text-tertiary);">平台管理</span>
        </div>
        <button class="relative inline-flex items-center justify-center w-10 h-10 rounded-full transition-colors duration-150 hover:bg-[var(--color-surface-hover)] active:bg-[var(--color-background-secondary)]" aria-label="通知">
          <i data-lucide="bell" class="w-[20px] h-[20px]" style="color: var(--color-text-secondary);"></i>
          <span class="absolute top-1.5 right-1.5 w-2 h-2 rounded-full" style="background: var(--color-primary);"></span>
        </button>
      </header>

      <!-- Revenue Overview Card -->
      <section class="mx-5 mt-2">
        <div class="rounded-2xl overflow-hidden" style="background: var(--color-surface); box-shadow: var(--shadow-card);">
          <!-- Gradient top accent -->
          <div class="h-1" style="background: var(--gradient-primary);"></div>
          <div class="p-5">
            <p class="text-[13px]" style="color: var(--color-text-tertiary);">本月营收</p>
            <div class="mt-2 flex items-baseline gap-1">
              <span class="text-[28px] font-semibold tracking-tight" style="color: var(--color-primary); font-variant-numeric: tabular-nums;">6,680</span>
              <span class="text-[15px] font-medium" style="color: var(--color-primary);">万</span>
            </div>
            <!-- Sub stats -->
            <div class="mt-4 flex items-center gap-4">
              <div class="flex items-center gap-1.5">
                <i data-lucide="users" class="w-[14px] h-[14px]" style="color: var(--color-text-tertiary);"></i>
                <span class="text-[13px] font-medium" style="color: var(--color-text-primary); font-variant-numeric: tabular-nums;">326</span>
                <span class="text-[13px]" style="color: var(--color-text-tertiary);">会员</span>
              </div>
              <div class="w-px h-3" style="background: var(--color-divider);"></div>
              <div class="flex items-center gap-1.5">
                <i data-lucide="car" class="w-[14px] h-[14px]" style="color: var(--color-text-tertiary);"></i>
                <span class="text-[13px] font-medium" style="color: var(--color-text-primary); font-variant-numeric: tabular-nums;">142</span>
                <span class="text-[13px]" style="color: var(--color-text-tertiary);">车辆</span>
              </div>
              <div class="w-px h-3" style="background: var(--color-divider);"></div>
              <div class="flex items-center gap-1.5">
                <i data-lucide="file-text" class="w-[14px] h-[14px]" style="color: var(--color-text-tertiary);"></i>
                <span class="text-[13px] font-medium" style="color: var(--color-text-primary); font-variant-numeric: tabular-nums;">58</span>
                <span class="text-[13px]" style="color: var(--color-text-tertiary);">订单</span>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- Quick Stats Grid -->
      <section class="mx-5 mt-5">
        <div class="grid grid-cols-2 gap-3">
          <!-- 今日新增 -->
          <div class="rounded-2xl p-4 transition-transform duration-150 active:scale-[0.98]" style="background: var(--color-surface); box-shadow: var(--shadow-card);">
            <div class="flex items-center gap-2">
              <div class="inline-flex items-center justify-center w-8 h-8 rounded-lg" style="background: var(--state-success-bg);">
                <i data-lucide="trending-up" class="w-4 h-4" style="color: var(--state-success);"></i>
              </div>
              <span class="text-[13px]" style="color: var(--color-text-tertiary);">今日新增</span>
            </div>
            <p class="mt-3 text-[24px] font-semibold tracking-tight" style="color: var(--color-text-primary); font-variant-numeric: tabular-nums;">+12</p>
          </div>
          <!-- 活跃顾问 -->
          <div class="rounded-2xl p-4 transition-transform duration-150 active:scale-[0.98]" style="background: var(--color-surface); box-shadow: var(--shadow-card);">
            <div class="flex items-center gap-2">
              <div class="inline-flex items-center justify-center w-8 h-8 rounded-lg" style="background: var(--color-primary-lighter);">
                <i data-lucide="headphones" class="w-4 h-4" style="color: var(--color-primary);"></i>
              </div>
              <span class="text-[13px]" style="color: var(--color-text-tertiary);">活跃顾问</span>
            </div>
            <p class="mt-3 text-[24px] font-semibold tracking-tight" style="color: var(--color-text-primary); font-variant-numeric: tabular-nums;">8<span class="text-[15px] font-normal" style="color: var(--color-text-tertiary);">/10</span></p>
          </div>
          <!-- 待处理工单 -->
          <div class="rounded-2xl p-4 transition-transform duration-150 active:scale-[0.98]" style="background: var(--color-surface); box-shadow: var(--shadow-card);">
            <div class="flex items-center gap-2">
              <div class="inline-flex items-center justify-center w-8 h-8 rounded-lg" style="background: var(--state-warning-bg);">
                <i data-lucide="clipboard-list" class="w-4 h-4" style="color: var(--state-warning);"></i>
              </div>
              <span class="text-[13px]" style="color: var(--color-text-tertiary);">待处理工单</span>
            </div>
            <p class="mt-3 text-[24px] font-semibold tracking-tight" style="color: var(--color-text-primary); font-variant-numeric: tabular-nums;">3</p>
          </div>
          <!-- 库存周转 -->
          <div class="rounded-2xl p-4 transition-transform duration-150 active:scale-[0.98]" style="background: var(--color-surface); box-shadow: var(--shadow-card);">
            <div class="flex items-center gap-2">
              <div class="inline-flex items-center justify-center w-8 h-8 rounded-lg" style="background: var(--state-info-bg);">
                <i data-lucide="clock" class="w-4 h-4" style="color: var(--state-info);"></i>
              </div>
              <span class="text-[13px]" style="color: var(--color-text-tertiary);">库存周转</span>
            </div>
            <p class="mt-3 text-[24px] font-semibold tracking-tight" style="color: var(--color-text-primary); font-variant-numeric: tabular-nums;">23<span class="text-[15px] font-normal" style="color: var(--color-text-tertiary);">天</span></p>
          </div>
        </div>
      </section>

      <!-- Recent Orders -->
      <section class="mx-5 mt-6">
        <div class="flex items-center justify-between mb-3">
          <h2 class="text-[17px] font-semibold tracking-[-0.01em]" style="color: var(--color-text-primary);">最近订单</h2>
          <a href="#" class="text-[13px] font-medium transition-colors duration-150 hover:opacity-70" style="color: var(--color-primary);">全部</a>
        </div>
        <div class="rounded-2xl overflow-hidden" style="background: var(--color-surface); box-shadow: var(--shadow-card);">
          <!-- Order 1 -->
          <div class="flex items-center gap-3 px-4 py-3.5 transition-colors duration-150 active:bg-[var(--color-surface-hover)]" style="border-bottom: 1px solid var(--color-border-subtle);">
            <div class="w-10 h-10 rounded-full flex items-center justify-center shrink-0 text-[13px] font-medium" style="background: var(--color-background-secondary); color: var(--color-text-secondary);">李</div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center justify-between">
                <span class="text-[14px] font-medium truncate" style="color: var(--color-text-primary);">李明远</span>
                <span class="text-[14px] font-semibold shrink-0 ml-2" style="color: var(--color-text-primary); font-variant-numeric: tabular-nums;">¥128万</span>
              </div>
              <div class="flex items-center justify-between mt-0.5">
                <span class="text-[12px] truncate" style="color: var(--color-text-tertiary);">ES8 签名版</span>
                <span class="inline-flex items-center h-5 px-2 rounded-md text-[11px] font-medium shrink-0 ml-2" style="background: var(--state-success-bg); color: var(--state-success);">已签约</span>
              </div>
            </div>
          </div>
          <!-- Order 2 -->
          <div class="flex items-center gap-3 px-4 py-3.5 transition-colors duration-150 active:bg-[var(--color-surface-hover)]" style="border-bottom: 1px solid var(--color-border-subtle);">
            <div class="w-10 h-10 rounded-full flex items-center justify-center shrink-0 text-[13px] font-medium" style="background: var(--color-background-secondary); color: var(--color-text-secondary);">王</div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center justify-between">
                <span class="text-[14px] font-medium truncate" style="color: var(--color-text-primary);">王思涵</span>
                <span class="text-[14px] font-semibold shrink-0 ml-2" style="color: var(--color-text-primary); font-variant-numeric: tabular-nums;">¥86万</span>
              </div>
              <div class="flex items-center justify-between mt-0.5">
                <span class="text-[12px] truncate" style="color: var(--color-text-tertiary);">ET7 首发版</span>
                <span class="inline-flex items-center h-5 px-2 rounded-md text-[11px] font-medium shrink-0 ml-2" style="background: var(--state-info-bg); color: var(--state-info);">跟进中</span>
              </div>
            </div>
          </div>
          <!-- Order 3 -->
          <div class="flex items-center gap-3 px-4 py-3.5 transition-colors duration-150 active:bg-[var(--color-surface-hover)]">
            <div class="w-10 h-10 rounded-full flex items-center justify-center shrink-0 text-[13px] font-medium" style="background: var(--color-background-secondary); color: var(--color-text-secondary);">张</div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center justify-between">
                <span class="text-[14px] font-medium truncate" style="color: var(--color-text-primary);">张海涛</span>
                <span class="text-[14px] font-semibold shrink-0 ml-2" style="color: var(--color-text-primary); font-variant-numeric: tabular-nums;">¥42万</span>
              </div>
              <div class="flex items-center justify-between mt-0.5">
                <span class="text-[12px] truncate" style="color: var(--color-text-tertiary);">ES6 性能版</span>
                <span class="inline-flex items-center h-5 px-2 rounded-md text-[11px] font-medium shrink-0 ml-2" style="background: var(--state-warning-bg); color: var(--state-warning);">待确认</span>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- Bottom Tab Bar -->
      <nav class="fixed bottom-0 left-0 right-0 z-30" style="background: var(--color-surface); border-top: 1px solid var(--color-border);">
        <div class="flex items-center justify-around h-16 max-w-lg mx-auto">
          <button class="flex flex-col items-center justify-center gap-0.5 w-16 h-full" aria-label="首页" data-nav-key="home" data-active="true">
            <i data-lucide="home" class="w-[22px] h-[22px]" style="color: var(--color-primary);"></i>
            <span class="text-[11px] font-medium" style="color: var(--color-primary);">首页</span>
          </button>
          <button class="flex flex-col items-center justify-center gap-0.5 w-16 h-full transition-colors duration-150" aria-label="展厅" data-nav-key="showroom">
            <i data-lucide="layout-grid" class="w-[22px] h-[22px]" style="color: var(--color-text-tertiary);"></i>
            <span class="text-[11px]" style="color: var(--color-text-tertiary);">展厅</span>
          </button>
          <button class="flex flex-col items-center justify-center gap-0.5 w-16 h-full transition-colors duration-150" aria-label="会员" data-nav-key="members">
            <i data-lucide="users" class="w-[22px] h-[22px]" style="color: var(--color-text-tertiary);"></i>
            <span class="text-[11px]" style="color: var(--color-text-tertiary);">会员</span>
          </button>
          <button class="flex flex-col items-center justify-center gap-0.5 w-16 h-full transition-colors duration-150" aria-label="库存" data-nav-key="inventory">
            <i data-lucide="package" class="w-[22px] h-[22px]" style="color: var(--color-text-tertiary);"></i>
            <span class="text-[11px]" style="color: var(--color-text-tertiary);">库存</span>
          </button>
          <button class="flex flex-col items-center justify-center gap-0.5 w-16 h-full transition-colors duration-150" aria-label="我的" data-nav-key="profile">
            <i data-lucide="circle-user" class="w-[22px] h-[22px]" style="color: var(--color-text-tertiary);"></i>
            <span class="text-[11px]" style="color: var(--color-text-tertiary);">我的</span>
          </button>
        </div>
        <!-- Safe area -->
        <div class="h-[env(safe-area-inset-bottom,0px)]"></div>
      </nav>
    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
