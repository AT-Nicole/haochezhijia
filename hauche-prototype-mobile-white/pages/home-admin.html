<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员首页</title>
    <style id="theme-vars">
:root {
  /* ── Brand Colors: Ferrari Rosso Corsa ── */
  --color-primary: #DA291C;
  --color-primary-light: #E8403A;
  --color-primary-lighter: rgba(218, 41, 28, 0.06);
  --color-primary-lightest: rgba(218, 41, 28, 0.03);
  --color-primary-dark: #B01E0A;
  --color-primary-active: #9D2211;
  --color-primary-text: #FFFFFF;

  /* ── Accent: Giallo Modena ── */
  --color-accent: #E8B800;
  --color-accent-light: #F0CC44;
  --color-accent-lighter: rgba(232, 184, 0, 0.10);
  --color-accent-lightest: rgba(232, 184, 0, 0.05);

  /* ── Backgrounds ── */
  --color-background: #FAFAFA;
  --color-background-secondary: #F3F3F3;
  --color-background-tertiary: #E8E8E8;
  --color-surface: #FFFFFF;
  --color-surface-elevated: #FFFFFF;
  --color-surface-hover: #F5F5F5;

  /* ── Text ── */
  --color-text-primary: #181818;
  --color-text-secondary: #666666;
  --color-text-tertiary: #8F8F8F;
  --color-text-inverse: #FFFFFF;
  --color-text-quaternary: #B0B0B0;

  /* ── Borders ── */
  --color-border: #CCCCCC;
  --color-border-subtle: rgba(0, 0, 0, 0.06);
  --color-divider: rgba(0, 0, 0, 0.08);

  /* ── State Colors ── */
  --state-success: #03904A;
  --state-success-bg: rgba(3, 144, 74, 0.06);
  --state-warning: #E8A838;
  --state-warning-bg: rgba(232, 168, 56, 0.06);
  --state-error: #F13A2C;
  --state-error-bg: rgba(241, 58, 44, 0.06);
  --state-info: #4C98B9;
  --state-info-bg: rgba(76, 152, 185, 0.06);

  /* ── Typography ── */
  --font-display: 'SF Pro Display', 'PingFang SC', 'Noto Sans SC', 'Helvetica Neue', Arial, sans-serif;
  --font-body: 'SF Pro Text', 'PingFang SC', 'Noto Sans SC', 'Helvetica Neue', Arial, sans-serif;
  --font-mono: 'SF Mono', 'JetBrains Mono', ui-monospace, monospace;

  --text-xs: 0.6875rem;
  --text-sm: 0.8125rem;
  --text-base: 0.875rem;
  --text-lg: 1rem;
  --text-xl: 1.125rem;
  --text-2xl: 1.25rem;
  --text-3xl: 1.5rem;
  --text-display: 1.75rem;

  /* ── Spacing ── */
  --space-0-5: 2px;
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;

  /* ── Radius ── */
  --radius-xs: 1px;
  --radius-sm: 2px;
  --radius-md: 4px;
  --radius-lg: 8px;
  --radius-xl: 12px;
  --radius-2xl: 16px;
  --radius-full: 9999px;

  /* ── Shadows ── */
  --shadow-none: none;
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 2px 6px rgba(0, 0, 0, 0.06);
  --shadow-card: none;
  --shadow-elevated: 0 4px 12px rgba(0, 0, 0, 0.08);
  --shadow-float: 0 8px 24px rgba(0, 0, 0, 0.10);
  --shadow-modal: 0 12px 40px rgba(0, 0, 0, 0.12);

  --gradient-primary: linear-gradient(135deg, #DA291C 0%, #B01E0A 100%);
  --gradient-accent: linear-gradient(135deg, #E8B800 0%, #C49E00 100%);
  --gradient-dark: linear-gradient(180deg, #000000 0%, #181818 100%);
  --gradient-hero: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 100%);
}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--color-background);
    --color-primary: var(--color-primary);
    --color-accent: var(--color-accent);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased" style="font-family: var(--font-body);">
    <main class="pb-[72px]">
      <!-- Status Bar Spacer -->
      <div class="h-11"></div>

      <!-- Header -->
      <header class="flex items-center justify-between px-5 pt-1 pb-4" style="margin-top: 20px;">
        <div class="flex flex-col">
          <span class="text-[16px] font-medium" style="color: #181818; font-family: var(--font-display);">豪车之家</span>
          <span class="mt-0.5 text-[13px] font-normal" style="color: #8F8F8F;">平台管理</span>
        </div>
        <button class="relative inline-flex items-center justify-center w-10 h-10 transition-colors duration-150" style="color: #666666;" aria-label="通知">
          <i data-lucide="bell" class="w-5 h-5"></i>
          <span class="absolute top-1.5 right-1.5 w-2 h-2 rounded-full" style="background: var(--color-primary);"></span>
        </button>
      </header>

      <!-- Revenue Overview Card -->
      <section class="mx-5 mt-2">
        <div class="overflow-hidden" style="background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); border-left: 3px solid var(--color-primary);">
          <div class="p-5">
            <p class="text-[13px] font-normal" style="color: #8F8F8F;">本月营收</p>
            <div class="mt-2 flex items-baseline gap-1">
              <span class="text-[28px] font-bold tracking-tight leading-none" style="color: #181818; font-variant-numeric: tabular-nums; font-family: var(--font-display);">¥6,680</span>
              <span class="text-[14px] font-medium" style="color: #181818;">万</span>
            </div>
            <div class="mt-4 flex items-center gap-4">
              <div class="flex items-center gap-1.5">
                <i data-lucide="users" class="w-3.5 h-3.5" style="color: #8F8F8F;"></i>
                <span class="text-[13px] font-medium" style="color: #181818; font-variant-numeric: tabular-nums;">326</span>
                <span class="text-[13px]" style="color: #8F8F8F;">会员</span>
              </div>
              <div class="w-px h-3" style="background: var(--color-border);"></div>
              <div class="flex items-center gap-1.5">
                <i data-lucide="car" class="w-3.5 h-3.5" style="color: #8F8F8F;"></i>
                <span class="text-[13px] font-medium" style="color: #181818; font-variant-numeric: tabular-nums;">142</span>
                <span class="text-[13px]" style="color: #8F8F8F;">车辆</span>
              </div>
              <div class="w-px h-3" style="background: var(--color-border);"></div>
              <div class="flex items-center gap-1.5">
                <i data-lucide="file-text" class="w-3.5 h-3.5" style="color: #8F8F8F;"></i>
                <span class="text-[13px] font-medium" style="color: #181818; font-variant-numeric: tabular-nums;">58</span>
                <span class="text-[13px]" style="color: #8F8F8F;">订单</span>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- Quick Stats Grid (2x2) -->
      <section class="mx-5 mt-5">
        <div class="grid grid-cols-2 gap-3">
          <!-- 今日新增 -->
          <div class="p-4 transition-transform duration-150 active:scale-[0.98]" style="background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg);">
            <div class="flex items-center gap-2">
              <div class="inline-flex items-center justify-center w-8 h-8" style="background: var(--state-success-bg); border-radius: var(--radius-sm);">
                <i data-lucide="trending-up" class="w-4 h-4" style="color: var(--state-success);"></i>
              </div>
              <span class="text-[11px] uppercase font-normal" style="color: #8F8F8F; letter-spacing: 1px;">今日新增</span>
            </div>
            <p class="mt-3 text-[24px] font-bold tracking-tight" style="color: #181818; font-variant-numeric: tabular-nums; font-family: var(--font-display);">+12</p>
          </div>
          <!-- 活跃顾问 -->
          <div class="p-4 transition-transform duration-150 active:scale-[0.98]" style="background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg);">
            <div class="flex items-center gap-2">
              <div class="inline-flex items-center justify-center w-8 h-8" style="background: var(--color-primary-lighter); border-radius: var(--radius-sm);">
                <i data-lucide="headphones" class="w-4 h-4" style="color: var(--color-primary);"></i>
              </div>
              <span class="text-[11px] uppercase font-normal" style="color: #8F8F8F; letter-spacing: 1px;">活跃顾问</span>
            </div>
            <p class="mt-3 text-[24px] font-bold tracking-tight" style="color: #181818; font-variant-numeric: tabular-nums; font-family: var(--font-display);">8<span class="text-[14px] font-normal" style="color: #8F8F8F;">/10</span></p>
          </div>
          <!-- 待处理工单 -->
          <div class="p-4 transition-transform duration-150 active:scale-[0.98]" style="background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg);">
            <div class="flex items-center gap-2">
              <div class="inline-flex items-center justify-center w-8 h-8" style="background: var(--state-warning-bg); border-radius: var(--radius-sm);">
                <i data-lucide="clipboard-list" class="w-4 h-4" style="color: var(--state-warning);"></i>
              </div>
              <span class="text-[11px] uppercase font-normal" style="color: #8F8F8F; letter-spacing: 1px;">待处理工单</span>
            </div>
            <p class="mt-3 text-[24px] font-bold tracking-tight" style="color: #181818; font-variant-numeric: tabular-nums; font-family: var(--font-display);">3</p>
          </div>
          <!-- 库存周转 -->
          <div class="p-4 transition-transform duration-150 active:scale-[0.98]" style="background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg);">
            <div class="flex items-center gap-2">
              <div class="inline-flex items-center justify-center w-8 h-8" style="background: var(--state-info-bg); border-radius: var(--radius-sm);">
                <i data-lucide="clock" class="w-4 h-4" style="color: var(--state-info);"></i>
              </div>
              <span class="text-[11px] uppercase font-normal" style="color: #8F8F8F; letter-spacing: 1px;">库存周转</span>
            </div>
            <p class="mt-3 text-[24px] font-bold tracking-tight" style="color: #181818; font-variant-numeric: tabular-nums; font-family: var(--font-display);">23<span class="text-[14px] font-normal" style="color: #8F8F8F;">天</span></p>
          </div>
        </div>
      </section>

      <!-- Recent Orders -->
      <section class="mx-5 mt-6">
        <div class="flex items-center justify-between mb-3">
          <h2 class="text-[16px] font-medium" style="color: #181818; font-family: var(--font-display);">最近订单</h2>
          <a href="#" class="text-[13px] font-medium transition-colors duration-150" style="color: var(--color-primary);">全部</a>
        </div>
        <div class="overflow-hidden" style="background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg);">
          <!-- Order 1 -->
          <div class="flex items-center gap-3 px-4 py-3.5 transition-colors duration-150" style="border-bottom: 1px solid var(--color-border-subtle);">
            <div class="w-10 h-10 rounded-full flex items-center justify-center shrink-0 text-[13px] font-medium text-white" style="background: #666666;">李</div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center justify-between">
                <span class="text-[14px] font-medium truncate" style="color: #181818;">李明远</span>
                <span class="text-[14px] font-semibold shrink-0 ml-2" style="color: #181818; font-variant-numeric: tabular-nums;">¥128万</span>
              </div>
              <div class="flex items-center justify-between mt-0.5">
                <span class="text-[12px] truncate" style="color: #8F8F8F;">迈巴赫S480</span>
                <span class="inline-flex items-center h-5 px-2 text-[11px] font-medium shrink-0 ml-2" style="background: var(--state-success-bg); color: var(--state-success); border-radius: var(--radius-sm);">已签约</span>
              </div>
            </div>
          </div>
          <!-- Order 2 -->
          <div class="flex items-center gap-3 px-4 py-3.5 transition-colors duration-150" style="border-bottom: 1px solid var(--color-border-subtle);">
            <div class="w-10 h-10 rounded-full flex items-center justify-center shrink-0 text-[13px] font-medium text-white" style="background: #666666;">王</div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center justify-between">
                <span class="text-[14px] font-medium truncate" style="color: #181818;">王思涵</span>
                <span class="text-[14px] font-semibold shrink-0 ml-2" style="color: #181818; font-variant-numeric: tabular-nums;">¥86万</span>
              </div>
              <div class="flex items-center justify-between mt-0.5">
                <span class="text-[12px] truncate" style="color: #8F8F8F;">保时捷911</span>
                <span class="inline-flex items-center h-5 px-2 text-[11px] font-medium shrink-0 ml-2" style="background: var(--state-info-bg); color: var(--state-info); border-radius: var(--radius-sm);">跟进中</span>
              </div>
            </div>
          </div>
          <!-- Order 3 -->
          <div class="flex items-center gap-3 px-4 py-3.5 transition-colors duration-150">
            <div class="w-10 h-10 rounded-full flex items-center justify-center shrink-0 text-[13px] font-medium text-white" style="background: #666666;">张</div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center justify-between">
                <span class="text-[14px] font-medium truncate" style="color: #181818;">张海涛</span>
                <span class="text-[14px] font-semibold shrink-0 ml-2" style="color: #181818; font-variant-numeric: tabular-nums;">¥258万</span>
              </div>
              <div class="flex items-center justify-between mt-0.5">
                <span class="text-[12px] truncate" style="color: #8F8F8F;">奔驰G63</span>
                <span class="inline-flex items-center h-5 px-2 text-[11px] font-medium shrink-0 ml-2" style="background: var(--state-warning-bg); color: var(--state-warning); border-radius: var(--radius-sm);">待确认</span>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- Bottom Tab Bar -->
      <nav class="fixed bottom-0 left-0 right-0 z-30" style="background: var(--color-surface); border-top: 1px solid var(--color-border);" aria-label="底部导航">
        <div class="flex items-center justify-around h-14" style="padding-bottom: max(env(safe-area-inset-bottom), 0px);">
          <button class="flex flex-col items-center justify-center gap-0.5 w-16 h-full" aria-label="首页" data-nav-key="home" data-active="true">
            <i data-lucide="home" class="w-5 h-5" style="color: var(--color-primary);"></i>
            <span class="text-[10px] font-medium" style="color: var(--color-primary);">首页</span>
          </button>
          <button class="flex flex-col items-center justify-center gap-0.5 w-16 h-full transition-colors duration-150" aria-label="展厅" data-nav-key="showroom">
            <i data-lucide="layout-grid" class="w-5 h-5" style="color: #8F8F8F;"></i>
            <span class="text-[10px]" style="color: #8F8F8F;">展厅</span>
          </button>
          <button class="flex flex-col items-center justify-center gap-0.5 w-16 h-full transition-colors duration-150" aria-label="会员" data-nav-key="members">
            <i data-lucide="users" class="w-5 h-5" style="color: #8F8F8F;"></i>
            <span class="text-[10px]" style="color: #8F8F8F;">会员</span>
          </button>
          <button class="flex flex-col items-center justify-center gap-0.5 w-16 h-full transition-colors duration-150" aria-label="库存" data-nav-key="inventory">
            <i data-lucide="package" class="w-5 h-5" style="color: #8F8F8F;"></i>
            <span class="text-[10px]" style="color: #8F8F8F;">库存</span>
          </button>
          <button class="flex flex-col items-center justify-center gap-0.5 w-16 h-full transition-colors duration-150" aria-label="我的" data-nav-key="profile">
            <i data-lucide="circle-user" class="w-5 h-5" style="color: #8F8F8F;"></i>
            <span class="text-[10px]" style="color: #8F8F8F;">我的</span>
          </button>
        </div>
      </nav>
    </main>
    <style>
      @media (prefers-reduced-motion: reduce) {
        * { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; }
      }
      button:focus-visible {
        outline: 2px solid var(--color-primary);
        outline-offset: 2px;
      }
    </style>
    <script>lucide.createIcons();</script>
</body>
</html>
