<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI智能客服</title>
    <style id="theme-vars">
:root {
  /* ── Brand Colors: Ferrari Rosso Corsa — 赛道传承红 ── */
  /* 法拉利数字设计: 克制的红色使用，仅用于CTA和品牌关键时刻 */
  --color-primary: #DA291C;
  --color-primary-light: #E8403A;
  --color-primary-lighter: rgba(218, 41, 28, 0.06);
  --color-primary-lightest: rgba(218, 41, 28, 0.03);
  --color-primary-dark: #B01E0A;
  --color-primary-active: #9D2211;
  --color-primary-text: #FFFFFF;

  /* ── Accent: 赛道黄 Giallo Modena — 法拉利盾牌传承色 ── */
  --color-accent: #E8B800;
  --color-accent-light: #F0CC44;
  --color-accent-lighter: rgba(232, 184, 0, 0.10);
  --color-accent-lightest: rgba(232, 184, 0, 0.05);

  /* ── Backgrounds: Ferrari Chiaroscuro — 明暗交替展厅感 ── */
  /* 法拉利核心理念：纯白编辑面板 + 深黑沉浸区域，硬切割过渡 */
  --color-background: #FAFAFA;
  --color-background-secondary: #F3F3F3;
  --color-background-tertiary: #E8E8E8;
  --color-surface: #FFFFFF;
  --color-surface-elevated: #FFFFFF;
  --color-surface-hover: #F5F5F5;

  /* ── Text: Ferrari双字体编辑层级 — FerrariSans灵感 ── */
  --color-text-primary: #181818;
  --color-text-secondary: #666666;
  --color-text-tertiary: #8F8F8F;
  --color-text-inverse: #FFFFFF;
  --color-text-quaternary: #B0B0B0;

  /* ── Borders & Dividers: 法拉利精准线条 ── */
  --color-border: #CCCCCC;
  --color-border-subtle: rgba(0, 0, 0, 0.06);
  --color-divider: rgba(0, 0, 0, 0.08);

  /* ── State Colors ── */
  --state-success: #03904A;
  --state-success-bg: rgba(3, 144, 74, 0.06);
  --state-warning: #E8A838;
  --state-warning-bg: rgba(232, 168, 56, 0.06);
  --state-error: #F13A2C;
  --state-error-bg: rgba(241, 58, 44, 0.06);
  --state-info: #4C98B9;
  --state-info-bg: rgba(76, 152, 185, 0.06);

  /* ── Typography: FerrariSans灵感 — 紧凑有力 ── */
  --font-display: 'SF Pro Display', 'PingFang SC', 'Noto Sans SC', 'Helvetica Neue', Arial, sans-serif;
  --font-body: 'SF Pro Text', 'PingFang SC', 'Noto Sans SC', 'Helvetica Neue', Arial, sans-serif;
  --font-mono: 'SF Mono', 'JetBrains Mono', ui-monospace, monospace;

  /* 法拉利字号层级 — 标题紧凑、正文舒适 */
  --text-xs: 0.6875rem;     /* 11px - 大写标签（text-transform:uppercase + letter-spacing:1px）*/
  --text-sm: 0.8125rem;     /* 13px - 说明文字 */
  --text-base: 0.875rem;    /* 14px - 正文 */
  --text-lg: 1rem;          /* 16px - 卡片标题/UI标题 */
  --text-xl: 1.125rem;      /* 18px - 副标题 */
  --text-2xl: 1.25rem;      /* 20px - 章节标题 */
  --text-3xl: 1.5rem;       /* 24px - 大标题 */
  --text-display: 1.75rem;   /* 28px - 核心数据/英雄标题 */

  /* ── Spacing: 法拉利8px基础网格 ── */
  --space-0-5: 2px;
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;

  /* ── Radius: 法拉利剃刀级精度 — 2px标志性圆角 ── */
  --radius-xs: 1px;
  --radius-sm: 2px;
  --radius-md: 4px;
  --radius-lg: 8px;
  --radius-xl: 12px;
  --radius-2xl: 16px;
  --radius-full: 9999px;

  /* ── Shadows: 法拉利扁平层次 — 近乎零阴影 ── */
  --shadow-none: none;
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 2px 6px rgba(0, 0, 0, 0.06);
  --shadow-card: none;
  --shadow-elevated: 0 4px 12px rgba(0, 0, 0, 0.08);
  --shadow-float: 0 8px 24px rgba(0, 0, 0, 0.10);
  --shadow-modal: 0 12px 40px rgba(0, 0, 0, 0.12);

  /* ── Gradients: 极少使用 — 法拉利用纯色对比，不用渐变 ── */
  --gradient-primary: linear-gradient(135deg, #DA291C 0%, #B01E0A 100%);
  --gradient-accent: linear-gradient(135deg, #E8B800 0%, #C49E00 100%);
  --gradient-dark: linear-gradient(180deg, #000000 0%, #181818 100%);
  --gradient-hero: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 100%);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--color-background);
    --color-primary: var(--color-primary);
    --color-accent: var(--color-accent);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="flex flex-col h-screen" data-dom-id="page-ai-chat" style="font-family: var(--font-body);">

      <!-- Top Bar -->
      <header class="shrink-0 flex items-center h-14 px-4" style="border-bottom: 1px solid var(--color-border); background: var(--color-surface);">
        <div class="w-9"></div>
        <div class="flex-1 text-center">
          <h1 class="text-sm font-semibold tracking-wide" style="color: var(--color-text-primary); text-transform: uppercase; letter-spacing: 1px; word-break: keep-all; text-wrap: balance;">AI CHAT</h1>
        </div>
        <button class="w-9 h-9 flex items-center justify-center transition-colors duration-150 hover:bg-[var(--color-background-secondary)]" style="border-radius: var(--radius-sm);" aria-label="关闭" data-dom-id="btn-close-chat">
          <i data-lucide="x" class="w-5 h-5" style="color: var(--color-text-secondary);"></i>
        </button>
      </header>

      <!-- Chat Area -->
      <div class="flex-1 overflow-y-auto px-4 py-4 space-y-5" style="background: var(--color-background);">

        <!-- AI Message 1 -->
        <div class="flex gap-3 max-w-[85%]">
          <div class="w-8 h-8 flex items-center justify-center shrink-0 mt-1" style="border-radius: var(--radius-sm); background: var(--color-primary-lighter);">
            <i data-lucide="bot" class="w-4 h-4" style="color: var(--color-primary);"></i>
          </div>
          <div class="px-3.5 py-3" style="border-radius: var(--radius-lg); border: 1px solid var(--color-border); background: var(--color-surface);">
            <p class="text-sm leading-relaxed" style="color: var(--color-text-primary);">您好，我是您的AI智能购车顾问。请问有什么可以帮您？</p>
            <p class="mt-2" style="font-size: var(--text-xs); color: var(--color-text-quaternary);">10:30</p>
          </div>
        </div>

        <!-- User Message 1 -->
        <div class="flex justify-end">
          <div class="max-w-[80%]">
            <div class="px-3.5 py-3" style="border-radius: var(--radius-lg); background: var(--color-primary);">
              <p class="text-sm leading-relaxed" style="color: var(--color-primary-text);">我想了解一下迈巴赫S480，预算300万以内</p>
            </div>
            <p class="mt-2 text-right" style="font-size: var(--text-xs); color: var(--color-text-quaternary);">10:31</p>
          </div>
        </div>

        <!-- AI Message 2 with inline car card -->
        <div class="flex gap-3 max-w-[85%]">
          <div class="w-8 h-8 flex items-center justify-center shrink-0 mt-1" style="border-radius: var(--radius-sm); background: var(--color-primary-lighter);">
            <i data-lucide="bot" class="w-4 h-4" style="color: var(--color-primary);"></i>
          </div>
          <div class="px-3.5 py-3" style="border-radius: var(--radius-lg); border: 1px solid var(--color-border); background: var(--color-surface);">
            <p class="text-sm leading-relaxed" style="color: var(--color-text-primary);">迈巴赫S480是非常不错的选择，目前店内在库一台：</p>
            <!-- Inline Car Card -->
            <div class="flex gap-3 p-3 mt-2" style="border-radius: var(--radius-md); background: var(--color-background-secondary);">
              <div class="w-16 h-12 shrink-0 overflow-hidden" style="border-radius: var(--radius-xs);">
                <img src="../assets/car-maybach.jpg" alt="迈巴赫S480" class="w-full h-full object-cover">
              </div>
              <div class="flex-1 min-w-0">
                <p class="text-sm font-medium truncate" style="color: var(--color-text-primary);">迈巴赫S480 2024款</p>
                <p class="text-sm font-semibold" style="color: var(--color-primary); font-variant-numeric: tabular-nums;">¥288万</p>
              </div>
            </div>
            <p class="mt-3 text-sm leading-relaxed" style="color: var(--color-text-primary);">这台车配备了4.0T双涡轮增压发动机，9速自动变速箱，AI综合评分96分，性价比和市场热度都非常出色。需要为您预约到店看车吗？</p>
            <p class="mt-2" style="font-size: var(--text-xs); color: var(--color-text-quaternary);">10:31</p>
          </div>
        </div>

        <!-- User Message 2 -->
        <div class="flex justify-end">
          <div class="max-w-[80%]">
            <div class="px-3.5 py-3" style="border-radius: var(--radius-lg); background: var(--color-primary);">
              <p class="text-sm leading-relaxed" style="color: var(--color-primary-text);">价格还有优惠空间吗？</p>
            </div>
            <p class="mt-2 text-right" style="font-size: var(--text-xs); color: var(--color-text-quaternary);">10:32</p>
          </div>
        </div>

        <!-- Bottom Spacer -->
        <div class="h-2"></div>
      </div>

      <!-- Input Bar -->
      <div class="shrink-0 px-4 py-3 flex items-center gap-3" style="border-top: 1px solid var(--color-border); background: var(--color-surface);">
        <div class="flex-1 h-10 px-4 flex items-center" style="border-radius: var(--radius-sm); background: var(--color-background-secondary);">
          <input type="text" placeholder="输入您的问题..." class="flex-1 bg-transparent text-sm outline-none" style="color: var(--color-text-primary);" aria-label="输入消息">
        </div>
        <button class="w-10 h-10 flex items-center justify-center shrink-0 transition-all duration-200 hover:opacity-90 active:scale-[0.95]" style="border-radius: var(--radius-sm); background: var(--color-primary);" aria-label="发送" data-dom-id="btn-send">
          <i data-lucide="send" class="w-4 h-4" style="color: var(--color-primary-text);"></i>
        </button>
      </div>

    </main>
    <style>
      @media (prefers-reduced-motion: reduce) {
        * { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; }
      }
    </style>
    <script>lucide.createIcons();</script>
</body>
</html>
