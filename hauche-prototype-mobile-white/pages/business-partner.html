<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>事业合伙人</title>
    <style id="theme-vars">
:root {
  /* ── Brand Colors: Ferrari Rosso Corsa — 赛道传承红 ── */
  /* 法拉利数字设计: 克制的红色使用，仅用于CTA和品牌关键时刻 */
  --color-primary: #DA291C;
  --color-primary-light: #E8403A;
  --color-primary-lighter: rgba(218, 41, 28, 0.06);
  --color-primary-lightest: rgba(218, 41, 28, 0.03);
  --color-primary-dark: #B01E0A;
  --color-primary-active: #9D2211;
  --color-primary-text: #FFFFFF;

  /* ── Accent: 赛道黄 Giallo Modena — 法拉利盾牌传承色 ── */
  --color-accent: #E8B800;
  --color-accent-light: #F0CC44;
  --color-accent-lighter: rgba(232, 184, 0, 0.10);
  --color-accent-lightest: rgba(232, 184, 0, 0.05);

  /* ── Backgrounds: Ferrari Chiaroscuro — 明暗交替展厅感 ── */
  /* 法拉利核心理念：纯白编辑面板 + 深黑沉浸区域，硬切割过渡 */
  --color-background: #FAFAFA;
  --color-background-secondary: #F3F3F3;
  --color-background-tertiary: #E8E8E8;
  --color-surface: #FFFFFF;
  --color-surface-elevated: #FFFFFF;
  --color-surface-hover: #F5F5F5;

  /* ── Text: Ferrari双字体编辑层级 — FerrariSans灵感 ── */
  --color-text-primary: #181818;
  --color-text-secondary: #666666;
  --color-text-tertiary: #8F8F8F;
  --color-text-inverse: #FFFFFF;
  --color-text-quaternary: #B0B0B0;

  /* ── Borders & Dividers: 法拉利精准线条 ── */
  --color-border: #CCCCCC;
  --color-border-subtle: rgba(0, 0, 0, 0.06);
  --color-divider: rgba(0, 0, 0, 0.08);

  /* ── State Colors ── */
  --state-success: #03904A;
  --state-success-bg: rgba(3, 144, 74, 0.06);
  --state-warning: #E8A838;
  --state-warning-bg: rgba(232, 168, 56, 0.06);
  --state-error: #F13A2C;
  --state-error-bg: rgba(241, 58, 44, 0.06);
  --state-info: #4C98B9;
  --state-info-bg: rgba(76, 152, 185, 0.06);

  /* ── Typography: FerrariSans灵感 — 紧凑有力 ── */
  --font-display: 'SF Pro Display', 'PingFang SC', 'Noto Sans SC', 'Helvetica Neue', Arial, sans-serif;
  --font-body: 'SF Pro Text', 'PingFang SC', 'Noto Sans SC', 'Helvetica Neue', Arial, sans-serif;
  --font-mono: 'SF Mono', 'JetBrains Mono', ui-monospace, monospace;

  /* 法拉利字号层级 — 标题紧凑、正文舒适 */
  --text-xs: 0.6875rem;     /* 11px - 大写标签（text-transform:uppercase + letter-spacing:1px）*/
  --text-sm: 0.8125rem;     /* 13px - 说明文字 */
  --text-base: 0.875rem;    /* 14px - 正文 */
  --text-lg: 1rem;          /* 16px - 卡片标题/UI标题 */
  --text-xl: 1.125rem;      /* 18px - 副标题 */
  --text-2xl: 1.25rem;      /* 20px - 章节标题 */
  --text-3xl: 1.5rem;       /* 24px - 大标题 */
  --text-display: 1.75rem;   /* 28px - 核心数据/英雄标题 */

  /* ── Spacing: 法拉利8px基础网格 ── */
  --space-0-5: 2px;
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;

  /* ── Radius: 法拉利剃刀级精度 — 2px标志性圆角 ── */
  --radius-xs: 1px;
  --radius-sm: 2px;
  --radius-md: 4px;
  --radius-lg: 8px;
  --radius-xl: 12px;
  --radius-2xl: 16px;
  --radius-full: 9999px;

  /* ── Shadows: 法拉利扁平层次 — 近乎零阴影 ── */
  --shadow-none: none;
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 2px 6px rgba(0, 0, 0, 0.06);
  --shadow-card: none;
  --shadow-elevated: 0 4px 12px rgba(0, 0, 0, 0.08);
  --shadow-float: 0 8px 24px rgba(0, 0, 0, 0.10);
  --shadow-modal: 0 12px 40px rgba(0, 0, 0, 0.12);

  /* ── Gradients: 极少使用 — 法拉利用纯色对比，不用渐变 ── */
  --gradient-primary: linear-gradient(135deg, #DA291C 0%, #B01E0A 100%);
  --gradient-accent: linear-gradient(135deg, #E8B800 0%, #C49E00 100%);
  --gradient-dark: linear-gradient(180deg, #000000 0%, #181818 100%);
  --gradient-hero: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 100%);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--color-background);
    --color-primary: var(--color-primary);
    --color-accent: var(--color-accent);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main data-dom-id="page-business-partner">
      <!-- Top Bar -->
      <header class="sticky top-0 z-30" style="background: var(--color-surface); border-bottom: 1px solid var(--color-border);">
        <div class="flex h-14 items-center px-5">
          <button class="inline-flex h-9 w-9 items-center justify-center transition-colors duration-150 hover:bg-[var(--color-surface-hover)]" style="border-radius: var(--radius-sm); color: var(--color-text-primary);" aria-label="返回">
            <i data-lucide="arrow-left" class="h-5 w-5"></i>
          </button>
          <h1 class="ml-3 text-sm font-semibold tracking-wide" style="color: var(--color-text-primary); text-transform: uppercase; letter-spacing: 1px;">PARTNER</h1>
        </div>
      </header>

      <!-- Income Overview - 28px bold gold -->
      <section class="mx-4 mt-4 overflow-hidden" style="border-radius: var(--radius-lg); background: var(--color-accent);">
        <div class="px-5 py-6">
          <p class="text-xs font-medium tracking-wide" style="color: rgba(0,0,0,0.6); text-transform: uppercase; letter-spacing: 1px;">累计收益</p>
          <div class="mt-2 flex items-baseline gap-1">
            <span class="text-sm font-medium" style="color: rgba(0,0,0,0.7);">¥</span>
            <span class="text-2xl font-bold" style="color: var(--color-text-primary); font-variant-numeric: tabular-nums;">68</span>
            <span class="text-base font-semibold" style="color: rgba(0,0,0,0.7);">万</span>
          </div>
        </div>
        <!-- Stats Row -->
        <div class="grid grid-cols-3 gap-0" style="background: rgba(0,0,0,0.08); border-top: 1px solid rgba(0,0,0,0.1);">
          <div class="flex flex-col items-center py-3" style="border-right: 1px solid rgba(0,0,0,0.08);">
            <span class="text-sm font-semibold" style="color: var(--color-text-primary); font-variant-numeric: tabular-nums;">23单</span>
            <span class="mt-0.5" style="font-size: var(--text-xs); color: rgba(0,0,0,0.5);">推荐成交</span>
          </div>
          <div class="flex flex-col items-center py-3" style="border-right: 1px solid rgba(0,0,0,0.08);">
            <span class="text-sm font-semibold" style="color: var(--color-text-primary); font-variant-numeric: tabular-nums;">55%</span>
            <span class="mt-0.5" style="font-size: var(--text-xs); color: rgba(0,0,0,0.5);">佣金比例</span>
          </div>
          <div class="flex flex-col items-center py-3">
            <span class="text-sm font-semibold" style="color: var(--color-text-primary); font-variant-numeric: tabular-nums;">+¥8.5万</span>
            <span class="mt-0.5" style="font-size: var(--text-xs); color: rgba(0,0,0,0.5);">本月</span>
          </div>
        </div>
      </section>

      <!-- 3-Step Flow -->
      <section class="px-4 mt-6">
        <h2 class="text-sm font-semibold tracking-wide" style="color: var(--color-text-primary); text-transform: uppercase; letter-spacing: 1px;">运作模式</h2>
        <div class="mt-3 flex items-center gap-0">
          <!-- Step 1 -->
          <div class="flex-1 flex flex-col items-center text-center">
            <div class="h-12 w-12 flex items-center justify-center" style="border-radius: var(--radius-full); background: var(--color-primary-lighter);">
              <i data-lucide="share-2" class="h-5 w-5" style="color: var(--color-primary);"></i>
            </div>
            <span class="mt-2 text-xs font-semibold" style="color: var(--color-text-primary);">分享</span>
            <span class="mt-0.5" style="font-size: var(--text-xs); color: var(--color-text-tertiary);">推荐好友</span>
          </div>
          <!-- Arrow -->
          <div class="flex items-center px-1">
            <i data-lucide="chevron-right" class="h-4 w-4" style="color: var(--color-text-quaternary);"></i>
          </div>
          <!-- Step 2 -->
          <div class="flex-1 flex flex-col items-center text-center">
            <div class="h-12 w-12 flex items-center justify-center" style="border-radius: var(--radius-full); background: var(--color-accent-lightest);">
              <i data-lucide="handshake" class="h-5 w-5" style="color: var(--color-accent);"></i>
            </div>
            <span class="mt-2 text-xs font-semibold" style="color: var(--color-text-primary);">成交</span>
            <span class="mt-0.5" style="font-size: var(--text-xs); color: var(--color-text-tertiary);">好友购车</span>
          </div>
          <!-- Arrow -->
          <div class="flex items-center px-1">
            <i data-lucide="chevron-right" class="h-4 w-4" style="color: var(--color-text-quaternary);"></i>
          </div>
          <!-- Step 3 -->
          <div class="flex-1 flex flex-col items-center text-center">
            <div class="h-12 w-12 flex items-center justify-center" style="border-radius: var(--radius-full); background: var(--color-background-secondary);">
              <i data-lucide="wallet" class="h-5 w-5" style="color: var(--color-text-secondary);"></i>
            </div>
            <span class="mt-2 text-xs font-semibold" style="color: var(--color-text-primary);">收益</span>
            <span class="mt-0.5" style="font-size: var(--text-xs); color: var(--color-text-tertiary);">获取佣金</span>
          </div>
        </div>
      </section>

      <!-- My Referrals -->
      <section class="px-4 mt-6 pb-8">
        <h2 class="text-sm font-semibold tracking-wide" style="color: var(--color-text-primary); text-transform: uppercase; letter-spacing: 1px;">我的推荐</h2>
        <div class="mt-3 flex flex-col gap-3">
          <!-- Referral 1 -->
          <div class="flex items-center gap-3 p-4" style="background: var(--color-surface); border-radius: var(--radius-lg); border: 1px solid var(--color-border);">
            <div class="h-10 w-10 shrink-0 overflow-hidden" style="border-radius: var(--radius-full); background: var(--color-background-secondary);">
              <span class="flex h-full w-full items-center justify-center text-sm font-semibold" style="color: var(--color-text-secondary);">刘</span>
            </div>
            <div class="min-w-0 flex-1">
              <div class="flex items-center justify-between">
                <span class="text-sm font-semibold" style="color: var(--color-text-primary);">刘洋</span>
                <span class="text-xs font-semibold whitespace-nowrap" style="color: var(--color-accent);">+¥3.2万</span>
              </div>
              <div class="flex items-center justify-between mt-0.5">
                <span class="text-xs" style="color: var(--color-text-secondary);">保时捷 Cayenne</span>
                <span class="text-xs" style="color: var(--state-success);">已成交</span>
              </div>
            </div>
          </div>

          <!-- Referral 2 -->
          <div class="flex items-center gap-3 p-4" style="background: var(--color-surface); border-radius: var(--radius-lg); border: 1px solid var(--color-border);">
            <div class="h-10 w-10 shrink-0 overflow-hidden" style="border-radius: var(--radius-full); background: var(--color-background-secondary);">
              <span class="flex h-full w-full items-center justify-center text-sm font-semibold" style="color: var(--color-text-secondary);">陈</span>
            </div>
            <div class="min-w-0 flex-1">
              <div class="flex items-center justify-between">
                <span class="text-sm font-semibold" style="color: var(--color-text-primary);">陈晓</span>
                <span class="text-xs font-semibold whitespace-nowrap" style="color: var(--color-accent);">+¥5.8万</span>
              </div>
              <div class="flex items-center justify-between mt-0.5">
                <span class="text-xs" style="color: var(--color-text-secondary);">奔驰 S400L</span>
                <span class="text-xs" style="color: var(--state-success);">已成交</span>
              </div>
            </div>
          </div>

          <!-- Referral 3 -->
          <div class="flex items-center gap-3 p-4" style="background: var(--color-surface); border-radius: var(--radius-lg); border: 1px solid var(--color-border);">
            <div class="h-10 w-10 shrink-0 overflow-hidden" style="border-radius: var(--radius-full); background: var(--color-background-secondary);">
              <span class="flex h-full w-full items-center justify-center text-sm font-semibold" style="color: var(--color-text-secondary);">王</span>
            </div>
            <div class="min-w-0 flex-1">
              <div class="flex items-center justify-between">
                <span class="text-sm font-semibold" style="color: var(--color-text-primary);">王明</span>
                <span class="text-xs font-semibold whitespace-nowrap" style="color: var(--color-text-tertiary);">待确认</span>
              </div>
              <div class="flex items-center justify-between mt-0.5">
                <span class="text-xs" style="color: var(--color-text-secondary);">宝马 760Li</span>
                <span class="text-xs" style="color: var(--state-warning);">洽谈中</span>
              </div>
            </div>
          </div>
        </div>

        <!-- CTA -->
        <div class="mt-6">
          <button class="w-full h-12 text-sm font-semibold tracking-wide transition-all duration-200 hover:opacity-90 active:scale-[0.98]" style="border-radius: var(--radius-sm); background: var(--color-primary); color: var(--color-primary-text); text-transform: uppercase; letter-spacing: 1px;" data-dom-id="cta-invite">
            邀请好友
          </button>
        </div>
      </section>
    </main>
    <style>
      @media (prefers-reduced-motion: reduce) {
        * { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; }
      }
    </style>
    <script>lucide.createIcons();</script>
</body>
</html>
