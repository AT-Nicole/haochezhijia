<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金融服务</title>
    <style id="theme-vars">
:root {
  /* ── Brand Colors: White Premium — NIO-Inspired Refined Red + Gold VIP ── */
  /* 蔚来风格要点：克制用色、精确对比、75%浅色+25%深色比例 */
  --color-primary: #C41E3A;
  --color-primary-light: #D6344F;
  --color-primary-lighter: rgba(196, 30, 58, 0.06);
  --color-primary-lightest: rgba(196, 30, 58, 0.03);
  --color-primary-dark: #9A1830;
  --color-primary-text: #FFFFFF;

  --color-accent: #D4A843;
  --color-accent-light: #E8C06A;
  --color-accent-lighter: rgba(212, 168, 67, 0.10);
  --color-accent-lightest: rgba(212, 168, 67, 0.05);

  /* ── Backgrounds: NIO-inspired "有温度的白" — 层次分明的暖灰梯度 ── */
  --color-background: #FAFBFC;
  --color-background-secondary: #F5F6F8;
  --color-background-tertiary: #EEEEF0;
  --color-surface: #FFFFFF;
  --color-surface-elevated: #FFFFFF;
  --color-surface-hover: #F7F8FA;

  /* ── Text: NIO风格 — 5级字重、精确对比度（9.9:1） ── */
  --color-text-primary: #1F2022;
  --color-text-secondary: #6E747A;
  --color-text-tertiary: #A0A6AE;
  --color-text-inverse: #FFFFFF;
  --color-text-quaternary: #C8CDD3;

  /* ── Borders & Dividers: NIO克制分割线 ── */
  --color-border: rgba(0, 0, 0, 0.05);
  --color-border-subtle: rgba(0, 0, 0, 0.03);
  --color-divider: rgba(0, 0, 0, 0.06);

  /* ── State Colors: 柔和功能性色彩 ── */
  --state-success: #2BBC8E;
  --state-success-bg: rgba(43, 188, 142, 0.06);
  --state-warning: #E8A838;
  --state-warning-bg: rgba(232, 168, 56, 0.06);
  --state-error: #E94A47;
  --state-error-bg: rgba(233, 74, 71, 0.06);
  --state-info: #3B8BEB;
  --state-info-bg: rgba(59, 139, 235, 0.06);

  /* ── Typography: NIO Blue Sky Sans 灵感 — 更大字号、更舒适行高 ── */
  --font-display: 'SF Pro Display', 'PingFang SC', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-body: 'SF Pro Text', 'PingFang SC', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'SF Mono', 'JetBrains Mono', ui-monospace, monospace;

  /* 蔚来APP字号层级（移动端适配） */
  --text-xs: 0.6875rem;     /* 11px - 注释/标签 */
  --text-sm: 0.8125rem;     /* 13px - 辅助文字 */
  --text-base: 0.875rem;    /* 14px - 正文（蔚来标准正文） */
  --text-lg: 0.9375rem;     /* 15px - 次要标题 */
  --text-xl: 1.0625rem;     /* 17px - 卡片标题（蔚来标准） */
  --text-2xl: 1.25rem;      /* 20px - 页面标题 */
  --text-3xl: 1.5rem;       /* 24px - 大标题 */
  --text-display: 1.75rem;  /* 28px - 核心数据展示 */

  /* ── Spacing: NIO"松弛有度"留白策略 ── */
  --space-0-5: 2px;
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;

  /* ── Radius: NIO大圆角 — 柔和亲切 ── */
  --radius-xs: 4px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-2xl: 24px;
  --radius-full: 9999px;

  /* ── Shadows: NIO精致阴影 — "高级精致的品质" ── */
  --shadow-none: none;
  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.02);
  --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.06);
  --shadow-card: 0 1px 4px rgba(0, 0, 0, 0.04), 0 0 0 1px rgba(0, 0, 0, 0.02);
  --shadow-elevated: 0 4px 16px rgba(0, 0, 0, 0.08);
  --shadow-float: 0 8px 30px rgba(0, 0, 0, 0.10);
  --shadow-modal: 0 16px 48px rgba(0, 0, 0, 0.12);

  /* ── NIO-inspired gradients ── */
  --gradient-primary: linear-gradient(135deg, #C41E3A 0%, #9A1830 100%);
  --gradient-accent: linear-gradient(135deg, #D4A843 0%, #B8922E 100%);
  --gradient-sky: linear-gradient(180deg, #EDF2FF 0%, #FAFBFC 100%);
  --gradient-warm: linear-gradient(180deg, #FFF8F0 0%, #FAFBFC 100%);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--color-background);
    --color-primary: var(--color-primary);
    --color-accent: var(--color-accent);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="pb-8">

        <!-- 顶部导航 -->
        <header class="sticky top-0 z-30 flex h-11 items-center px-4 border-b border-[var(--color-border)]" style="background: rgba(250,251,252,0.95); backdrop-filter: blur(8px);">
            <button class="inline-flex h-8 w-8 items-center justify-center rounded-lg hover:bg-[var(--color-surface-hover)] transition-colors duration-150" aria-label="返回">
                <i data-lucide="chevron-left" class="h-5 w-5" style="color: var(--color-text-primary);"></i>
            </button>
            <h1 class="min-w-0 flex-1 text-center text-base font-semibold tracking-[-0.02em]" style="color: var(--color-text-primary);">金融服务</h1>
            <div class="w-8"></div>
        </header>

        <div class="px-4 pt-5 flex flex-col gap-5">

            <!-- Banner 卡片 -->
            <section class="rounded-2xl p-5 flex flex-col gap-3" style="background: linear-gradient(135deg, #D4A843 0%, #B8922E 60%, #9A7A22 100%);" aria-label="金融方案推广">
                <h2 class="text-xl font-semibold tracking-[-0.01em] text-white" style="text-wrap: balance; word-break: keep-all;">尊享豪车金融方案</h2>
                <p class="text-sm leading-relaxed" style="color: rgba(255,255,255,0.85);">低至年化2.8% · 最长5年期 · 最高2000万额度</p>
                <button class="mt-1 self-start inline-flex h-9 items-center justify-center rounded-lg px-5 text-sm font-semibold whitespace-nowrap transition-all duration-200 hover:brightness-110 active:scale-[0.97]" style="background: var(--color-surface); color: var(--color-text-primary);">
                    立即测算
                </button>
            </section>

            <!-- 服务网格 2x2 -->
            <section aria-label="金融服务分类">
                <div class="grid grid-cols-2 gap-3">
                    <!-- 金融服务 -->
                    <div class="rounded-xl p-4 flex flex-col gap-2 transition-all duration-200 hover:shadow-md cursor-pointer active:scale-[0.98]" style="background: var(--color-surface); box-shadow: var(--shadow-card);">
                        <div class="inline-flex h-10 w-10 items-center justify-center rounded-lg" style="background: var(--color-primary-lighter);">
                            <i data-lucide="credit-card" class="h-5 w-5" style="color: var(--color-primary);"></i>
                        </div>
                        <div>
                            <p class="text-sm font-semibold" style="color: var(--color-text-primary);">金融服务</p>
                            <p class="text-xs mt-0.5 truncate" style="color: var(--color-text-secondary);">豪车贷款，年化低至2.8%</p>
                        </div>
                    </div>
                    <!-- 保险服务 -->
                    <div class="rounded-xl p-4 flex flex-col gap-2 transition-all duration-200 hover:shadow-md cursor-pointer active:scale-[0.98]" style="background: var(--color-surface); box-shadow: var(--shadow-card);">
                        <div class="inline-flex h-10 w-10 items-center justify-center rounded-lg" style="background: var(--color-primary-lighter);">
                            <i data-lucide="shield" class="h-5 w-5" style="color: var(--color-primary);"></i>
                        </div>
                        <div>
                            <p class="text-sm font-semibold" style="color: var(--color-text-primary);">保险服务</p>
                            <p class="text-xs mt-0.5 truncate" style="color: var(--color-text-secondary);">豪车保险，全险定制方案</p>
                        </div>
                    </div>
                    <!-- 以旧换新 -->
                    <div class="rounded-xl p-4 flex flex-col gap-2 transition-all duration-200 hover:shadow-md cursor-pointer active:scale-[0.98]" style="background: var(--color-surface); box-shadow: var(--shadow-card);">
                        <div class="inline-flex h-10 w-10 items-center justify-center rounded-lg" style="background: var(--color-primary-lighter);">
                            <i data-lucide="repeat" class="h-5 w-5" style="color: var(--color-primary);"></i>
                        </div>
                        <div>
                            <p class="text-sm font-semibold" style="color: var(--color-text-primary);">以旧换新</p>
                            <p class="text-xs mt-0.5 truncate" style="color: var(--color-text-secondary);">豪车置换，AI精准估价</p>
                        </div>
                    </div>
                    <!-- 延保服务 -->
                    <div class="rounded-xl p-4 flex flex-col gap-2 transition-all duration-200 hover:shadow-md cursor-pointer active:scale-[0.98]" style="background: var(--color-surface); box-shadow: var(--shadow-card);">
                        <div class="inline-flex h-10 w-10 items-center justify-center rounded-lg" style="background: var(--color-primary-lighter);">
                            <i data-lucide="wrench" class="h-5 w-5" style="color: var(--color-primary);"></i>
                        </div>
                        <div>
                            <p class="text-sm font-semibold" style="color: var(--color-text-primary);">延保服务</p>
                            <p class="text-xs mt-0.5 truncate" style="color: var(--color-text-secondary);">延长保修，最多延保5年</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 热门金融产品列表 -->
            <section aria-label="热门金融产品">
                <h2 class="text-base font-semibold tracking-[-0.01em] mb-3" style="color: var(--color-text-primary);">热门金融产品</h2>
                <div class="flex flex-col gap-3">
                    <!-- 产品1 -->
                    <div class="rounded-xl p-4 flex flex-col gap-2 transition-all duration-200 hover:shadow-md cursor-pointer active:scale-[0.99]" style="background: var(--color-surface); box-shadow: var(--shadow-card);">
                        <div class="flex items-center gap-2">
                            <span class="inline-flex items-center justify-center rounded-md px-2 py-0.5 text-xs font-semibold whitespace-nowrap" style="background: var(--color-accent-lighter); color: var(--color-accent);">热门</span>
                            <h3 class="text-sm font-semibold truncate" style="color: var(--color-text-primary);">黑金VIP专属贷款</h3>
                        </div>
                        <p class="text-xs leading-relaxed" style="color: var(--color-text-secondary);">年化2.8% · 最高2000万 · 随借随还</p>
                    </div>
                    <!-- 产品2 -->
                    <div class="rounded-xl p-4 flex flex-col gap-2 transition-all duration-200 hover:shadow-md cursor-pointer active:scale-[0.99]" style="background: var(--color-surface); box-shadow: var(--shadow-card);">
                        <div class="flex items-center gap-2">
                            <span class="inline-flex items-center justify-center rounded-md px-2 py-0.5 text-xs font-semibold whitespace-nowrap" style="background: var(--color-primary-lighter); color: var(--color-primary);">推荐</span>
                            <h3 class="text-sm font-semibold truncate" style="color: var(--color-text-primary);">豪车全险定制</h3>
                        </div>
                        <p class="text-xs leading-relaxed" style="color: var(--color-text-secondary);">车损+三者+划痕 · 一站式理赔</p>
                    </div>
                    <!-- 产品3 -->
                    <div class="rounded-xl p-4 flex flex-col gap-2 transition-all duration-200 hover:shadow-md cursor-pointer active:scale-[0.99]" style="background: var(--color-surface); box-shadow: var(--shadow-card);">
                        <div class="flex items-center gap-2">
                            <span class="inline-flex items-center justify-center rounded-md px-2 py-0.5 text-xs font-semibold whitespace-nowrap" style="background: var(--state-success-bg); color: var(--state-success);">限时</span>
                            <h3 class="text-sm font-semibold truncate" style="color: var(--color-text-primary);">0息金融方案</h3>
                        </div>
                        <p class="text-xs leading-relaxed" style="color: var(--color-text-secondary);">指定车型0利息 · 最高36期</p>
                    </div>
                </div>
            </section>

            <!-- 保值率查询入口 -->
            <section class="rounded-xl p-4 flex flex-col gap-3" style="background: var(--color-surface); box-shadow: var(--shadow-card);" aria-label="保值率查询">
                <h2 class="text-base font-semibold tracking-[-0.01em]" style="color: var(--color-text-primary);">查询爱车保值率</h2>
                <div class="flex gap-2">
                    <label class="sr-only" for="car-model-input">输入车型</label>
                    <input
                        id="car-model-input"
                        type="text"
                        placeholder="输入车型，如保时捷 Cayenne"
                        class="flex-1 min-w-0 h-10 rounded-lg px-3 text-sm border outline-none transition-colors duration-150"
                        style="border-color: var(--color-border); background: var(--color-background); color: var(--color-text-primary);"
                        onfocus="this.style.borderColor='var(--color-primary)'; this.style.boxShadow='0 0 0 2px var(--color-primary-lighter)';"
                        onblur="this.style.borderColor='var(--color-border)'; this.style.boxShadow='none';"
                    >
                    <button class="inline-flex h-10 items-center justify-center rounded-lg px-4 text-sm font-semibold whitespace-nowrap transition-all duration-200 hover:brightness-110 active:scale-[0.97]" style="background: var(--color-primary); color: var(--color-primary-text);">
                        查询
                    </button>
                </div>
            </section>

            <!-- 底部提示 -->
            <p class="text-center text-xs pt-1 pb-4" style="color: var(--color-text-tertiary);">以上费率仅供参考，实际以审批结果为准</p>

        </div>
    </main>

    <style>
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                transition-duration: 0.01ms !important;
                animation-duration: 0.01ms !important;
            }
        }
    </style>
    <script>lucide.createIcons();</script>
</body>
</html>
