<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创作者工作台</title>
    <style id="theme-vars">
:root {
  /* ── Brand Colors: Ferrari Rosso Corsa — 赛道传承红 ── */
  /* 法拉利数字设计: 克制的红色使用，仅用于CTA和品牌关键时刻 */
  --color-primary: #DA291C;
  --color-primary-light: #E8403A;
  --color-primary-lighter: rgba(218, 41, 28, 0.06);
  --color-primary-lightest: rgba(218, 41, 28, 0.03);
  --color-primary-dark: #B01E0A;
  --color-primary-active: #9D2211;
  --color-primary-text: #FFFFFF;

  /* ── Accent: 赛道黄 Giallo Modena — 法拉利盾牌传承色 ── */
  --color-accent: #E8B800;
  --color-accent-light: #F0CC44;
  --color-accent-lighter: rgba(232, 184, 0, 0.10);
  --color-accent-lightest: rgba(232, 184, 0, 0.05);

  /* ── Backgrounds: Ferrari Chiaroscuro — 明暗交替展厅感 ── */
  /* 法拉利核心理念：纯白编辑面板 + 深黑沉浸区域，硬切割过渡 */
  --color-background: #FAFAFA;
  --color-background-secondary: #F3F3F3;
  --color-background-tertiary: #E8E8E8;
  --color-surface: #FFFFFF;
  --color-surface-elevated: #FFFFFF;
  --color-surface-hover: #F5F5F5;

  /* ── Text: Ferrari双字体编辑层级 — FerrariSans灵感 ── */
  --color-text-primary: #181818;
  --color-text-secondary: #666666;
  --color-text-tertiary: #8F8F8F;
  --color-text-inverse: #FFFFFF;
  --color-text-quaternary: #B0B0B0;

  /* ── Borders & Dividers: 法拉利精准线条 ── */
  --color-border: #CCCCCC;
  --color-border-subtle: rgba(0, 0, 0, 0.06);
  --color-divider: rgba(0, 0, 0, 0.08);

  /* ── State Colors ── */
  --state-success: #03904A;
  --state-success-bg: rgba(3, 144, 74, 0.06);
  --state-warning: #E8A838;
  --state-warning-bg: rgba(232, 168, 56, 0.06);
  --state-error: #F13A2C;
  --state-error-bg: rgba(241, 58, 44, 0.06);
  --state-info: #4C98B9;
  --state-info-bg: rgba(76, 152, 185, 0.06);

  /* ── Typography: FerrariSans灵感 — 紧凑有力 ── */
  --font-display: 'SF Pro Display', 'PingFang SC', 'Noto Sans SC', 'Helvetica Neue', Arial, sans-serif;
  --font-body: 'SF Pro Text', 'PingFang SC', 'Noto Sans SC', 'Helvetica Neue', Arial, sans-serif;
  --font-mono: 'SF Mono', 'JetBrains Mono', ui-monospace, monospace;

  /* 法拉利字号层级 — 标题紧凑、正文舒适 */
  --text-xs: 0.6875rem;     /* 11px - 大写标签（text-transform:uppercase + letter-spacing:1px）*/
  --text-sm: 0.8125rem;     /* 13px - 说明文字 */
  --text-base: 0.875rem;    /* 14px - 正文 */
  --text-lg: 1rem;          /* 16px - 卡片标题/UI标题 */
  --text-xl: 1.125rem;      /* 18px - 副标题 */
  --text-2xl: 1.25rem;      /* 20px - 章节标题 */
  --text-3xl: 1.5rem;       /* 24px - 大标题 */
  --text-display: 1.75rem;   /* 28px - 核心数据/英雄标题 */

  /* ── Spacing: 法拉利8px基础网格 ── */
  --space-0-5: 2px;
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;

  /* ── Radius: 法拉利剃刀级精度 — 2px标志性圆角 ── */
  --radius-xs: 1px;
  --radius-sm: 2px;
  --radius-md: 4px;
  --radius-lg: 8px;
  --radius-xl: 12px;
  --radius-2xl: 16px;
  --radius-full: 9999px;

  /* ── Shadows: 法拉利扁平层次 — 近乎零阴影 ── */
  --shadow-none: none;
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 2px 6px rgba(0, 0, 0, 0.06);
  --shadow-card: none;
  --shadow-elevated: 0 4px 12px rgba(0, 0, 0, 0.08);
  --shadow-float: 0 8px 24px rgba(0, 0, 0, 0.10);
  --shadow-modal: 0 12px 40px rgba(0, 0, 0, 0.12);

  /* ── Gradients: 极少使用 — 法拉利用纯色对比，不用渐变 ── */
  --gradient-primary: linear-gradient(135deg, #DA291C 0%, #B01E0A 100%);
  --gradient-accent: linear-gradient(135deg, #E8B800 0%, #C49E00 100%);
  --gradient-dark: linear-gradient(180deg, #000000 0%, #181818 100%);
  --gradient-hero: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 100%);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--color-background);
    --color-primary: var(--color-primary);
    --color-accent: var(--color-accent);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="pb-20">
      <!-- 顶部栏 -->
      <header class="sticky top-0 z-30 flex items-center justify-between px-4 h-14 border-b bg-[var(--color-surface)]" style="border-color: var(--color-border);">
        <h1 class="text-lg font-semibold tracking-tight truncate" style="font-family: var(--font-display); color: var(--color-text-primary);">创作者工作台</h1>
        <button class="inline-flex items-center justify-center w-8 h-8 rounded-sm hover:bg-[var(--color-surface-hover)] active:scale-95 transition-transform duration-150" aria-label="设置">
          <i data-lucide="settings" class="w-5 h-5" style="color: var(--color-text-secondary);"></i>
        </button>
      </header>

      <div class="px-4 pt-4 space-y-4">

        <!-- 数据概览 -->
        <section class="rounded-lg border bg-[var(--color-surface)] p-4" style="border-color: var(--color-border);">
          <h2 class="text-base font-semibold mb-3" style="font-family: var(--font-display); color: var(--color-text-primary);">今日数据</h2>
          <div class="grid grid-cols-3 gap-3 mb-3">
            <div class="text-center">
              <p class="text-xl font-semibold tabular-nums" style="color: var(--color-primary); font-family: var(--font-display);">12.8k</p>
              <p class="text-xs mt-1" style="color: var(--color-text-tertiary);">阅读</p>
            </div>
            <div class="text-center">
              <p class="text-xl font-semibold tabular-nums" style="color: var(--color-primary); font-family: var(--font-display);">856</p>
              <p class="text-xs mt-1" style="color: var(--color-text-tertiary);">点赞</p>
            </div>
            <div class="text-center">
              <p class="text-xl font-semibold tabular-nums" style="color: var(--color-accent); font-family: var(--font-display);">+128</p>
              <p class="text-xs mt-1" style="color: var(--color-text-tertiary);">新增粉丝</p>
            </div>
          </div>
          <div class="grid grid-cols-3 gap-3 pt-3" style="border-top: 1px solid var(--color-border-subtle);">
            <div class="text-center">
              <p class="text-base font-semibold tabular-nums" style="color: var(--color-text-primary); font-family: var(--font-display);">234</p>
              <p class="text-xs mt-1" style="color: var(--color-text-tertiary);">评论</p>
            </div>
            <div class="text-center">
              <p class="text-base font-semibold tabular-nums" style="color: var(--color-text-primary); font-family: var(--font-display);">89</p>
              <p class="text-xs mt-1" style="color: var(--color-text-tertiary);">分享</p>
            </div>
            <div class="text-center">
              <p class="text-base font-semibold tabular-nums" style="color: var(--color-primary); font-family: var(--font-display);">¥1,280</p>
              <p class="text-xs mt-1" style="color: var(--color-text-tertiary);">收益</p>
            </div>
          </div>
        </section>

        <!-- 创作入口 -->
        <section>
          <div class="grid grid-cols-4 gap-3">
            <button class="flex flex-col items-center gap-2 py-4 rounded-lg border bg-[var(--color-surface)] hover:bg-[var(--color-surface-hover)] active:scale-95 transition-transform duration-150" style="border-color: var(--color-border);">
              <i data-lucide="file-text" class="w-5 h-5" style="color: var(--color-primary);"></i>
              <span class="text-xs whitespace-nowrap" style="color: var(--color-text-primary);">发布图文</span>
            </button>
            <button class="flex flex-col items-center gap-2 py-4 rounded-lg border bg-[var(--color-surface)] hover:bg-[var(--color-surface-hover)] active:scale-95 transition-transform duration-150" style="border-color: var(--color-border);">
              <i data-lucide="video" class="w-5 h-5" style="color: var(--color-primary);"></i>
              <span class="text-xs whitespace-nowrap" style="color: var(--color-text-primary);">发布视频</span>
            </button>
            <button class="flex flex-col items-center gap-2 py-4 rounded-lg border bg-[var(--color-surface)] hover:bg-[var(--color-surface-hover)] active:scale-95 transition-transform duration-150" style="border-color: var(--color-border);">
              <i data-lucide="image" class="w-5 h-5" style="color: var(--color-primary);"></i>
              <span class="text-xs whitespace-nowrap" style="color: var(--color-text-primary);">发圈素材</span>
            </button>
            <button class="flex flex-col items-center gap-2 py-4 rounded-lg border bg-[var(--color-surface)] hover:bg-[var(--color-surface-hover)] active:scale-95 transition-transform duration-150" style="border-color: var(--color-border);">
              <i data-lucide="radio" class="w-5 h-5" style="color: var(--color-primary);"></i>
              <span class="text-xs whitespace-nowrap" style="color: var(--color-text-primary);">直播</span>
            </button>
          </div>
        </section>

        <!-- 内容管理 -->
        <section class="rounded-lg border bg-[var(--color-surface)]" style="border-color: var(--color-border);">
          <div class="flex items-center justify-between px-4 py-3" style="border-bottom: 1px solid var(--color-border-subtle);">
            <h2 class="text-base font-semibold" style="font-family: var(--font-display); color: var(--color-text-primary);">我的内容</h2>
            <a href="#" class="text-xs font-medium whitespace-nowrap" style="color: var(--color-primary);">全部</a>
          </div>
          <div class="divide-y" style="--tw-divide-opacity: 1; border-color: var(--color-border-subtle);">
            <!-- 内容1 -->
            <a href="#" class="flex items-start gap-3 px-4 py-3 hover:bg-[var(--color-surface-hover)] transition-colors duration-120">
              <div class="flex-1 min-w-0">
                <p class="text-sm font-medium truncate" style="color: var(--color-text-primary);">迈巴赫S480到店实拍</p>
                <div class="flex items-center gap-2 mt-1">
                  <span class="inline-flex items-center px-1.5 py-0.5 rounded-sm text-xs" style="background: var(--color-accent-lightest); color: var(--color-accent);">视频</span>
                  <span class="text-xs whitespace-nowrap" style="color: var(--color-text-tertiary);">2.1w播放</span>
                </div>
              </div>
              <span class="text-xs whitespace-nowrap mt-0.5" style="color: var(--color-text-quaternary);">3小时前</span>
            </a>
            <!-- 内容2 -->
            <a href="#" class="flex items-start gap-3 px-4 py-3 hover:bg-[var(--color-surface-hover)] transition-colors duration-120">
              <div class="flex-1 min-w-0">
                <p class="text-sm font-medium truncate" style="color: var(--color-text-primary);">大湾区豪车半年报</p>
                <div class="flex items-center gap-2 mt-1">
                  <span class="inline-flex items-center px-1.5 py-0.5 rounded-sm text-xs" style="background: var(--color-primary-lightest); color: var(--color-primary);">图文</span>
                  <span class="text-xs whitespace-nowrap" style="color: var(--color-text-tertiary);">8.6k阅读</span>
                </div>
              </div>
              <span class="text-xs whitespace-nowrap mt-0.5" style="color: var(--color-text-quaternary);">昨天</span>
            </a>
            <!-- 内容3 -->
            <a href="#" class="flex items-start gap-3 px-4 py-3 hover:bg-[var(--color-surface-hover)] transition-colors duration-120">
              <div class="flex-1 min-w-0">
                <p class="text-sm font-medium truncate" style="color: var(--color-text-primary);">保时捷911赛道体验</p>
                <div class="flex items-center gap-2 mt-1">
                  <span class="inline-flex items-center px-1.5 py-0.5 rounded-sm text-xs" style="background: var(--color-accent-lightest); color: var(--color-accent);">视频</span>
                  <span class="text-xs whitespace-nowrap" style="color: var(--color-text-tertiary);">1.5w播放</span>
                </div>
              </div>
              <span class="text-xs whitespace-nowrap mt-0.5" style="color: var(--color-text-quaternary);">2天前</span>
            </a>
          </div>
        </section>

        <!-- 任务中心 -->
        <section class="rounded-lg border bg-[var(--color-surface)] p-4" style="border-color: var(--color-border);">
          <h2 class="text-base font-semibold mb-3" style="font-family: var(--font-display); color: var(--color-text-primary);">平台任务</h2>
          <div class="space-y-3">
            <!-- 任务1 -->
            <div class="flex items-center justify-between gap-3 py-2" style="border-bottom: 1px solid var(--color-border-subtle);">
              <div class="flex-1 min-w-0">
                <p class="text-sm font-medium truncate" style="color: var(--color-text-primary);">发布一篇车型评测</p>
                <p class="text-xs mt-0.5" style="color: var(--color-accent);">奖励 ¥200</p>
              </div>
              <button class="inline-flex items-center justify-center px-3 h-7 rounded-sm text-xs font-medium whitespace-nowrap bg-[var(--color-primary)] hover:bg-[var(--color-primary-dark)] active:bg-[var(--color-primary-active)] transition-colors duration-150" style="color: var(--color-primary-text);">
                去完成
              </button>
            </div>
            <!-- 任务2 -->
            <div class="flex items-center justify-between gap-3 py-2" style="border-bottom: 1px solid var(--color-border-subtle);">
              <div class="flex-1 min-w-0">
                <p class="text-sm font-medium truncate" style="color: var(--color-text-primary);">拍摄短视频</p>
                <p class="text-xs mt-0.5" style="color: var(--color-accent);">奖励 ¥500</p>
              </div>
              <button class="inline-flex items-center justify-center px-3 h-7 rounded-sm text-xs font-medium whitespace-nowrap bg-[var(--color-primary)] hover:bg-[var(--color-primary-dark)] active:bg-[var(--color-primary-active)] transition-colors duration-150" style="color: var(--color-primary-text);">
                去完成
              </button>
            </div>
            <!-- 任务3 -->
            <div class="flex items-center justify-between gap-3 py-2">
              <div class="flex-1 min-w-0">
                <p class="text-sm font-medium truncate" style="color: var(--color-text-primary);">转发朋友圈</p>
                <p class="text-xs mt-0.5" style="color: var(--color-accent);">奖励 ¥50</p>
              </div>
              <button class="inline-flex items-center justify-center px-3 h-7 rounded-sm text-xs font-medium whitespace-nowrap bg-[var(--color-primary)] hover:bg-[var(--color-primary-dark)] active:bg-[var(--color-primary-active)] transition-colors duration-150" style="color: var(--color-primary-text);">
                去完成
              </button>
            </div>
          </div>
        </section>

      </div>

      <!-- Tab Bar -->
      <nav class="fixed bottom-0 left-0 right-0 z-40 border-t bg-[var(--color-surface)]" style="border-color: var(--color-border);">
        <div class="flex items-center justify-around h-14 max-w-lg mx-auto">
          <button class="flex flex-col items-center justify-center gap-0.5 flex-1 h-full" style="color: var(--color-primary);" aria-label="首页" data-dom-id="tab-home">
            <i data-lucide="home" class="w-5 h-5"></i>
            <span class="text-xs">首页</span>
          </button>
          <button class="flex flex-col items-center justify-center gap-0.5 flex-1 h-full" style="color: var(--color-text-tertiary);" aria-label="创作" data-dom-id="tab-create">
            <i data-lucide="pen-line" class="w-5 h-5"></i>
            <span class="text-xs">创作</span>
          </button>
          <button class="flex flex-col items-center justify-center gap-0.5 flex-1 h-full" style="color: var(--color-text-tertiary);" aria-label="数据" data-dom-id="tab-stats">
            <i data-lucide="bar-chart-3" class="w-5 h-5"></i>
            <span class="text-xs">数据</span>
          </button>
          <button class="flex flex-col items-center justify-center gap-0.5 flex-1 h-full" style="color: var(--color-text-tertiary);" aria-label="消息" data-dom-id="tab-messages">
            <i data-lucide="message-square" class="w-5 h-5"></i>
            <span class="text-xs">消息</span>
          </button>
          <button class="flex flex-col items-center justify-center gap-0.5 flex-1 h-full" style="color: var(--color-text-tertiary);" aria-label="我的" data-dom-id="tab-profile">
            <i data-lucide="user" class="w-5 h-5"></i>
            <span class="text-xs">我的</span>
          </button>
        </div>
      </nav>
    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
