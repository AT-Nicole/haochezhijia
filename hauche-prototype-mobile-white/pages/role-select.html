<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>角色选择</title>
    <style id="theme-vars">
:root {
  /* ── Brand Colors: Ferrari Rosso Corsa — 赛道传承红 ── */
  --color-primary: #DA291C;
  --color-primary-light: #E8403A;
  --color-primary-lighter: rgba(218, 41, 28, 0.06);
  --color-primary-lightest: rgba(218, 41, 28, 0.03);
  --color-primary-dark: #B01E0A;
  --color-primary-active: #9D2211;
  --color-primary-text: #FFFFFF;

  /* ── Accent: 赛道黄 Giallo Modena ── */
  --color-accent: #E8B800;
  --color-accent-light: #F0CC44;
  --color-accent-lighter: rgba(232, 184, 0, 0.10);
  --color-accent-lightest: rgba(232, 184, 0, 0.05);

  /* ── Backgrounds: Ferrari Chiaroscuro ── */
  --color-background: #FAFAFA;
  --color-background-secondary: #F3F3F3;
  --color-background-tertiary: #E8E8E8;
  --color-surface: #FFFFFF;
  --color-surface-elevated: #FFFFFF;
  --color-surface-hover: #F5F5F5;

  /* ── Text: Ferrari双字体编辑层级 ── */
  --color-text-primary: #181818;
  --color-text-secondary: #666666;
  --color-text-tertiary: #8F8F8F;
  --color-text-inverse: #FFFFFF;
  --color-text-quaternary: #B0B0B0;

  /* ── Borders & Dividers: 法拉利精准线条 ── */
  --color-border: #CCCCCC;
  --color-border-subtle: rgba(0, 0, 0, 0.06);
  --color-divider: rgba(0, 0, 0, 0.08);

  /* ── State Colors ── */
  --state-success: #03904A;
  --state-success-bg: rgba(3, 144, 74, 0.06);
  --state-warning: #E8A838;
  --state-warning-bg: rgba(232, 168, 56, 0.06);
  --state-error: #F13A2C;
  --state-error-bg: rgba(241, 58, 44, 0.06);
  --state-info: #4C98B9;
  --state-info-bg: rgba(76, 152, 185, 0.06);

  /* ── Typography: FerrariSans灵感 ── */
  --font-display: 'SF Pro Display', 'PingFang SC', 'Noto Sans SC', 'Helvetica Neue', Arial, sans-serif;
  --font-body: 'SF Pro Text', 'PingFang SC', 'Noto Sans SC', 'Helvetica Neue', Arial, sans-serif;
  --font-mono: 'SF Mono', 'JetBrains Mono', ui-monospace, monospace;

  --text-xs: 0.6875rem;
  --text-sm: 0.8125rem;
  --text-base: 0.875rem;
  --text-lg: 1rem;
  --text-xl: 1.125rem;
  --text-2xl: 1.25rem;
  --text-3xl: 1.5rem;
  --text-display: 1.75rem;

  /* ── Spacing: 8px基础网格 ── */
  --space-0-5: 2px;
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;

  /* ── Radius: 剃刀级精度 ── */
  --radius-xs: 1px;
  --radius-sm: 2px;
  --radius-md: 4px;
  --radius-lg: 8px;
  --radius-xl: 12px;
  --radius-2xl: 16px;
  --radius-full: 9999px;

  /* ── Shadows: 近乎零阴影 ── */
  --shadow-none: none;
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 2px 6px rgba(0, 0, 0, 0.06);
  --shadow-card: none;
  --shadow-elevated: 0 4px 12px rgba(0, 0, 0, 0.08);
  --shadow-float: 0 8px 24px rgba(0, 0, 0, 0.10);
  --shadow-modal: 0 12px 40px rgba(0, 0, 0, 0.12);

  --gradient-primary: linear-gradient(135deg, #DA291C 0%, #B01E0A 100%);
  --gradient-accent: linear-gradient(135deg, #E8B800 0%, #C49E00 100%);
  --gradient-dark: linear-gradient(180deg, #000000 0%, #181818 100%);
  --gradient-hero: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 100%);
}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--color-background);
    --color-primary: var(--color-primary);
    --color-accent: var(--color-accent);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="min-h-screen flex flex-col" style="background-color: var(--color-background);">

      <!-- Brand Header -->
      <div class="flex flex-col items-center px-5 pt-16 pb-10">
        <h1 class="text-[20px] font-medium tracking-tight" style="color: #181818; font-family: var(--font-display); text-wrap: balance; word-break: keep-all;">豪车之家</h1>
        <div class="mt-3 h-[3px] w-[60px]" style="background-color: var(--color-primary);"></div>
        <p class="mt-3 text-[13px] font-normal" style="color: #8F8F8F; font-family: var(--font-body);">大湾区高端汽车服务生态</p>
      </div>

      <!-- Role Selection Cards -->
      <div class="flex-1 flex flex-col gap-4 px-5 pb-10">

        <!-- Card 1: Platform Admin -->
        <button
          class="flex items-center gap-4 cursor-pointer transition-transform duration-200 ease-[cubic-bezier(.2,.8,.2,1)] active:scale-[0.98] focus-visible:outline-2 focus-visible:outline-offset-2"
          style="background-color: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-sm); padding: 20px; min-height: 110px; --tw-outline-color: var(--color-primary);"
          aria-label="进入平台管理员"
          data-dom-id="role-admin"
        >
          <div class="flex h-12 w-12 shrink-0 items-center justify-center">
            <i data-lucide="shield-check" class="h-6 w-6" style="color: #181818;"></i>
          </div>
          <div class="min-w-0 flex-1 text-left">
            <div class="flex items-center gap-2">
              <p class="text-[16px] font-medium truncate" style="color: #181818; font-family: var(--font-display);">管理员</p>
              <span class="shrink-0 text-[11px] font-medium uppercase whitespace-nowrap" style="letter-spacing: 1px; color: var(--color-text-tertiary);">全权限</span>
            </div>
            <p class="mt-1 text-[13px] line-clamp-1" style="color: #666666; font-family: var(--font-body);">全功能管理后台，数据总览与运营监控</p>
          </div>
          <i data-lucide="chevron-right" class="h-5 w-5 shrink-0" style="color: #8F8F8F;"></i>
        </button>

        <!-- Card 2: VIP Member -->
        <button
          class="flex items-center gap-4 cursor-pointer transition-transform duration-200 ease-[cubic-bezier(.2,.8,.2,1)] active:scale-[0.98] focus-visible:outline-2 focus-visible:outline-offset-2"
          style="background-color: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-sm); padding: 20px; min-height: 110px; --tw-outline-color: var(--color-primary);"
          aria-label="进入私董会员"
          data-dom-id="role-vip"
        >
          <div class="flex h-12 w-12 shrink-0 items-center justify-center">
            <i data-lucide="crown" class="h-6 w-6" style="color: var(--color-accent);"></i>
          </div>
          <div class="min-w-0 flex-1 text-left">
            <div class="flex items-center gap-2">
              <p class="text-[16px] font-medium truncate" style="color: #181818; font-family: var(--font-display);">私董会员</p>
              <span class="shrink-0 text-[11px] font-semibold uppercase whitespace-nowrap" style="letter-spacing: 1px; color: var(--color-accent);">SVIP</span>
            </div>
            <p class="mt-1 text-[13px] line-clamp-1" style="color: #666666; font-family: var(--font-body);">尊享服务、专属顾问与终身管家</p>
          </div>
          <i data-lucide="chevron-right" class="h-5 w-5 shrink-0" style="color: #8F8F8F;"></i>
        </button>

        <!-- Card 3: Dealer Partner -->
        <button
          class="flex items-center gap-4 cursor-pointer transition-transform duration-200 ease-[cubic-bezier(.2,.8,.2,1)] active:scale-[0.98] focus-visible:outline-2 focus-visible:outline-offset-2"
          style="background-color: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-sm); padding: 20px; min-height: 110px; --tw-outline-color: var(--color-primary);"
          aria-label="进入经销商伙伴"
          data-dom-id="role-dealer"
        >
          <div class="flex h-12 w-12 shrink-0 items-center justify-center">
            <i data-lucide="building-2" class="h-6 w-6" style="color: #181818;"></i>
          </div>
          <div class="min-w-0 flex-1 text-left">
            <div class="flex items-center gap-2">
              <p class="text-[16px] font-medium truncate" style="color: #181818; font-family: var(--font-display);">经销商伙伴</p>
              <span class="shrink-0 text-[11px] font-medium uppercase whitespace-nowrap" style="letter-spacing: 1px; color: var(--color-text-tertiary);">商家端</span>
            </div>
            <p class="mt-1 text-[13px] line-clamp-1" style="color: #666666; font-family: var(--font-body);">展厅运营、库存管理与营销推广</p>
          </div>
          <i data-lucide="chevron-right" class="h-5 w-5 shrink-0" style="color: #8F8F8F;"></i>
        </button>

      </div>

      <!-- Footer -->
      <footer class="pb-8 pt-4 text-center">
        <p class="text-[11px] uppercase font-normal" style="color: #8F8F8F; letter-spacing: 1px;">TRAE AI 创意大赛</p>
      </footer>

    </main>
    <style>
      @media (prefers-reduced-motion: reduce) {
        button { transition-duration: 0.01ms !important; }
      }
      button:focus-visible {
        outline: 2px solid var(--color-primary);
        outline-offset: 2px;
      }
    </style>
    <script>lucide.createIcons();</script>
</body>
</html>
