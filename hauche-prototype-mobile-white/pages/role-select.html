<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>角色选择</title>
    <style id="theme-vars">
:root {
  /* ── Brand Colors: White Premium — NIO-Inspired Refined Red + Gold VIP ── */
  /* 蔚来风格要点：克制用色、精确对比、75%浅色+25%深色比例 */
  --color-primary: #C41E3A;
  --color-primary-light: #D6344F;
  --color-primary-lighter: rgba(196, 30, 58, 0.06);
  --color-primary-lightest: rgba(196, 30, 58, 0.03);
  --color-primary-dark: #9A1830;
  --color-primary-text: #FFFFFF;

  --color-accent: #D4A843;
  --color-accent-light: #E8C06A;
  --color-accent-lighter: rgba(212, 168, 67, 0.10);
  --color-accent-lightest: rgba(212, 168, 67, 0.05);

  /* ── Backgrounds: NIO-inspired "有温度的白" — 层次分明的暖灰梯度 ── */
  --color-background: #FAFBFC;
  --color-background-secondary: #F5F6F8;
  --color-background-tertiary: #EEEEF0;
  --color-surface: #FFFFFF;
  --color-surface-elevated: #FFFFFF;
  --color-surface-hover: #F7F8FA;

  /* ── Text: NIO风格 — 5级字重、精确对比度（9.9:1） ── */
  --color-text-primary: #1F2022;
  --color-text-secondary: #6E747A;
  --color-text-tertiary: #A0A6AE;
  --color-text-inverse: #FFFFFF;
  --color-text-quaternary: #C8CDD3;

  /* ── Borders & Dividers: NIO克制分割线 ── */
  --color-border: rgba(0, 0, 0, 0.05);
  --color-border-subtle: rgba(0, 0, 0, 0.03);
  --color-divider: rgba(0, 0, 0, 0.06);

  /* ── State Colors: 柔和功能性色彩 ── */
  --state-success: #2BBC8E;
  --state-success-bg: rgba(43, 188, 142, 0.06);
  --state-warning: #E8A838;
  --state-warning-bg: rgba(232, 168, 56, 0.06);
  --state-error: #E94A47;
  --state-error-bg: rgba(233, 74, 71, 0.06);
  --state-info: #3B8BEB;
  --state-info-bg: rgba(59, 139, 235, 0.06);

  /* ── Typography: NIO Blue Sky Sans 灵感 — 更大字号、更舒适行高 ── */
  --font-display: 'SF Pro Display', 'PingFang SC', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-body: 'SF Pro Text', 'PingFang SC', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'SF Mono', 'JetBrains Mono', ui-monospace, monospace;

  /* 蔚来APP字号层级（移动端适配） */
  --text-xs: 0.6875rem;     /* 11px - 注释/标签 */
  --text-sm: 0.8125rem;     /* 13px - 辅助文字 */
  --text-base: 0.875rem;    /* 14px - 正文（蔚来标准正文） */
  --text-lg: 0.9375rem;     /* 15px - 次要标题 */
  --text-xl: 1.0625rem;     /* 17px - 卡片标题（蔚来标准） */
  --text-2xl: 1.25rem;      /* 20px - 页面标题 */
  --text-3xl: 1.5rem;       /* 24px - 大标题 */
  --text-display: 1.75rem;  /* 28px - 核心数据展示 */

  /* ── Spacing: NIO"松弛有度"留白策略 ── */
  --space-0-5: 2px;
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;

  /* ── Radius: NIO大圆角 — 柔和亲切 ── */
  --radius-xs: 4px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-2xl: 24px;
  --radius-full: 9999px;

  /* ── Shadows: NIO精致阴影 — "高级精致的品质" ── */
  --shadow-none: none;
  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.02);
  --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.06);
  --shadow-card: 0 1px 4px rgba(0, 0, 0, 0.04), 0 0 0 1px rgba(0, 0, 0, 0.02);
  --shadow-elevated: 0 4px 16px rgba(0, 0, 0, 0.08);
  --shadow-float: 0 8px 30px rgba(0, 0, 0, 0.10);
  --shadow-modal: 0 16px 48px rgba(0, 0, 0, 0.12);

  /* ── NIO-inspired gradients ── */
  --gradient-primary: linear-gradient(135deg, #C41E3A 0%, #9A1830 100%);
  --gradient-accent: linear-gradient(135deg, #D4A843 0%, #B8922E 100%);
  --gradient-sky: linear-gradient(180deg, #EDF2FF 0%, #FAFBFC 100%);
  --gradient-warm: linear-gradient(180deg, #FFF8F0 0%, #FAFBFC 100%);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--color-background);
    --color-primary: var(--color-primary);
    --color-accent: var(--color-accent);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="min-h-screen flex flex-col" style="background-color: var(--color-background);">

      <!-- Brand Header Area -->
      <div class="flex flex-col items-center px-5 pt-16 pb-10">
        <h1 class="text-3xl font-semibold tracking-tight" style="color: var(--color-text-primary); font-family: var(--font-display); text-wrap: balance; word-break: keep-all; overflow-wrap: break-word;">豪车之家</h1>
        <div class="mt-3 h-[3px] w-10 rounded-full" style="background-color: var(--color-primary);"></div>
        <p class="mt-3 text-sm font-normal" style="color: var(--color-text-tertiary); font-family: var(--font-body);">大湾区高端汽车服务生态</p>
      </div>

      <!-- Role Selection Cards -->
      <div class="flex-1 flex flex-col gap-4 px-5 pb-10">

        <!-- Card 1: Platform Admin -->
        <button
          class="flex items-center gap-4 rounded-2xl cursor-pointer transition-transform duration-200 ease-[cubic-bezier(.2,.8,.2,1)] hover:-translate-y-px active:translate-y-0"
          style="background-color: var(--color-surface); box-shadow: var(--shadow-card); padding: 20px; min-height: 120px;"
          aria-label="进入平台管理员"
          data-dom-id="role-admin"
        >
          <div class="flex h-14 w-14 shrink-0 items-center justify-center rounded-full" style="background-color: var(--color-primary-lighter);">
            <i data-lucide="shield-check" class="h-7 w-7" style="color: var(--color-primary);"></i>
          </div>
          <div class="min-w-0 flex-1 text-left">
            <div class="flex items-center gap-2">
              <p class="text-lg font-semibold truncate" style="color: var(--color-text-primary); font-family: var(--font-display);">平台管理员</p>
              <span class="shrink-0 inline-flex items-center justify-center text-xs font-medium px-2 py-0.5 rounded-lg whitespace-nowrap" style="color: var(--color-primary); background-color: var(--color-primary-lighter);">全权限</span>
            </div>
            <p class="mt-1.5 text-sm line-clamp-2" style="color: var(--color-text-secondary); font-family: var(--font-body);">全功能管理后台，数据总览、团队管理与运营监控</p>
          </div>
          <i data-lucide="chevron-right" class="h-5 w-5 shrink-0" style="color: var(--color-text-tertiary);"></i>
        </button>

        <!-- Card 2: VIP Member -->
        <button
          class="flex items-center gap-4 rounded-2xl cursor-pointer transition-transform duration-200 ease-[cubic-bezier(.2,.8,.2,1)] hover:-translate-y-px active:translate-y-0"
          style="background-color: var(--color-surface); box-shadow: var(--shadow-card); padding: 20px; min-height: 120px;"
          aria-label="进入私董会员"
          data-dom-id="role-vip"
        >
          <div class="flex h-14 w-14 shrink-0 items-center justify-center rounded-full" style="background-color: var(--color-accent-lightest);">
            <i data-lucide="crown" class="h-7 w-7" style="color: var(--color-accent);"></i>
          </div>
          <div class="min-w-0 flex-1 text-left">
            <div class="flex items-center gap-2">
              <p class="text-lg font-semibold truncate" style="color: var(--color-text-primary); font-family: var(--font-display);">私董会员</p>
              <span class="shrink-0 inline-flex items-center justify-center text-xs font-medium px-2 py-0.5 rounded-lg whitespace-nowrap" style="color: var(--color-accent); background-color: var(--color-accent-lightest);">SVIP</span>
            </div>
            <p class="mt-1.5 text-sm line-clamp-2" style="color: var(--color-text-secondary); font-family: var(--font-body);">尊享服务、专属顾问、终身管家与全球寻车</p>
          </div>
          <i data-lucide="chevron-right" class="h-5 w-5 shrink-0" style="color: var(--color-text-tertiary);"></i>
        </button>

        <!-- Card 3: Dealer Partner -->
        <button
          class="flex items-center gap-4 rounded-2xl cursor-pointer transition-transform duration-200 ease-[cubic-bezier(.2,.8,.2,1)] hover:-translate-y-px active:translate-y-0"
          style="background-color: var(--color-surface); box-shadow: var(--shadow-card); padding: 20px; min-height: 120px;"
          aria-label="进入经销商伙伴"
          data-dom-id="role-dealer"
        >
          <div class="flex h-14 w-14 shrink-0 items-center justify-center rounded-full" style="background-color: var(--state-info-bg);">
            <i data-lucide="building-2" class="h-7 w-7" style="color: var(--state-info);"></i>
          </div>
          <div class="min-w-0 flex-1 text-left">
            <div class="flex items-center gap-2">
              <p class="text-lg font-semibold truncate" style="color: var(--color-text-primary); font-family: var(--font-display);">经销商伙伴</p>
              <span class="shrink-0 inline-flex items-center justify-center text-xs font-medium px-2 py-0.5 rounded-lg whitespace-nowrap" style="color: var(--state-info); background-color: var(--state-info-bg);">商家端</span>
            </div>
            <p class="mt-1.5 text-sm line-clamp-2" style="color: var(--color-text-secondary); font-family: var(--font-body);">展厅运营、库存管理、内容营销与活动统筹</p>
          </div>
          <i data-lucide="chevron-right" class="h-5 w-5 shrink-0" style="color: var(--color-text-tertiary);"></i>
        </button>

      </div>

      <!-- Footer -->
      <footer class="pb-8 pt-4 text-center">
        <p class="text-xs" style="color: var(--color-text-tertiary);">豪车之家 TRAE AI 创意大赛</p>
      </footer>

    </main>
    <style>
      @media (prefers-reduced-motion: reduce) {
        button { transition-duration: 0.01ms !important; }
      }
      button:focus-visible {
        outline: 2px solid var(--color-primary);
        outline-offset: 2px;
      }
    </style>
    <script>lucide.createIcons();</script>
</body>
</html>
