<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>终身管家</title>
    <style id="theme-vars">
:root {
  /* ── Brand Colors: White Premium — NIO-Inspired Refined Red + Gold VIP ── */
  /* 蔚来风格要点：克制用色、精确对比、75%浅色+25%深色比例 */
  --color-primary: #C41E3A;
  --color-primary-light: #D6344F;
  --color-primary-lighter: rgba(196, 30, 58, 0.06);
  --color-primary-lightest: rgba(196, 30, 58, 0.03);
  --color-primary-dark: #9A1830;
  --color-primary-text: #FFFFFF;

  --color-accent: #D4A843;
  --color-accent-light: #E8C06A;
  --color-accent-lighter: rgba(212, 168, 67, 0.10);
  --color-accent-lightest: rgba(212, 168, 67, 0.05);

  /* ── Backgrounds: NIO-inspired "有温度的白" — 层次分明的暖灰梯度 ── */
  --color-background: #FAFBFC;
  --color-background-secondary: #F5F6F8;
  --color-background-tertiary: #EEEEF0;
  --color-surface: #FFFFFF;
  --color-surface-elevated: #FFFFFF;
  --color-surface-hover: #F7F8FA;

  /* ── Text: NIO风格 — 5级字重、精确对比度（9.9:1） ── */
  --color-text-primary: #1F2022;
  --color-text-secondary: #6E747A;
  --color-text-tertiary: #A0A6AE;
  --color-text-inverse: #FFFFFF;
  --color-text-quaternary: #C8CDD3;

  /* ── Borders & Dividers: NIO克制分割线 ── */
  --color-border: rgba(0, 0, 0, 0.05);
  --color-border-subtle: rgba(0, 0, 0, 0.03);
  --color-divider: rgba(0, 0, 0, 0.06);

  /* ── State Colors: 柔和功能性色彩 ── */
  --state-success: #2BBC8E;
  --state-success-bg: rgba(43, 188, 142, 0.06);
  --state-warning: #E8A838;
  --state-warning-bg: rgba(232, 168, 56, 0.06);
  --state-error: #E94A47;
  --state-error-bg: rgba(233, 74, 71, 0.06);
  --state-info: #3B8BEB;
  --state-info-bg: rgba(59, 139, 235, 0.06);

  /* ── Typography: NIO Blue Sky Sans 灵感 — 更大字号、更舒适行高 ── */
  --font-display: 'SF Pro Display', 'PingFang SC', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-body: 'SF Pro Text', 'PingFang SC', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'SF Mono', 'JetBrains Mono', ui-monospace, monospace;

  /* 蔚来APP字号层级（移动端适配） */
  --text-xs: 0.6875rem;     /* 11px - 注释/标签 */
  --text-sm: 0.8125rem;     /* 13px - 辅助文字 */
  --text-base: 0.875rem;    /* 14px - 正文（蔚来标准正文） */
  --text-lg: 0.9375rem;     /* 15px - 次要标题 */
  --text-xl: 1.0625rem;     /* 17px - 卡片标题（蔚来标准） */
  --text-2xl: 1.25rem;      /* 20px - 页面标题 */
  --text-3xl: 1.5rem;       /* 24px - 大标题 */
  --text-display: 1.75rem;  /* 28px - 核心数据展示 */

  /* ── Spacing: NIO"松弛有度"留白策略 ── */
  --space-0-5: 2px;
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;

  /* ── Radius: NIO大圆角 — 柔和亲切 ── */
  --radius-xs: 4px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-2xl: 24px;
  --radius-full: 9999px;

  /* ── Shadows: NIO精致阴影 — "高级精致的品质" ── */
  --shadow-none: none;
  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.02);
  --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.06);
  --shadow-card: 0 1px 4px rgba(0, 0, 0, 0.04), 0 0 0 1px rgba(0, 0, 0, 0.02);
  --shadow-elevated: 0 4px 16px rgba(0, 0, 0, 0.08);
  --shadow-float: 0 8px 30px rgba(0, 0, 0, 0.10);
  --shadow-modal: 0 16px 48px rgba(0, 0, 0, 0.12);

  /* ── NIO-inspired gradients ── */
  --gradient-primary: linear-gradient(135deg, #C41E3A 0%, #9A1830 100%);
  --gradient-accent: linear-gradient(135deg, #D4A843 0%, #B8922E 100%);
  --gradient-sky: linear-gradient(180deg, #EDF2FF 0%, #FAFBFC 100%);
  --gradient-warm: linear-gradient(180deg, #FFF8F0 0%, #FAFBFC 100%);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--color-background);
    --color-primary: var(--color-primary);
    --color-accent: var(--color-accent);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main>
      <!-- Top Bar -->
      <header class="sticky top-0 z-30 bg-[var(--color-surface)]/95 backdrop-blur-sm" style="border-bottom: 1px solid var(--color-border);">
        <div class="flex h-14 items-center px-5">
          <button class="inline-flex h-9 w-9 items-center justify-center rounded-xl" style="color: var(--color-text-primary);" aria-label="返回">
            <i data-lucide="arrow-left" class="h-5 w-5"></i>
          </button>
          <h1 class="ml-3 text-[17px] font-semibold tracking-tight" style="color: var(--color-text-primary);">终身管家</h1>
        </div>
      </header>

      <!-- VIP Card Header -->
      <section class="mx-5 mt-5 rounded-2xl overflow-hidden" style="background: linear-gradient(135deg, #D4A843 0%, #B8922E 50%, #9A7B24 100%);">
        <div class="px-5 py-6">
          <div class="flex items-center gap-2">
            <i data-lucide="crown" class="h-5 w-5" style="color: rgba(255,255,255,0.9);"></i>
            <span class="text-[13px] font-medium tracking-wide" style="color: rgba(255,255,255,0.8);">SVIP 尊享权益</span>
          </div>
          <h2 class="mt-2 text-[22px] font-semibold" style="color: #FFFFFF; word-break: keep-all; text-wrap: balance;">26项终身管家服务</h2>
          <p class="mt-1.5 text-[13px]" style="color: rgba(255,255,255,0.75);">覆盖用车全场景，全方位守护您的出行品质</p>
        </div>
      </section>

      <!-- Category Tabs -->
      <nav class="px-5 mt-5 flex gap-2 overflow-x-auto no-scrollbar" aria-label="服务分类">
        <button class="shrink-0 px-4 py-2 rounded-xl text-[13px] font-semibold transition-colors duration-150" style="background: var(--color-primary); color: var(--color-primary-text);">全部</button>
        <button class="shrink-0 px-4 py-2 rounded-xl text-[13px] font-medium transition-colors duration-150" style="background: var(--color-background-secondary); color: var(--color-text-secondary);">养护</button>
        <button class="shrink-0 px-4 py-2 rounded-xl text-[13px] font-medium transition-colors duration-150" style="background: var(--color-background-secondary); color: var(--color-text-secondary);">年审</button>
        <button class="shrink-0 px-4 py-2 rounded-xl text-[13px] font-medium transition-colors duration-150" style="background: var(--color-background-secondary); color: var(--color-text-secondary);">保险</button>
        <button class="shrink-0 px-4 py-2 rounded-xl text-[13px] font-medium transition-colors duration-150" style="background: var(--color-background-secondary); color: var(--color-text-secondary);">救援</button>
        <button class="shrink-0 px-4 py-2 rounded-xl text-[13px] font-medium transition-colors duration-150" style="background: var(--color-background-secondary); color: var(--color-text-secondary);">生活</button>
      </nav>

      <!-- Service List -->
      <section class="px-5 mt-4 pb-8 flex flex-col gap-3">
        <!-- Service 1 -->
        <div class="flex items-center gap-4 bg-[var(--color-surface)] rounded-2xl p-4" style="box-shadow: var(--shadow-card);">
          <div class="inline-flex h-10 w-10 shrink-0 items-center justify-center rounded-xl" style="background: var(--color-accent-lightest);">
            <i data-lucide="droplets" class="h-5 w-5" style="color: var(--color-accent);"></i>
          </div>
          <div class="min-w-0 flex-1">
            <h3 class="text-[15px] font-semibold" style="color: var(--color-text-primary);">SVIP精洗</h3>
            <p class="mt-0.5 text-[13px] truncate" style="color: var(--color-text-secondary);">专人精洗，内外全方位护理</p>
          </div>
          <button class="shrink-0 h-8 px-4 rounded-lg text-[13px] font-medium transition-transform duration-150 active:scale-[0.96]" style="background: var(--color-primary-lighter); color: var(--color-primary);">立即使用</button>
        </div>

        <!-- Service 2 -->
        <div class="flex items-center gap-4 bg-[var(--color-surface)] rounded-2xl p-4" style="box-shadow: var(--shadow-card);">
          <div class="inline-flex h-10 w-10 shrink-0 items-center justify-center rounded-xl" style="background: var(--state-info-bg);">
            <i data-lucide="clipboard-check" class="h-5 w-5" style="color: var(--state-info);"></i>
          </div>
          <div class="min-w-0 flex-1">
            <h3 class="text-[15px] font-semibold" style="color: var(--color-text-primary);">年检代办</h3>
            <p class="mt-0.5 text-[13px] truncate" style="color: var(--color-text-secondary);">全程代办年检，到站即走</p>
          </div>
          <button class="shrink-0 h-8 px-4 rounded-lg text-[13px] font-medium transition-transform duration-150 active:scale-[0.96]" style="background: var(--color-primary-lighter); color: var(--color-primary);">立即使用</button>
        </div>

        <!-- Service 3 -->
        <div class="flex items-center gap-4 bg-[var(--color-surface)] rounded-2xl p-4" style="box-shadow: var(--shadow-card);">
          <div class="inline-flex h-10 w-10 shrink-0 items-center justify-center rounded-xl" style="background: var(--state-success-bg);">
            <i data-lucide="refresh-cw" class="h-5 w-5" style="color: var(--state-success);"></i>
          </div>
          <div class="min-w-0 flex-1">
            <h3 class="text-[15px] font-semibold" style="color: var(--color-text-primary);">保险续保</h3>
            <p class="mt-0.5 text-[13px] truncate" style="color: var(--color-text-secondary);">到期自动提醒，一键续保无忧</p>
          </div>
          <button class="shrink-0 h-8 px-4 rounded-lg text-[13px] font-medium transition-transform duration-150 active:scale-[0.96]" style="background: var(--color-primary-lighter); color: var(--color-primary);">立即使用</button>
        </div>

        <!-- Service 4 -->
        <div class="flex items-center gap-4 bg-[var(--color-surface)] rounded-2xl p-4" style="box-shadow: var(--shadow-card);">
          <div class="inline-flex h-10 w-10 shrink-0 items-center justify-center rounded-xl" style="background: var(--color-primary-lighter);">
            <i data-lucide="siren" class="h-5 w-5" style="color: var(--color-primary);"></i>
          </div>
          <div class="min-w-0 flex-1">
            <h3 class="text-[15px] font-semibold" style="color: var(--color-text-primary);">24h救援</h3>
            <p class="mt-0.5 text-[13px] truncate" style="color: var(--color-text-secondary);">全天候道路救援，30分钟极速响应</p>
          </div>
          <button class="shrink-0 h-8 px-4 rounded-lg text-[13px] font-medium transition-transform duration-150 active:scale-[0.96]" style="background: var(--color-primary-lighter); color: var(--color-primary);">立即使用</button>
        </div>

        <!-- Service 5 -->
        <div class="flex items-center gap-4 bg-[var(--color-surface)] rounded-2xl p-4" style="box-shadow: var(--shadow-card);">
          <div class="inline-flex h-10 w-10 shrink-0 items-center justify-center rounded-xl" style="background: var(--state-warning-bg);">
            <i data-lucide="user-check" class="h-5 w-5" style="color: var(--state-warning);"></i>
          </div>
          <div class="min-w-0 flex-1">
            <h3 class="text-[15px] font-semibold" style="color: var(--color-text-primary);">代驾服务</h3>
            <p class="mt-0.5 text-[13px] truncate" style="color: var(--color-text-secondary);">专业司机代驾，安全可靠放心</p>
          </div>
          <button class="shrink-0 h-8 px-4 rounded-lg text-[13px] font-medium transition-transform duration-150 active:scale-[0.96]" style="background: var(--color-primary-lighter); color: var(--color-primary);">立即使用</button>
        </div>

        <!-- Service 6 -->
        <div class="flex items-center gap-4 bg-[var(--color-surface)] rounded-2xl p-4" style="box-shadow: var(--shadow-card);">
          <div class="inline-flex h-10 w-10 shrink-0 items-center justify-center rounded-xl" style="background: var(--color-accent-lightest);">
            <i data-lucide="gift" class="h-5 w-5" style="color: var(--color-accent);"></i>
          </div>
          <div class="min-w-0 flex-1">
            <h3 class="text-[15px] font-semibold" style="color: var(--color-text-primary);">增值服务</h3>
            <p class="mt-0.5 text-[13px] truncate" style="color: var(--color-text-secondary);">专属增值权益，更多尊享等你开启</p>
          </div>
          <button class="shrink-0 h-8 px-4 rounded-lg text-[13px] font-medium transition-transform duration-150 active:scale-[0.96]" style="background: var(--color-primary-lighter); color: var(--color-primary);">立即使用</button>
        </div>
      </section>
    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
