<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>门店运营</title>
    <style id="theme-vars">
:root {
  /* ── Brand Colors: White Premium — NIO-Inspired Refined Red + Gold VIP ── */
  --color-primary: #C41E3A;
  --color-primary-light: #D6344F;
  --color-primary-lighter: rgba(196, 30, 58, 0.06);
  --color-primary-lightest: rgba(196, 30, 58, 0.03);
  --color-primary-dark: #9A1830;
  --color-primary-text: #FFFFFF;

  --color-accent: #D4A843;
  --color-accent-light: #E8C06A;
  --color-accent-lighter: rgba(212, 168, 67, 0.10);
  --color-accent-lightest: rgba(212, 168, 67, 0.05);

  /* ── Backgrounds: NIO-inspired "有温度的白" ── */
  --color-background: #FAFBFC;
  --color-background-secondary: #F5F6F8;
  --color-background-tertiary: #EEEEF0;
  --color-surface: #FFFFFF;
  --color-surface-elevated: #FFFFFF;
  --color-surface-hover: #F7F8FA;

  /* ── Text: NIO 5-level weight ── */
  --color-text-primary: #1F2022;
  --color-text-secondary: #6E747A;
  --color-text-tertiary: #A0A6AE;
  --color-text-inverse: #FFFFFF;
  --color-text-quaternary: #C8CDD3;

  /* ── Borders & Dividers ── */
  --color-border: rgba(0, 0, 0, 0.05);
  --color-border-subtle: rgba(0, 0, 0, 0.03);
  --color-divider: rgba(0, 0, 0, 0.06);

  /* ── State Colors ── */
  --state-success: #2BBC8E;
  --state-success-bg: rgba(43, 188, 142, 0.06);
  --state-warning: #E8A838;
  --state-warning-bg: rgba(232, 168, 56, 0.06);
  --state-error: #E94A47;
  --state-error-bg: rgba(233, 74, 71, 0.06);
  --state-info: #3B8BEB;
  --state-info-bg: rgba(59, 139, 235, 0.06);

  /* ── Typography: NIO Blue Sky Sans ── */
  --font-display: 'SF Pro Display', 'PingFang SC', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-body: 'SF Pro Text', 'PingFang SC', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'SF Mono', 'JetBrains Mono', ui-monospace, monospace;

  --text-xs: 0.6875rem;
  --text-sm: 0.8125rem;
  --text-base: 0.875rem;
  --text-lg: 0.9375rem;
  --text-xl: 1.0625rem;
  --text-2xl: 1.25rem;
  --text-3xl: 1.5rem;
  --text-display: 1.75rem;

  /* ── Spacing: NIO breathing room ── */
  --space-0-5: 2px;
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;

  /* ── Radius: NIO large curves ── */
  --radius-xs: 4px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-2xl: 24px;
  --radius-full: 9999px;

  /* ── Shadows: NIO refined ── */
  --shadow-none: none;
  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.02);
  --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.06);
  --shadow-card: 0 1px 4px rgba(0, 0, 0, 0.04), 0 0 0 1px rgba(0, 0, 0, 0.02);
  --shadow-elevated: 0 4px 16px rgba(0, 0, 0, 0.08);
  --shadow-float: 0 8px 30px rgba(0, 0, 0, 0.10);
  --shadow-modal: 0 16px 48px rgba(0, 0, 0, 0.12);

  --gradient-primary: linear-gradient(135deg, #C41E3A 0%, #9A1830 100%);
  --gradient-accent: linear-gradient(135deg, #D4A843 0%, #B8922E 100%);
  --gradient-sky: linear-gradient(180deg, #EDF2FF 0%, #FAFBFC 100%);
  --gradient-warm: linear-gradient(180deg, #FFF8F0 0%, #FAFBFC 100%);
}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--color-background);
    --color-primary: var(--color-primary);
    --color-accent: var(--color-accent);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased" style="font-family: var(--font-body);">
    <main>

      <!-- Top Bar -->
      <header class="flex items-center px-5 pt-4 pb-3">
        <div class="flex items-center gap-2.5">
          <button class="inline-flex h-9 w-9 items-center justify-center rounded-lg" style="background-color: var(--color-surface); box-shadow: var(--shadow-sm);" aria-label="返回">
            <i data-lucide="chevron-left" class="h-[18px] w-[18px]" style="color: var(--color-text-primary);"></i>
          </button>
          <h1 class="text-xl font-semibold tracking-tight" style="color: var(--color-text-primary); text-wrap: balance; word-break: keep-all;">门店运营</h1>
        </div>
      </header>

      <!-- Store Selector -->
      <section class="px-5 pb-5">
        <button class="flex items-center gap-2 w-full px-4 py-3 rounded-xl" style="background-color: var(--color-surface); box-shadow: var(--shadow-card);" aria-label="选择门店">
          <div class="flex h-8 w-8 shrink-0 items-center justify-center rounded-lg" style="background-color: var(--color-primary-lightest);">
            <i data-lucide="building-2" class="h-4 w-4" style="color: var(--color-primary);"></i>
          </div>
          <span class="flex-1 text-left text-sm font-medium truncate" style="color: var(--color-text-primary);">深圳湾旗舰店</span>
          <i data-lucide="chevron-down" class="h-4 w-4 shrink-0" style="color: var(--color-text-tertiary);"></i>
        </button>
      </section>

      <!-- Today's Overview: 3 rounded cards -->
      <section class="px-5 pb-6" aria-label="今日概览">
        <div class="grid grid-cols-3 gap-3">
          <div class="flex flex-col items-center py-5 rounded-2xl" style="background-color: var(--color-surface); box-shadow: var(--shadow-card);">
            <p class="text-display font-bold whitespace-nowrap" style="color: var(--color-text-primary); font-variant-numeric: tabular-nums;">28</p>
            <p class="text-sm mt-1" style="color: var(--color-text-secondary);">到店</p>
            <p class="text-xs" style="color: var(--color-text-quaternary);">组</p>
          </div>
          <div class="flex flex-col items-center py-5 rounded-2xl" style="background-color: var(--color-surface); box-shadow: var(--shadow-card);">
            <p class="text-display font-bold whitespace-nowrap" style="color: var(--color-accent); font-variant-numeric: tabular-nums;">12</p>
            <p class="text-sm mt-1" style="color: var(--color-text-secondary);">试驾</p>
            <p class="text-xs" style="color: var(--color-text-quaternary);">组</p>
          </div>
          <div class="flex flex-col items-center py-5 rounded-2xl" style="background-color: var(--color-surface); box-shadow: var(--shadow-card);">
            <p class="text-display font-bold whitespace-nowrap" style="color: var(--color-primary); font-variant-numeric: tabular-nums;">3</p>
            <p class="text-sm mt-1" style="color: var(--color-text-secondary);">成交</p>
            <p class="text-xs" style="color: var(--color-text-quaternary);">台</p>
          </div>
        </div>
      </section>

      <!-- Task Board -->
      <section class="px-5 pb-6" aria-label="待办事项">
        <div class="rounded-2xl" style="background-color: var(--color-surface); box-shadow: var(--shadow-card);">
          <div class="flex items-center justify-between px-5 pt-5 pb-2">
            <h2 class="text-base font-semibold" style="color: var(--color-text-primary);">待办事项</h2>
            <span class="text-xs" style="color: var(--color-text-tertiary);">4 项</span>
          </div>
          <ul class="px-5 pb-5">
            <!-- Task 1: Urgent -->
            <li class="flex items-center gap-3.5 py-3.5" style="border-bottom: 1px solid var(--color-border-subtle);">
              <div class="relative shrink-0">
                <div class="w-[18px] h-[18px] rounded-full shrink-0" style="border: 1.5px solid var(--color-text-quaternary);"></div>
                <div class="absolute -top-0.5 -right-0.5 w-2 h-2 rounded-full" style="background: var(--color-primary);"></div>
              </div>
              <div class="flex-1 min-w-0">
                <p class="text-sm font-medium truncate" style="color: var(--color-text-primary);">整备迈巴赫S680</p>
                <p class="text-xs mt-0.5" style="color: var(--color-text-tertiary);">紧急 · 今日交付</p>
              </div>
              <i data-lucide="chevron-right" class="h-4 w-4 shrink-0" style="color: var(--color-text-quaternary);"></i>
            </li>
            <!-- Task 2 -->
            <li class="flex items-center gap-3.5 py-3.5" style="border-bottom: 1px solid var(--color-border-subtle);">
              <div class="w-[18px] h-[18px] rounded-full shrink-0" style="border: 1.5px solid var(--color-text-quaternary);"></div>
              <div class="flex-1 min-w-0">
                <p class="text-sm font-medium truncate" style="color: var(--color-text-primary);">更新车源信息</p>
                <p class="text-xs mt-0.5" style="color: var(--color-text-tertiary);">6台车待更新</p>
              </div>
              <i data-lucide="chevron-right" class="h-4 w-4 shrink-0" style="color: var(--color-text-quaternary);"></i>
            </li>
            <!-- Task 3 -->
            <li class="flex items-center gap-3.5 py-3.5" style="border-bottom: 1px solid var(--color-border-subtle);">
              <div class="w-[18px] h-[18px] rounded-full shrink-0" style="border: 1.5px solid var(--color-text-quaternary);"></div>
              <div class="flex-1 min-w-0">
                <p class="text-sm font-medium truncate" style="color: var(--color-text-primary);">准备周末活动物料</p>
                <p class="text-xs mt-0.5" style="color: var(--color-text-tertiary);">VIP品鉴会</p>
              </div>
              <i data-lucide="chevron-right" class="h-4 w-4 shrink-0" style="color: var(--color-text-quaternary);"></i>
            </li>
            <!-- Task 4 -->
            <li class="flex items-center gap-3.5 py-3.5">
              <div class="w-[18px] h-[18px] rounded-full shrink-0" style="border: 1.5px solid var(--color-text-quaternary);"></div>
              <div class="flex-1 min-w-0">
                <p class="text-sm font-medium truncate" style="color: var(--color-text-primary);">回访张先生</p>
                <p class="text-xs mt-0.5" style="color: var(--color-text-tertiary);">保时捷911意向</p>
              </div>
              <i data-lucide="chevron-right" class="h-4 w-4 shrink-0" style="color: var(--color-text-quaternary);"></i>
            </li>
          </ul>
        </div>
      </section>

      <!-- Team Status -->
      <section class="px-5 pb-6" aria-label="团队状态">
        <div class="flex items-center justify-between mb-3">
          <h2 class="text-base font-semibold" style="color: var(--color-text-primary);">团队状态</h2>
          <span class="text-xs" style="color: var(--color-text-tertiary);">3 人</span>
        </div>
        <div class="space-y-3">
          <!-- Member 1 -->
          <div class="flex items-center gap-3 px-4 py-3.5 rounded-2xl" style="background-color: var(--color-surface); box-shadow: var(--shadow-card);">
            <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full" style="background-color: var(--color-primary-lighter);">
              <span class="text-sm font-semibold" style="color: var(--color-primary);">王</span>
            </div>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-medium truncate" style="color: var(--color-text-primary);">王建国</p>
              <p class="text-xs mt-0.5" style="color: var(--color-text-tertiary);">高级销售顾问</p>
            </div>
            <span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-lg text-xs font-medium whitespace-nowrap" style="background-color: var(--state-success-bg); color: var(--state-success);">
              <span class="w-1.5 h-1.5 rounded-full" style="background: var(--state-success);"></span>
              接待中
            </span>
          </div>
          <!-- Member 2 -->
          <div class="flex items-center gap-3 px-4 py-3.5 rounded-2xl" style="background-color: var(--color-surface); box-shadow: var(--shadow-card);">
            <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full" style="background-color: var(--color-accent-lightest);">
              <span class="text-sm font-semibold" style="color: var(--color-accent);">陈</span>
            </div>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-medium truncate" style="color: var(--color-text-primary);">陈伟达</p>
              <p class="text-xs mt-0.5" style="color: var(--color-text-tertiary);">销售主管</p>
            </div>
            <span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-lg text-xs font-medium whitespace-nowrap" style="background-color: var(--state-info-bg); color: var(--state-info);">
              <span class="w-1.5 h-1.5 rounded-full" style="background: var(--state-info);"></span>
              试驾中
            </span>
          </div>
          <!-- Member 3 -->
          <div class="flex items-center gap-3 px-4 py-3.5 rounded-2xl" style="background-color: var(--color-surface); box-shadow: var(--shadow-card);">
            <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full" style="background-color: var(--color-background-secondary);">
              <span class="text-sm font-semibold" style="color: var(--color-text-secondary);">刘</span>
            </div>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-medium truncate" style="color: var(--color-text-primary);">刘思琪</p>
              <p class="text-xs mt-0.5" style="color: var(--color-text-tertiary);">客户经理</p>
            </div>
            <span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-lg text-xs font-medium whitespace-nowrap" style="background-color: var(--color-background-secondary); color: var(--color-text-tertiary);">
              空闲
            </span>
          </div>
        </div>
      </section>

      <!-- Quick Actions Row -->
      <section class="px-5 pb-8" aria-label="快捷操作">
        <div class="grid grid-cols-3 gap-3">
          <button class="flex flex-col items-center gap-2 py-4 rounded-2xl" style="background-color: var(--color-surface); box-shadow: var(--shadow-card);" aria-label="录入车源">
            <div class="flex h-11 w-11 items-center justify-center rounded-xl" style="background-color: var(--color-primary-lightest);">
              <i data-lucide="plus-circle" class="h-5 w-5" style="color: var(--color-primary);"></i>
            </div>
            <span class="text-xs font-medium whitespace-nowrap" style="color: var(--color-text-secondary);">录入车源</span>
          </button>
          <button class="flex flex-col items-center gap-2 py-4 rounded-2xl" style="background-color: var(--color-surface); box-shadow: var(--shadow-card);" aria-label="安排试驾">
            <div class="flex h-11 w-11 items-center justify-center rounded-xl" style="background-color: var(--color-accent-lightest);">
              <i data-lucide="calendar-check" class="h-5 w-5" style="color: var(--color-accent);"></i>
            </div>
            <span class="text-xs font-medium whitespace-nowrap" style="color: var(--color-text-secondary);">安排试驾</span>
          </button>
          <button class="flex flex-col items-center gap-2 py-4 rounded-2xl" style="background-color: var(--color-surface); box-shadow: var(--shadow-card);" aria-label="记录客户">
            <div class="flex h-11 w-11 items-center justify-center rounded-xl" style="background-color: var(--state-info-bg);">
              <i data-lucide="user-plus" class="h-5 w-5" style="color: var(--state-info);"></i>
            </div>
            <span class="text-xs font-medium whitespace-nowrap" style="color: var(--color-text-secondary);">记录客户</span>
          </button>
        </div>
      </section>

    </main>
    <style>
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          transition-duration: 0.01ms !important;
          animation-duration: 0.01ms !important;
        }
      }
      button:active {
        transform: scale(0.97);
        transition: transform 120ms cubic-bezier(0.2, 0.8, 0.2, 1);
      }
    </style>
    <script>lucide.createIcons();</script>
</body>
</html>
