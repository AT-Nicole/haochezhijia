<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>门店运营</title>
    <style id="theme-vars">
:root {
  /* ── Brand Colors: Ferrari Rosso Corsa — 赛道传承红 ── */
  /* 法拉利数字设计: 克制的红色使用，仅用于CTA和品牌关键时刻 */
  --color-primary: #DA291C;
  --color-primary-light: #E8403A;
  --color-primary-lighter: rgba(218, 41, 28, 0.06);
  --color-primary-lightest: rgba(218, 41, 28, 0.03);
  --color-primary-dark: #B01E0A;
  --color-primary-active: #9D2211;
  --color-primary-text: #FFFFFF;

  /* ── Accent: 赛道黄 Giallo Modena — 法拉利盾牌传承色 ── */
  --color-accent: #E8B800;
  --color-accent-light: #F0CC44;
  --color-accent-lighter: rgba(232, 184, 0, 0.10);
  --color-accent-lightest: rgba(232, 184, 0, 0.05);

  /* ── Backgrounds: Ferrari Chiaroscuro — 明暗交替展厅感 ── */
  /* 法拉利核心理念：纯白编辑面板 + 深黑沉浸区域，硬切割过渡 */
  --color-background: #FAFAFA;
  --color-background-secondary: #F3F3F3;
  --color-background-tertiary: #E8E8E8;
  --color-surface: #FFFFFF;
  --color-surface-elevated: #FFFFFF;
  --color-surface-hover: #F5F5F5;

  /* ── Text: Ferrari双字体编辑层级 — FerrariSans灵感 ── */
  --color-text-primary: #181818;
  --color-text-secondary: #666666;
  --color-text-tertiary: #8F8F8F;
  --color-text-inverse: #FFFFFF;
  --color-text-quaternary: #B0B0B0;

  /* ── Borders & Dividers: 法拉利精准线条 ── */
  --color-border: #CCCCCC;
  --color-border-subtle: rgba(0, 0, 0, 0.06);
  --color-divider: rgba(0, 0, 0, 0.08);

  /* ── State Colors ── */
  --state-success: #03904A;
  --state-success-bg: rgba(3, 144, 74, 0.06);
  --state-warning: #E8A838;
  --state-warning-bg: rgba(232, 168, 56, 0.06);
  --state-error: #F13A2C;
  --state-error-bg: rgba(241, 58, 44, 0.06);
  --state-info: #4C98B9;
  --state-info-bg: rgba(76, 152, 185, 0.06);

  /* ── Typography: FerrariSans灵感 — 紧凑有力 ── */
  --font-display: 'SF Pro Display', 'PingFang SC', 'Noto Sans SC', 'Helvetica Neue', Arial, sans-serif;
  --font-body: 'SF Pro Text', 'PingFang SC', 'Noto Sans SC', 'Helvetica Neue', Arial, sans-serif;
  --font-mono: 'SF Mono', 'JetBrains Mono', ui-monospace, monospace;

  /* 法拉利字号层级 — 标题紧凑、正文舒适 */
  --text-xs: 0.6875rem;     /* 11px - 大写标签（text-transform:uppercase + letter-spacing:1px）*/
  --text-sm: 0.8125rem;     /* 13px - 说明文字 */
  --text-base: 0.875rem;    /* 14px - 正文 */
  --text-lg: 1rem;          /* 16px - 卡片标题/UI标题 */
  --text-xl: 1.125rem;      /* 18px - 副标题 */
  --text-2xl: 1.25rem;      /* 20px - 章节标题 */
  --text-3xl: 1.5rem;       /* 24px - 大标题 */
  --text-display: 1.75rem;   /* 28px - 核心数据/英雄标题 */

  /* ── Spacing: 法拉利8px基础网格 ── */
  --space-0-5: 2px;
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;

  /* ── Radius: 法拉利剃刀级精度 — 2px标志性圆角 ── */
  --radius-xs: 1px;
  --radius-sm: 2px;
  --radius-md: 4px;
  --radius-lg: 8px;
  --radius-xl: 12px;
  --radius-2xl: 16px;
  --radius-full: 9999px;

  /* ── Shadows: 法拉利扁平层次 — 近乎零阴影 ── */
  --shadow-none: none;
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 2px 6px rgba(0, 0, 0, 0.06);
  --shadow-card: none;
  --shadow-elevated: 0 4px 12px rgba(0, 0, 0, 0.08);
  --shadow-float: 0 8px 24px rgba(0, 0, 0, 0.10);
  --shadow-modal: 0 12px 40px rgba(0, 0, 0, 0.12);

  /* ── Gradients: 极少使用 — 法拉利用纯色对比，不用渐变 ── */
  --gradient-primary: linear-gradient(135deg, #DA291C 0%, #B01E0A 100%);
  --gradient-accent: linear-gradient(135deg, #E8B800 0%, #C49E00 100%);
  --gradient-dark: linear-gradient(180deg, #000000 0%, #181818 100%);
  --gradient-hero: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 100%);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--color-background);
    --color-primary: var(--color-primary);
    --color-accent: var(--color-accent);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main>
        <!-- Back Nav -->
        <header class="sticky top-0 z-30 border-b border-[var(--color-border)]" style="background:var(--color-surface)">
            <div class="flex h-12 items-center px-4">
                <button class="flex h-8 w-8 items-center justify-center" aria-label="返回" data-dom-id="nav-back">
                    <i data-lucide="chevron-left" class="h-5 w-5" style="color:var(--color-text-primary)"></i>
                </button>
                <div class="min-w-0 flex-1 text-center font-semibold text-[var(--color-text-primary)]" style="font-size:var(--text-lg)">门店运营</div>
                <div class="w-8"></div>
            </div>
        </header>

        <div class="px-4 pb-8 pt-4">
            <!-- Store Selector -->
            <div class="flex items-center justify-between border border-[var(--color-border)] p-3" style="border-radius:var(--radius-lg);background:var(--color-surface)" data-dom-id="store-selector">
                <div class="flex items-center gap-2">
                    <i data-lucide="map-pin" class="h-4 w-4" style="color:var(--color-primary)"></i>
                    <span class="font-medium text-[var(--color-text-primary)]" style="font-size:var(--text-base)">上海浦东旗舰店</span>
                </div>
                <i data-lucide="chevron-down" class="h-4 w-4" style="color:var(--color-text-tertiary)"></i>
            </div>

            <!-- Stats -->
            <div class="mt-4 grid grid-cols-3 gap-2" data-dom-id="stats-grid">
                <div class="border border-[var(--color-border)] p-3 text-center" style="border-radius:var(--radius-lg);background:var(--color-surface)">
                    <div class="font-semibold" style="font-size:var(--text-3xl);color:var(--color-primary)">28</div>
                    <div class="text-[var(--color-text-secondary)]" style="font-size:var(--text-xs)">今日到店</div>
                </div>
                <div class="border border-[var(--color-border)] p-3 text-center" style="border-radius:var(--radius-lg);background:var(--color-surface)">
                    <div class="font-semibold" style="font-size:var(--text-3xl);color:var(--color-primary)">12</div>
                    <div class="text-[var(--color-text-secondary)]" style="font-size:var(--text-xs)">试驾预约</div>
                </div>
                <div class="border border-[var(--color-border)] p-3 text-center" style="border-radius:var(--radius-lg);background:var(--color-surface)">
                    <div class="font-semibold" style="font-size:var(--text-3xl);color:var(--color-accent)">3</div>
                    <div class="text-[var(--color-text-secondary)]" style="font-size:var(--text-xs)">成交订单</div>
                </div>
            </div>

            <!-- Task List -->
            <div class="mt-5">
                <h3 class="mb-3 font-semibold text-[var(--color-text-primary)]" style="font-size:var(--text-base)">今日任务</h3>
                <div class="border border-[var(--color-border)]" style="border-radius:var(--radius-lg);background:var(--color-surface)" data-dom-id="task-list">
                    <div class="flex items-center gap-3 border-b border-[var(--color-divider)] p-4">
                        <div class="h-2 w-2 shrink-0" style="background:var(--color-primary);border-radius:var(--radius-full)"></div>
                        <div class="min-w-0 flex-1">
                            <div class="font-medium text-[var(--color-text-primary)]" style="font-size:var(--text-sm)">交付仪式准备</div>
                            <div class="text-[var(--color-text-tertiary)]" style="font-size:var(--text-xs)">迈巴赫 S680 &middot; 王先生 14:00</div>
                        </div>
                        <i data-lucide="chevron-right" class="h-4 w-4 shrink-0" style="color:var(--color-text-tertiary)"></i>
                    </div>
                    <div class="flex items-center gap-3 border-b border-[var(--color-divider)] p-4">
                        <div class="h-2 w-2 shrink-0" style="background:var(--state-warning);border-radius:var(--radius-full)"></div>
                        <div class="min-w-0 flex-1">
                            <div class="font-medium text-[var(--color-text-primary)]" style="font-size:var(--text-sm)">展厅车辆清洁检查</div>
                            <div class="text-[var(--color-text-tertiary)]" style="font-size:var(--text-xs)">待完成 &middot; 截止 10:00</div>
                        </div>
                        <i data-lucide="chevron-right" class="h-4 w-4 shrink-0" style="color:var(--color-text-tertiary)"></i>
                    </div>
                    <div class="flex items-center gap-3 border-b border-[var(--color-divider)] p-4">
                        <div class="h-2 w-2 shrink-0" style="background:var(--color-text-tertiary);border-radius:var(--radius-full)"></div>
                        <div class="min-w-0 flex-1">
                            <div class="font-medium text-[var(--color-text-primary)]" style="font-size:var(--text-sm)">新车入库登记</div>
                            <div class="text-[var(--color-text-tertiary)]" style="font-size:var(--text-xs)">保时捷 911 &middot; 3台待入库</div>
                        </div>
                        <i data-lucide="chevron-right" class="h-4 w-4 shrink-0" style="color:var(--color-text-tertiary)"></i>
                    </div>
                    <div class="flex items-center gap-3 p-4">
                        <div class="h-2 w-2 shrink-0" style="background:var(--color-text-tertiary);border-radius:var(--radius-full)"></div>
                        <div class="min-w-0 flex-1">
                            <div class="font-medium text-[var(--color-text-primary)]" style="font-size:var(--text-sm)">周报提交</div>
                            <div class="text-[var(--color-text-tertiary)]" style="font-size:var(--text-xs)">截止周五 18:00</div>
                        </div>
                        <i data-lucide="chevron-right" class="h-4 w-4 shrink-0" style="color:var(--color-text-tertiary)"></i>
                    </div>
                </div>
            </div>

            <!-- Team Status -->
            <div class="mt-5">
                <h3 class="mb-3 font-semibold text-[var(--color-text-primary)]" style="font-size:var(--text-base)">团队状态</h3>
                <div class="border border-[var(--color-border)]" style="border-radius:var(--radius-lg);background:var(--color-surface)" data-dom-id="team-status">
                    <div class="flex items-center gap-3 border-b border-[var(--color-divider)] p-4">
                        <div class="flex h-8 w-8 items-center justify-center text-[var(--color-text-sm)] font-medium" style="background:var(--color-primary-lighter);border-radius:var(--radius-full);color:var(--color-primary);font-size:var(--text-xs)">李</div>
                        <div class="min-w-0 flex-1">
                            <div class="font-medium text-[var(--color-text-primary)]" style="font-size:var(--text-sm)">李经理</div>
                            <div class="text-[var(--color-text-tertiary)]" style="font-size:var(--text-xs)">在岗 &middot; 接待客户中</div>
                        </div>
                        <span class="px-2 py-0.5" style="font-size:var(--text-xs);color:var(--state-success);background:var(--state-success-bg);border-radius:var(--radius-sm)">在线</span>
                    </div>
                    <div class="flex items-center gap-3 border-b border-[var(--color-divider)] p-4">
                        <div class="flex h-8 w-8 items-center justify-center font-medium" style="background:var(--color-background-secondary);border-radius:var(--radius-full);color:var(--color-text-primary);font-size:var(--text-xs)">张</div>
                        <div class="min-w-0 flex-1">
                            <div class="font-medium text-[var(--color-text-primary)]" style="font-size:var(--text-sm)">张销售</div>
                            <div class="text-[var(--color-text-tertiary)]" style="font-size:var(--text-xs)">外出试驾 &middot; G63</div>
                        </div>
                        <span class="px-2 py-0.5" style="font-size:var(--text-xs);color:var(--state-warning);background:var(--state-warning-bg);border-radius:var(--radius-sm)">外出</span>
                    </div>
                    <div class="flex items-center gap-3 p-4">
                        <div class="flex h-8 w-8 items-center justify-center font-medium" style="background:var(--color-background-secondary);border-radius:var(--radius-full);color:var(--color-text-primary);font-size:var(--text-xs)">刘</div>
                        <div class="min-w-0 flex-1">
                            <div class="font-medium text-[var(--color-text-primary)]" style="font-size:var(--text-sm)">刘交付</div>
                            <div class="text-[var(--color-text-tertiary)]" style="font-size:var(--text-xs)">准备交付仪式</div>
                        </div>
                        <span class="px-2 py-0.5" style="font-size:var(--text-xs);color:var(--state-success);background:var(--state-success-bg);border-radius:var(--radius-sm)">在线</span>
                    </div>
                </div>
            </div>

            <!-- Quick Actions -->
            <div class="mt-5">
                <h3 class="mb-3 font-semibold text-[var(--color-text-primary)]" style="font-size:var(--text-base)">快捷操作</h3>
                <div class="grid grid-cols-4 gap-3" data-dom-id="quick-actions">
                    <button class="flex flex-col items-center gap-2 p-3" aria-label="新增客户">
                        <div class="flex h-10 w-10 items-center justify-center" style="background:var(--color-primary-lighter);border-radius:var(--radius-lg)">
                            <i data-lucide="user-plus" class="h-5 w-5" style="color:var(--color-primary)"></i>
                        </div>
                        <span class="text-[var(--color-text-secondary)]" style="font-size:var(--text-xs)">新增客户</span>
                    </button>
                    <button class="flex flex-col items-center gap-2 p-3" aria-label="试驾预约">
                        <div class="flex h-10 w-10 items-center justify-center" style="background:var(--color-primary-lighter);border-radius:var(--radius-lg)">
                            <i data-lucide="calendar" class="h-5 w-5" style="color:var(--color-primary)"></i>
                        </div>
                        <span class="text-[var(--color-text-secondary)]" style="font-size:var(--text-xs)">试驾预约</span>
                    </button>
                    <button class="flex flex-col items-center gap-2 p-3" aria-label="库存查询">
                        <div class="flex h-10 w-10 items-center justify-center" style="background:var(--color-primary-lighter);border-radius:var(--radius-lg)">
                            <i data-lucide="package" class="h-5 w-5" style="color:var(--color-primary)"></i>
                        </div>
                        <span class="text-[var(--color-text-secondary)]" style="font-size:var(--text-xs)">库存查询</span>
                    </button>
                    <button class="flex flex-col items-center gap-2 p-3" aria-label="数据报表">
                        <div class="flex h-10 w-10 items-center justify-center" style="background:var(--color-primary-lighter);border-radius:var(--radius-lg)">
                            <i data-lucide="bar-chart-3" class="h-5 w-5" style="color:var(--color-primary)"></i>
                        </div>
                        <span class="text-[var(--color-text-secondary)]" style="font-size:var(--text-xs)">数据报表</span>
                    </button>
                </div>
            </div>
        </div>
    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
