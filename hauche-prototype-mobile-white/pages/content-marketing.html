<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>内容营销</title>
    <style id="theme-vars">
:root {
  /* ── Brand Colors: White Premium — NIO-Inspired Refined Red + Gold VIP ── */
  --color-primary: #C41E3A;
  --color-primary-light: #D6344F;
  --color-primary-lighter: rgba(196, 30, 58, 0.06);
  --color-primary-lightest: rgba(196, 30, 58, 0.03);
  --color-primary-dark: #9A1830;
  --color-primary-text: #FFFFFF;

  --color-accent: #D4A843;
  --color-accent-light: #E8C06A;
  --color-accent-lighter: rgba(212, 168, 67, 0.10);
  --color-accent-lightest: rgba(212, 168, 67, 0.05);

  /* ── Backgrounds: NIO-inspired "有温度的白" ── */
  --color-background: #FAFBFC;
  --color-background-secondary: #F5F6F8;
  --color-background-tertiary: #EEEEF0;
  --color-surface: #FFFFFF;
  --color-surface-elevated: #FFFFFF;
  --color-surface-hover: #F7F8FA;

  /* ── Text: NIO 5-level weight ── */
  --color-text-primary: #1F2022;
  --color-text-secondary: #6E747A;
  --color-text-tertiary: #A0A6AE;
  --color-text-inverse: #FFFFFF;
  --color-text-quaternary: #C8CDD3;

  /* ── Borders & Dividers ── */
  --color-border: rgba(0, 0, 0, 0.05);
  --color-border-subtle: rgba(0, 0, 0, 0.03);
  --color-divider: rgba(0, 0, 0, 0.06);

  /* ── State Colors ── */
  --state-success: #2BBC8E;
  --state-success-bg: rgba(43, 188, 142, 0.06);
  --state-warning: #E8A838;
  --state-warning-bg: rgba(232, 168, 56, 0.06);
  --state-error: #E94A47;
  --state-error-bg: rgba(233, 74, 71, 0.06);
  --state-info: #3B8BEB;
  --state-info-bg: rgba(59, 139, 235, 0.06);

  /* ── Typography: NIO Blue Sky Sans ── */
  --font-display: 'SF Pro Display', 'PingFang SC', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-body: 'SF Pro Text', 'PingFang SC', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'SF Mono', 'JetBrains Mono', ui-monospace, monospace;

  --text-xs: 0.6875rem;
  --text-sm: 0.8125rem;
  --text-base: 0.875rem;
  --text-lg: 0.9375rem;
  --text-xl: 1.0625rem;
  --text-2xl: 1.25rem;
  --text-3xl: 1.5rem;
  --text-display: 1.75rem;

  /* ── Spacing: NIO breathing room ── */
  --space-0-5: 2px;
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;

  /* ── Radius: NIO large curves ── */
  --radius-xs: 4px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-2xl: 24px;
  --radius-full: 9999px;

  /* ── Shadows: NIO refined ── */
  --shadow-none: none;
  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.02);
  --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.06);
  --shadow-card: 0 1px 4px rgba(0, 0, 0, 0.04), 0 0 0 1px rgba(0, 0, 0, 0.02);
  --shadow-elevated: 0 4px 16px rgba(0, 0, 0, 0.08);
  --shadow-float: 0 8px 30px rgba(0, 0, 0, 0.10);
  --shadow-modal: 0 16px 48px rgba(0, 0, 0, 0.12);

  --gradient-primary: linear-gradient(135deg, #C41E3A 0%, #9A1830 100%);
  --gradient-accent: linear-gradient(135deg, #D4A843 0%, #B8922E 100%);
  --gradient-sky: linear-gradient(180deg, #EDF2FF 0%, #FAFBFC 100%);
  --gradient-warm: linear-gradient(180deg, #FFF8F0 0%, #FAFBFC 100%);
}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--color-background);
    --color-primary: var(--color-primary);
    --color-accent: var(--color-accent);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased" style="font-family: var(--font-body);">
    <main>

      <!-- Top Bar -->
      <header class="flex items-center px-5 pt-4 pb-3">
        <div class="flex items-center gap-2.5">
          <button class="inline-flex h-9 w-9 items-center justify-center rounded-lg" style="background-color: var(--color-surface); box-shadow: var(--shadow-sm);" aria-label="返回">
            <i data-lucide="chevron-left" class="h-[18px] w-[18px]" style="color: var(--color-text-primary);"></i>
          </button>
          <h1 class="text-xl font-semibold tracking-tight" style="color: var(--color-text-primary); text-wrap: balance; word-break: keep-all;">内容营销</h1>
        </div>
      </header>

      <!-- Stats Overview: Horizontal scroll cards -->
      <section class="pb-6" aria-label="数据概览">
        <div class="flex gap-3 overflow-x-auto no-scrollbar px-5">
          <div class="shrink-0 flex flex-col items-center px-6 py-4 rounded-2xl" style="background-color: var(--color-surface); box-shadow: var(--shadow-card); min-width: 96px;">
            <p class="text-xl font-bold whitespace-nowrap" style="color: var(--color-text-primary); font-variant-numeric: tabular-nums;">42<span class="text-sm font-normal ml-0.5" style="color: var(--color-text-secondary);">条</span></p>
            <p class="text-sm mt-1" style="color: var(--color-text-secondary);">素材</p>
          </div>
          <div class="shrink-0 flex flex-col items-center px-6 py-4 rounded-2xl" style="background-color: var(--color-surface); box-shadow: var(--shadow-card); min-width: 96px;">
            <p class="text-xl font-bold whitespace-nowrap" style="color: var(--color-text-primary); font-variant-numeric: tabular-nums;">128<span class="text-sm font-normal ml-0.5" style="color: var(--color-text-secondary);">次</span></p>
            <p class="text-sm mt-1" style="color: var(--color-text-secondary);">朋友圈</p>
          </div>
          <div class="shrink-0 flex flex-col items-center px-6 py-4 rounded-2xl" style="background-color: var(--color-surface); box-shadow: var(--shadow-card); min-width: 96px;">
            <p class="text-xl font-bold whitespace-nowrap" style="color: var(--color-accent); font-variant-numeric: tabular-nums;">3.2<span class="text-sm font-normal ml-0.5" style="color: var(--color-text-secondary);">k</span></p>
            <p class="text-sm mt-1" style="color: var(--color-text-secondary);">浏览</p>
          </div>
          <div class="shrink-0 flex flex-col items-center px-6 py-4 rounded-2xl" style="background-color: var(--color-surface); box-shadow: var(--shadow-card); min-width: 96px;">
            <p class="text-xl font-bold whitespace-nowrap" style="color: var(--color-primary); font-variant-numeric: tabular-nums;">15<span class="text-sm font-normal ml-0.5" style="color: var(--color-text-secondary);">单</span></p>
            <p class="text-sm mt-1" style="color: var(--color-text-secondary);">转化</p>
          </div>
        </div>
      </section>

      <!-- Pending Content Section -->
      <section class="px-5 pb-6" aria-label="待发素材">
        <div class="flex items-center justify-between mb-3">
          <h2 class="text-base font-semibold" style="color: var(--color-text-primary);">待发素材</h2>
          <span class="text-xs" style="color: var(--color-text-tertiary);">5 条</span>
        </div>
        <div class="space-y-3">

          <!-- Item 1: 迈巴赫S680 -->
          <div class="flex gap-3 px-4 py-3.5 rounded-2xl" style="background-color: var(--color-surface); box-shadow: var(--shadow-card);">
            <div class="shrink-0 w-20 h-16 rounded-lg overflow-hidden">
              <img src="../assets/car-maybach.jpg" alt="迈巴赫S680" class="w-full h-full object-cover">
            </div>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-semibold truncate" style="color: var(--color-text-primary);">迈巴赫S680</p>
              <p class="text-xs mt-1 line-clamp-2" style="color: var(--color-text-secondary);">至臻奢华 · 头等舱级座驾体验</p>
              <div class="flex gap-2 mt-2.5">
                <button class="inline-flex items-center justify-center px-3 py-1.5 rounded-lg text-xs font-medium whitespace-nowrap" style="border: 1px solid var(--color-border); color: var(--color-text-secondary);">编辑</button>
                <button class="inline-flex items-center justify-center px-3 py-1.5 rounded-lg text-xs font-medium whitespace-nowrap" style="background-color: var(--color-primary); color: var(--color-primary-text);">一键发圈</button>
              </div>
            </div>
          </div>

          <!-- Item 2: 奔驰G63 -->
          <div class="flex gap-3 px-4 py-3.5 rounded-2xl" style="background-color: var(--color-surface); box-shadow: var(--shadow-card);">
            <div class="shrink-0 w-20 h-16 rounded-lg overflow-hidden">
              <img src="../assets/car-g63.jpg" alt="奔驰G63" class="w-full h-full object-cover">
            </div>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-semibold truncate" style="color: var(--color-text-primary);">奔驰G63</p>
              <p class="text-xs mt-1 line-clamp-2" style="color: var(--color-text-secondary);">越野之王 · 征服全地形</p>
              <div class="flex gap-2 mt-2.5">
                <button class="inline-flex items-center justify-center px-3 py-1.5 rounded-lg text-xs font-medium whitespace-nowrap" style="border: 1px solid var(--color-border); color: var(--color-text-secondary);">编辑</button>
                <button class="inline-flex items-center justify-center px-3 py-1.5 rounded-lg text-xs font-medium whitespace-nowrap" style="background-color: var(--color-primary); color: var(--color-primary-text);">一键发圈</button>
              </div>
            </div>
          </div>

          <!-- Item 3: 保时捷911 -->
          <div class="flex gap-3 px-4 py-3.5 rounded-2xl" style="background-color: var(--color-surface); box-shadow: var(--shadow-card);">
            <div class="shrink-0 w-20 h-16 rounded-lg overflow-hidden">
              <img src="../assets/car-porsche.jpg" alt="保时捷911" class="w-full h-full object-cover">
            </div>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-semibold truncate" style="color: var(--color-text-primary);">保时捷911</p>
              <p class="text-xs mt-1 line-clamp-2" style="color: var(--color-text-secondary);">纯粹驾控 · 跑车灵魂传承</p>
              <div class="flex gap-2 mt-2.5">
                <button class="inline-flex items-center justify-center px-3 py-1.5 rounded-lg text-xs font-medium whitespace-nowrap" style="border: 1px solid var(--color-border); color: var(--color-text-secondary);">编辑</button>
                <button class="inline-flex items-center justify-center px-3 py-1.5 rounded-lg text-xs font-medium whitespace-nowrap" style="background-color: var(--color-primary); color: var(--color-primary-text);">一键发圈</button>
              </div>
            </div>
          </div>

          <!-- Item 4: 迈巴赫GLS600 -->
          <div class="flex gap-3 px-4 py-3.5 rounded-2xl" style="background-color: var(--color-surface); box-shadow: var(--shadow-card);">
            <div class="shrink-0 w-20 h-16 rounded-lg overflow-hidden">
              <img src="../assets/car-maybach_1.jpg" alt="迈巴赫GLS600" class="w-full h-full object-cover">
            </div>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-semibold truncate" style="color: var(--color-text-primary);">迈巴赫GLS600</p>
              <p class="text-xs mt-1 line-clamp-2" style="color: var(--color-text-secondary);">全场景尊享 · 商旅双栖旗舰</p>
              <div class="flex gap-2 mt-2.5">
                <button class="inline-flex items-center justify-center px-3 py-1.5 rounded-lg text-xs font-medium whitespace-nowrap" style="border: 1px solid var(--color-border); color: var(--color-text-secondary);">编辑</button>
                <button class="inline-flex items-center justify-center px-3 py-1.5 rounded-lg text-xs font-medium whitespace-nowrap" style="background-color: var(--color-primary); color: var(--color-primary-text);">一键发圈</button>
              </div>
            </div>
          </div>

          <!-- Item 5: 奔驰S级 -->
          <div class="flex gap-3 px-4 py-3.5 rounded-2xl" style="background-color: var(--color-surface); box-shadow: var(--shadow-card);">
            <div class="shrink-0 w-20 h-16 rounded-lg overflow-hidden flex items-center justify-center" style="background-color: var(--color-background-secondary);">
              <i data-lucide="car" class="h-8 w-8" style="color: var(--color-text-quaternary);"></i>
            </div>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-semibold truncate" style="color: var(--color-text-primary);">奔驰S级</p>
              <p class="text-xs mt-1 line-clamp-2" style="color: var(--color-text-secondary);">商务典范 · 行业的标杆</p>
              <div class="flex gap-2 mt-2.5">
                <button class="inline-flex items-center justify-center px-3 py-1.5 rounded-lg text-xs font-medium whitespace-nowrap" style="border: 1px solid var(--color-border); color: var(--color-text-secondary);">编辑</button>
                <button class="inline-flex items-center justify-center px-3 py-1.5 rounded-lg text-xs font-medium whitespace-nowrap" style="background-color: var(--color-primary); color: var(--color-primary-text);">一键发圈</button>
              </div>
            </div>
          </div>

        </div>
      </section>

      <!-- Publishing Calendar -->
      <section class="px-5 pb-8" aria-label="发圈日历">
        <div class="flex items-center justify-between mb-3">
          <h2 class="text-base font-semibold" style="color: var(--color-text-primary);">发圈日历</h2>
          <span class="text-xs font-medium" style="color: var(--color-text-tertiary);">本周</span>
        </div>
        <div class="rounded-2xl px-4 py-4" style="background-color: var(--color-surface); box-shadow: var(--shadow-card);">
          <!-- Week header -->
          <div class="grid grid-cols-7 gap-1 text-center mb-3">
            <span class="text-xs" style="color: var(--color-text-tertiary);">一</span>
            <span class="text-xs" style="color: var(--color-text-tertiary);">二</span>
            <span class="text-xs" style="color: var(--color-text-tertiary);">三</span>
            <span class="text-xs" style="color: var(--color-text-tertiary);">四</span>
            <span class="text-xs" style="color: var(--color-text-tertiary);">五</span>
            <span class="text-xs" style="color: var(--color-text-tertiary);">六</span>
            <span class="text-xs" style="color: var(--color-text-tertiary);">日</span>
          </div>
          <!-- Week days -->
          <div class="grid grid-cols-7 gap-1 text-center">
            <!-- Monday: 7/7 -->
            <div class="flex flex-col items-center py-2 rounded-lg">
              <span class="text-sm font-medium" style="color: var(--color-text-primary);">7</span>
              <div class="mt-1.5 w-1.5 h-1.5 rounded-full" style="background: var(--color-primary);"></div>
            </div>
            <!-- Tuesday: 7/8 -->
            <div class="flex flex-col items-center py-2 rounded-lg">
              <span class="text-sm font-medium" style="color: var(--color-text-primary);">8</span>
              <div class="mt-1.5 w-1.5 h-1.5 rounded-full" style="background: var(--color-accent);"></div>
            </div>
            <!-- Wednesday: 7/9 -->
            <div class="flex flex-col items-center py-2 rounded-lg">
              <span class="text-sm font-medium" style="color: var(--color-text-primary);">9</span>
            </div>
            <!-- Thursday: 7/10 -->
            <div class="flex flex-col items-center py-2 rounded-lg">
              <span class="text-sm font-medium" style="color: var(--color-text-primary);">10</span>
              <div class="mt-1.5 flex gap-0.5">
                <div class="w-1.5 h-1.5 rounded-full" style="background: var(--color-primary);"></div>
                <div class="w-1.5 h-1.5 rounded-full" style="background: var(--color-accent);"></div>
              </div>
            </div>
            <!-- Friday: 7/11 -->
            <div class="flex flex-col items-center py-2 rounded-lg">
              <span class="text-sm font-medium" style="color: var(--color-text-primary);">11</span>
              <div class="mt-1.5 w-1.5 h-1.5 rounded-full" style="background: var(--color-primary);"></div>
            </div>
            <!-- Saturday: 7/12 (today) -->
            <div class="flex flex-col items-center py-2 rounded-lg" style="background-color: var(--color-primary-lightest);">
              <span class="text-sm font-semibold" style="color: var(--color-primary);">12</span>
              <div class="mt-1.5 w-1.5 h-1.5 rounded-full" style="background: var(--color-primary);"></div>
            </div>
            <!-- Sunday: 7/13 -->
            <div class="flex flex-col items-center py-2 rounded-lg">
              <span class="text-sm font-medium" style="color: var(--color-text-quaternary);">13</span>
            </div>
          </div>
          <!-- Calendar legend -->
          <div class="flex items-center justify-center gap-5 mt-4 pt-3" style="border-top: 1px solid var(--color-border-subtle);">
            <div class="flex items-center gap-1.5">
              <div class="w-2 h-2 rounded-full" style="background: var(--color-primary);"></div>
              <span class="text-xs" style="color: var(--color-text-tertiary);">朋友圈</span>
            </div>
            <div class="flex items-center gap-1.5">
              <div class="w-2 h-2 rounded-full" style="background: var(--color-accent);"></div>
              <span class="text-xs" style="color: var(--color-text-tertiary);">短视频</span>
            </div>
          </div>
        </div>
      </section>

    </main>
    <style>
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          transition-duration: 0.01ms !important;
          animation-duration: 0.01ms !important;
        }
      }
      button:active {
        transform: scale(0.97);
        transition: transform 120ms cubic-bezier(0.2, 0.8, 0.2, 1);
      }
    </style>
    <script>lucide.createIcons();</script>
</body>
</html>
