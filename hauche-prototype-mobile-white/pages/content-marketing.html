<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>内容营销</title>
    <style id="theme-vars">
:root {
  /* ── Brand Colors: Ferrari Rosso Corsa — 赛道传承红 ── */
  /* 法拉利数字设计: 克制的红色使用，仅用于CTA和品牌关键时刻 */
  --color-primary: #DA291C;
  --color-primary-light: #E8403A;
  --color-primary-lighter: rgba(218, 41, 28, 0.06);
  --color-primary-lightest: rgba(218, 41, 28, 0.03);
  --color-primary-dark: #B01E0A;
  --color-primary-active: #9D2211;
  --color-primary-text: #FFFFFF;

  /* ── Accent: 赛道黄 Giallo Modena — 法拉利盾牌传承色 ── */
  --color-accent: #E8B800;
  --color-accent-light: #F0CC44;
  --color-accent-lighter: rgba(232, 184, 0, 0.10);
  --color-accent-lightest: rgba(232, 184, 0, 0.05);

  /* ── Backgrounds: Ferrari Chiaroscuro — 明暗交替展厅感 ── */
  /* 法拉利核心理念：纯白编辑面板 + 深黑沉浸区域，硬切割过渡 */
  --color-background: #FAFAFA;
  --color-background-secondary: #F3F3F3;
  --color-background-tertiary: #E8E8E8;
  --color-surface: #FFFFFF;
  --color-surface-elevated: #FFFFFF;
  --color-surface-hover: #F5F5F5;

  /* ── Text: Ferrari双字体编辑层级 — FerrariSans灵感 ── */
  --color-text-primary: #181818;
  --color-text-secondary: #666666;
  --color-text-tertiary: #8F8F8F;
  --color-text-inverse: #FFFFFF;
  --color-text-quaternary: #B0B0B0;

  /* ── Borders & Dividers: 法拉利精准线条 ── */
  --color-border: #CCCCCC;
  --color-border-subtle: rgba(0, 0, 0, 0.06);
  --color-divider: rgba(0, 0, 0, 0.08);

  /* ── State Colors ── */
  --state-success: #03904A;
  --state-success-bg: rgba(3, 144, 74, 0.06);
  --state-warning: #E8A838;
  --state-warning-bg: rgba(232, 168, 56, 0.06);
  --state-error: #F13A2C;
  --state-error-bg: rgba(241, 58, 44, 0.06);
  --state-info: #4C98B9;
  --state-info-bg: rgba(76, 152, 185, 0.06);

  /* ── Typography: FerrariSans灵感 — 紧凑有力 ── */
  --font-display: 'SF Pro Display', 'PingFang SC', 'Noto Sans SC', 'Helvetica Neue', Arial, sans-serif;
  --font-body: 'SF Pro Text', 'PingFang SC', 'Noto Sans SC', 'Helvetica Neue', Arial, sans-serif;
  --font-mono: 'SF Mono', 'JetBrains Mono', ui-monospace, monospace;

  /* 法拉利字号层级 — 标题紧凑、正文舒适 */
  --text-xs: 0.6875rem;     /* 11px - 大写标签（text-transform:uppercase + letter-spacing:1px）*/
  --text-sm: 0.8125rem;     /* 13px - 说明文字 */
  --text-base: 0.875rem;    /* 14px - 正文 */
  --text-lg: 1rem;          /* 16px - 卡片标题/UI标题 */
  --text-xl: 1.125rem;      /* 18px - 副标题 */
  --text-2xl: 1.25rem;      /* 20px - 章节标题 */
  --text-3xl: 1.5rem;       /* 24px - 大标题 */
  --text-display: 1.75rem;   /* 28px - 核心数据/英雄标题 */

  /* ── Spacing: 法拉利8px基础网格 ── */
  --space-0-5: 2px;
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;

  /* ── Radius: 法拉利剃刀级精度 — 2px标志性圆角 ── */
  --radius-xs: 1px;
  --radius-sm: 2px;
  --radius-md: 4px;
  --radius-lg: 8px;
  --radius-xl: 12px;
  --radius-2xl: 16px;
  --radius-full: 9999px;

  /* ── Shadows: 法拉利扁平层次 — 近乎零阴影 ── */
  --shadow-none: none;
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 2px 6px rgba(0, 0, 0, 0.06);
  --shadow-card: none;
  --shadow-elevated: 0 4px 12px rgba(0, 0, 0, 0.08);
  --shadow-float: 0 8px 24px rgba(0, 0, 0, 0.10);
  --shadow-modal: 0 12px 40px rgba(0, 0, 0, 0.12);

  /* ── Gradients: 极少使用 — 法拉利用纯色对比，不用渐变 ── */
  --gradient-primary: linear-gradient(135deg, #DA291C 0%, #B01E0A 100%);
  --gradient-accent: linear-gradient(135deg, #E8B800 0%, #C49E00 100%);
  --gradient-dark: linear-gradient(180deg, #000000 0%, #181818 100%);
  --gradient-hero: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 100%);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--color-background);
    --color-primary: var(--color-primary);
    --color-accent: var(--color-accent);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main>
        <!-- Back Nav -->
        <header class="sticky top-0 z-30 border-b border-[var(--color-border)]" style="background:var(--color-surface)">
            <div class="flex h-12 items-center px-4">
                <button class="flex h-8 w-8 items-center justify-center" aria-label="返回" data-dom-id="nav-back">
                    <i data-lucide="chevron-left" class="h-5 w-5" style="color:var(--color-text-primary)"></i>
                </button>
                <div class="min-w-0 flex-1 text-center font-semibold text-[var(--color-text-primary)]" style="font-size:var(--text-lg)">内容营销</div>
                <div class="w-8"></div>
            </div>
        </header>

        <div class="px-4 pb-8 pt-4">
            <!-- Stats Overview -->
            <div class="grid grid-cols-3 gap-2" data-dom-id="content-stats">
                <div class="border border-[var(--color-border)] p-3 text-center" style="border-radius:var(--radius-lg);background:var(--color-surface)">
                    <div class="font-semibold" style="font-size:var(--text-3xl);color:var(--color-primary)">156</div>
                    <div class="text-[var(--color-text-secondary)]" style="font-size:var(--text-xs)">已发布</div>
                </div>
                <div class="border border-[var(--color-border)] p-3 text-center" style="border-radius:var(--radius-lg);background:var(--color-surface)">
                    <div class="font-semibold" style="font-size:var(--text-3xl);color:var(--color-accent)">5</div>
                    <div class="text-[var(--color-text-secondary)]" style="font-size:var(--text-xs)">待审核</div>
                </div>
                <div class="border border-[var(--color-border)] p-3 text-center" style="border-radius:var(--radius-lg);background:var(--color-surface)">
                    <div class="font-semibold" style="font-size:var(--text-3xl);color:var(--color-text-primary)">89.2k</div>
                    <div class="text-[var(--color-text-secondary)]" style="font-size:var(--text-xs)">总曝光</div>
                </div>
            </div>

            <!-- Pending Materials -->
            <div class="mt-5">
                <h3 class="mb-3 font-semibold text-[var(--color-text-primary)]" style="font-size:var(--text-base)">待审核素材</h3>
                <div class="flex flex-col gap-3" data-dom-id="pending-materials">
                    <!-- Material 1 -->
                    <div class="flex gap-3 border border-[var(--color-border)] p-3" style="border-radius:var(--radius-lg);background:var(--color-surface)">
                        <img src="../assets/car-maybach.jpg" alt="迈巴赫素材" class="h-16 w-20 shrink-0 object-cover" style="border-radius:var(--radius-md)">
                        <div class="min-w-0 flex-1">
                            <div class="font-medium text-[var(--color-text-primary)]" style="font-size:var(--text-sm)">迈巴赫 S680 新车品鉴</div>
                            <div class="mt-1 text-[var(--color-text-tertiary)]" style="font-size:var(--text-xs)">短视频 &middot; 00:45</div>
                            <div class="mt-2 flex gap-2">
                                <button class="px-2.5 py-1 font-medium" style="font-size:var(--text-xs);color:var(--color-primary-text);background:var(--color-primary);border-radius:var(--radius-sm)">通过</button>
                                <button class="px-2.5 py-1 border border-[var(--color-border)] text-[var(--color-text-secondary)]" style="font-size:var(--text-xs);border-radius:var(--radius-sm)">编辑</button>
                            </div>
                        </div>
                    </div>

                    <!-- Material 2 -->
                    <div class="flex gap-3 border border-[var(--color-border)] p-3" style="border-radius:var(--radius-lg);background:var(--color-surface)">
                        <img src="../assets/car-g63.jpg" alt="G63素材" class="h-16 w-20 shrink-0 object-cover" style="border-radius:var(--radius-md)">
                        <div class="min-w-0 flex-1">
                            <div class="font-medium text-[var(--color-text-primary)]" style="font-size:var(--text-sm)">G63 AMG 越野实拍</div>
                            <div class="mt-1 text-[var(--color-text-tertiary)]" style="font-size:var(--text-xs)">图文 &middot; 12张</div>
                            <div class="mt-2 flex gap-2">
                                <button class="px-2.5 py-1 font-medium" style="font-size:var(--text-xs);color:var(--color-primary-text);background:var(--color-primary);border-radius:var(--radius-sm)">通过</button>
                                <button class="px-2.5 py-1 border border-[var(--color-border)] text-[var(--color-text-secondary)]" style="font-size:var(--text-xs);border-radius:var(--radius-sm)">编辑</button>
                            </div>
                        </div>
                    </div>

                    <!-- Material 3 -->
                    <div class="flex gap-3 border border-[var(--color-border)] p-3" style="border-radius:var(--radius-lg);background:var(--color-surface)">
                        <img src="../assets/car-porsche.jpg" alt="保时捷素材" class="h-16 w-20 shrink-0 object-cover" style="border-radius:var(--radius-md)">
                        <div class="min-w-0 flex-1">
                            <div class="font-medium text-[var(--color-text-primary)]" style="font-size:var(--text-sm)">保时捷 911 赛道日回顾</div>
                            <div class="mt-1 text-[var(--color-text-tertiary)]" style="font-size:var(--text-xs)">视频 &middot; 03:22</div>
                            <div class="mt-2 flex gap-2">
                                <button class="px-2.5 py-1 font-medium" style="font-size:var(--text-xs);color:var(--color-primary-text);background:var(--color-primary);border-radius:var(--radius-sm)">通过</button>
                                <button class="px-2.5 py-1 border border-[var(--color-border)] text-[var(--color-text-secondary)]" style="font-size:var(--text-xs);border-radius:var(--radius-sm)">编辑</button>
                            </div>
                        </div>
                    </div>

                    <!-- Material 4 -->
                    <div class="flex gap-3 border border-[var(--color-border)] p-3" style="border-radius:var(--radius-lg);background:var(--color-surface)">
                        <img src="../assets/car-maybach_1.jpg" alt="劳斯莱斯素材" class="h-16 w-20 shrink-0 object-cover" style="border-radius:var(--radius-md)">
                        <div class="min-w-0 flex-1">
                            <div class="font-medium text-[var(--color-text-primary)]" style="font-size:var(--text-sm)">劳斯莱斯 幻影内饰特写</div>
                            <div class="mt-1 text-[var(--color-text-tertiary)]" style="font-size:var(--text-xs)">图文 &middot; 8张</div>
                            <div class="mt-2 flex gap-2">
                                <button class="px-2.5 py-1 font-medium" style="font-size:var(--text-xs);color:var(--color-primary-text);background:var(--color-primary);border-radius:var(--radius-sm)">通过</button>
                                <button class="px-2.5 py-1 border border-[var(--color-border)] text-[var(--color-text-secondary)]" style="font-size:var(--text-xs);border-radius:var(--radius-sm)">编辑</button>
                            </div>
                        </div>
                    </div>

                    <!-- Material 5 -->
                    <div class="flex gap-3 border border-[var(--color-border)] p-3" style="border-radius:var(--radius-lg);background:var(--color-surface)">
                        <img src="../assets/showroom-hero.jpg" alt="展厅素材" class="h-16 w-20 shrink-0 object-cover" style="border-radius:var(--radius-md)">
                        <div class="min-w-0 flex-1">
                            <div class="font-medium text-[var(--color-text-primary)]" style="font-size:var(--text-sm)">上海旗舰店展厅全景</div>
                            <div class="mt-1 text-[var(--color-text-tertiary)]" style="font-size:var(--text-xs)">图文 &middot; 6张</div>
                            <div class="mt-2 flex gap-2">
                                <button class="px-2.5 py-1 font-medium" style="font-size:var(--text-xs);color:var(--color-primary-text);background:var(--color-primary);border-radius:var(--radius-sm)">通过</button>
                                <button class="px-2.5 py-1 border border-[var(--color-border)] text-[var(--color-text-secondary)]" style="font-size:var(--text-xs);border-radius:var(--radius-sm)">编辑</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Weekly Calendar -->
            <div class="mt-5">
                <h3 class="mb-3 font-semibold text-[var(--color-text-primary)]" style="font-size:var(--text-base)">本周发布计划</h3>
                <div class="border border-[var(--color-border)]" style="border-radius:var(--radius-lg);background:var(--color-surface)" data-dom-id="weekly-calendar">
                    <div class="flex items-center gap-3 border-b border-[var(--color-divider)] p-4">
                        <div class="shrink-0 text-center" style="width:40px">
                            <div class="text-[var(--color-text-tertiary)]" style="font-size:var(--text-xs)">周一</div>
                            <div class="font-semibold" style="font-size:var(--text-sm)">7/14</div>
                        </div>
                        <div class="min-w-0 flex-1">
                            <div class="text-[var(--color-text-primary)]" style="font-size:var(--text-sm)">迈巴赫 S680 品鉴文章</div>
                        </div>
                        <span class="px-2 py-0.5" style="font-size:var(--text-xs);color:var(--state-success);background:var(--state-success-bg);border-radius:var(--radius-sm)">已发</span>
                    </div>
                    <div class="flex items-center gap-3 border-b border-[var(--color-divider)] p-4">
                        <div class="shrink-0 text-center" style="width:40px">
                            <div class="text-[var(--color-text-tertiary)]" style="font-size:var(--text-xs)">周二</div>
                            <div class="font-semibold" style="font-size:var(--text-sm)">7/15</div>
                        </div>
                        <div class="min-w-0 flex-1">
                            <div class="text-[var(--color-text-primary)]" style="font-size:var(--text-sm)">G63 AMG 越野专题</div>
                        </div>
                        <span class="px-2 py-0.5" style="font-size:var(--text-xs);color:var(--state-success);background:var(--state-success-bg);border-radius:var(--radius-sm)">已发</span>
                    </div>
                    <div class="flex items-center gap-3 border-b border-[var(--color-divider)] p-4">
                        <div class="shrink-0 text-center" style="width:40px">
                            <div class="text-[var(--color-text-tertiary)]" style="font-size:var(--text-xs)">周三</div>
                            <div class="font-semibold" style="font-size:var(--text-sm);color:var(--color-primary)">7/16</div>
                        </div>
                        <div class="min-w-0 flex-1">
                            <div class="font-medium text-[var(--color-text-primary)]" style="font-size:var(--text-sm)">保时捷 911 赛道日视频</div>
                        </div>
                        <span class="px-2 py-0.5" style="font-size:var(--text-xs);color:var(--color-primary);background:var(--color-primary-lighter);border-radius:var(--radius-sm)">今天</span>
                    </div>
                    <div class="flex items-center gap-3 border-b border-[var(--color-divider)] p-4">
                        <div class="shrink-0 text-center" style="width:40px">
                            <div class="text-[var(--color-text-tertiary)]" style="font-size:var(--text-xs)">周四</div>
                            <div class="font-semibold" style="font-size:var(--text-sm)">7/17</div>
                        </div>
                        <div class="min-w-0 flex-1">
                            <div class="text-[var(--color-text-tertiary)]" style="font-size:var(--text-sm)">劳斯莱斯 幻影内饰故事</div>
                        </div>
                        <span class="px-2 py-0.5 text-[var(--color-text-tertiary)]" style="font-size:var(--text-xs);background:var(--color-background-secondary);border-radius:var(--radius-sm)">待发</span>
                    </div>
                    <div class="flex items-center gap-3 p-4">
                        <div class="shrink-0 text-center" style="width:40px">
                            <div class="text-[var(--color-text-tertiary)]" style="font-size:var(--text-xs)">周五</div>
                            <div class="font-semibold" style="font-size:var(--text-sm)">7/18</div>
                        </div>
                        <div class="min-w-0 flex-1">
                            <div class="text-[var(--color-text-tertiary)]" style="font-size:var(--text-sm)">展厅周报汇总</div>
                        </div>
                        <span class="px-2 py-0.5 text-[var(--color-text-tertiary)]" style="font-size:var(--text-xs);background:var(--color-background-secondary);border-radius:var(--radius-sm)">待发</span>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
