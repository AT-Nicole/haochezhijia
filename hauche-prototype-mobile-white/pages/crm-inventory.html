<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>库存台账</title>
    <style id="theme-vars">
:root {
  /* ── Brand Colors: Ferrari Rosso Corsa — 赛道传承红 ── */
  /* 法拉利数字设计: 克制的红色使用，仅用于CTA和品牌关键时刻 */
  --color-primary: #DA291C;
  --color-primary-light: #E8403A;
  --color-primary-lighter: rgba(218, 41, 28, 0.06);
  --color-primary-lightest: rgba(218, 41, 28, 0.03);
  --color-primary-dark: #B01E0A;
  --color-primary-active: #9D2211;
  --color-primary-text: #FFFFFF;

  /* ── Accent: 赛道黄 Giallo Modena — 法拉利盾牌传承色 ── */
  --color-accent: #E8B800;
  --color-accent-light: #F0CC44;
  --color-accent-lighter: rgba(232, 184, 0, 0.10);
  --color-accent-lightest: rgba(232, 184, 0, 0.05);

  /* ── Backgrounds: Ferrari Chiaroscuro — 明暗交替展厅感 ── */
  /* 法拉利核心理念：纯白编辑面板 + 深黑沉浸区域，硬切割过渡 */
  --color-background: #FAFAFA;
  --color-background-secondary: #F3F3F3;
  --color-background-tertiary: #E8E8E8;
  --color-surface: #FFFFFF;
  --color-surface-elevated: #FFFFFF;
  --color-surface-hover: #F5F5F5;

  /* ── Text: Ferrari双字体编辑层级 — FerrariSans灵感 ── */
  --color-text-primary: #181818;
  --color-text-secondary: #666666;
  --color-text-tertiary: #8F8F8F;
  --color-text-inverse: #FFFFFF;
  --color-text-quaternary: #B0B0B0;

  /* ── Borders & Dividers: 法拉利精准线条 ── */
  --color-border: #CCCCCC;
  --color-border-subtle: rgba(0, 0, 0, 0.06);
  --color-divider: rgba(0, 0, 0, 0.08);

  /* ── State Colors ── */
  --state-success: #03904A;
  --state-success-bg: rgba(3, 144, 74, 0.06);
  --state-warning: #E8A838;
  --state-warning-bg: rgba(232, 168, 56, 0.06);
  --state-error: #F13A2C;
  --state-error-bg: rgba(241, 58, 44, 0.06);
  --state-info: #4C98B9;
  --state-info-bg: rgba(76, 152, 185, 0.06);

  /* ── Typography: FerrariSans灵感 — 紧凑有力 ── */
  --font-display: 'SF Pro Display', 'PingFang SC', 'Noto Sans SC', 'Helvetica Neue', Arial, sans-serif;
  --font-body: 'SF Pro Text', 'PingFang SC', 'Noto Sans SC', 'Helvetica Neue', Arial, sans-serif;
  --font-mono: 'SF Mono', 'JetBrains Mono', ui-monospace, monospace;

  /* 法拉利字号层级 — 标题紧凑、正文舒适 */
  --text-xs: 0.6875rem;     /* 11px - 大写标签（text-transform:uppercase + letter-spacing:1px）*/
  --text-sm: 0.8125rem;     /* 13px - 说明文字 */
  --text-base: 0.875rem;    /* 14px - 正文 */
  --text-lg: 1rem;          /* 16px - 卡片标题/UI标题 */
  --text-xl: 1.125rem;      /* 18px - 副标题 */
  --text-2xl: 1.25rem;      /* 20px - 章节标题 */
  --text-3xl: 1.5rem;       /* 24px - 大标题 */
  --text-display: 1.75rem;   /* 28px - 核心数据/英雄标题 */

  /* ── Spacing: 法拉利8px基础网格 ── */
  --space-0-5: 2px;
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;

  /* ── Radius: 法拉利剃刀级精度 — 2px标志性圆角 ── */
  --radius-xs: 1px;
  --radius-sm: 2px;
  --radius-md: 4px;
  --radius-lg: 8px;
  --radius-xl: 12px;
  --radius-2xl: 16px;
  --radius-full: 9999px;

  /* ── Shadows: 法拉利扁平层次 — 近乎零阴影 ── */
  --shadow-none: none;
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 2px 6px rgba(0, 0, 0, 0.06);
  --shadow-card: none;
  --shadow-elevated: 0 4px 12px rgba(0, 0, 0, 0.08);
  --shadow-float: 0 8px 24px rgba(0, 0, 0, 0.10);
  --shadow-modal: 0 12px 40px rgba(0, 0, 0, 0.12);

  /* ── Gradients: 极少使用 — 法拉利用纯色对比，不用渐变 ── */
  --gradient-primary: linear-gradient(135deg, #DA291C 0%, #B01E0A 100%);
  --gradient-accent: linear-gradient(135deg, #E8B800 0%, #C49E00 100%);
  --gradient-dark: linear-gradient(180deg, #000000 0%, #181818 100%);
  --gradient-hero: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 100%);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--color-background);
    --color-primary: var(--color-primary);
    --color-accent: var(--color-accent);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="pb-20" data-dom-id="page-crm-inventory" style="font-family: var(--font-body);">

      <!-- Status Bar Spacer -->
      <div class="h-11"></div>

      <!-- Header -->
      <div class="px-4 pt-3 pb-4">
        <h1 class="text-[var(--text-2xl)] font-semibold" style="color: var(--color-text-primary); text-wrap: balance; word-break: keep-all;">库存台账</h1>
      </div>

      <!-- Stats Row -->
      <div class="px-4 mb-5">
        <div class="grid grid-cols-3 gap-2">
          <div class="rounded-[var(--radius-sm)] p-3 text-center border" style="background: var(--color-surface); border-color: var(--color-border);">
            <p class="text-[var(--text-3xl)] font-bold whitespace-nowrap" style="color: var(--color-text-primary); font-variant-numeric: tabular-nums;">12</p>
            <p class="text-[var(--text-xs)] mt-0.5 whitespace-nowrap uppercase tracking-[0.05em]" style="color: var(--color-text-tertiary);">在库</p>
          </div>
          <div class="rounded-[var(--radius-sm)] p-3 text-center border" style="background: var(--color-surface); border-color: var(--color-border);">
            <p class="text-[var(--text-3xl)] font-bold whitespace-nowrap" style="color: var(--state-warning); font-variant-numeric: tabular-nums;">3</p>
            <p class="text-[var(--text-xs)] mt-0.5 whitespace-nowrap uppercase tracking-[0.05em]" style="color: var(--color-text-tertiary);">预订</p>
          </div>
          <div class="rounded-[var(--radius-sm)] p-3 text-center border" style="background: var(--color-surface); border-color: var(--color-border);">
            <p class="text-[var(--text-3xl)] font-bold whitespace-nowrap" style="color: var(--state-info); font-variant-numeric: tabular-nums;">2</p>
            <p class="text-[var(--text-xs)] mt-0.5 whitespace-nowrap uppercase tracking-[0.05em]" style="color: var(--color-text-tertiary);">在途</p>
          </div>
        </div>
      </div>

      <!-- Inventory List -->
      <div class="px-4 flex flex-col gap-2.5">
        <!-- Item 1 -->
        <div class="rounded-[var(--radius-lg)] p-3 flex gap-3 border transition-colors duration-200" style="background: var(--color-surface); border-color: var(--color-border);" data-dom-id="inv-1">
          <div class="w-[72px] h-[56px] rounded-[var(--radius-sm)] overflow-hidden shrink-0">
            <img src="../assets/car-maybach.jpg" alt="迈巴赫S480" class="w-full h-full object-cover">
          </div>
          <div class="flex-1 min-w-0">
            <div class="flex items-start justify-between mb-0.5">
              <p class="text-[var(--text-sm)] font-medium truncate" style="color: var(--color-text-primary);">迈巴赫S480</p>
              <span class="text-[var(--text-xs)] px-1.5 py-[1px] rounded-[var(--radius-sm)] whitespace-nowrap shrink-0 ml-2 font-medium" style="background: var(--state-success-bg); color: var(--state-success);">在库</span>
            </div>
            <p class="text-[var(--text-xs)] mb-1 truncate" style="color: var(--color-text-tertiary);">2024 · 4.0T · 黑色</p>
            <p class="text-[var(--text-sm)] font-semibold whitespace-nowrap" style="color: var(--color-primary); font-variant-numeric: tabular-nums;">¥288万</p>
          </div>
        </div>

        <!-- Item 2 -->
        <div class="rounded-[var(--radius-lg)] p-3 flex gap-3 border transition-colors duration-200" style="background: var(--color-surface); border-color: var(--color-border);" data-dom-id="inv-2">
          <div class="w-[72px] h-[56px] rounded-[var(--radius-sm)] overflow-hidden shrink-0">
            <img src="../assets/car-porsche.jpg" alt="保时捷卡宴" class="w-full h-full object-cover">
          </div>
          <div class="flex-1 min-w-0">
            <div class="flex items-start justify-between mb-0.5">
              <p class="text-[var(--text-sm)] font-medium truncate" style="color: var(--color-text-primary);">保时捷卡宴</p>
              <span class="text-[var(--text-xs)] px-1.5 py-[1px] rounded-[var(--radius-sm)] whitespace-nowrap shrink-0 ml-2 font-medium" style="background: var(--state-warning-bg); color: var(--state-warning);">已预订</span>
            </div>
            <p class="text-[var(--text-xs)] mb-1 truncate" style="color: var(--color-text-tertiary);">2025 · 3.0T · 白色</p>
            <p class="text-[var(--text-sm)] font-semibold whitespace-nowrap" style="color: var(--color-primary); font-variant-numeric: tabular-nums;">¥128万</p>
          </div>
        </div>

        <!-- Item 3 -->
        <div class="rounded-[var(--radius-lg)] p-3 flex gap-3 border transition-colors duration-200" style="background: var(--color-surface); border-color: var(--color-border);" data-dom-id="inv-3">
          <div class="w-[72px] h-[56px] rounded-[var(--radius-sm)] overflow-hidden shrink-0">
            <img src="../assets/car-g63.jpg" alt="AMG G63" class="w-full h-full object-cover">
          </div>
          <div class="flex-1 min-w-0">
            <div class="flex items-start justify-between mb-0.5">
              <p class="text-[var(--text-sm)] font-medium truncate" style="color: var(--color-text-primary);">AMG G63</p>
              <span class="text-[var(--text-xs)] px-1.5 py-[1px] rounded-[var(--radius-sm)] whitespace-nowrap shrink-0 ml-2 font-medium" style="background: var(--state-info-bg); color: var(--state-info);">在途</span>
            </div>
            <p class="text-[var(--text-xs)] mb-1 truncate" style="color: var(--color-text-tertiary);">2024 · 4.0T · 灰色</p>
            <p class="text-[var(--text-sm)] font-semibold whitespace-nowrap" style="color: var(--color-primary); font-variant-numeric: tabular-nums;">¥258万</p>
          </div>
        </div>

        <!-- Item 4 -->
        <div class="rounded-[var(--radius-lg)] p-3 flex gap-3 border transition-colors duration-200" style="background: var(--color-surface); border-color: var(--color-border);" data-dom-id="inv-4">
          <div class="w-[72px] h-[56px] rounded-[var(--radius-sm)] overflow-hidden shrink-0">
            <img src="../assets/car-maybach_1.jpg" alt="迈巴赫S580" class="w-full h-full object-cover">
          </div>
          <div class="flex-1 min-w-0">
            <div class="flex items-start justify-between mb-0.5">
              <p class="text-[var(--text-sm)] font-medium truncate" style="color: var(--color-text-primary);">迈巴赫S580</p>
              <span class="text-[var(--text-xs)] px-1.5 py-[1px] rounded-[var(--radius-sm)] whitespace-nowrap shrink-0 ml-2 font-medium" style="background: var(--state-success-bg); color: var(--state-success);">在库</span>
            </div>
            <p class="text-[var(--text-xs)] mb-1 truncate" style="color: var(--color-text-tertiary);">2025 · 4.0T · 深蓝</p>
            <p class="text-[var(--text-sm)] font-semibold whitespace-nowrap" style="color: var(--color-primary); font-variant-numeric: tabular-nums;">¥198万</p>
          </div>
        </div>

        <!-- Item 5 -->
        <div class="rounded-[var(--radius-lg)] p-3 flex gap-3 border transition-colors duration-200" style="background: var(--color-surface); border-color: var(--color-border);" data-dom-id="inv-5">
          <div class="w-[72px] h-[56px] rounded-[var(--radius-sm)] overflow-hidden shrink-0">
            <img src="../assets/car-g63.jpg" alt="奔驰G500" class="w-full h-full object-cover">
          </div>
          <div class="flex-1 min-w-0">
            <div class="flex items-start justify-between mb-0.5">
              <p class="text-[var(--text-sm)] font-medium truncate" style="color: var(--color-text-primary);">奔驰G500</p>
              <span class="text-[var(--text-xs)] px-1.5 py-[1px] rounded-[var(--radius-sm)] whitespace-nowrap shrink-0 ml-2 font-medium" style="background: var(--state-warning-bg); color: var(--state-warning);">已预订</span>
            </div>
            <p class="text-[var(--text-xs)] mb-1 truncate" style="color: var(--color-text-tertiary);">2024 · 3.0T · 白色</p>
            <p class="text-[var(--text-sm)] font-semibold whitespace-nowrap" style="color: var(--color-primary); font-variant-numeric: tabular-nums;">¥186万</p>
          </div>
        </div>
      </div>

    </main>

    <!-- Tab Bar -->
    <nav class="fixed bottom-0 inset-x-0 z-30" style="background: var(--color-surface); border-top: 1px solid var(--color-border);" data-dom-id="tab-bar-inventory">
      <div class="flex items-center justify-around h-14 px-2 pb-1">
        <button class="flex flex-col items-center gap-[2px] py-1 min-w-0" data-dom-id="tab-home">
          <i data-lucide="home" class="w-5 h-5" style="color: var(--color-text-quaternary);"></i>
          <span class="text-[var(--text-xs)] whitespace-nowrap" style="color: var(--color-text-quaternary);">首页</span>
        </button>
        <button class="flex flex-col items-center gap-[2px] py-1 min-w-0" data-dom-id="tab-showroom">
          <i data-lucide="layout-grid" class="w-5 h-5" style="color: var(--color-text-quaternary);"></i>
          <span class="text-[var(--text-xs)] whitespace-nowrap" style="color: var(--color-text-quaternary);">展厅</span>
        </button>
        <button class="flex flex-col items-center gap-[2px] py-1 min-w-0" data-dom-id="tab-members">
          <i data-lucide="crown" class="w-5 h-5" style="color: var(--color-text-quaternary);"></i>
          <span class="text-[var(--text-xs)] whitespace-nowrap" style="color: var(--color-text-quaternary);">会员</span>
        </button>
        <button class="flex flex-col items-center gap-[2px] py-1 min-w-0" data-dom-id="tab-inventory" data-active="true">
          <i data-lucide="package" class="w-5 h-5" style="color: var(--color-primary);"></i>
          <span class="text-[var(--text-xs)] whitespace-nowrap font-semibold" style="color: var(--color-primary);">库存</span>
        </button>
        <button class="flex flex-col items-center gap-[2px] py-1 min-w-0" data-dom-id="tab-profile">
          <i data-lucide="user" class="w-5 h-5" style="color: var(--color-text-quaternary);"></i>
          <span class="text-[var(--text-xs)] whitespace-nowrap" style="color: var(--color-text-quaternary);">我的</span>
        </button>
      </div>
      <div class="h-[env(safe-area-inset-bottom,34px)]" style="background: var(--color-surface);"></div>
    </nav>
    <script>lucide.createIcons();</script>
</body>
</html>
