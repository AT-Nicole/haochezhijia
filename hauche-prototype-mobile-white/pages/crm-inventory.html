<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>库存台账</title>
    <style id="theme-vars">
:root {
  /* ── Brand Colors: White Premium — NIO-Inspired Refined Red + Gold VIP ── */
  /* 蔚来风格要点：克制用色、精确对比、75%浅色+25%深色比例 */
  --color-primary: #C41E3A;
  --color-primary-light: #D6344F;
  --color-primary-lighter: rgba(196, 30, 58, 0.06);
  --color-primary-lightest: rgba(196, 30, 58, 0.03);
  --color-primary-dark: #9A1830;
  --color-primary-text: #FFFFFF;

  --color-accent: #D4A843;
  --color-accent-light: #E8C06A;
  --color-accent-lighter: rgba(212, 168, 67, 0.10);
  --color-accent-lightest: rgba(212, 168, 67, 0.05);

  /* ── Backgrounds: NIO-inspired "有温度的白" — 层次分明的暖灰梯度 ── */
  --color-background: #FAFBFC;
  --color-background-secondary: #F5F6F8;
  --color-background-tertiary: #EEEEF0;
  --color-surface: #FFFFFF;
  --color-surface-elevated: #FFFFFF;
  --color-surface-hover: #F7F8FA;

  /* ── Text: NIO风格 — 5级字重、精确对比度（9.9:1） ── */
  --color-text-primary: #1F2022;
  --color-text-secondary: #6E747A;
  --color-text-tertiary: #A0A6AE;
  --color-text-inverse: #FFFFFF;
  --color-text-quaternary: #C8CDD3;

  /* ── Borders & Dividers: NIO克制分割线 ── */
  --color-border: rgba(0, 0, 0, 0.05);
  --color-border-subtle: rgba(0, 0, 0, 0.03);
  --color-divider: rgba(0, 0, 0, 0.06);

  /* ── State Colors: 柔和功能性色彩 ── */
  --state-success: #2BBC8E;
  --state-success-bg: rgba(43, 188, 142, 0.06);
  --state-warning: #E8A838;
  --state-warning-bg: rgba(232, 168, 56, 0.06);
  --state-error: #E94A47;
  --state-error-bg: rgba(233, 74, 71, 0.06);
  --state-info: #3B8BEB;
  --state-info-bg: rgba(59, 139, 235, 0.06);

  /* ── Typography: NIO Blue Sky Sans 灵感 — 更大字号、更舒适行高 ── */
  --font-display: 'SF Pro Display', 'PingFang SC', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-body: 'SF Pro Text', 'PingFang SC', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'SF Mono', 'JetBrains Mono', ui-monospace, monospace;

  /* 蔚来APP字号层级（移动端适配） */
  --text-xs: 0.6875rem;     /* 11px - 注释/标签 */
  --text-sm: 0.8125rem;     /* 13px - 辅助文字 */
  --text-base: 0.875rem;    /* 14px - 正文（蔚来标准正文） */
  --text-lg: 0.9375rem;     /* 15px - 次要标题 */
  --text-xl: 1.0625rem;     /* 17px - 卡片标题（蔚来标准） */
  --text-2xl: 1.25rem;      /* 20px - 页面标题 */
  --text-3xl: 1.5rem;       /* 24px - 大标题 */
  --text-display: 1.75rem;  /* 28px - 核心数据展示 */

  /* ── Spacing: NIO"松弛有度"留白策略 ── */
  --space-0-5: 2px;
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;

  /* ── Radius: NIO大圆角 — 柔和亲切 ── */
  --radius-xs: 4px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-2xl: 24px;
  --radius-full: 9999px;

  /* ── Shadows: NIO精致阴影 — "高级精致的品质" ── */
  --shadow-none: none;
  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.02);
  --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.06);
  --shadow-card: 0 1px 4px rgba(0, 0, 0, 0.04), 0 0 0 1px rgba(0, 0, 0, 0.02);
  --shadow-elevated: 0 4px 16px rgba(0, 0, 0, 0.08);
  --shadow-float: 0 8px 30px rgba(0, 0, 0, 0.10);
  --shadow-modal: 0 16px 48px rgba(0, 0, 0, 0.12);

  /* ── NIO-inspired gradients ── */
  --gradient-primary: linear-gradient(135deg, #C41E3A 0%, #9A1830 100%);
  --gradient-accent: linear-gradient(135deg, #D4A843 0%, #B8922E 100%);
  --gradient-sky: linear-gradient(180deg, #EDF2FF 0%, #FAFBFC 100%);
  --gradient-warm: linear-gradient(180deg, #FFF8F0 0%, #FAFBFC 100%);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--color-background);
    --color-primary: var(--color-primary);
    --color-accent: var(--color-accent);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="pb-20" data-dom-id="page-crm-inventory" style="font-family: var(--font-body);">

      <!-- Status Bar Spacer -->
      <div class="h-11"></div>

      <!-- Header -->
      <div class="px-5 pt-4 pb-5">
        <h1 class="text-[var(--color-text-primary)] text-[var(--text-2xl)] font-semibold" style="text-wrap: balance; word-break: keep-all;">库存台账</h1>
      </div>

      <!-- Stats Row -->
      <div class="px-5 mb-6">
        <div class="grid grid-cols-3 gap-3">
          <div class="rounded-[var(--radius-md)] p-4 text-center" style="background: var(--color-surface); box-shadow: var(--shadow-card);">
            <p class="text-[var(--color-text-primary)] text-[var(--text-3xl)] font-bold whitespace-nowrap" style="font-variant-numeric: tabular-nums;">12</p>
            <p class="text-[var(--color-text-tertiary)] text-[var(--text-xs)] mt-1 whitespace-nowrap">在库</p>
          </div>
          <div class="rounded-[var(--radius-md)] p-4 text-center" style="background: var(--color-surface); box-shadow: var(--shadow-card);">
            <p class="text-[var(--state-warning)] text-[var(--text-3xl)] font-bold whitespace-nowrap" style="font-variant-numeric: tabular-nums;">3</p>
            <p class="text-[var(--color-text-tertiary)] text-[var(--text-xs)] mt-1 whitespace-nowrap">预订</p>
          </div>
          <div class="rounded-[var(--radius-md)] p-4 text-center" style="background: var(--color-surface); box-shadow: var(--shadow-card);">
            <p class="text-[var(--state-info)] text-[var(--text-3xl)] font-bold whitespace-nowrap" style="font-variant-numeric: tabular-nums;">2</p>
            <p class="text-[var(--color-text-tertiary)] text-[var(--text-xs)] mt-1 whitespace-nowrap">在途</p>
          </div>
        </div>
      </div>

      <!-- Inventory List -->
      <div class="px-5 space-y-3">
        <!-- Item 1 -->
        <div class="rounded-[var(--radius-lg)] p-4 flex gap-4 transition-all duration-200 hover:shadow-md active:scale-[0.99]" style="background: var(--color-surface); box-shadow: var(--shadow-card);" data-dom-id="inv-1">
          <div class="w-20 h-16 rounded-[var(--radius-sm)] overflow-hidden shrink-0">
            <img src="../assets/car-maybach.jpg" alt="迈巴赫S480" class="w-full h-full object-cover">
          </div>
          <div class="flex-1 min-w-0">
            <div class="flex items-start justify-between mb-1">
              <p class="text-[var(--color-text-primary)] text-[var(--text-base)] font-medium truncate">迈巴赫S480</p>
              <span class="text-[var(--state-success)] text-[var(--text-xs)] px-2 py-0.5 rounded-[var(--radius-full)] whitespace-nowrap shrink-0 ml-2" style="background: var(--state-success-bg);">在库</span>
            </div>
            <p class="text-[var(--color-text-tertiary)] text-[var(--text-sm)] mb-1 truncate">2024款 · 4.0T · 黑色</p>
            <p class="text-[var(--color-primary)] text-[var(--text-base)] font-semibold whitespace-nowrap" style="font-variant-numeric: tabular-nums;">¥288万</p>
          </div>
        </div>

        <!-- Item 2 -->
        <div class="rounded-[var(--radius-lg)] p-4 flex gap-4 transition-all duration-200 hover:shadow-md active:scale-[0.99]" style="background: var(--color-surface); box-shadow: var(--shadow-card);" data-dom-id="inv-2">
          <div class="w-20 h-16 rounded-[var(--radius-sm)] overflow-hidden shrink-0">
            <img src="../assets/car-porsche.jpg" alt="保时捷卡宴" class="w-full h-full object-cover">
          </div>
          <div class="flex-1 min-w-0">
            <div class="flex items-start justify-between mb-1">
              <p class="text-[var(--color-text-primary)] text-[var(--text-base)] font-medium truncate">保时捷卡宴</p>
              <span class="text-[var(--state-warning)] text-[var(--text-xs)] px-2 py-0.5 rounded-[var(--radius-full)] whitespace-nowrap shrink-0 ml-2" style="background: var(--state-warning-bg);">已预订</span>
            </div>
            <p class="text-[var(--color-text-tertiary)] text-[var(--text-sm)] mb-1 truncate">2025款 · 3.0T · 白色</p>
            <p class="text-[var(--color-primary)] text-[var(--text-base)] font-semibold whitespace-nowrap" style="font-variant-numeric: tabular-nums;">¥128万</p>
          </div>
        </div>

        <!-- Item 3 -->
        <div class="rounded-[var(--radius-lg)] p-4 flex gap-4 transition-all duration-200 hover:shadow-md active:scale-[0.99]" style="background: var(--color-surface); box-shadow: var(--shadow-card);" data-dom-id="inv-3">
          <div class="w-20 h-16 rounded-[var(--radius-sm)] overflow-hidden shrink-0">
            <img src="../assets/car-g63.jpg" alt="AMG G63" class="w-full h-full object-cover">
          </div>
          <div class="flex-1 min-w-0">
            <div class="flex items-start justify-between mb-1">
              <p class="text-[var(--color-text-primary)] text-[var(--text-base)] font-medium truncate">AMG G63</p>
              <span class="text-[var(--state-info)] text-[var(--text-xs)] px-2 py-0.5 rounded-[var(--radius-full)] whitespace-nowrap shrink-0 ml-2" style="background: var(--state-info-bg);">在途</span>
            </div>
            <p class="text-[var(--color-text-tertiary)] text-[var(--text-sm)] mb-1 truncate">2024款 · 4.0T · 灰色</p>
            <p class="text-[var(--color-primary)] text-[var(--text-base)] font-semibold whitespace-nowrap" style="font-variant-numeric: tabular-nums;">¥258万</p>
          </div>
        </div>

        <!-- Item 4 -->
        <div class="rounded-[var(--radius-lg)] p-4 flex gap-4 transition-all duration-200 hover:shadow-md active:scale-[0.99]" style="background: var(--color-surface); box-shadow: var(--shadow-card);" data-dom-id="inv-4">
          <div class="w-20 h-16 rounded-[var(--radius-sm)] overflow-hidden shrink-0">
            <img src="../assets/car-maybach_1.jpg" alt="迈巴赫S580" class="w-full h-full object-cover">
          </div>
          <div class="flex-1 min-w-0">
            <div class="flex items-start justify-between mb-1">
              <p class="text-[var(--color-text-primary)] text-[var(--text-base)] font-medium truncate">迈巴赫S580</p>
              <span class="text-[var(--state-success)] text-[var(--text-xs)] px-2 py-0.5 rounded-[var(--radius-full)] whitespace-nowrap shrink-0 ml-2" style="background: var(--state-success-bg);">在库</span>
            </div>
            <p class="text-[var(--color-text-tertiary)] text-[var(--text-sm)] mb-1 truncate">2025款 · 4.0T · 深蓝</p>
            <p class="text-[var(--color-primary)] text-[var(--text-base)] font-semibold whitespace-nowrap" style="font-variant-numeric: tabular-nums;">¥198万</p>
          </div>
        </div>
      </div>

    </main>

    <!-- Tab Bar -->
    <nav class="fixed bottom-0 inset-x-0 z-30" style="background: var(--color-surface); border-top: 1px solid var(--color-border);" data-dom-id="tab-bar-inventory">
      <div class="flex items-center justify-around h-16 px-2 pb-1">
        <button class="flex flex-col items-center gap-1 py-1 min-w-0" data-dom-id="tab-home">
          <i data-lucide="home" class="w-5 h-5" style="color: var(--color-text-quaternary);"></i>
          <span class="text-[var(--text-xs)] whitespace-nowrap" style="color: var(--color-text-quaternary);">首页</span>
        </button>
        <button class="flex flex-col items-center gap-1 py-1 min-w-0" data-dom-id="tab-showroom">
          <i data-lucide="layout-grid" class="w-5 h-5" style="color: var(--color-text-quaternary);"></i>
          <span class="text-[var(--text-xs)] whitespace-nowrap" style="color: var(--color-text-quaternary);">展厅</span>
        </button>
        <button class="flex flex-col items-center gap-1 py-1 min-w-0" data-dom-id="tab-members">
          <i data-lucide="crown" class="w-5 h-5" style="color: var(--color-text-quaternary);"></i>
          <span class="text-[var(--text-xs)] whitespace-nowrap" style="color: var(--color-text-quaternary);">会员</span>
        </button>
        <button class="flex flex-col items-center gap-1 py-1 min-w-0" data-dom-id="tab-inventory" data-active="true">
          <i data-lucide="package" class="w-5 h-5" style="color: var(--color-primary);"></i>
          <span class="text-[var(--text-xs)] whitespace-nowrap" style="color: var(--color-primary);">库存</span>
        </button>
        <button class="flex flex-col items-center gap-1 py-1 min-w-0" data-dom-id="tab-profile">
          <i data-lucide="user" class="w-5 h-5" style="color: var(--color-text-quaternary);"></i>
          <span class="text-[var(--text-xs)] whitespace-nowrap" style="color: var(--color-text-quaternary);">我的</span>
        </button>
      </div>
      <div class="h-[env(safe-area-inset-bottom,34px)]" style="background: var(--color-surface);"></div>
    </nav>

    <style>
      @media (prefers-reduced-motion: reduce) {
        * { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; }
      }
      .tabular { font-variant-numeric: tabular-nums; }
    </style>
    <script>lucide.createIcons();</script>
</body>
</html>
