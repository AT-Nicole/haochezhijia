<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服务追踪</title>
    <style id="theme-vars">
:root {
  /* ── Brand Colors: Ferrari Rosso Corsa — 赛道传承红 ── */
  /* 法拉利数字设计: 克制的红色使用，仅用于CTA和品牌关键时刻 */
  --color-primary: #DA291C;
  --color-primary-light: #E8403A;
  --color-primary-lighter: rgba(218, 41, 28, 0.06);
  --color-primary-lightest: rgba(218, 41, 28, 0.03);
  --color-primary-dark: #B01E0A;
  --color-primary-active: #9D2211;
  --color-primary-text: #FFFFFF;

  /* ── Accent: 赛道黄 Giallo Modena — 法拉利盾牌传承色 ── */
  --color-accent: #E8B800;
  --color-accent-light: #F0CC44;
  --color-accent-lighter: rgba(232, 184, 0, 0.10);
  --color-accent-lightest: rgba(232, 184, 0, 0.05);

  /* ── Backgrounds: Ferrari Chiaroscuro — 明暗交替展厅感 ── */
  /* 法拉利核心理念：纯白编辑面板 + 深黑沉浸区域，硬切割过渡 */
  --color-background: #FAFAFA;
  --color-background-secondary: #F3F3F3;
  --color-background-tertiary: #E8E8E8;
  --color-surface: #FFFFFF;
  --color-surface-elevated: #FFFFFF;
  --color-surface-hover: #F5F5F5;

  /* ── Text: Ferrari双字体编辑层级 — FerrariSans灵感 ── */
  --color-text-primary: #181818;
  --color-text-secondary: #666666;
  --color-text-tertiary: #8F8F8F;
  --color-text-inverse: #FFFFFF;
  --color-text-quaternary: #B0B0B0;

  /* ── Borders & Dividers: 法拉利精准线条 ── */
  --color-border: #CCCCCC;
  --color-border-subtle: rgba(0, 0, 0, 0.06);
  --color-divider: rgba(0, 0, 0, 0.08);

  /* ── State Colors ── */
  --state-success: #03904A;
  --state-success-bg: rgba(3, 144, 74, 0.06);
  --state-warning: #E8A838;
  --state-warning-bg: rgba(232, 168, 56, 0.06);
  --state-error: #F13A2C;
  --state-error-bg: rgba(241, 58, 44, 0.06);
  --state-info: #4C98B9;
  --state-info-bg: rgba(76, 152, 185, 0.06);

  /* ── Typography: FerrariSans灵感 — 紧凑有力 ── */
  --font-display: 'SF Pro Display', 'PingFang SC', 'Noto Sans SC', 'Helvetica Neue', Arial, sans-serif;
  --font-body: 'SF Pro Text', 'PingFang SC', 'Noto Sans SC', 'Helvetica Neue', Arial, sans-serif;
  --font-mono: 'SF Mono', 'JetBrains Mono', ui-monospace, monospace;

  /* 法拉利字号层级 — 标题紧凑、正文舒适 */
  --text-xs: 0.6875rem;     /* 11px - 大写标签（text-transform:uppercase + letter-spacing:1px）*/
  --text-sm: 0.8125rem;     /* 13px - 说明文字 */
  --text-base: 0.875rem;    /* 14px - 正文 */
  --text-lg: 1rem;          /* 16px - 卡片标题/UI标题 */
  --text-xl: 1.125rem;      /* 18px - 副标题 */
  --text-2xl: 1.25rem;      /* 20px - 章节标题 */
  --text-3xl: 1.5rem;       /* 24px - 大标题 */
  --text-display: 1.75rem;   /* 28px - 核心数据/英雄标题 */

  /* ── Spacing: 法拉利8px基础网格 ── */
  --space-0-5: 2px;
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;

  /* ── Radius: 法拉利剃刀级精度 — 2px标志性圆角 ── */
  --radius-xs: 1px;
  --radius-sm: 2px;
  --radius-md: 4px;
  --radius-lg: 8px;
  --radius-xl: 12px;
  --radius-2xl: 16px;
  --radius-full: 9999px;

  /* ── Shadows: 法拉利扁平层次 — 近乎零阴影 ── */
  --shadow-none: none;
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 2px 6px rgba(0, 0, 0, 0.06);
  --shadow-card: none;
  --shadow-elevated: 0 4px 12px rgba(0, 0, 0, 0.08);
  --shadow-float: 0 8px 24px rgba(0, 0, 0, 0.10);
  --shadow-modal: 0 12px 40px rgba(0, 0, 0, 0.12);

  /* ── Gradients: 极少使用 — 法拉利用纯色对比，不用渐变 ── */
  --gradient-primary: linear-gradient(135deg, #DA291C 0%, #B01E0A 100%);
  --gradient-accent: linear-gradient(135deg, #E8B800 0%, #C49E00 100%);
  --gradient-dark: linear-gradient(180deg, #000000 0%, #181818 100%);
  --gradient-hero: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 100%);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--color-background);
    --color-primary: var(--color-primary);
    --color-accent: var(--color-accent);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main data-dom-id="page-service-tracking">
      <!-- Top Bar -->
      <header class="sticky top-0 z-30" style="background: var(--color-surface); border-bottom: 1px solid var(--color-border);">
        <div class="flex h-14 items-center px-5">
          <button class="inline-flex h-9 w-9 items-center justify-center transition-colors duration-150 hover:bg-[var(--color-surface-hover)]" style="border-radius: var(--radius-sm); color: var(--color-text-primary);" aria-label="返回">
            <i data-lucide="arrow-left" class="h-5 w-5"></i>
          </button>
          <h1 class="ml-3 text-sm font-semibold tracking-wide" style="color: var(--color-text-primary); text-transform: uppercase; letter-spacing: 1px;">TRACKING</h1>
        </div>
      </header>

      <!-- Active Order Card -->
      <section class="mx-4 mt-4 p-5" style="background: var(--color-surface); border-radius: var(--radius-lg); border: 1px solid var(--color-border);">
        <div class="flex items-center justify-between">
          <div>
            <h2 class="text-sm font-semibold" style="color: var(--color-text-primary);">迈巴赫 S480</h2>
            <p class="mt-1 text-xs" style="color: var(--color-text-secondary);">订单号 HC20260712001</p>
          </div>
          <span class="inline-flex items-center px-3 py-1 text-xs font-medium" style="border-radius: var(--radius-sm); background: var(--color-primary-lighter); color: var(--color-primary);">进行中</span>
        </div>

        <!-- 8-Step Progress Bar -->
        <div class="mt-5 px-1">
          <div class="flex items-center justify-between relative">
            <!-- Track line -->
            <div class="absolute top-2.5 left-3 right-3 h-px" style="background: var(--color-border);"></div>
            <!-- Active track (3 of 8 completed = 37.5%) -->
            <div class="absolute top-2.5 left-3 h-px" style="width: calc(37.5% * (100% - 24px) / 100%); background: var(--color-primary);"></div>

            <!-- Step 1: 需求确认 - done -->
            <div class="relative z-10 flex flex-col items-center">
              <div class="h-5 w-5 flex items-center justify-center" style="border-radius: var(--radius-full); background: var(--state-success);">
                <i data-lucide="check" class="h-3 w-3" style="color: white;"></i>
              </div>
              <span class="mt-1.5 whitespace-nowrap" style="font-size: var(--text-xs); color: var(--state-success);">需求</span>
            </div>
            <!-- Step 2: 寻车 - done -->
            <div class="relative z-10 flex flex-col items-center">
              <div class="h-5 w-5 flex items-center justify-center" style="border-radius: var(--radius-full); background: var(--state-success);">
                <i data-lucide="check" class="h-3 w-3" style="color: white;"></i>
              </div>
              <span class="mt-1.5 whitespace-nowrap" style="font-size: var(--text-xs); color: var(--state-success);">寻车</span>
            </div>
            <!-- Step 3: 验车 - current -->
            <div class="relative z-10 flex flex-col items-center">
              <div class="h-5 w-5 flex items-center justify-center" style="border-radius: var(--radius-full); background: var(--color-primary);">
                <span class="h-2 w-2" style="border-radius: var(--radius-full); background: white;"></span>
              </div>
              <span class="mt-1.5 whitespace-nowrap text-xs font-semibold" style="font-size: var(--text-xs); color: var(--color-primary);">验车</span>
            </div>
            <!-- Step 4-8: pending -->
            <div class="relative z-10 flex flex-col items-center">
              <div class="h-5 w-5" style="border-radius: var(--radius-full); background: var(--color-border);"></div>
              <span class="mt-1.5 whitespace-nowrap" style="font-size: var(--text-xs); color: var(--color-text-quaternary);">合同</span>
            </div>
            <div class="relative z-10 flex flex-col items-center">
              <div class="h-5 w-5" style="border-radius: var(--radius-full); background: var(--color-border);"></div>
              <span class="mt-1.5 whitespace-nowrap" style="font-size: var(--text-xs); color: var(--color-text-quaternary);">付款</span>
            </div>
            <div class="relative z-10 flex flex-col items-center">
              <div class="h-5 w-5" style="border-radius: var(--radius-full); background: var(--color-border);"></div>
              <span class="mt-1.5 whitespace-nowrap" style="font-size: var(--text-xs); color: var(--color-text-quaternary);">整备</span>
            </div>
            <div class="relative z-10 flex flex-col items-center">
              <div class="h-5 w-5" style="border-radius: var(--radius-full); background: var(--color-border);"></div>
              <span class="mt-1.5 whitespace-nowrap" style="font-size: var(--text-xs); color: var(--color-text-quaternary);">交付</span>
            </div>
            <div class="relative z-10 flex flex-col items-center">
              <div class="h-5 w-5" style="border-radius: var(--radius-full); background: var(--color-border);"></div>
              <span class="mt-1.5 whitespace-nowrap" style="font-size: var(--text-xs); color: var(--color-text-quaternary);">售后</span>
            </div>
          </div>
        </div>
      </section>

      <!-- Timeline -->
      <section class="px-4 mt-6 pb-8">
        <h2 class="text-sm font-semibold tracking-wide" style="color: var(--color-text-primary); text-transform: uppercase; letter-spacing: 1px;">事件记录</h2>
        <div class="mt-3 relative pl-6">
          <!-- Timeline line -->
          <div class="absolute left-2.5 top-1 bottom-1 w-px" style="background: var(--color-border);"></div>

          <!-- Event 1: current -->
          <div class="relative pb-5">
            <div class="absolute -left-6 top-1 h-5 w-5 flex items-center justify-center" style="border-radius: var(--radius-full); background: var(--color-primary);">
              <span class="h-2 w-2" style="border-radius: var(--radius-full); background: white;"></span>
            </div>
            <div class="px-4 py-3" style="border-radius: var(--radius-md); background: var(--color-surface); border: 1px solid var(--color-border);">
              <div class="flex items-center justify-between">
                <span class="text-sm font-semibold" style="color: var(--color-text-primary);">验车进行中</span>
                <span class="text-xs" style="color: var(--color-text-tertiary);">07/12 14:30</span>
              </div>
              <p class="mt-1 text-xs leading-relaxed" style="color: var(--color-text-secondary);">已安排资深技师前往上海保税区进行车辆全方位检测，预计2个工作日完成。</p>
            </div>
          </div>

          <!-- Event 2 -->
          <div class="relative pb-5">
            <div class="absolute -left-6 top-1 h-5 w-5 flex items-center justify-center" style="border-radius: var(--radius-full); background: var(--state-success);">
              <i data-lucide="check" class="h-3 w-3" style="color: white;"></i>
            </div>
            <div class="px-4 py-3" style="border-radius: var(--radius-md); background: var(--color-surface); border: 1px solid var(--color-border);">
              <div class="flex items-center justify-between">
                <span class="text-sm font-semibold" style="color: var(--color-text-primary);">寻车完成</span>
                <span class="text-xs" style="color: var(--color-text-tertiary);">07/10 09:15</span>
              </div>
              <p class="mt-1 text-xs leading-relaxed" style="color: var(--color-text-secondary);">已在杜塞尔多夫成功匹配到符合您需求的迈巴赫S480，车况评估为优。</p>
            </div>
          </div>

          <!-- Event 3 -->
          <div class="relative pb-5">
            <div class="absolute -left-6 top-1 h-5 w-5 flex items-center justify-center" style="border-radius: var(--radius-full); background: var(--state-success);">
              <i data-lucide="check" class="h-3 w-3" style="color: white;"></i>
            </div>
            <div class="px-4 py-3" style="border-radius: var(--radius-md); background: var(--color-surface); border: 1px solid var(--color-border);">
              <div class="flex items-center justify-between">
                <span class="text-sm font-semibold" style="color: var(--color-text-primary);">需求确认</span>
                <span class="text-xs" style="color: var(--color-text-tertiary);">07/08 16:00</span>
              </div>
              <p class="mt-1 text-xs leading-relaxed" style="color: var(--color-text-secondary);">已确认您的配置偏好：曜岩黑外漆、玛瑙灰内饰、AMG运动套件。</p>
            </div>
          </div>

          <!-- Event 4 -->
          <div class="relative">
            <div class="absolute -left-6 top-1 h-5 w-5 flex items-center justify-center" style="border-radius: var(--radius-full); background: var(--state-success);">
              <i data-lucide="check" class="h-3 w-3" style="color: white;"></i>
            </div>
            <div class="px-4 py-3" style="border-radius: var(--radius-md); background: var(--color-surface); border: 1px solid var(--color-border);">
              <div class="flex items-center justify-between">
                <span class="text-sm font-semibold" style="color: var(--color-text-primary);">订单创建</span>
                <span class="text-xs" style="color: var(--color-text-tertiary);">07/08 15:20</span>
              </div>
              <p class="mt-1 text-xs leading-relaxed" style="color: var(--color-text-secondary);">您的私董服务订单已创建，专属顾问已分配。</p>
            </div>
          </div>
        </div>
      </section>
    </main>
    <style>
      @media (prefers-reduced-motion: reduce) {
        * { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; }
      }
    </style>
    <script>lucide.createIcons();</script>
</body>
</html>
