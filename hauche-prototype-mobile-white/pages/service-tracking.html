<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服务追踪</title>
    <style id="theme-vars">
:root {
  /* ── Brand Colors: White Premium — NIO-Inspired Refined Red + Gold VIP ── */
  /* 蔚来风格要点：克制用色、精确对比、75%浅色+25%深色比例 */
  --color-primary: #C41E3A;
  --color-primary-light: #D6344F;
  --color-primary-lighter: rgba(196, 30, 58, 0.06);
  --color-primary-lightest: rgba(196, 30, 58, 0.03);
  --color-primary-dark: #9A1830;
  --color-primary-text: #FFFFFF;

  --color-accent: #D4A843;
  --color-accent-light: #E8C06A;
  --color-accent-lighter: rgba(212, 168, 67, 0.10);
  --color-accent-lightest: rgba(212, 168, 67, 0.05);

  /* ── Backgrounds: NIO-inspired "有温度的白" — 层次分明的暖灰梯度 ── */
  --color-background: #FAFBFC;
  --color-background-secondary: #F5F6F8;
  --color-background-tertiary: #EEEEF0;
  --color-surface: #FFFFFF;
  --color-surface-elevated: #FFFFFF;
  --color-surface-hover: #F7F8FA;

  /* ── Text: NIO风格 — 5级字重、精确对比度（9.9:1） ── */
  --color-text-primary: #1F2022;
  --color-text-secondary: #6E747A;
  --color-text-tertiary: #A0A6AE;
  --color-text-inverse: #FFFFFF;
  --color-text-quaternary: #C8CDD3;

  /* ── Borders & Dividers: NIO克制分割线 ── */
  --color-border: rgba(0, 0, 0, 0.05);
  --color-border-subtle: rgba(0, 0, 0, 0.03);
  --color-divider: rgba(0, 0, 0, 0.06);

  /* ── State Colors: 柔和功能性色彩 ── */
  --state-success: #2BBC8E;
  --state-success-bg: rgba(43, 188, 142, 0.06);
  --state-warning: #E8A838;
  --state-warning-bg: rgba(232, 168, 56, 0.06);
  --state-error: #E94A47;
  --state-error-bg: rgba(233, 74, 71, 0.06);
  --state-info: #3B8BEB;
  --state-info-bg: rgba(59, 139, 235, 0.06);

  /* ── Typography: NIO Blue Sky Sans 灵感 — 更大字号、更舒适行高 ── */
  --font-display: 'SF Pro Display', 'PingFang SC', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-body: 'SF Pro Text', 'PingFang SC', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'SF Mono', 'JetBrains Mono', ui-monospace, monospace;

  /* 蔚来APP字号层级（移动端适配） */
  --text-xs: 0.6875rem;     /* 11px - 注释/标签 */
  --text-sm: 0.8125rem;     /* 13px - 辅助文字 */
  --text-base: 0.875rem;    /* 14px - 正文（蔚来标准正文） */
  --text-lg: 0.9375rem;     /* 15px - 次要标题 */
  --text-xl: 1.0625rem;     /* 17px - 卡片标题（蔚来标准） */
  --text-2xl: 1.25rem;      /* 20px - 页面标题 */
  --text-3xl: 1.5rem;       /* 24px - 大标题 */
  --text-display: 1.75rem;  /* 28px - 核心数据展示 */

  /* ── Spacing: NIO"松弛有度"留白策略 ── */
  --space-0-5: 2px;
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;

  /* ── Radius: NIO大圆角 — 柔和亲切 ── */
  --radius-xs: 4px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-2xl: 24px;
  --radius-full: 9999px;

  /* ── Shadows: NIO精致阴影 — "高级精致的品质" ── */
  --shadow-none: none;
  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.02);
  --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.06);
  --shadow-card: 0 1px 4px rgba(0, 0, 0, 0.04), 0 0 0 1px rgba(0, 0, 0, 0.02);
  --shadow-elevated: 0 4px 16px rgba(0, 0, 0, 0.08);
  --shadow-float: 0 8px 30px rgba(0, 0, 0, 0.10);
  --shadow-modal: 0 16px 48px rgba(0, 0, 0, 0.12);

  /* ── NIO-inspired gradients ── */
  --gradient-primary: linear-gradient(135deg, #C41E3A 0%, #9A1830 100%);
  --gradient-accent: linear-gradient(135deg, #D4A843 0%, #B8922E 100%);
  --gradient-sky: linear-gradient(180deg, #EDF2FF 0%, #FAFBFC 100%);
  --gradient-warm: linear-gradient(180deg, #FFF8F0 0%, #FAFBFC 100%);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--color-background);
    --color-primary: var(--color-primary);
    --color-accent: var(--color-accent);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main>
      <!-- Top Bar -->
      <header class="sticky top-0 z-30 bg-[var(--color-surface)]/95 backdrop-blur-sm" style="border-bottom: 1px solid var(--color-border);">
        <div class="flex h-14 items-center px-5">
          <button class="inline-flex h-9 w-9 items-center justify-center rounded-xl" style="color: var(--color-text-primary);" aria-label="返回">
            <i data-lucide="arrow-left" class="h-5 w-5"></i>
          </button>
          <h1 class="ml-3 text-[17px] font-semibold tracking-tight" style="color: var(--color-text-primary);">服务追踪</h1>
        </div>
      </header>

      <!-- Active Order Card -->
      <section class="mx-5 mt-5 bg-[var(--color-surface)] rounded-2xl p-5" style="box-shadow: var(--shadow-card);">
        <div class="flex items-center justify-between">
          <div>
            <h2 class="text-[17px] font-semibold" style="color: var(--color-text-primary);">迈巴赫 S480</h2>
            <p class="mt-1 text-[13px]" style="color: var(--color-text-secondary);">订单号 HC20260712001</p>
          </div>
          <span class="inline-flex items-center px-3 py-1 rounded-lg text-[12px] font-medium" style="background: var(--color-primary-lighter); color: var(--color-primary);">进行中</span>
        </div>

        <!-- Progress Bar -->
        <div class="mt-5 px-2">
          <div class="flex items-center justify-between relative">
            <!-- Track line -->
            <div class="absolute top-2.5 left-2 right-2 h-0.5 rounded-full" style="background: var(--color-border);"></div>
            <!-- Active track -->
            <div class="absolute top-2.5 left-2 h-0.5 rounded-full" style="width: 37.5%; background: var(--color-primary);"></div>

            <!-- Step dots -->
            <div class="relative z-10 flex flex-col items-center">
              <div class="h-5 w-5 rounded-full flex items-center justify-center" style="background: var(--state-success);">
                <i data-lucide="check" class="h-3 w-3" style="color: white;"></i>
              </div>
              <span class="mt-1.5 text-[11px] whitespace-nowrap" style="color: var(--state-success);">需求确认</span>
            </div>
            <div class="relative z-10 flex flex-col items-center">
              <div class="h-5 w-5 rounded-full flex items-center justify-center" style="background: var(--state-success);">
                <i data-lucide="check" class="h-3 w-3" style="color: white;"></i>
              </div>
              <span class="mt-1.5 text-[11px] whitespace-nowrap" style="color: var(--state-success);">寻车</span>
            </div>
            <div class="relative z-10 flex flex-col items-center">
              <div class="h-5 w-5 rounded-full flex items-center justify-center" style="background: var(--color-primary);">
                <span class="h-2 w-2 rounded-full" style="background: white;"></span>
              </div>
              <span class="mt-1.5 text-[11px] font-semibold whitespace-nowrap" style="color: var(--color-primary);">验车</span>
            </div>
            <div class="relative z-10 flex flex-col items-center">
              <div class="h-5 w-5 rounded-full" style="background: var(--color-border);"></div>
              <span class="mt-1.5 text-[11px] whitespace-nowrap" style="color: var(--color-text-quaternary);">合同</span>
            </div>
            <div class="relative z-10 flex flex-col items-center">
              <div class="h-5 w-5 rounded-full" style="background: var(--color-border);"></div>
              <span class="mt-1.5 text-[11px] whitespace-nowrap" style="color: var(--color-text-quaternary);">付款</span>
            </div>
            <div class="relative z-10 flex flex-col items-center">
              <div class="h-5 w-5 rounded-full" style="background: var(--color-border);"></div>
              <span class="mt-1.5 text-[11px] whitespace-nowrap" style="color: var(--color-text-quaternary);">整备</span>
            </div>
            <div class="relative z-10 flex flex-col items-center">
              <div class="h-5 w-5 rounded-full" style="background: var(--color-border);"></div>
              <span class="mt-1.5 text-[11px] whitespace-nowrap" style="color: var(--color-text-quaternary);">交付</span>
            </div>
            <div class="relative z-10 flex flex-col items-center">
              <div class="h-5 w-5 rounded-full" style="background: var(--color-border);"></div>
              <span class="mt-1.5 text-[11px] whitespace-nowrap" style="color: var(--color-text-quaternary);">售后</span>
            </div>
          </div>
        </div>
      </section>

      <!-- Timeline -->
      <section class="px-5 mt-6 pb-8">
        <h2 class="text-[15px] font-semibold" style="color: var(--color-text-primary);">事件记录</h2>
        <div class="mt-3 relative pl-6">
          <!-- Timeline line -->
          <div class="absolute left-2.5 top-1 bottom-1 w-0.5" style="background: var(--color-border);"></div>

          <!-- Event 1 (current) -->
          <div class="relative pb-5">
            <div class="absolute -left-6 top-1 h-5 w-5 rounded-full flex items-center justify-center" style="background: var(--color-primary);">
              <span class="h-2 w-2 rounded-full" style="background: white;"></span>
            </div>
            <div class="bg-[var(--color-surface)] rounded-xl p-4" style="box-shadow: var(--shadow-card);">
              <div class="flex items-center justify-between">
                <span class="text-[14px] font-semibold" style="color: var(--color-text-primary);">验车进行中</span>
                <span class="text-[12px]" style="color: var(--color-text-tertiary);">07/12 14:30</span>
              </div>
              <p class="mt-1 text-[13px] leading-relaxed" style="color: var(--color-text-secondary);">已安排资深技师前往上海保税区进行车辆全方位检测，预计2个工作日完成。</p>
            </div>
          </div>

          <!-- Event 2 -->
          <div class="relative pb-5">
            <div class="absolute -left-6 top-1 h-5 w-5 rounded-full flex items-center justify-center" style="background: var(--state-success);">
              <i data-lucide="check" class="h-3 w-3" style="color: white;"></i>
            </div>
            <div class="bg-[var(--color-surface)] rounded-xl p-4" style="box-shadow: var(--shadow-card);">
              <div class="flex items-center justify-between">
                <span class="text-[14px] font-semibold" style="color: var(--color-text-primary);">寻车完成</span>
                <span class="text-[12px]" style="color: var(--color-text-tertiary);">07/10 09:15</span>
              </div>
              <p class="mt-1 text-[13px] leading-relaxed" style="color: var(--color-text-secondary);">已在杜塞尔多夫成功匹配到符合您需求的迈巴赫S480，车况评估为优。</p>
            </div>
          </div>

          <!-- Event 3 -->
          <div class="relative pb-5">
            <div class="absolute -left-6 top-1 h-5 w-5 rounded-full flex items-center justify-center" style="background: var(--state-success);">
              <i data-lucide="check" class="h-3 w-3" style="color: white;"></i>
            </div>
            <div class="bg-[var(--color-surface)] rounded-xl p-4" style="box-shadow: var(--shadow-card);">
              <div class="flex items-center justify-between">
                <span class="text-[14px] font-semibold" style="color: var(--color-text-primary);">需求确认</span>
                <span class="text-[12px]" style="color: var(--color-text-tertiary);">07/08 16:00</span>
              </div>
              <p class="mt-1 text-[13px] leading-relaxed" style="color: var(--color-text-secondary);">已确认您的配置偏好：曜岩黑外漆、玛瑙灰内饰、AMG运动套件。</p>
            </div>
          </div>

          <!-- Event 4 -->
          <div class="relative">
            <div class="absolute -left-6 top-1 h-5 w-5 rounded-full flex items-center justify-center" style="background: var(--state-success);">
              <i data-lucide="check" class="h-3 w-3" style="color: white;"></i>
            </div>
            <div class="bg-[var(--color-surface)] rounded-xl p-4" style="box-shadow: var(--shadow-card);">
              <div class="flex items-center justify-between">
                <span class="text-[14px] font-semibold" style="color: var(--color-text-primary);">订单创建</span>
                <span class="text-[12px]" style="color: var(--color-text-tertiary);">07/08 15:20</span>
              </div>
              <p class="mt-1 text-[13px] leading-relaxed" style="color: var(--color-text-secondary);">您的私董服务订单已创建，专属顾问已分配。</p>
            </div>
          </div>
        </div>
      </section>
    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
