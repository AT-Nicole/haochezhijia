<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>豪车排行</title>
    <style id="theme-vars">
:root {
  /* ── Brand Colors: Ferrari Rosso Corsa — 赛道传承红 ── */
  /* 法拉利数字设计: 克制的红色使用，仅用于CTA和品牌关键时刻 */
  --color-primary: #DA291C;
  --color-primary-light: #E8403A;
  --color-primary-lighter: rgba(218, 41, 28, 0.06);
  --color-primary-lightest: rgba(218, 41, 28, 0.03);
  --color-primary-dark: #B01E0A;
  --color-primary-active: #9D2211;
  --color-primary-text: #FFFFFF;

  /* ── Accent: 赛道黄 Giallo Modena — 法拉利盾牌传承色 ── */
  --color-accent: #E8B800;
  --color-accent-light: #F0CC44;
  --color-accent-lighter: rgba(232, 184, 0, 0.10);
  --color-accent-lightest: rgba(232, 184, 0, 0.05);

  /* ── Backgrounds: Ferrari Chiaroscuro — 明暗交替展厅感 ── */
  /* 法拉利核心理念：纯白编辑面板 + 深黑沉浸区域，硬切割过渡 */
  --color-background: #FAFAFA;
  --color-background-secondary: #F3F3F3;
  --color-background-tertiary: #E8E8E8;
  --color-surface: #FFFFFF;
  --color-surface-elevated: #FFFFFF;
  --color-surface-hover: #F5F5F5;

  /* ── Text: Ferrari双字体编辑层级 — FerrariSans灵感 ── */
  --color-text-primary: #181818;
  --color-text-secondary: #666666;
  --color-text-tertiary: #8F8F8F;
  --color-text-inverse: #FFFFFF;
  --color-text-quaternary: #B0B0B0;

  /* ── Borders & Dividers: 法拉利精准线条 ── */
  --color-border: #CCCCCC;
  --color-border-subtle: rgba(0, 0, 0, 0.06);
  --color-divider: rgba(0, 0, 0, 0.08);

  /* ── State Colors ── */
  --state-success: #03904A;
  --state-success-bg: rgba(3, 144, 74, 0.06);
  --state-warning: #E8A838;
  --state-warning-bg: rgba(232, 168, 56, 0.06);
  --state-error: #F13A2C;
  --state-error-bg: rgba(241, 58, 44, 0.06);
  --state-info: #4C98B9;
  --state-info-bg: rgba(76, 152, 185, 0.06);

  /* ── Typography: FerrariSans灵感 — 紧凑有力 ── */
  --font-display: 'SF Pro Display', 'PingFang SC', 'Noto Sans SC', 'Helvetica Neue', Arial, sans-serif;
  --font-body: 'SF Pro Text', 'PingFang SC', 'Noto Sans SC', 'Helvetica Neue', Arial, sans-serif;
  --font-mono: 'SF Mono', 'JetBrains Mono', ui-monospace, monospace;

  /* 法拉利字号层级 — 标题紧凑、正文舒适 */
  --text-xs: 0.6875rem;     /* 11px - 大写标签（text-transform:uppercase + letter-spacing:1px）*/
  --text-sm: 0.8125rem;     /* 13px - 说明文字 */
  --text-base: 0.875rem;    /* 14px - 正文 */
  --text-lg: 1rem;          /* 16px - 卡片标题/UI标题 */
  --text-xl: 1.125rem;      /* 18px - 副标题 */
  --text-2xl: 1.25rem;      /* 20px - 章节标题 */
  --text-3xl: 1.5rem;       /* 24px - 大标题 */
  --text-display: 1.75rem;   /* 28px - 核心数据/英雄标题 */

  /* ── Spacing: 法拉利8px基础网格 ── */
  --space-0-5: 2px;
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;

  /* ── Radius: 法拉利剃刀级精度 — 2px标志性圆角 ── */
  --radius-xs: 1px;
  --radius-sm: 2px;
  --radius-md: 4px;
  --radius-lg: 8px;
  --radius-xl: 12px;
  --radius-2xl: 16px;
  --radius-full: 9999px;

  /* ── Shadows: 法拉利扁平层次 — 近乎零阴影 ── */
  --shadow-none: none;
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 2px 6px rgba(0, 0, 0, 0.06);
  --shadow-card: none;
  --shadow-elevated: 0 4px 12px rgba(0, 0, 0, 0.08);
  --shadow-float: 0 8px 24px rgba(0, 0, 0, 0.10);
  --shadow-modal: 0 12px 40px rgba(0, 0, 0, 0.12);

  /* ── Gradients: 极少使用 — 法拉利用纯色对比，不用渐变 ── */
  --gradient-primary: linear-gradient(135deg, #DA291C 0%, #B01E0A 100%);
  --gradient-accent: linear-gradient(135deg, #E8B800 0%, #C49E00 100%);
  --gradient-dark: linear-gradient(180deg, #000000 0%, #181818 100%);
  --gradient-hero: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 100%);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--color-background);
    --color-primary: var(--color-primary);
    --color-accent: var(--color-accent);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main>
        <!-- Back Nav -->
        <header class="sticky top-0 z-30 border-b border-[var(--color-border)]" style="background:var(--color-surface)">
            <div class="flex h-12 items-center px-4">
                <button class="flex h-8 w-8 items-center justify-center" aria-label="返回" data-dom-id="nav-back">
                    <i data-lucide="chevron-left" class="h-5 w-5" style="color:var(--color-text-primary)"></i>
                </button>
                <div class="min-w-0 flex-1 text-center font-semibold text-[var(--color-text-primary)]" style="font-size:var(--text-lg)">豪车排行</div>
                <div class="w-8"></div>
            </div>
        </header>

        <!-- Tabs -->
        <nav class="sticky top-12 z-20 border-b border-[var(--color-border)] no-scrollbar" style="background:var(--color-surface)" data-dom-id="ranking-tabs">
            <div class="flex gap-0 overflow-x-auto px-4" style="scrollbar-width:none">
                <button class="shrink-0 whitespace-nowrap px-3 py-3 text-[var(--color-text-primary)]" style="font-size:var(--text-sm);font-weight:600;border-bottom:2px solid var(--color-primary)">销量</button>
                <button class="shrink-0 whitespace-nowrap px-3 py-3 text-[var(--color-text-secondary)]" style="font-size:var(--text-sm)">保值率</button>
                <button class="shrink-0 whitespace-nowrap px-3 py-3 text-[var(--color-text-secondary)]" style="font-size:var(--text-sm)">热度</button>
                <button class="shrink-0 whitespace-nowrap px-3 py-3 text-[var(--color-text-secondary)]" style="font-size:var(--text-sm)">关注</button>
            </div>
        </nav>

        <div class="px-4 pb-8 pt-4">
            <!-- TOP 3 Podium -->
            <div class="grid grid-cols-3 gap-2" data-dom-id="top-3">
                <!-- Silver #2 -->
                <div class="flex flex-col items-center border border-[var(--color-border)] p-3 pt-6" style="border-radius:var(--radius-lg);background:var(--color-surface)">
                    <div class="flex h-6 w-6 items-center justify-center font-bold" style="background:#C0C0C0;color:white;border-radius:var(--radius-full);font-size:var(--text-xs)">2</div>
                    <img src="../assets/car-porsche.jpg" alt="保时捷" class="mt-2 aspect-square w-full object-cover" style="border-radius:var(--radius-md)">
                    <div class="mt-2 text-center font-medium text-[var(--color-text-primary)]" style="font-size:var(--text-sm)">保时捷</div>
                    <div class="text-[var(--color-text-tertiary)]" style="font-size:var(--text-xs)">卡宴</div>
                    <div class="mt-1 font-semibold" style="font-size:var(--text-sm);color:var(--color-text-primary)">12,860</div>
                </div>
                <!-- Gold #1 -->
                <div class="flex flex-col items-center border-2 p-3 pt-4" style="border-color:var(--color-accent);border-radius:var(--radius-lg);background:var(--color-surface)">
                    <div class="flex h-7 w-7 items-center justify-center font-bold" style="background:var(--color-accent);color:white;border-radius:var(--radius-full);font-size:var(--text-xs)">1</div>
                    <img src="../assets/car-maybach.jpg" alt="迈巴赫" class="mt-2 aspect-square w-full object-cover" style="border-radius:var(--radius-md)">
                    <div class="mt-2 text-center font-semibold text-[var(--color-text-primary)]" style="font-size:var(--text-sm)">迈巴赫</div>
                    <div class="text-[var(--color-text-tertiary)]" style="font-size:var(--text-xs)">S级</div>
                    <div class="mt-1 font-semibold" style="font-size:var(--text-lg);color:var(--color-primary)">15,230</div>
                </div>
                <!-- Bronze #3 -->
                <div class="flex flex-col items-center border border-[var(--color-border)] p-3 pt-6" style="border-radius:var(--radius-lg);background:var(--color-surface)">
                    <div class="flex h-6 w-6 items-center justify-center font-bold" style="background:#CD7F32;color:white;border-radius:var(--radius-full);font-size:var(--text-xs)">3</div>
                    <img src="../assets/car-g63.jpg" alt="奔驰AMG" class="mt-2 aspect-square w-full object-cover" style="border-radius:var(--radius-md)">
                    <div class="mt-2 text-center font-medium text-[var(--color-text-primary)]" style="font-size:var(--text-sm)">奔驰</div>
                    <div class="text-[var(--color-text-tertiary)]" style="font-size:var(--text-xs)">G63</div>
                    <div class="mt-1 font-semibold" style="font-size:var(--text-sm);color:var(--color-text-primary)">9,845</div>
                </div>
            </div>

            <!-- Rank 4-10 -->
            <div class="mt-5">
                <div class="flex items-center gap-3 border-b border-[var(--color-divider)] py-3.5" data-dom-id="rank-4">
                    <span class="w-6 text-center font-semibold text-[var(--color-text-secondary)" style="font-size:var(--text-sm)">4</span>
                    <img src="../assets/car-maybach_1.jpg" alt="劳斯莱斯" class="h-12 w-16 shrink-0 object-cover" style="border-radius:var(--radius-md)">
                    <div class="min-w-0 flex-1">
                        <div class="font-medium text-[var(--color-text-primary)]" style="font-size:var(--text-base)">劳斯莱斯 幻影</div>
                        <div class="text-[var(--color-text-tertiary)]" style="font-size:var(--text-xs)">指导价 790-986万</div>
                    </div>
                    <div class="font-semibold text-[var(--color-text-primary)]" style="font-size:var(--text-sm)">8,520</div>
                </div>

                <div class="flex items-center gap-3 border-b border-[var(--color-divider)] py-3.5" data-dom-id="rank-5">
                    <span class="w-6 text-center font-semibold text-[var(--color-text-secondary)]" style="font-size:var(--text-sm)">5</span>
                    <img src="../assets/car-porsche.jpg" alt="宾利" class="h-12 w-16 shrink-0 object-cover" style="border-radius:var(--radius-md)">
                    <div class="min-w-0 flex-1">
                        <div class="font-medium text-[var(--color-text-primary)]" style="font-size:var(--text-base)">宾利 欧陆 GT</div>
                        <div class="text-[var(--color-text-tertiary)]" style="font-size:var(--text-xs)">指导价 288-398万</div>
                    </div>
                    <div class="font-semibold text-[var(--color-text-primary)]" style="font-size:var(--text-sm)">7,650</div>
                </div>

                <div class="flex items-center gap-3 border-b border-[var(--color-divider)] py-3.5" data-dom-id="rank-6">
                    <span class="w-6 text-center font-semibold text-[var(--color-text-secondary)]" style="font-size:var(--text-sm)">6</span>
                    <img src="../assets/showroom-hero.jpg" alt="法拉利" class="h-12 w-16 shrink-0 object-cover" style="border-radius:var(--radius-md)">
                    <div class="min-w-0 flex-1">
                        <div class="font-medium text-[var(--color-text-primary)]" style="font-size:var(--text-base)">法拉利 SF90</div>
                        <div class="text-[var(--color-text-tertiary)]" style="font-size:var(--text-xs)">指导价 498-598万</div>
                    </div>
                    <div class="font-semibold text-[var(--color-text-primary)]" style="font-size:var(--text-sm)">6,120</div>
                </div>

                <div class="flex items-center gap-3 border-b border-[var(--color-divider)] py-3.5" data-dom-id="rank-7">
                    <span class="w-6 text-center font-semibold text-[var(--color-text-secondary)]" style="font-size:var(--text-sm)">7</span>
                    <img src="../assets/car-g63.jpg" alt="兰博基尼" class="h-12 w-16 shrink-0 object-cover" style="border-radius:var(--radius-md)">
                    <div class="min-w-0 flex-1">
                        <div class="font-medium text-[var(--color-text-primary)]" style="font-size:var(--text-base)">兰博基尼 Urus</div>
                        <div class="text-[var(--color-text-tertiary)]" style="font-size:var(--text-xs)">指导价 238-298万</div>
                    </div>
                    <div class="font-semibold text-[var(--color-text-primary)]" style="font-size:var(--text-sm)">5,890</div>
                </div>

                <div class="flex items-center gap-3 border-b border-[var(--color-divider)] py-3.5" data-dom-id="rank-8">
                    <span class="w-6 text-center font-semibold text-[var(--color-text-secondary)]" style="font-size:var(--text-sm)">8</span>
                    <img src="../assets/car-maybach.jpg" alt="阿斯顿马丁" class="h-12 w-16 shrink-0 object-cover" style="border-radius:var(--radius-md)">
                    <div class="min-w-0 flex-1">
                        <div class="font-medium text-[var(--color-text-primary)]" style="font-size:var(--text-base)">阿斯顿马丁 DB12</div>
                        <div class="text-[var(--color-text-tertiary)]" style="font-size:var(--text-xs)">指导价 238-278万</div>
                    </div>
                    <div class="font-semibold text-[var(--color-text-primary)]" style="font-size:var(--text-sm)">4,760</div>
                </div>

                <div class="flex items-center gap-3 border-b border-[var(--color-divider)] py-3.5" data-dom-id="rank-9">
                    <span class="w-6 text-center font-semibold text-[var(--color-text-secondary)]" style="font-size:var(--text-sm)">9</span>
                    <img src="../assets/car-porsche.jpg" alt="保时捷911" class="h-12 w-16 shrink-0 object-cover" style="border-radius:var(--radius-md)">
                    <div class="min-w-0 flex-1">
                        <div class="font-medium text-[var(--color-text-primary)]" style="font-size:var(--text-base)">保时捷 911</div>
                        <div class="text-[var(--color-text-tertiary)]" style="font-size:var(--text-xs)">指导价 128-258万</div>
                    </div>
                    <div class="font-semibold text-[var(--color-text-primary)]" style="font-size:var(--text-sm)">4,320</div>
                </div>

                <div class="flex items-center gap-3 py-3.5" data-dom-id="rank-10">
                    <span class="w-6 text-center font-semibold text-[var(--color-text-secondary)]" style="font-size:var(--text-sm)">10</span>
                    <img src="../assets/car-maybach_1.jpg" alt="迈巴赫GLS" class="h-12 w-16 shrink-0 object-cover" style="border-radius:var(--radius-md)">
                    <div class="min-w-0 flex-1">
                        <div class="font-medium text-[var(--color-text-primary)]" style="font-size:var(--text-base)">迈巴赫 GLS</div>
                        <div class="text-[var(--color-text-tertiary)]" style="font-size:var(--text-xs)">指导价 183-268万</div>
                    </div>
                    <div class="font-semibold text-[var(--color-text-primary)]" style="font-size:var(--text-sm)">3,980</div>
                </div>
            </div>
        </div>
    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
