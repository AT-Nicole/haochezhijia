<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私董会员首页</title>
    <style id="theme-vars">
:root {
  /* ── Brand Colors: Ferrari Rosso Corsa ── */
  --color-primary: #DA291C;
  --color-primary-light: #E8403A;
  --color-primary-lighter: rgba(218, 41, 28, 0.06);
  --color-primary-lightest: rgba(218, 41, 28, 0.03);
  --color-primary-dark: #B01E0A;
  --color-primary-active: #9D2211;
  --color-primary-text: #FFFFFF;

  /* ── Accent: Giallo Modena ── */
  --color-accent: #E8B800;
  --color-accent-light: #F0CC44;
  --color-accent-lighter: rgba(232, 184, 0, 0.10);
  --color-accent-lightest: rgba(232, 184, 0, 0.05);

  /* ── Backgrounds: Ferrari Chiaroscuro ── */
  --color-background: #FAFAFA;
  --color-background-secondary: #F3F3F3;
  --color-background-tertiary: #E8E8E8;
  --color-surface: #FFFFFF;
  --color-surface-elevated: #FFFFFF;
  --color-surface-hover: #F5F5F5;

  /* ── Text ── */
  --color-text-primary: #181818;
  --color-text-secondary: #666666;
  --color-text-tertiary: #8F8F8F;
  --color-text-inverse: #FFFFFF;
  --color-text-quaternary: #B0B0B0;

  /* ── Borders ── */
  --color-border: #CCCCCC;
  --color-border-subtle: rgba(0, 0, 0, 0.06);
  --color-divider: rgba(0, 0, 0, 0.08);

  /* ── State Colors ── */
  --state-success: #03904A;
  --state-success-bg: rgba(3, 144, 74, 0.06);
  --state-warning: #E8A838;
  --state-warning-bg: rgba(232, 168, 56, 0.06);
  --state-error: #F13A2C;
  --state-error-bg: rgba(241, 58, 44, 0.06);
  --state-info: #4C98B9;
  --state-info-bg: rgba(76, 152, 185, 0.06);

  /* ── Typography ── */
  --font-display: 'SF Pro Display', 'PingFang SC', 'Noto Sans SC', 'Helvetica Neue', Arial, sans-serif;
  --font-body: 'SF Pro Text', 'PingFang SC', 'Noto Sans SC', 'Helvetica Neue', Arial, sans-serif;
  --font-mono: 'SF Mono', 'JetBrains Mono', ui-monospace, monospace;

  --text-xs: 0.6875rem;
  --text-sm: 0.8125rem;
  --text-base: 0.875rem;
  --text-lg: 1rem;
  --text-xl: 1.125rem;
  --text-2xl: 1.25rem;
  --text-3xl: 1.5rem;
  --text-display: 1.75rem;

  /* ── Spacing ── */
  --space-0-5: 2px;
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;

  /* ── Radius ── */
  --radius-xs: 1px;
  --radius-sm: 2px;
  --radius-md: 4px;
  --radius-lg: 8px;
  --radius-xl: 12px;
  --radius-2xl: 16px;
  --radius-full: 9999px;

  /* ── Shadows ── */
  --shadow-none: none;
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 2px 6px rgba(0, 0, 0, 0.06);
  --shadow-card: none;
  --shadow-elevated: 0 4px 12px rgba(0, 0, 0, 0.08);
  --shadow-float: 0 8px 24px rgba(0, 0, 0, 0.10);
  --shadow-modal: 0 12px 40px rgba(0, 0, 0, 0.12);

  --gradient-primary: linear-gradient(135deg, #DA291C 0%, #B01E0A 100%);
  --gradient-accent: linear-gradient(135deg, #E8B800 0%, #C49E00 100%);
  --gradient-dark: linear-gradient(180deg, #000000 0%, #181818 100%);
  --gradient-hero: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 100%);
}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--color-background);
    --color-primary: var(--color-primary);
    --color-accent: var(--color-accent);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="pb-[72px]">

      <!-- 1. Greeting Section -->
      <section class="px-5 pt-6 pb-5" aria-label="用户问候">
        <div class="flex items-center gap-3">
          <div class="flex h-11 w-11 shrink-0 items-center justify-center rounded-full" style="background: var(--color-accent);">
            <span class="text-[14px] font-semibold text-white">李</span>
          </div>
          <div class="min-w-0 flex-1">
            <p class="truncate text-[16px] font-medium leading-tight" style="color: #181818; font-family: var(--font-display);">李明辉 · 黑金私董</p>
            <p class="mt-1 text-[13px] font-normal leading-relaxed" style="color: #8F8F8F; font-family: var(--font-body);">尊享服务，品质生活</p>
          </div>
          <span class="inline-flex shrink-0 items-center gap-1 whitespace-nowrap px-2.5 py-1 text-[11px] font-semibold uppercase" style="color: var(--color-accent); letter-spacing: 1px;">
            黑金
          </span>
        </div>
      </section>

      <!-- 2. Personal Advisor Card -->
      <section class="px-5 pb-5" aria-label="专属顾问">
        <div class="p-5" style="background-color: var(--color-surface); border: 1px solid var(--color-border); border-top: 2px solid var(--color-accent); border-radius: var(--radius-lg);">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-2">
              <span class="relative flex h-2 w-2">
                <span class="absolute inline-flex h-full w-full animate-ping rounded-full opacity-75" style="background-color: var(--state-success);"></span>
                <span class="relative inline-flex h-2 w-2 rounded-full" style="background-color: var(--state-success);"></span>
              </span>
              <p class="text-[16px] font-medium leading-snug" style="color: #181818; font-family: var(--font-display);">您的专属顾问</p>
            </div>
            <span class="text-[13px] font-normal" style="color: #666666;">本月服务 8次</span>
          </div>
          <p class="mt-2 text-[14px] font-normal leading-relaxed" style="color: #666666; font-family: var(--font-body);">陈经理 · 在线</p>
          <button class="mt-3 inline-flex items-center gap-1 text-[13px] font-medium whitespace-nowrap transition-colors duration-150 active:opacity-100 focus-visible:outline-2 focus-visible:outline-offset-2" style="color: var(--color-accent); font-family: var(--font-body);">
            立即联系
            <i data-lucide="chevron-right" class="h-3.5 w-3.5"></i>
          </button>
        </div>
      </section>

      <!-- 3. Upcoming Service Card -->
      <section class="px-5 pb-5" aria-label="即将到来">
        <div class="p-5" style="background-color: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg);">
          <p class="text-[11px] uppercase font-normal" style="color: #8F8F8F; letter-spacing: 1px;">即将到来</p>
          <p class="mt-2 text-[16px] font-medium leading-snug" style="color: #181818; font-family: var(--font-display);">迈巴赫S480提车</p>
          <div class="mt-2 flex items-center gap-2">
            <i data-lucide="calendar" class="h-4 w-4" style="color: #8F8F8F;"></i>
            <span class="text-[13px] font-normal leading-relaxed" style="color: #666666;">7月18日 14:00</span>
          </div>
          <button class="mt-3 inline-flex items-center gap-1 text-[13px] font-medium whitespace-nowrap transition-colors duration-150 active:opacity-100 focus-visible:outline-2 focus-visible:outline-offset-2" style="color: var(--color-primary); font-family: var(--font-body);">
            查看详情
            <i data-lucide="chevron-right" class="h-3.5 w-3.5"></i>
          </button>
        </div>
      </section>

      <!-- 4. Quick Access Grid (2x2) -->
      <section class="px-5 pb-6" aria-label="快捷入口">
        <div class="grid grid-cols-2 gap-3">
          <button class="flex flex-col items-start gap-3 p-5 text-left transition-transform duration-200 active:scale-[0.98] focus-visible:outline-2 focus-visible:outline-offset-2" style="background-color: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg);">
            <i data-lucide="globe" class="h-5 w-5" style="color: #181818;"></i>
            <span class="text-[14px] font-medium leading-snug" style="color: #181818; font-family: var(--font-display);">全球寻车</span>
          </button>
          <button class="flex flex-col items-start gap-3 p-5 text-left transition-transform duration-200 active:scale-[0.98] focus-visible:outline-2 focus-visible:outline-offset-2" style="background-color: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg);">
            <i data-lucide="car" class="h-5 w-5" style="color: #181818;"></i>
            <span class="text-[14px] font-medium leading-snug" style="color: #181818; font-family: var(--font-display);">专属试驾</span>
          </button>
          <button class="flex flex-col items-start gap-3 p-5 text-left transition-transform duration-200 active:scale-[0.98] focus-visible:outline-2 focus-visible:outline-offset-2" style="background-color: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg);">
            <i data-lucide="sparkles" class="h-5 w-5" style="color: var(--color-accent);"></i>
            <span class="text-[14px] font-medium leading-snug" style="color: #181818; font-family: var(--font-display);">AI定价</span>
          </button>
          <button class="flex flex-col items-start gap-3 p-5 text-left transition-transform duration-200 active:scale-[0.98] focus-visible:outline-2 focus-visible:outline-offset-2" style="background-color: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg);">
            <i data-lucide="landmark" class="h-5 w-5" style="color: #181818;"></i>
            <span class="text-[14px] font-medium leading-snug" style="color: #181818; font-family: var(--font-display);">金融方案</span>
          </button>
        </div>
      </section>

      <!-- 5. AI Recommendation -->
      <section class="pb-6" aria-label="AI推荐">
        <div class="mb-3 flex items-center justify-between px-5">
          <p class="text-[16px] font-medium leading-snug" style="color: #181818; font-family: var(--font-display);">AI 为你推荐</p>
          <button class="text-[13px] font-normal whitespace-nowrap transition-colors duration-150 active:opacity-100" style="color: #8F8F8F; font-family: var(--font-body);">查看更多</button>
        </div>
        <div class="flex gap-3 overflow-x-auto px-5 pb-1 no-scrollbar">
          <article class="w-[200px] shrink-0 overflow-hidden transition-transform duration-200 active:scale-[0.98]" style="background-color: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg);">
            <img src="../assets/car-maybach.jpg" alt="迈巴赫S480" class="h-28 w-full object-cover">
            <div class="p-3">
              <p class="truncate text-[14px] font-medium leading-snug" style="color: #181818; font-family: var(--font-display);">迈巴赫S480</p>
              <p class="mt-1 text-[14px] font-medium" style="color: var(--color-primary); font-variant-numeric: tabular-nums;">¥288万</p>
            </div>
          </article>
          <article class="w-[200px] shrink-0 overflow-hidden transition-transform duration-200 active:scale-[0.98]" style="background-color: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg);">
            <img src="../assets/car-porsche.jpg" alt="保时捷911" class="h-28 w-full object-cover">
            <div class="p-3">
              <p class="truncate text-[14px] font-medium leading-snug" style="color: #181818; font-family: var(--font-display);">保时捷911</p>
              <p class="mt-1 text-[14px] font-medium" style="color: var(--color-primary); font-variant-numeric: tabular-nums;">¥198万</p>
            </div>
          </article>
        </div>
      </section>

      <!-- 6. Service Timeline -->
      <section class="px-5 pb-6" aria-label="服务进度">
        <p class="mb-3 text-[16px] font-medium leading-snug" style="color: #181818; font-family: var(--font-display);">服务进度</p>
        <div class="p-5" style="background-color: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg);">
          <div class="flex items-start gap-4">
            <div class="flex flex-col items-center pt-0.5">
              <div class="flex h-5 w-5 items-center justify-center rounded-full" style="background-color: var(--state-success);">
                <i data-lucide="check" class="h-3 w-3 text-white"></i>
              </div>
              <div class="w-px flex-1 my-1.5" style="background-color: var(--color-border);"></div>
              <div class="flex h-5 w-5 items-center justify-center rounded-full" style="background-color: var(--state-success);">
                <i data-lucide="check" class="h-3 w-3 text-white"></i>
              </div>
              <div class="w-px flex-1 my-1.5" style="background-color: var(--color-border);"></div>
              <div class="h-5 w-5 rounded-full border-2" style="background-color: var(--color-surface); border-color: #B0B0B0;"></div>
            </div>
            <div class="flex flex-col justify-between flex-1">
              <div class="pb-6">
                <p class="text-[14px] font-medium leading-snug" style="color: #181818;">合同签署</p>
                <p class="mt-1 text-[13px] font-normal" style="color: #8F8F8F;">7月10日 · 已完成</p>
              </div>
              <div class="pb-6">
                <p class="text-[14px] font-medium leading-snug" style="color: #181818;">车辆整备</p>
                <p class="mt-1 text-[13px] font-normal" style="color: #8F8F8F;">7月14日 · 已完成</p>
              </div>
              <div>
                <p class="text-[14px] font-medium leading-snug" style="color: #8F8F8F;">交付提车</p>
                <p class="mt-1 text-[13px] font-normal" style="color: #8F8F8F;">7月18日 · 待完成</p>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- 7. Lifetime Stats Bar -->
      <section class="px-5 pb-6" aria-label="会员数据">
        <div class="flex items-center justify-around px-4 py-5" style="background-color: var(--color-accent-lightest); border-radius: var(--radius-lg);">
          <div class="text-center">
            <p class="text-[16px] font-bold leading-none" style="color: var(--color-accent); font-variant-numeric: tabular-nums;">42<span class="text-[11px] font-normal ml-0.5">次</span></p>
            <p class="mt-1.5 text-[11px] font-normal" style="color: #666666;">已享服务</p>
          </div>
          <div class="h-8 w-px" style="background-color: var(--color-accent); opacity: 0.2;"></div>
          <div class="text-center">
            <p class="text-[16px] font-bold leading-none" style="color: var(--color-accent); font-variant-numeric: tabular-nums;">¥68万</p>
            <p class="mt-1.5 text-[11px] font-normal" style="color: #666666;">已省</p>
          </div>
          <div class="h-8 w-px" style="background-color: var(--color-accent); opacity: 0.2;"></div>
          <div class="text-center">
            <p class="text-[16px] font-bold leading-none" style="color: var(--color-accent); font-variant-numeric: tabular-nums;">2<span class="text-[11px] font-normal ml-0.5">年</span></p>
            <p class="mt-1.5 text-[11px] font-normal" style="color: #666666;">会员</p>
          </div>
        </div>
      </section>

      <!-- 8. Tab Bar -->
      <nav class="fixed inset-x-0 bottom-0 z-30" style="background: var(--color-surface); border-top: 1px solid var(--color-border);" aria-label="主导航">
        <div class="flex items-center justify-around h-14" style="padding-bottom: max(env(safe-area-inset-bottom), 0px);">
          <button class="flex flex-col items-center justify-center gap-0.5 w-16 h-full" style="color: var(--color-primary);" aria-label="首页" aria-current="page">
            <i data-lucide="home" class="w-5 h-5"></i>
            <span class="text-[10px] font-medium">首页</span>
          </button>
          <button class="flex flex-col items-center justify-center gap-0.5 w-16 h-full transition-colors duration-150" style="color: #8F8F8F;" aria-label="展厅">
            <i data-lucide="car" class="w-5 h-5"></i>
            <span class="text-[10px]">展厅</span>
          </button>
          <button class="flex flex-col items-center justify-center gap-0.5 w-16 h-full transition-colors duration-150" style="color: #8F8F8F;" aria-label="服务">
            <i data-lucide="concierge-bell" class="w-5 h-5"></i>
            <span class="text-[10px]">服务</span>
          </button>
          <button class="flex flex-col items-center justify-center gap-0.5 w-16 h-full transition-colors duration-150" style="color: #8F8F8F;" aria-label="管家">
            <i data-lucide="headset" class="w-5 h-5"></i>
            <span class="text-[10px]">管家</span>
          </button>
          <button class="flex flex-col items-center justify-center gap-0.5 w-16 h-full transition-colors duration-150" style="color: #8F8F8F;" aria-label="我的">
            <i data-lucide="user" class="w-5 h-5"></i>
            <span class="text-[10px]">我的</span>
          </button>
        </div>
      </nav>
    </main>
    <style>
      @media (prefers-reduced-motion: reduce) {
        * { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; }
      }
      button:focus-visible {
        outline: 2px solid var(--color-primary);
        outline-offset: 2px;
      }
    </style>
    <script>lucide.createIcons();</script>
</body>
</html>
