<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私董会员首页</title>
    <style id="theme-vars">
:root {
  /* ── Brand Colors: White Premium — NIO-Inspired Refined Red + Gold VIP ── */
  /* 蔚来风格要点：克制用色、精确对比、75%浅色+25%深色比例 */
  --color-primary: #C41E3A;
  --color-primary-light: #D6344F;
  --color-primary-lighter: rgba(196, 30, 58, 0.06);
  --color-primary-lightest: rgba(196, 30, 58, 0.03);
  --color-primary-dark: #9A1830;
  --color-primary-text: #FFFFFF;

  --color-accent: #D4A843;
  --color-accent-light: #E8C06A;
  --color-accent-lighter: rgba(212, 168, 67, 0.10);
  --color-accent-lightest: rgba(212, 168, 67, 0.05);

  /* ── Backgrounds: NIO-inspired "有温度的白" — 层次分明的暖灰梯度 ── */
  --color-background: #FAFBFC;
  --color-background-secondary: #F5F6F8;
  --color-background-tertiary: #EEEEF0;
  --color-surface: #FFFFFF;
  --color-surface-elevated: #FFFFFF;
  --color-surface-hover: #F7F8FA;

  /* ── Text: NIO风格 — 5级字重、精确对比度（9.9:1） ── */
  --color-text-primary: #1F2022;
  --color-text-secondary: #6E747A;
  --color-text-tertiary: #A0A6AE;
  --color-text-inverse: #FFFFFF;
  --color-text-quaternary: #C8CDD3;

  /* ── Borders & Dividers: NIO克制分割线 ── */
  --color-border: rgba(0, 0, 0, 0.05);
  --color-border-subtle: rgba(0, 0, 0, 0.03);
  --color-divider: rgba(0, 0, 0, 0.06);

  /* ── State Colors: 柔和功能性色彩 ── */
  --state-success: #2BBC8E;
  --state-success-bg: rgba(43, 188, 142, 0.06);
  --state-warning: #E8A838;
  --state-warning-bg: rgba(232, 168, 56, 0.06);
  --state-error: #E94A47;
  --state-error-bg: rgba(233, 74, 71, 0.06);
  --state-info: #3B8BEB;
  --state-info-bg: rgba(59, 139, 235, 0.06);

  /* ── Typography: NIO Blue Sky Sans 灵感 — 更大字号、更舒适行高 ── */
  --font-display: 'SF Pro Display', 'PingFang SC', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-body: 'SF Pro Text', 'PingFang SC', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'SF Mono', 'JetBrains Mono', ui-monospace, monospace;

  /* 蔚来APP字号层级（移动端适配） */
  --text-xs: 0.6875rem;     /* 11px - 注释/标签 */
  --text-sm: 0.8125rem;     /* 13px - 辅助文字 */
  --text-base: 0.875rem;    /* 14px - 正文（蔚来标准正文） */
  --text-lg: 0.9375rem;     /* 15px - 次要标题 */
  --text-xl: 1.0625rem;     /* 17px - 卡片标题（蔚来标准） */
  --text-2xl: 1.25rem;      /* 20px - 页面标题 */
  --text-3xl: 1.5rem;       /* 24px - 大标题 */
  --text-display: 1.75rem;  /* 28px - 核心数据展示 */

  /* ── Spacing: NIO"松弛有度"留白策略 ── */
  --space-0-5: 2px;
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;

  /* ── Radius: NIO大圆角 — 柔和亲切 ── */
  --radius-xs: 4px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-2xl: 24px;
  --radius-full: 9999px;

  /* ── Shadows: NIO精致阴影 — "高级精致的品质" ── */
  --shadow-none: none;
  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.02);
  --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.06);
  --shadow-card: 0 1px 4px rgba(0, 0, 0, 0.04), 0 0 0 1px rgba(0, 0, 0, 0.02);
  --shadow-elevated: 0 4px 16px rgba(0, 0, 0, 0.08);
  --shadow-float: 0 8px 30px rgba(0, 0, 0, 0.10);
  --shadow-modal: 0 16px 48px rgba(0, 0, 0, 0.12);

  /* ── NIO-inspired gradients ── */
  --gradient-primary: linear-gradient(135deg, #C41E3A 0%, #9A1830 100%);
  --gradient-accent: linear-gradient(135deg, #D4A843 0%, #B8922E 100%);
  --gradient-sky: linear-gradient(180deg, #EDF2FF 0%, #FAFBFC 100%);
  --gradient-warm: linear-gradient(180deg, #FFF8F0 0%, #FAFBFC 100%);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--color-background);
    --color-primary: var(--color-primary);
    --color-accent: var(--color-accent);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="pb-[84px]">
      <!-- 1. Greeting Section -->
      <section class="px-5 pt-6 pb-5" aria-label="用户问候">
        <div class="flex items-center gap-3">
          <div class="flex h-11 w-11 shrink-0 items-center justify-center rounded-full" style="background: var(--gradient-accent);">
            <span class="text-sm font-semibold text-white">李</span>
          </div>
          <div class="min-w-0 flex-1">
            <p class="truncate text-[17px] font-semibold leading-tight" style="color: var(--color-text-primary); font-family: var(--font-display);">李明辉 · 黑金私董会员</p>
            <p class="mt-1 text-[13px] font-light leading-relaxed" style="color: var(--color-text-tertiary); font-family: var(--font-body);">尊享服务，品质生活</p>
          </div>
          <span class="inline-flex shrink-0 items-center gap-1 whitespace-nowrap rounded-lg px-2.5 py-1 text-[11px] font-medium" style="color: var(--color-accent); background-color: var(--color-accent-lightest);">
            <i data-lucide="gem" class="h-3 w-3"></i>
            <span>黑金</span>
          </span>
        </div>
      </section>

      <!-- 2. Personal Advisor Card -->
      <section class="px-5 pb-5" aria-label="专属顾问">
        <div class="rounded-2xl p-5" style="background-color: var(--color-surface); box-shadow: var(--shadow-card); border-top: 2px solid var(--color-accent);">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-2">
              <span class="relative flex h-2 w-2">
                <span class="absolute inline-flex h-full w-full animate-ping rounded-full opacity-75" style="background-color: var(--state-success);"></span>
                <span class="relative inline-flex h-2 w-2 rounded-full" style="background-color: var(--state-success);"></span>
              </span>
              <p class="text-[17px] font-medium leading-snug" style="color: var(--color-text-primary); font-family: var(--font-display);">您的专属顾问</p>
            </div>
            <span class="text-[13px] font-light" style="color: var(--color-text-secondary);">本月服务 8次</span>
          </div>
          <p class="mt-2 text-[15px] font-normal leading-relaxed" style="color: var(--color-text-secondary); font-family: var(--font-body);">陈经理 · 在线</p>
          <button class="mt-3 inline-flex items-center gap-1 text-[13px] font-medium whitespace-nowrap transition-colors duration-150 hover:opacity-80 active:opacity-100 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-[var(--color-accent)]" style="color: var(--color-accent); font-family: var(--font-body);">
            立即联系
            <i data-lucide="chevron-right" class="h-3.5 w-3.5"></i>
          </button>
        </div>
      </section>

      <!-- 3. Upcoming Service Card -->
      <section class="px-5 pb-5" aria-label="即将到来">
        <div class="rounded-2xl p-5" style="background-color: var(--color-surface); box-shadow: var(--shadow-card);">
          <p class="text-[13px] font-light leading-relaxed" style="color: var(--color-text-tertiary);">即将到来</p>
          <p class="mt-2 text-[17px] font-semibold leading-snug" style="color: var(--color-text-primary); font-family: var(--font-display);">迈巴赫S480提车</p>
          <div class="mt-2 flex items-center gap-2">
            <i data-lucide="calendar" class="h-4 w-4" style="color: var(--color-text-tertiary);"></i>
            <span class="text-[15px] font-normal leading-relaxed" style="color: var(--color-text-secondary);">7月18日 14:00</span>
          </div>
          <button class="mt-3 inline-flex items-center gap-1 text-[13px] font-medium whitespace-nowrap transition-colors duration-150 hover:opacity-80 active:opacity-100 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-[var(--color-primary)]" style="color: var(--color-primary); font-family: var(--font-body);">
            查看详情
            <i data-lucide="chevron-right" class="h-3.5 w-3.5"></i>
          </button>
        </div>
      </section>

      <!-- 4. Quick Access Grid -->
      <section class="px-5 pb-6" aria-label="快捷入口">
        <div class="grid grid-cols-2 gap-3">
          <button class="flex flex-col items-start gap-3 rounded-2xl p-5 text-left transition-transform duration-200 hover:-translate-y-0.5 active:translate-y-0 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-[var(--color-primary)]" style="background-color: var(--color-surface); box-shadow: var(--shadow-card);">
            <i data-lucide="globe" class="h-5 w-5" style="color: var(--color-primary);"></i>
            <span class="text-[15px] font-medium leading-snug" style="color: var(--color-text-primary); font-family: var(--font-display);">全球寻车</span>
          </button>
          <button class="flex flex-col items-start gap-3 rounded-2xl p-5 text-left transition-transform duration-200 hover:-translate-y-0.5 active:translate-y-0 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-[var(--color-primary)]" style="background-color: var(--color-surface); box-shadow: var(--shadow-card);">
            <i data-lucide="car" class="h-5 w-5" style="color: var(--color-primary);"></i>
            <span class="text-[15px] font-medium leading-snug" style="color: var(--color-text-primary); font-family: var(--font-display);">专属试驾</span>
          </button>
          <button class="flex flex-col items-start gap-3 rounded-2xl p-5 text-left transition-transform duration-200 hover:-translate-y-0.5 active:translate-y-0 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-[var(--color-accent)]" style="background-color: var(--color-surface); box-shadow: var(--shadow-card);">
            <i data-lucide="sparkles" class="h-5 w-5" style="color: var(--color-accent);"></i>
            <span class="text-[15px] font-medium leading-snug" style="color: var(--color-text-primary); font-family: var(--font-display);">AI定价</span>
          </button>
          <button class="flex flex-col items-start gap-3 rounded-2xl p-5 text-left transition-transform duration-200 hover:-translate-y-0.5 active:translate-y-0 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-[var(--color-primary)]" style="background-color: var(--color-surface); box-shadow: var(--shadow-card);">
            <i data-lucide="landmark" class="h-5 w-5" style="color: var(--color-primary);"></i>
            <span class="text-[15px] font-medium leading-snug" style="color: var(--color-text-primary); font-family: var(--font-display);">金融方案</span>
          </button>
        </div>
      </section>

      <!-- 5. AI Recommendation -->
      <section class="pb-6" aria-label="AI推荐">
        <div class="mb-3 flex items-center justify-between px-5">
          <p class="text-[17px] font-semibold leading-snug" style="color: var(--color-text-primary); font-family: var(--font-display);">AI 为你推荐</p>
          <button class="text-[13px] font-normal whitespace-nowrap transition-colors duration-150 hover:opacity-80 active:opacity-100 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-[var(--color-text-tertiary)]" style="color: var(--color-text-tertiary); font-family: var(--font-body);">查看更多</button>
        </div>
        <div class="flex gap-3 overflow-x-auto px-5 pb-1 no-scrollbar">
          <!-- Car 1: Maybach -->
          <article class="w-[220px] shrink-0 overflow-hidden rounded-2xl transition-transform duration-200 hover:-translate-y-0.5 active:translate-y-0" style="background-color: var(--color-surface); box-shadow: var(--shadow-card);">
            <img src="../assets/car-maybach.jpg" alt="迈巴赫S480" class="h-32 w-full object-cover">
            <div class="p-4">
              <p class="truncate text-[15px] font-medium leading-snug" style="color: var(--color-text-primary); font-family: var(--font-display);">迈巴赫S480</p>
              <p class="mt-1.5 text-[15px] font-semibold leading-snug" style="color: var(--color-primary); font-variant-numeric: tabular-nums;">¥288万</p>
            </div>
          </article>
          <!-- Car 2: Porsche -->
          <article class="w-[220px] shrink-0 overflow-hidden rounded-2xl transition-transform duration-200 hover:-translate-y-0.5 active:translate-y-0" style="background-color: var(--color-surface); box-shadow: var(--shadow-card);">
            <img src="../assets/car-porsche.jpg" alt="保时捷911" class="h-32 w-full object-cover">
            <div class="p-4">
              <p class="truncate text-[15px] font-medium leading-snug" style="color: var(--color-text-primary); font-family: var(--font-display);">保时捷911</p>
              <p class="mt-1.5 text-[15px] font-semibold leading-snug" style="color: var(--color-primary); font-variant-numeric: tabular-nums;">¥198万</p>
            </div>
          </article>
        </div>
      </section>

      <!-- 6. Service Timeline -->
      <section class="px-5 pb-6" aria-label="服务进度">
        <p class="mb-3 text-[17px] font-semibold leading-snug" style="color: var(--color-text-primary); font-family: var(--font-display);">服务进度</p>
        <div class="rounded-2xl p-5" style="background-color: var(--color-surface); box-shadow: var(--shadow-card);">
          <div class="flex items-start gap-4">
            <!-- Timeline dots + lines -->
            <div class="flex flex-col items-center pt-0.5">
              <div class="flex h-5 w-5 items-center justify-center rounded-full" style="background-color: var(--state-success);">
                <i data-lucide="check" class="h-3 w-3 text-white"></i>
              </div>
              <div class="w-px flex-1 my-1.5" style="background-color: var(--color-border);"></div>
              <div class="flex h-5 w-5 items-center justify-center rounded-full" style="background-color: var(--state-success);">
                <i data-lucide="check" class="h-3 w-3 text-white"></i>
              </div>
              <div class="w-px flex-1 my-1.5" style="background-color: var(--color-border);"></div>
              <div class="h-5 w-5 rounded-full border-2" style="background-color: var(--color-surface); border-color: var(--color-text-quaternary);"></div>
            </div>
            <!-- Timeline content -->
            <div class="flex flex-col justify-between flex-1">
              <div class="pb-6">
                <p class="text-[15px] font-medium leading-snug" style="color: var(--color-text-primary);">合同签署</p>
                <p class="mt-1 text-[13px] font-light leading-relaxed" style="color: var(--color-text-tertiary);">7月10日 · 已完成</p>
              </div>
              <div class="pb-6">
                <p class="text-[15px] font-medium leading-snug" style="color: var(--color-text-primary);">车辆整备</p>
                <p class="mt-1 text-[13px] font-light leading-relaxed" style="color: var(--color-text-tertiary);">7月14日 · 已完成</p>
              </div>
              <div>
                <p class="text-[15px] font-medium leading-snug" style="color: var(--color-text-tertiary);">交付提车</p>
                <p class="mt-1 text-[13px] font-light leading-relaxed" style="color: var(--color-text-tertiary);">7月18日 · 待完成</p>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- 7. Lifetime Stats Bar -->
      <section class="px-5 pb-6" aria-label="会员数据">
        <div class="flex items-center justify-around rounded-2xl px-4 py-5" style="background-color: var(--color-accent-lightest);">
          <div class="text-center">
            <p class="text-lg font-bold leading-none" style="color: var(--color-accent); font-variant-numeric: tabular-nums;">42<span class="text-[11px] font-normal ml-0.5">次</span></p>
            <p class="mt-1.5 text-[11px] font-light leading-relaxed" style="color: var(--color-text-secondary);">已享服务</p>
          </div>
          <div class="h-8 w-px" style="background-color: var(--color-accent); opacity: 0.2;"></div>
          <div class="text-center">
            <p class="text-lg font-bold leading-none" style="color: var(--color-accent); font-variant-numeric: tabular-nums;">¥68万</p>
            <p class="mt-1.5 text-[11px] font-light leading-relaxed" style="color: var(--color-text-secondary);">已省</p>
          </div>
          <div class="h-8 w-px" style="background-color: var(--color-accent); opacity: 0.2;"></div>
          <div class="text-center">
            <p class="text-lg font-bold leading-none" style="color: var(--color-accent); font-variant-numeric: tabular-nums;">2<span class="text-[11px] font-normal ml-0.5">年</span></p>
            <p class="mt-1.5 text-[11px] font-light leading-relaxed" style="color: var(--color-text-secondary);">会员</p>
          </div>
        </div>
      </section>

      <!-- 8. Tab Bar -->
      <nav class="fixed inset-x-0 bottom-0 z-30 border-t" style="background-color: var(--color-surface); border-color: var(--color-border-subtle);" aria-label="主导航">
        <div class="flex items-center justify-around px-2 pt-2 pb-[max(env(safe-area-inset-bottom),8px)]">
          <button class="flex flex-col items-center gap-0.5 px-3 py-1" style="color: var(--color-primary);" aria-label="首页" aria-current="page">
            <i data-lucide="home" class="h-5 w-5"></i>
            <span class="text-[10px] font-medium">首页</span>
          </button>
          <button class="flex flex-col items-center gap-0.5 px-3 py-1 transition-colors duration-150" style="color: var(--color-text-tertiary);" aria-label="展厅">
            <i data-lucide="car" class="h-5 w-5"></i>
            <span class="text-[10px] font-light">展厅</span>
          </button>
          <button class="flex flex-col items-center gap-0.5 px-3 py-1 transition-colors duration-150" style="color: var(--color-text-tertiary);" aria-label="服务">
            <i data-lucide="concierge-bell" class="h-5 w-5"></i>
            <span class="text-[10px] font-light">服务</span>
          </button>
          <button class="flex flex-col items-center gap-0.5 px-3 py-1 transition-colors duration-150" style="color: var(--color-text-tertiary);" aria-label="管家">
            <i data-lucide="headset" class="h-5 w-5"></i>
            <span class="text-[10px] font-light">管家</span>
          </button>
          <button class="flex flex-col items-center gap-0.5 px-3 py-1 transition-colors duration-150" style="color: var(--color-text-tertiary);" aria-label="我的">
            <i data-lucide="user" class="h-5 w-5"></i>
            <span class="text-[10px] font-light">我的</span>
          </button>
        </div>
      </nav>
    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
