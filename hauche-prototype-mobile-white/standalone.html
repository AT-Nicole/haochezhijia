<style id="theme-vars">
:root {
  /* ── Brand Colors: Ferrari Rosso Corsa — 赛道传承红 ── */
  /* 法拉利数字设计: 克制的红色使用，仅用于CTA和品牌关键时刻 */
  --color-primary: #DA291C;
  --color-primary-light: #E8403A;
  --color-primary-lighter: rgba(218, 41, 28, 0.06);
  --color-primary-lightest: rgba(218, 41, 28, 0.03);
  --color-primary-dark: #B01E0A;
  --color-primary-active: #9D2211;
  --color-primary-text: #FFFFFF;

  /* ── Accent: 赛道黄 Giallo Modena — 法拉利盾牌传承色 ── */
  --color-accent: #E8B800;
  --color-accent-light: #F0CC44;
  --color-accent-lighter: rgba(232, 184, 0, 0.10);
  --color-accent-lightest: rgba(232, 184, 0, 0.05);

  /* ── Backgrounds: Ferrari Chiaroscuro — 明暗交替展厅感 ── */
  /* 法拉利核心理念：纯白编辑面板 + 深黑沉浸区域，硬切割过渡 */
  --color-background: #FAFAFA;
  --color-background-secondary: #F3F3F3;
  --color-background-tertiary: #E8E8E8;
  --color-surface: #FFFFFF;
  --color-surface-elevated: #FFFFFF;
  --color-surface-hover: #F5F5F5;

  /* ── Text: Ferrari双字体编辑层级 — FerrariSans灵感 ── */
  --color-text-primary: #181818;
  --color-text-secondary: #666666;
  --color-text-tertiary: #8F8F8F;
  --color-text-inverse: #FFFFFF;
  --color-text-quaternary: #B0B0B0;

  /* ── Borders & Dividers: 法拉利精准线条 ── */
  --color-border: #CCCCCC;
  --color-border-subtle: rgba(0, 0, 0, 0.06);
  --color-divider: rgba(0, 0, 0, 0.08);

  /* ── State Colors ── */
  --state-success: #03904A;
  --state-success-bg: rgba(3, 144, 74, 0.06);
  --state-warning: #E8A838;
  --state-warning-bg: rgba(232, 168, 56, 0.06);
  --state-error: #F13A2C;
  --state-error-bg: rgba(241, 58, 44, 0.06);
  --state-info: #4C98B9;
  --state-info-bg: rgba(76, 152, 185, 0.06);

  /* ── Typography: FerrariSans灵感 — 紧凑有力 ── */
  --font-display: 'SF Pro Display', 'PingFang SC', 'Noto Sans SC', 'Helvetica Neue', Arial, sans-serif;
  --font-body: 'SF Pro Text', 'PingFang SC', 'Noto Sans SC', 'Helvetica Neue', Arial, sans-serif;
  --font-mono: 'SF Mono', 'JetBrains Mono', ui-monospace, monospace;

  /* 法拉利字号层级 — 标题紧凑、正文舒适 */
  --text-xs: 0.6875rem;     /* 11px - 大写标签（text-transform:uppercase + letter-spacing:1px）*/
  --text-sm: 0.8125rem;     /* 13px - 说明文字 */
  --text-base: 0.875rem;    /* 14px - 正文 */
  --text-lg: 1rem;          /* 16px - 卡片标题/UI标题 */
  --text-xl: 1.125rem;      /* 18px - 副标题 */
  --text-2xl: 1.25rem;      /* 20px - 章节标题 */
  --text-3xl: 1.5rem;       /* 24px - 大标题 */
  --text-display: 1.75rem;   /* 28px - 核心数据/英雄标题 */

  /* ── Spacing: 法拉利8px基础网格 ── */
  --space-0-5: 2px;
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;

  /* ── Radius: 法拉利剃刀级精度 — 2px标志性圆角 ── */
  --radius-xs: 1px;
  --radius-sm: 2px;
  --radius-md: 4px;
  --radius-lg: 8px;
  --radius-xl: 12px;
  --radius-2xl: 16px;
  --radius-full: 9999px;

  /* ── Shadows: 法拉利扁平层次 — 近乎零阴影 ── */
  --shadow-none: none;
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 2px 6px rgba(0, 0, 0, 0.06);
  --shadow-card: none;
  --shadow-elevated: 0 4px 12px rgba(0, 0, 0, 0.08);
  --shadow-float: 0 8px 24px rgba(0, 0, 0, 0.10);
  --shadow-modal: 0 12px 40px rgba(0, 0, 0, 0.12);

  /* ── Gradients: 极少使用 — 法拉利用纯色对比，不用渐变 ── */
  --gradient-primary: linear-gradient(135deg, #DA291C 0%, #B01E0A 100%);
  --gradient-accent: linear-gradient(135deg, #E8B800 0%, #C49E00 100%);
  --gradient-dark: linear-gradient(180deg, #000000 0%, #181818 100%);
  --gradient-hero: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 100%);
}

</style>

@theme inline {

}
@layer base {
body { background: var(--color-background); color: var(--color-text-primary); }
td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
th { @apply whitespace-nowrap; }
}

=\"chevron-right\" class=\"h-4 w-4 shrink-0\" style=\"color:var(--color-text-tertiary)\"></i>\n                    </div>\n                </div>\n            </div>\n\n            <!-- Team Status -->\n            <div class=\"mt-5\">\n                <h3 class=\"mb-3 font-semibold text-[var(--color-text-primary)]\" style=\"font-size:var(--text-base)\">团队状态</h3>\n                <div class=\"border border-[var(--color-border)]\" style=\"border-radius:var(--radius-lg);background:var(--color-surface)\" data-dom-id=\"team-status\">\n                    <div class=\"flex items-center gap-3 border-b border-[var(--color-divider)] p-4\">\n                        <div class=\"flex h-8 w-8 items-center justify-center text-[var(--color-text-sm)] font-medium\" style=\"background:var(--color-primary-lighter);border-radius:var(--radius-full);color:var(--color-primary);font-size:var(--text-xs)\">李</div>\n                        <div class=\"min-w-0 flex-1\">\n                            <div class=\"font-medium text-[var(--color-text-primary)]\" style=\"font-size:var(--text-sm)\">李经理</div>\n                            <div class=\"text-[var(--color-text-tertiary)]\" style=\"font-size:var(--text-xs)\">在岗 &middot; 接待客户中</div>\n                        </div>\n                        <span class=\"px-2 py-0.5\" style=\"font-size:var(--text-xs);color:var(--state-success);background:var(--state-success-bg);border-radius:var(--radius-sm)\">在线</span>\n                    </div>\n                    <div class=\"flex items-center gap-3 border-b border-[var(--color-divider)] p-4\">\n                        <div class=\"flex h-8 w-8 items-center justify-center font-medium\" style=\"background:var(--color-background-secondary);border-radius:var(--radius-full);color:var(--color-text-primary);font-size:var(--text-xs)\">张</div>\n                        <div class=\"min-w-0 flex-1\">\n                            <div class=\"font-medium text-[var(--color-text-primary)]\" style=\"font-size:var(--text-sm)\">张销售</div>\n                            <div class=\"text-[var(--color-text-tertiary)]\" style=\"font-size:var(--text-xs)\">外出试驾 &middot; G63</div>\n                        </div>\n                        <span class=\"px-2 py-0.5\" style=\"font-size:var(--text-xs);color:var(--state-warning);background:var(--state-warning-bg);border-radius:var(--radius-sm)\">外出</span>\n                    </div>\n                    <div class=\"flex items-center gap-3 p-4\">\n                        <div class=\"flex h-8 w-8 items-center justify-center font-medium\" style=\"background:var(--color-background-secondary);border-radius:var(--radius-full);color:var(--color-text-primary);font-size:var(--text-xs)\">刘</div>\n                        <div class=\"min-w-0 flex-1\">\n                            <div class=\"font-medium text-[var(--color-text-primary)]\" style=\"font-size:var(--text-sm)\">刘交付</div>\n                            <div class=\"text-[var(--color-text-tertiary)]\" style=\"font-size:var(--text-xs)\">准备交付仪式</div>\n                        </div>\n                        <span class=\"px-2 py-0.5\" style=\"font-size:var(--text-xs);color:var(--state-success);background:var(--state-success-bg);border-radius:var(--radius-sm)\">在线</span>\n                    </div>\n                </div>\n            </div>\n\n            <!-- Quick Actions -->\n            <div class=\"mt-5\">\n                <h3 class=\"mb-3 font-semibold text-[var(--color-text-primary)]\" style=\"font-size:var(--text-base)\">快捷操作</h3>\n                <div class=\"grid grid-cols-4 gap-3\" data-dom-id=\"quick-actions\">\n                    <button class=\"flex flex-col items-center gap-2 p-3\" aria-label=\"新增客户\">\n                        <div class=\"flex h-10 w-10 items-center justify-center\" style=\"background:var(--color-primary-lighter);border-radius:var(--radius-lg)\">\n                            <i data-lucide=\"user-plus\" class=\"h-5 w-5\" style=\"color:var(--color-primary)\"></i>\ function resolveTabs(pk){var p=PAGES[pk];if(!p)return null;if(Array.isArray(p.tabs))return p.tabs;if(typeof p.tabs==='string'){for(var k in PAGES){var v=PAGES[k];if(v.role===p.tabs&&Array.isArray(v.tabs))return v.tabs;}}return null;}
function findRoleForPage(pk){if(PAGES[pk]&&PAGES[pk].role)return PAGES[pk].role;for(var k in PAGES){var v=PAGES[k];if(!Array.isArray(v.tabs))continue;for(var i=0;i<v.tabs.length;i++){if(v.tabs[i].page===pk)return v.role;}}return null;}
function getCurrentTabs(pk){var p=PAGES[pk];if(!p)return null;if(p.tabs)return resolveTabs(pk);var r=findRoleForPage(pk);if(r){for(var k in PAGES){var v=PAGES[k];if(v.role===r&&Array.isArray(v.tabs))return v.tabs;}}return null;}

var $navBar=document.getElementById('nav-bar');

var cache={};
var currentPage=null;
var isLoading=false;

function getPageKeyFromHash(){var h=window.location.hash||'';var m=h.match(/^#\/([a-z0-9-]+)$/i);return m?m[1].toLowerCase():null;}

function navigate(pk,ps){if(!pk||!PAGES[pk]){if(pk!=='role-select')window.location.hash='#/role-select';return;}if(ps!==false)history.pushState(null,'','#/'+pk);currentPage=pk;loadPage(pk);}

function loadPage(pk){if(isLoading)return;isLoading=true;var pi=PAGES[pk];updateNavBar(pk,pi);updateTabBar(pk,pi);updateContainerPadding(pi);$content.classList.remove('loaded');showLoading(true);requestAnimationFrame(function(){try{var html;if(cache[pk]){html=cache[pk];}else if(PAGE_CONTENTS[pk]){html=PAGE_CONTENTS[pk];cache[pk]=html;}else{html='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;padding:24px;"><div style="font-size:var(--text-base);color:var(--color-text-secondary);text-align:center;line-height:1.6;">页面开发中</div></div>';}$content.innerHTML=html;showLoading(false);requestAnimationFrame(function(){$content.classList.add('loaded');});document.title=pi.title+' — 豪车之家';if(typeof lucide!=='undefined'&&lucide.createIcons)lucide.createIcons();setupInterception();}catch(e){console.error('Page load error:',pk,e);showLoading(false);}isLoading=false;});}

function setupInterception(){$content.onclick=function(e){var t=e.target.closest('a[href]');if(t){e.preventDefault();e.stopPropagation();var href=t.getAttribute('href');if(!href)return;href=href.replace(/\.html$/i,'');var parts=href.split('/');var pk=parts[parts.length-1].toLowerCase();if(PAGES[pk]){navigate(pk);}return;}var bt=e.target.closest('[data-back],.back-btn,[data-dom-id="btn-back"],[data-dom-id="nav-back"]');if(bt){e.preventDefault();e.stopPropagation();history.back();return;}};}

function updateNavBar(pk,pi){if(pi.showBack===true){$navBar.style.display='flex';$navTitle.textContent=pi.title;}else{$navBar.style.display='none';$navTitle.textContent='';}}

function updateTabBar(pk,pi){var tabs=getCurrentTabs(pk);if(!tabs){$tabBar.style.display='none';return;}$tabBar.style.display='block';var h='';for(var i=0;i<tabs.length;i++){var tab=tabs[i];var ia=tab.page===pk;h+='<button class="tab-item'+(ia?' active':'')+'" data-tab-page="'+tab.page+'" aria-label="'+tab.label+'"><span class="tab-icon"><i data-lucide="'+tab.icon+'" style="width:20px;height:20px;"></i></span><span class="tab-label">'+tab.label+'</span></button>';}$tabBarInner.innerHTML=h;if(typeof lucide!=='undefined'&&lucide.createIcons)lucide.createIcons();var btns=$tabBarInner.querySelectorAll('.tab-item');for(var j=0;j<btns.length;j++){(function(btn){btn.addEventListener('click',function(e){e.preventDefault();var tp=this.getAttribute('data-tab-page');if(tp&&PAGES[tp])navigate(tp);});})(btns[j]);}}

function updateContainerPadding(pi){var sb=pi.showBack===true;var ht=getCurrentTabs(currentPage)!==null;$container.className='';if(sb)$container.classList.add('has-nav');if(ht)$container.classList.add('has-tab');}

function showLoading(s){$loading.style.display=s?'flex':'none';}

document.addEventListener('click',function(e){var rb=e.target.closest('[data-dom-id="role-buyer"],[data-dom-id="role-dealer"],[data-dom-id="role-creator"],[data-dom-id="role-partner"],[data-dom-id="role-admin"]');if(rb){var di=rb.getAttribute('data-dom-id');var rm={'role-buyer':'home-landing','role-dealer':'home-dealer','role-creator':'home-creator','role-partner':'role-select','role-admin':'home-admin'};var t=rm[di];if(t)navigate(t);return;}});

$tabBar.addEventListener('click',function(e){var ti=e.target.closest('.tab-item');if(!ti)return;var tp=ti.getAttribute('data-tab-page');if(tp==='role-select'){e.preventDefault();navigate('role-select');}});

$navBackBtn.addEventListener('click',function(){history.back();});

window.addEventListener('hashchange',function(){var pk=getPageKeyFromHash();if(pk&&pk!==currentPage&&PAGES[pk]){currentPage=pk;loadPage(pk);}else if(!pk||!PAGES[pk]){window.location.hash='#/role-select';}});

function init(){if(typeof lucide!=='undefined'&&lucide.createIcons)lucide.createIcons();var pk=getPageKeyFromHash();if(pk&&PAGES[pk]){navigate(pk,false);}else{navigate('role-select',false);}}

if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',init);}else{init();}

</script>
